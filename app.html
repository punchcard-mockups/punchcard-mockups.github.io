<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>PunchCard</title>
<style>
  :root {
    --navy: #0D1B2A;
    --deep-blue: #1B2838;
    --slate: #2C3E50;
    --surface-dark: #1E293B;
    --surface-card: #263548;
    --surface-card-hi: #2e4058;
    --accent-blue: #3B82F6;
    --accent-blue-bright: #60A5FA;
    --accent-green: #10B981;
    --accent-green-light: #34D399;
    --accent-red: #EF4444;
    --accent-red-light: #F87171;
    --accent-amber: #F59E0B;
    --text-primary: #F1F5F9;
    --text-secondary: #94A3B8;
    --text-muted: #64748B;
    --outline-soft: rgba(148,163,184,.15);

    --emp-1:#3B82F6;
    --emp-2:#10B981;
    --emp-3:#F59E0B;
    --emp-4:#EF4444;
    --emp-5:#8B5CF6;
    --emp-6:#EC4899;
    --emp-7:#06B6D4;
    --emp-8:#F97316;
    --emp-9:#14B8A6;
    --emp-10:#6366F1;
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: #0A1220;
    color: var(--text-primary);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  header.page {
    padding: 24px 32px 12px;
    display: flex;
    align-items: baseline;
    gap: 16px;
    flex-wrap: wrap;
  }
  header.page h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; margin: 0; }
  header.page p { margin: 0; color: var(--text-secondary); font-size: 13px; }

  .stage {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
    gap: 28px;
    padding: 12px 32px 60px;
    align-items: start;
  }

  /* Phone shell */
  .phone {
    justify-self: center;
    width: 380px;
    height: 780px;
    border-radius: 44px;
    background: var(--navy);
    padding: 14px;
    box-shadow: 0 30px 80px rgba(0,0,0,.5), 0 0 0 10px #0a0f1a, 0 0 0 11px #1e293b;
    position: relative;
  }
  .phone::before {
    content: "";
    position: absolute;
    top: 18px; left: 50%;
    transform: translateX(-50%);
    width: 110px; height: 26px;
    background: #000;
    border-radius: 14px;
    z-index: 5;
  }
  .screen {
    border-radius: 32px;
    background: var(--navy);
    overflow: hidden;
    position: relative;
    height: 100%;
    padding: 56px 18px 24px;
    display: flex;
    flex-direction: column;
  }
  .scroll {
    flex: 1;
    overflow-y: auto;
    overscroll-behavior: contain;
    padding: 0 6px;
    margin: 0 -6px;
  }
  .scroll::-webkit-scrollbar { width: 6px; }
  .scroll::-webkit-scrollbar-thumb { background: var(--surface-dark); border-radius: 3px; }

  /* Topbar */
  .topbar {
    display: flex;
    align-items: center;
    gap: 4px;
    height: 38px;
    margin-bottom: 6px;
  }
  .topbar .spacer { flex: 1; }
  .topbar .back {
    width: 38px; height: 38px;
    border-radius: 12px;
    display: grid; place-items: center;
    color: var(--text-secondary);
    cursor: pointer;
    transition: background 150ms ease, transform 100ms ease;
  }
  .topbar .back:hover { background: var(--surface-dark); color: var(--text-primary); }
  .topbar .back:active { transform: scale(.92); }
  .topbar .title { font-size: 15px; font-weight: 600; color: var(--text-primary); }
  .topbar .icon-btn {
    width: 38px; height: 38px;
    border-radius: 12px;
    display: grid; place-items: center;
    color: var(--text-secondary);
    cursor: pointer;
    transition: background 150ms ease, transform 100ms ease;
  }
  .topbar .icon-btn:hover { background: var(--surface-dark); color: var(--text-primary); }
  .topbar .icon-btn:active { transform: scale(.92); }
  .lang-toggle {
    position: relative;
    display: inline-flex;
    background: var(--surface-dark);
    border-radius: 999px;
    padding: 3px;
    cursor: pointer;
    user-select: none;
    border: 1px solid var(--outline-soft);
    transition: background 150ms ease;
  }
  .lang-toggle:hover { background: var(--surface-card-hi); }
  .lang-toggle .slider {
    position: absolute;
    top: 3px; bottom: 3px;
    width: calc(50% - 3px);
    background: var(--accent-blue);
    border-radius: 999px;
    transition: transform 220ms cubic-bezier(.2,.8,.2,1);
    box-shadow: 0 2px 6px rgba(59,130,246,.3);
  }
  .lang-toggle.es .slider { transform: translateX(100%); }
  .lang-toggle .opt {
    position: relative;
    z-index: 1;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.5px;
    padding: 3px 10px;
    color: var(--text-secondary);
    transition: color 180ms ease;
    min-width: 26px;
    text-align: center;
  }
  .lang-toggle .opt.active { color: #fff; }

  /* Greeting */
  .greeting { padding: 2px 6px 10px; }
  .greeting .hello { font-size: 15px; color: var(--text-secondary); }
  .greeting .name {
    font-size: 26px; font-weight: 700; letter-spacing: -0.4px;
  }
  .greeting .role {
    margin-top: 4px;
    font-size: 12px; font-weight: 700; letter-spacing: 0.4px;
    color: var(--accent-blue-bright);
    text-transform: uppercase;
  }
  .greeting .role.readonly { color: var(--accent-amber); }

  /* Month nav */
  .month-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 2px;
  }
  .month-nav .chev {
    width: 40px; height: 40px;
    border-radius: 12px;
    display: grid; place-items: center;
    color: var(--text-secondary);
    cursor: pointer;
    transition: background 150ms ease, transform 100ms ease;
  }
  .month-nav .chev:hover { background: var(--surface-dark); color: var(--text-primary); }
  .month-nav .chev:active { transform: scale(.92); }
  .month-nav .label { font-size: 17px; font-weight: 600; }

  /* Calendar */
  .cal { padding: 4px 2px 0; }
  .cal .dows {
    display: grid; grid-template-columns: repeat(7, 1fr); margin-bottom: 4px;
  }
  .cal .dows span {
    text-align: center;
    font-size: 10px; font-weight: 700;
    color: var(--text-secondary);
    letter-spacing: 0.6px;
  }
  .cal .grid { display: grid; grid-template-columns: repeat(7, 1fr); }
  .cal .cell {
    aspect-ratio: 1/1;
    padding: 2px;
    cursor: pointer;
    transition: transform 90ms ease;
  }
  .cal .cell:active { transform: scale(.96); }
  .cal .inner {
    width: 100%; height: 100%;
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    transition: background 120ms ease;
  }
  .cal .inner .num { font-size: 14px; font-weight: 500; color: var(--text-primary); }
  .cal .cell.empty .num { opacity: 0.3; font-weight: 400; }
  .cal .cell.has-shifts .num { font-weight: 600; }
  .cal .cell.today .inner { background: rgba(59,130,246,.12); }
  .cal .cell.today .num { font-weight: 700; }
  .cal .cell.selected .inner { background: var(--accent-blue); }
  .cal .cell.selected .num { color: #fff; font-weight: 700; }
  .cal .pair {
    font-size: 9px; font-weight: 700; line-height: 1;
    display: flex; align-items: center; gap: 3px;
    color: var(--accent-blue-bright);
  }
  .cal .pair .mid { color: var(--text-muted); font-weight: 500; }
  .cal .pair .emp { color: var(--accent-green-light); }
  .cal .cell.selected .pair,
  .cal .cell.selected .pair .mid,
  .cal .cell.selected .pair .emp { color: rgba(255,255,255,.9); }
  .cal .heat-1 .inner { background: rgba(59,130,246,.04); }
  .cal .heat-2 .inner { background: rgba(59,130,246,.08); }
  .cal .heat-3 .inner { background: rgba(59,130,246,.12); }
  .cal .heat-4 .inner { background: rgba(59,130,246,.16); }

  /* Day detail — table header */
  .day-detail {
    margin: 6px 0 0;
    padding: 12px;
    border-radius: 14px;
    background: rgba(44,62,80,0.6);
  }
  .day-detail .date-label {
    font-size: 12px; font-weight: 700; letter-spacing: 0.3px; margin-bottom: 8px;
  }
  .day-detail .no-shifts { font-size: 12px; color: var(--text-muted); }
  .dd-table { display: flex; flex-direction: column; }
  .dd-table .head {
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 10px;
    padding: 4px 2px 6px;
    font-size: 9px;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    font-weight: 700;
    color: var(--text-muted);
    border-bottom: 1px solid var(--outline-soft);
  }
  .dd-table .head .r { text-align: right; }
  .dd-table .trow {
    display: grid;
    grid-template-columns: 1fr auto auto;
    align-items: center;
    gap: 10px;
    padding: 7px 2px;
    border-bottom: 1px solid var(--outline-soft);
  }
  .dd-table .trow:last-of-type { border-bottom: 0; }
  .dd-table .nm {
    font-size: 13px; font-weight: 600;
    display: flex; align-items: center; gap: 8px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .dd-table .nm .sw { width: 4px; height: 16px; border-radius: 2px; flex: 0 0 auto; }
  .dd-table .tm {
    font-size: 12px; color: var(--text-secondary);
    font-variant-numeric: tabular-nums;
  }
  .dd-table .hrs {
    font-size: 13px; font-weight: 700;
    font-variant-numeric: tabular-nums;
    text-align: right; min-width: 34px;
  }
  .dd-table .cmt {
    grid-column: 1 / -1;
    font-size: 11px; color: var(--text-secondary);
    font-style: italic; margin-top: 2px; opacity: .8;
  }

  /* Info card */
  .info-card {
    background: var(--surface-card);
    border-radius: 16px;
    padding: 16px;
    margin-top: 12px;
  }
  .info-card.clickable { cursor: pointer; transition: background 150ms ease; }
  .info-card.clickable:hover { background: var(--surface-card-hi); }
  .info-card .row {
    display: flex; justify-content: space-evenly; gap: 8px;
  }
  .info-card .stat {
    display: flex; flex-direction: column; align-items: center; gap: 2px;
  }
  .info-card .stat .value {
    font-size: 24px; font-weight: 700; letter-spacing: -0.3px;
  }
  .info-card .stat .label {
    font-size: 10px; letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--text-secondary); font-weight: 600;
  }
  .info-card .stat.blue .value { color: var(--accent-blue-bright); }
  .info-card .stat.green .value { color: var(--accent-green-light); }
  .info-card .stat.amber .value { color: var(--accent-amber); }
  .info-card .stat.plain .value { color: var(--text-primary); }

  .info-card.legend .legend-list {
    display: flex; flex-direction: column; gap: 8px;
    margin-top: 10px;
    border-top: 1px solid var(--outline-soft);
    padding-top: 10px;
  }
  .emp-breakdown .brow {
    display: flex; align-items: center; gap: 10px; padding: 4px 0;
  }
  .emp-breakdown .brow .swatch {
    width: 10px; height: 10px; border-radius: 3px; flex: 0 0 auto;
  }
  .emp-breakdown .brow .name { flex: 1; font-size: 12px; }
  .emp-breakdown .brow .meter {
    flex: 2; height: 6px;
    background: var(--outline-soft); border-radius: 3px; overflow: hidden;
  }
  .emp-breakdown .brow .meter span { display: block; height: 100%; border-radius: 3px; }
  .emp-breakdown .brow .hrs {
    font-size: 11px; font-weight: 700;
    min-width: 34px; text-align: right;
    font-variant-numeric: tabular-nums;
  }

  /* Section header */
  .section-header {
    display: flex; align-items: baseline; justify-content: space-between;
    margin: 16px 4px 8px;
  }
  .section-header h3 { margin: 0; font-size: 16px; font-weight: 600; }
  .section-header small { font-size: 11px; color: var(--text-secondary); }

  /* Employee row card */
  .emp-row {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 16px;
    background: var(--surface-card);
    border-radius: 16px;
    margin-top: 10px;
    cursor: pointer;
    transition: background 150ms ease;
  }
  .emp-row:hover { background: var(--surface-card-hi); }
  .emp-row .av {
    width: 40px; height: 40px;
    border-radius: 50%;
    display: grid; place-items: center;
    font-weight: 700; font-size: 14px;
  }
  .emp-row .body { flex: 1; }
  .emp-row .name { font-size: 14px; font-weight: 600; }
  .emp-row .meta { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
  .emp-row .badge {
    font-size: 9px; font-weight: 700;
    padding: 3px 7px;
    border-radius: 999px;
    background: rgba(245,158,11,.2);
    color: var(--accent-amber);
    letter-spacing: 0.4px;
    margin-left: 6px;
  }
  .emp-row .chev { color: var(--text-secondary); }

  /* FAB */
  .fab {
    position: absolute;
    right: 28px; bottom: 28px;
    width: 56px; height: 56px;
    border-radius: 18px;
    background: var(--accent-blue);
    color: #fff;
    border: 0;
    display: grid; place-items: center;
    cursor: pointer;
    box-shadow: 0 10px 24px rgba(59,130,246,.3);
    transition: transform 120ms ease, filter 150ms ease;
    z-index: 5;
  }
  .fab:hover { filter: brightness(1.1); }
  .fab:active { transform: scale(.96); }
  .fab svg { width: 26px; height: 26px; }

  /* Login */
  .login-wrap {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 100%;
    padding: 20px 12px;
    gap: 20px;
  }
  .login-wrap .brand {
    font-size: 28px; font-weight: 800;
    letter-spacing: -0.6px;
    color: var(--text-primary);
    margin-top: auto;
  }
  .login-wrap .brand .accent { color: var(--accent-blue-bright); }
  .login-wrap .tag {
    color: var(--text-secondary);
    font-size: 13px;
    margin-top: -10px;
    margin-bottom: 10px;
  }
  .login-form {
    width: 100%;
    display: flex; flex-direction: column; gap: 10px;
  }
  .login-form input {
    background: var(--surface-card);
    border: 1px solid var(--outline-soft);
    border-radius: 12px;
    padding: 12px 14px;
    color: var(--text-primary);
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color 150ms ease;
  }
  .login-form input:focus { border-color: var(--accent-blue); }
  .login-form .go {
    background: linear-gradient(180deg, var(--accent-blue), #1d4ed8);
    color: #fff;
    border: 0;
    border-radius: 12px;
    padding: 13px;
    font-size: 14px; font-weight: 700; letter-spacing: 0.3px;
    cursor: pointer;
    margin-top: 6px;
    transition: transform 100ms ease, filter 150ms ease;
  }
  .login-form .go:hover { filter: brightness(1.1); }
  .login-form .go:active { transform: scale(.98); }
  .login-form .err {
    font-size: 12px; color: var(--accent-red-light);
    background: rgba(239,68,68,.08);
    border-radius: 10px;
    padding: 8px 10px;
  }
  .demo-accounts {
    width: 100%;
    padding: 12px;
    background: var(--surface-dark);
    border-radius: 12px;
    margin-top: auto;
  }
  .demo-accounts .demo-title {
    font-size: 10px; font-weight: 700; letter-spacing: 0.5px;
    color: var(--text-secondary);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .demo-chip {
    display: block;
    width: 100%;
    text-align: left;
    background: var(--surface-card);
    color: var(--text-primary);
    border: 1px solid var(--outline-soft);
    border-radius: 10px;
    padding: 8px 12px;
    margin-top: 6px;
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
    transition: background 150ms ease;
  }
  .demo-chip:hover { background: var(--surface-card-hi); }
  .demo-chip b { color: var(--accent-blue-bright); }
  .demo-chip .tag {
    float: right;
    font-size: 10px; font-weight: 700;
    padding: 2px 6px;
    border-radius: 999px;
    letter-spacing: 0.3px;
  }
  .demo-chip .tag.admin { background: rgba(59,130,246,.2); color: var(--accent-blue-bright); }
  .demo-chip .tag.emp { background: rgba(16,185,129,.2); color: var(--accent-green-light); }
  .demo-chip .tag.readonly { background: rgba(245,158,11,.2); color: var(--accent-amber); }

  /* Clock-in flow */
  .big-cta {
    border: 0;
    width: 100%;
    height: 116px;
    border-radius: 24px;
    color: #fff;
    font-size: 18px; font-weight: 700;
    cursor: pointer;
    display: flex; flex-direction: column;
    gap: 4px; align-items: center; justify-content: center;
    letter-spacing: 0.3px;
    transition: transform 100ms ease, filter 150ms ease;
  }
  .big-cta:active { transform: scale(.985); }
  .big-cta.clock-in { background: linear-gradient(180deg, var(--accent-green), #059669); }
  .big-cta.clock-out { background: linear-gradient(180deg, var(--accent-red), #dc2626); }
  .big-cta.submit { background: linear-gradient(180deg, var(--accent-blue), #1d4ed8); }
  .big-cta.disabled {
    filter: grayscale(0.4) brightness(.7);
    cursor: not-allowed;
  }
  .big-cta svg { width: 32px; height: 32px; }

  .clock-card {
    display: flex; align-items: center; gap: 14px;
    padding: 18px 20px;
    background: var(--surface-card);
    border-radius: 18px;
  }
  .clock-card .pulse {
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--accent-green);
    position: relative;
  }
  .clock-card .pulse::after {
    content: "";
    position: absolute;
    inset: -6px;
    border-radius: 50%;
    background: var(--accent-green);
    opacity: .3;
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse {
    0% { transform: scale(.85); opacity: .35; }
    70% { transform: scale(1.5); opacity: 0; }
    100% { transform: scale(.85); opacity: 0; }
  }
  .clock-card .label {
    font-size: 11px; color: var(--text-secondary);
    letter-spacing: 0.4px; text-transform: uppercase; font-weight: 700;
  }
  .clock-card .time {
    font-size: 22px; font-weight: 700; color: var(--accent-green-light);
  }

  .shift-summary {
    background: var(--surface-card);
    border-radius: 18px;
    padding: 16px 18px;
  }
  .shift-summary .row {
    display: flex; justify-content: space-between; align-items: flex-end;
  }
  .shift-summary .col { display: flex; flex-direction: column; gap: 2px; }
  .shift-summary .col.r { align-items: flex-end; }
  .shift-summary .l-label {
    font-size: 10px; color: var(--text-secondary);
    letter-spacing: 0.4px; text-transform: uppercase; font-weight: 700;
  }
  .shift-summary .time { font-size: 22px; font-weight: 700; }
  .shift-summary .total {
    text-align: center; margin-top: 12px;
    border-top: 1px solid var(--outline-soft);
    padding-top: 14px;
  }
  .shift-summary .total .value {
    font-size: 40px; font-weight: 800;
    color: var(--accent-green-light);
    letter-spacing: -1px;
  }
  .shift-summary .total .value.warn { color: var(--accent-red-light); }
  .shift-summary .total .unit {
    font-size: 14px; color: var(--text-secondary); margin-left: 6px;
  }
  .comment-field {
    margin-top: 12px;
    padding: 10px 12px;
    background: var(--surface-dark);
    border: 1px solid var(--outline-soft);
    border-radius: 10px;
    color: var(--text-primary);
    font-size: 13px;
    width: 100%;
    font-family: inherit;
    resize: none;
    outline: none;
    min-height: 52px;
    transition: border-color 150ms ease;
  }
  .comment-field:focus { border-color: var(--accent-blue); }
  .comment-field.required { border-color: rgba(239,68,68,.5); }
  .comment-required-note {
    margin-top: 6px;
    font-size: 11px;
    color: var(--accent-red-light);
  }

  /* Toast */
  .toast-wrap {
    position: absolute;
    left: 14px; right: 14px; bottom: 28px;
    display: flex; flex-direction: column; gap: 8px;
    pointer-events: none; z-index: 30;
  }
  .toast {
    background: var(--surface-card-hi);
    border: 1px solid var(--outline-soft);
    color: var(--text-primary);
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,.4);
    display: flex; gap: 10px; align-items: center;
    animation: toast-in 220ms ease both;
    pointer-events: auto;
  }
  .toast.leave { animation: toast-out 220ms ease both; }
  .toast .pill {
    background: var(--accent-blue);
    color: #fff;
    font-weight: 700;
    font-size: 10px; letter-spacing: 0.4px; text-transform: uppercase;
    padding: 3px 7px; border-radius: 999px;
  }
  .toast.success .pill { background: var(--accent-green); }
  .toast.warn .pill { background: var(--accent-amber); color: #000; }
  .toast.error .pill { background: var(--accent-red); }
  @keyframes toast-in {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes toast-out {
    from { opacity: 1; transform: translateY(0); }
    to   { opacity: 0; transform: translateY(8px); }
  }

  /* Month slide animation */
  .month-anim-next { animation: slide-left 260ms ease both; }
  .month-anim-prev { animation: slide-right 260ms ease both; }
  @keyframes slide-left {
    from { opacity: 0; transform: translateX(18px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  @keyframes slide-right {
    from { opacity: 0; transform: translateX(-18px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  /* Screen transition */
  .screen-enter { animation: fade-up 260ms ease both; }
  @keyframes fade-up {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Modal */
  .modal-scrim {
    position: absolute;
    inset: 0;
    background: rgba(5, 10, 20, .7);
    border-radius: 32px;
    display: grid; place-items: center;
    z-index: 20;
    animation: fade-in 180ms ease both;
  }
  @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
  .modal-card {
    background: var(--surface-card);
    border-radius: 22px;
    padding: 22px 20px;
    width: calc(100% - 36px);
    max-height: calc(100% - 40px);
    overflow-y: auto;
    animation: modal-in 220ms cubic-bezier(.2,.8,.2,1) both;
  }
  @keyframes modal-in {
    from { opacity: 0; transform: translateY(12px) scale(.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  .modal-card h3 {
    margin: 0 0 6px;
    font-size: 18px; font-weight: 700;
  }
  .modal-card p { margin: 0 0 14px; color: var(--text-secondary); font-size: 13px; }
  .modal-card input, .modal-card textarea, .modal-card select {
    display: block;
    width: 100%;
    background: var(--surface-dark);
    border: 1px solid var(--outline-soft);
    border-radius: 10px;
    padding: 10px 12px;
    color: var(--text-primary);
    font-size: 13px;
    font-family: inherit;
    margin-bottom: 10px;
    outline: none;
    transition: border-color 150ms ease;
  }
  .modal-card input:focus, .modal-card textarea:focus { border-color: var(--accent-blue); }
  .modal-card .actions {
    display: flex; justify-content: flex-end; gap: 8px;
    margin-top: 6px;
  }
  .modal-card .btn {
    border: 0;
    background: transparent;
    color: var(--text-secondary);
    font-size: 13px; font-weight: 700;
    padding: 10px 16px;
    border-radius: 10px;
    cursor: pointer;
    font-family: inherit;
    transition: background 150ms ease, color 150ms ease;
  }
  .modal-card .btn:hover { background: var(--surface-dark); color: var(--text-primary); }
  .modal-card .btn.primary {
    background: var(--accent-blue); color: #fff;
  }
  .modal-card .btn.primary:hover { filter: brightness(1.1); background: var(--accent-blue); }
  .modal-card .btn.danger {
    background: rgba(239,68,68,.2); color: var(--accent-red-light);
  }
  .modal-card .err {
    font-size: 12px; color: var(--accent-red-light);
    background: rgba(239,68,68,.08);
    border-radius: 10px;
    padding: 8px 10px;
    margin-bottom: 10px;
  }

  /* History screen */
  .hist-shift-card {
    background: var(--surface-card);
    border-radius: 16px;
    padding: 14px 16px;
    margin-top: 10px;
  }
  .hist-shift-card .top {
    display: flex; justify-content: space-between; align-items: center;
  }
  .hist-shift-card .left {
    display: flex; align-items: center; gap: 10px;
  }
  .hist-shift-card .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
  }
  .hist-shift-card .status-dot.ok { background: var(--accent-green); }
  .hist-shift-card .status-dot.warn { background: var(--accent-red); }
  .hist-shift-card .date {
    font-size: 13px; font-weight: 600;
  }
  .hist-shift-card .hrs {
    font-size: 16px; font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  .hist-shift-card .hrs.ok { color: var(--accent-green-light); }
  .hist-shift-card .hrs.warn { color: var(--accent-red-light); }
  .hist-shift-card .chips {
    display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap;
  }
  .hist-shift-card .chip {
    font-size: 11px;
    background: var(--surface-dark);
    padding: 4px 8px;
    border-radius: 999px;
    color: var(--text-secondary);
    display: inline-flex; align-items: center; gap: 5px;
  }
  .hist-shift-card .chip svg { width: 11px; height: 11px; }
  .hist-shift-card .comment {
    margin-top: 8px;
    font-size: 12px;
    color: var(--text-secondary);
    font-style: italic;
  }
  .hist-shift-card .week-status {
    margin-top: 8px; display: inline-flex;
    font-size: 10px; font-weight: 700; letter-spacing: 0.4px;
    padding: 3px 8px; border-radius: 999px; text-transform: uppercase;
  }
  .hist-shift-card .week-status.pending { background: rgba(245,158,11,.2); color: var(--accent-amber); }
  .hist-shift-card .week-status.approved { background: rgba(16,185,129,.2); color: var(--accent-green-light); }

  /* Map */
  .mini-map {
    position: relative;
    width: 100%;
    height: 180px;
    border-radius: 16px;
    overflow: hidden;
    margin-top: 10px;
    background: #0a1b2e;
  }
  .mini-map .tiles {
    position: absolute;
    inset: 0;
    display: grid;
  }
  .mini-map .tiles img {
    width: 100%; height: 100%;
    display: block;
    filter: hue-rotate(190deg) saturate(.35) brightness(.7) contrast(1.1);
  }
  .mini-map .pins {
    position: absolute; inset: 0;
    pointer-events: none;
  }
  .mini-map .pin {
    position: absolute;
    width: 16px; height: 16px;
    border-radius: 50%;
    border: 3px solid #fff;
    box-shadow: 0 0 0 2px rgba(0,0,0,.4), 0 2px 6px rgba(0,0,0,.5);
    transform: translate(-50%, -50%);
  }
  .mini-map .pin.in { background: var(--accent-green); }
  .mini-map .pin.out { background: var(--accent-red); }
  .mini-map .legend {
    position: absolute;
    left: 10px; bottom: 10px;
    display: flex; gap: 10px;
    font-size: 10px; font-weight: 600;
    background: rgba(13,27,42,.85);
    padding: 4px 8px;
    border-radius: 999px;
    backdrop-filter: blur(4px);
  }
  .mini-map .legend span {
    display: inline-flex; align-items: center; gap: 4px;
  }
  .mini-map .legend span::before {
    content: ""; width: 7px; height: 7px; border-radius: 50%;
  }
  .mini-map .legend .in::before { background: var(--accent-green); }
  .mini-map .legend .out::before { background: var(--accent-red); }

  /* Weekly approvals banner */
  .approvals-banner {
    background: linear-gradient(180deg, rgba(245,158,11,.18), rgba(245,158,11,.08));
    border: 1px solid rgba(245,158,11,.25);
    border-radius: 16px;
    padding: 12px 14px;
    margin-top: 12px;
    display: flex; align-items: center; gap: 10px;
    cursor: pointer;
    transition: background 150ms ease;
  }
  .approvals-banner:hover { background: rgba(245,158,11,.15); }
  .approvals-banner .icon {
    width: 36px; height: 36px;
    border-radius: 12px;
    background: rgba(245,158,11,.25);
    color: var(--accent-amber);
    display: grid; place-items: center;
    flex: 0 0 auto;
  }
  .approvals-banner .icon svg { width: 20px; height: 20px; }
  .approvals-banner .body { flex: 1; }
  .approvals-banner .title { font-size: 13px; font-weight: 700; }
  .approvals-banner .meta { font-size: 11px; color: var(--text-secondary); margin-top: 1px; }

  /* Week submission card */
  .week-submit {
    background: var(--surface-card);
    border-radius: 16px;
    padding: 14px 16px;
    margin-top: 12px;
    display: flex; align-items: center; gap: 12px;
  }
  .week-submit .left { flex: 1; min-width: 0; }
  .week-submit .title { font-size: 13px; font-weight: 700; }
  .week-submit .sub { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
  .week-submit .btn {
    background: var(--accent-blue);
    color: #fff;
    border: 0;
    font-size: 12px; font-weight: 700;
    padding: 8px 14px;
    border-radius: 10px;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: 0.3px;
    transition: filter 150ms ease;
  }
  .week-submit .btn:hover { filter: brightness(1.1); }
  .week-submit .btn:disabled {
    filter: grayscale(.5) brightness(.7);
    cursor: default;
  }
  .week-submit .status-pill {
    font-size: 10px; font-weight: 700; letter-spacing: 0.4px; text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 999px;
  }
  .week-submit .status-pill.pending { background: rgba(245,158,11,.2); color: var(--accent-amber); }
  .week-submit .status-pill.approved { background: rgba(16,185,129,.2); color: var(--accent-green-light); }

  /* Approval row (in modal) */
  .approval-row {
    background: var(--surface-dark);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 8px;
  }
  .approval-row .top {
    display: flex; justify-content: space-between; align-items: center;
  }
  .approval-row .who { font-size: 13px; font-weight: 700; }
  .approval-row .total {
    font-size: 14px; font-weight: 700;
    color: var(--accent-blue-bright);
    font-variant-numeric: tabular-nums;
  }
  .approval-row .week { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
  .approval-row .actions {
    display: flex; gap: 8px; margin-top: 10px;
  }
  .approval-row .actions button {
    flex: 1;
    font-family: inherit;
    border: 0;
    border-radius: 8px;
    padding: 8px 10px;
    font-size: 12px; font-weight: 700;
    cursor: pointer;
    transition: filter 150ms ease;
  }
  .approval-row .approve { background: var(--accent-green); color: #fff; }
  .approval-row .reject { background: rgba(239,68,68,.2); color: var(--accent-red-light); }
  .approval-row .approve:hover, .approval-row .reject:hover { filter: brightness(1.1); }

  /* Read-only badge */
  .readonly-banner {
    background: rgba(245,158,11,.1);
    border: 1px dashed rgba(245,158,11,.35);
    color: var(--accent-amber);
    font-size: 11px;
    padding: 6px 10px;
    border-radius: 10px;
    margin-top: 6px;
    font-weight: 600;
    letter-spacing: 0.3px;
    display: flex; gap: 6px; align-items: center;
  }
  .readonly-banner svg { width: 14px; height: 14px; }

  /* Sidebar */
  .side {
    padding: 0 8px;
  }
  .phone-caption {
    text-align: center;
    color: var(--text-secondary);
    font-size: 12px;
    margin-top: 10px;
    font-weight: 600;
  }
  .phone-caption b { color: var(--text-primary); }
  .info-panel {
    margin-top: 16px;
    background: var(--surface-dark);
    border-radius: 16px;
    padding: 16px;
    color: var(--text-secondary);
    font-size: 13px;
    line-height: 1.55;
  }
  .info-panel h3 {
    margin: 0 0 8px;
    color: var(--text-primary);
    font-size: 14px;
    font-weight: 700;
  }
  .info-panel ul { margin: 0; padding-left: 18px; }
  .info-panel li { margin: 4px 0; }
  .info-panel code {
    background: var(--surface-card);
    padding: 1px 5px; border-radius: 4px;
    font-size: 12px;
  }

  .todo-list { display: flex; flex-direction: column; gap: 6px; }
  .todo-list .item {
    display: flex; gap: 8px; align-items: flex-start;
  }
  .todo-list .check {
    flex: 0 0 auto;
    width: 16px; height: 16px; border-radius: 4px;
    display: grid; place-items: center;
    margin-top: 2px;
  }
  .todo-list .check.done { background: var(--accent-green); }
  .todo-list .check.done::after { content: "✓"; color: #fff; font-size: 11px; font-weight: 700; }
  .todo-list .check.discuss { background: rgba(148,163,184,.2); color: var(--text-secondary); border: 1px dashed var(--outline-soft); }
  .todo-list .check.discuss::after { content: "?"; font-size: 11px; font-weight: 700; }
  .todo-list .txt { font-size: 12px; }
  .todo-list .txt b { color: var(--text-primary); }

  /* =========================================================
     THEME SWITCH (page header)
     ========================================================= */
  .theme-switch {
    margin-left: auto;
    display: inline-flex;
    background: var(--surface-dark);
    border: 1px solid var(--outline-soft);
    border-radius: 999px;
    padding: 3px;
    gap: 2px;
    user-select: none;
  }
  .theme-switch .opt {
    border: 0;
    background: transparent;
    color: var(--text-secondary);
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.2px;
    padding: 6px 14px;
    border-radius: 999px;
    cursor: pointer;
    transition: background 220ms ease, color 220ms ease;
    white-space: nowrap;
  }
  .theme-switch .opt:hover { color: var(--text-primary); }
  .theme-switch .opt.active {
    background: var(--accent-blue);
    color: #fff;
  }

  /* =========================================================
     SHARED: common tweaks applied to all non-default themes
     ========================================================= */
  body.theme-minimal,
  body.theme-warm,
  body.theme-nordic,
  body.theme-tactile {
    background: var(--t-bg);
  }

  /* =========================================================
     THEME: MINIMALIST  — Linear-ish, high contrast
     Off-white, near-black ink, electric orange accent.
     Red Hat Display / Red Hat Text + Azeret Mono.
     ========================================================= */
  body.theme-minimal {
    --t-bg: oklch(97% 0.004 250);
    --navy: oklch(99% 0.003 250);
    --deep-blue: oklch(94% 0.005 250);
    --surface-dark: oklch(95% 0.004 250);
    --surface-card: oklch(99% 0.003 250);
    --surface-card-hi: oklch(96% 0.005 250);
    --accent-blue: oklch(62% 0.2 45);
    --accent-blue-bright: oklch(55% 0.21 45);
    --accent-green: oklch(55% 0.14 160);
    --accent-green-light: oklch(50% 0.15 160);
    --accent-red: oklch(55% 0.19 28);
    --accent-red-light: oklch(52% 0.18 28);
    --accent-amber: oklch(70% 0.16 75);
    --text-primary: oklch(18% 0.01 250);
    --text-secondary: oklch(42% 0.01 250);
    --text-muted: oklch(62% 0.01 250);
    --outline-soft: oklch(89% 0.005 250);

    --tf-display: "Red Hat Display", system-ui, sans-serif;
    --tf-body: "Red Hat Text", system-ui, sans-serif;
    --tf-mono: "Azeret Mono", ui-monospace, monospace;
    font-family: var(--tf-body);
    color: var(--text-primary);
  }
  body.theme-minimal .phone {
    background: var(--t-bg);
    box-shadow:
      0 24px 60px oklch(18% 0.01 250 / .12),
      0 0 0 1px oklch(88% 0.005 250),
      0 0 0 10px oklch(94% 0.005 250);
  }
  body.theme-minimal .phone::before { background: oklch(18% 0.01 250); }
  body.theme-minimal .screen { background: var(--t-bg); }
  body.theme-minimal .topbar .title,
  body.theme-minimal .greeting .name,
  body.theme-minimal .month-nav .label,
  body.theme-minimal .section-header h3,
  body.theme-minimal .modal-card h3,
  body.theme-minimal .login-wrap .brand,
  body.theme-minimal .approvals-banner .title,
  body.theme-minimal .week-submit .title,
  body.theme-minimal .info-panel h3 {
    font-family: var(--tf-display);
    font-weight: 800;
    letter-spacing: -0.8px;
  }
  body.theme-minimal .greeting .name { font-size: 30px; }
  body.theme-minimal .login-wrap .brand { font-size: 40px; }
  body.theme-minimal .info-card .stat .value,
  body.theme-minimal .cal .inner .num,
  body.theme-minimal .cal .pair,
  body.theme-minimal .dd-table .tm,
  body.theme-minimal .dd-table .hrs,
  body.theme-minimal .clock-card .time,
  body.theme-minimal .shift-summary .time,
  body.theme-minimal .shift-summary .total .value,
  body.theme-minimal .hist-shift-card .hrs,
  body.theme-minimal .hist-shift-card .chip,
  body.theme-minimal .emp-breakdown .brow .hrs,
  body.theme-minimal .approval-row .total,
  body.theme-minimal .week-submit .sub {
    font-family: var(--tf-mono);
    font-feature-settings: "tnum" 1;
    letter-spacing: -0.6px;
  }
  body.theme-minimal .greeting .hello { color: var(--text-secondary); font-weight: 400; }
  body.theme-minimal .greeting .role {
    background: var(--text-primary);
    color: oklch(98% 0.003 250);
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 3px;
    font-size: 10px;
    letter-spacing: 1.4px;
    display: inline-block;
  }
  body.theme-minimal .greeting .role.readonly {
    background: var(--accent-amber);
    color: var(--text-primary);
  }
  body.theme-minimal .topbar .lang-toggle,
  body.theme-minimal .topbar .icon-btn,
  body.theme-minimal .topbar .back,
  body.theme-minimal .month-nav .chev {
    color: var(--text-primary);
  }
  body.theme-minimal .lang-toggle {
    background: oklch(94% 0.005 250);
    border: 1px solid var(--outline-soft);
  }
  body.theme-minimal .lang-toggle .slider { background: var(--text-primary); box-shadow: none; }
  body.theme-minimal .topbar .icon-btn:hover,
  body.theme-minimal .topbar .back:hover,
  body.theme-minimal .month-nav .chev:hover {
    background: oklch(93% 0.005 250);
  }
  body.theme-minimal .info-card {
    background: oklch(99% 0.003 250);
    border: 1px solid var(--outline-soft);
    border-radius: 6px;
    box-shadow: none;
  }
  body.theme-minimal .info-card .stat .value { font-size: 30px; font-weight: 600; }
  body.theme-minimal .info-card .stat .label { font-size: 9px; letter-spacing: 1.2px; }
  body.theme-minimal .info-card .stat.blue .value { color: var(--accent-blue); }
  body.theme-minimal .info-card .stat.green .value { color: var(--accent-green); }
  body.theme-minimal .info-card .stat.amber .value { color: var(--accent-amber); }
  body.theme-minimal .info-card .stat.plain .value { color: var(--text-primary); }
  body.theme-minimal .info-card.legend .legend-list {
    border-top: 1px solid var(--outline-soft); padding-top: 12px;
  }
  body.theme-minimal .emp-breakdown .brow .name { font-size: 13px; font-weight: 500; }
  body.theme-minimal .emp-breakdown .brow .meter { background: oklch(90% 0.005 250); }
  /* Calendar */
  body.theme-minimal .cal .dows span {
    color: var(--text-muted);
    font-size: 10px;
    letter-spacing: 1.2px;
    font-weight: 600;
  }
  body.theme-minimal .cal .inner { border-radius: 4px; }
  body.theme-minimal .cal .cell.today .inner {
    background: transparent;
    outline: 1.5px solid var(--accent-blue);
    outline-offset: -2px;
  }
  body.theme-minimal .cal .cell.today .num { color: var(--accent-blue); font-weight: 700; }
  body.theme-minimal .cal .cell.selected .inner { background: var(--accent-blue); }
  body.theme-minimal .cal .pair { color: var(--accent-blue); font-weight: 600; }
  body.theme-minimal .cal .pair .emp { color: var(--text-primary); }
  body.theme-minimal .cal .heat-1 .inner { background: oklch(95% 0.02 50); }
  body.theme-minimal .cal .heat-2 .inner { background: oklch(92% 0.05 50); }
  body.theme-minimal .cal .heat-3 .inner { background: oklch(88% 0.08 50); }
  body.theme-minimal .cal .heat-4 .inner { background: oklch(82% 0.12 50); }
  /* Day detail */
  body.theme-minimal .day-detail {
    background: oklch(99% 0.003 250);
    border: 1px solid var(--outline-soft);
    border-radius: 6px;
  }
  body.theme-minimal .day-detail .date-label {
    font-family: var(--tf-display); font-weight: 700;
    font-size: 14px; letter-spacing: -0.3px;
    text-transform: none;
  }
  body.theme-minimal .dd-table .head {
    color: var(--text-muted); font-size: 10px; letter-spacing: 1px;
    border-bottom: 1px solid var(--outline-soft);
  }
  body.theme-minimal .dd-table .nm { font-weight: 600; }
  body.theme-minimal .dd-table .trow { border-bottom: 1px solid var(--outline-soft); }
  /* Section */
  body.theme-minimal .section-header { border-bottom: 1px solid var(--outline-soft); padding-bottom: 6px; }
  body.theme-minimal .section-header h3 { font-size: 18px; }
  body.theme-minimal .section-header small {
    font-family: var(--tf-mono); letter-spacing: 1px; font-size: 10px; text-transform: uppercase;
  }
  /* Emp row */
  body.theme-minimal .emp-row {
    background: transparent;
    border: 0;
    border-bottom: 1px solid var(--outline-soft);
    border-radius: 0;
    padding: 14px 6px;
    margin-top: 0;
  }
  body.theme-minimal .emp-row:hover { background: oklch(95% 0.005 250); }
  body.theme-minimal .emp-row .name { font-weight: 600; font-size: 14px; }
  body.theme-minimal .emp-row .meta { font-family: var(--tf-mono); font-size: 11px; }
  body.theme-minimal .emp-row .badge {
    background: transparent;
    color: var(--accent-amber);
    border: 1px solid var(--accent-amber);
    border-radius: 2px;
    font-size: 9px; letter-spacing: 1px;
  }
  /* FAB */
  body.theme-minimal .fab {
    background: var(--text-primary); color: #fff;
    border-radius: 50%;
    box-shadow: 0 8px 20px oklch(18% 0.01 250 / .2);
  }
  /* Buttons — flat, hard edges */
  body.theme-minimal .big-cta {
    border-radius: 6px;
    font-family: var(--tf-display);
    font-weight: 800;
    font-size: 16px;
    letter-spacing: 1px;
    text-transform: uppercase;
    box-shadow: none;
  }
  body.theme-minimal .big-cta.clock-in { background: var(--accent-blue); color: #fff; }
  body.theme-minimal .big-cta.clock-out { background: var(--text-primary); color: #fff; }

    state.nav.push({ screen: state.screen, selectedDay: state.selectedDay, viewingEmployeeId: state.viewingEmployeeId });
    state.screen = screen;
    Object.assign(state, extra);
    state.lastAnim = 0;
    render();
  }
  function navBack() {
    const prev = state.nav.pop();
    if (prev) {
      state.screen = prev.screen;
      state.selectedDay = prev.selectedDay ?? state.selectedDay;
      state.viewingEmployeeId = prev.viewingEmployeeId ?? null;
    }
    render();
  }
  function login(u) {
    state.currentUser = u;
    state.nav = [];
    state.selectedDay = 10;
    state.calYear = 2026; state.calMonth = 3;
    state.screen = u.role === "admin" || u.role === "readonly" ? "admin_home" : "employee_home";
    render();
  }
  function logout() {
    state.currentUser = null;
    state.screen = "login";
    state.nav = [];
    state.modal = null;
    state.clock = "idle"; state.clockIn = state.clockOut = null; state.comment = "";
    render();
  }

  // =============================================================
  // CALENDAR / DAY DETAIL
  // =============================================================
  function dataByDay(year, month, scopeEmpId=null) {
    const out = {};
    for (const s of shifts) {
      const d = new Date(s.date + "T00:00:00");
      if (d.getFullYear() !== year || d.getMonth() !== month) continue;
      if (scopeEmpId && s.empId !== scopeEmpId) continue;
      (out[d.getDate()] = out[d.getDate()] || []).push(s);
    }
    return out;
  }

  function renderCalendar(scopeEmpId=null) {
    const firstOfMonth = new Date(state.calYear, state.calMonth, 1);
    const daysInMonth = new Date(state.calYear, state.calMonth+1, 0).getDate();
    const startOffset = firstOfMonth.getDay();
    const data = dataByDay(state.calYear, state.calMonth, scopeEmpId);
    const today = new Date(2026, 3, 13); // fixed "today" for demo

    const dowKey = state.lang === "es"
      ? ["D","L","M","M","J","V","S"]
      : ["S","M","T","W","T","F","S"];
    const dows = el("div", {class:"dows"}, ...dowKey.map(d => el("span", {}, d)));
    const grid = el("div", {class:"grid"});
    grid.dataset.scope = scopeEmpId == null ? "" : String(scopeEmpId);
    grid.dataset.year = String(state.calYear);
    grid.dataset.month = String(state.calMonth);
    const maxHrs = Math.max(0, ...Object.values(data).map(arr => arr.reduce((s,x)=>s+x.hours,0)));
    const totalCells = startOffset + daysInMonth;
    const rows = Math.ceil(totalCells / 7);

    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < 7; c++) {
        const cellIdx = r*7 + c;
        const dayNum = cellIdx - startOffset + 1;
        if (dayNum < 1 || dayNum > daysInMonth) {
          grid.appendChild(el("div", {class:"cell empty"}));
          continue;
        }
        const dayShifts = data[dayNum] || [];
        const dayHours = dayShifts.reduce((s,x)=>s+x.hours,0);
        const hasShifts = dayShifts.length > 0;
        const isToday = today.getFullYear() === state.calYear && today.getMonth() === state.calMonth && dayNum === today.getDate();
        const isSelected = state.selectedDay === dayNum;

        const inner = el("div", {class:"inner"});
        inner.appendChild(el("span", {class:"num"}, String(dayNum)));

        const byEmp = hasShifts
          ? Object.entries(dayShifts.reduce((m,sh)=>{m[sh.empId]=(m[sh.empId]||0)+sh.hours;return m;}, {}))
              .sort((a,b)=>b[1]-a[1])
          : [];
        const empCount = byEmp.length;

        const displayedHours = scopeEmpId
          ? (byEmp.find(([id])=>Number(id)===scopeEmpId)?.[1] || 0)
          : dayHours;
        const showHoursText = displayedHours >= 1
          ? `${Math.round(displayedHours)}${tr("hoursShort")}`
          : displayedHours > 0 ? `${displayedHours.toFixed(1)}${tr("hoursShort")}` : "";

        if (hasShifts && showHoursText) {
          const pair = el("span", {class:"pair"}, el("span", {}, showHoursText));
          if (!scopeEmpId && empCount > 0) {
            pair.appendChild(el("span", {class:"mid"}, "·"));
            pair.appendChild(el("span", {class:"emp"}, String(empCount)));
          }
          inner.appendChild(pair);
        }

        let heatClass = "";
        if (hasShifts && maxHrs > 0) {
          const ratio = dayHours / maxHrs;
          if (ratio > 0.8) heatClass = "heat-4";
          else if (ratio > 0.55) heatClass = "heat-3";
          else if (ratio > 0.3) heatClass = "heat-2";
          else heatClass = "heat-1";
        }

        const cell = el("div", {
          class: `cell ${hasShifts ? "has-shifts" : ""} ${isToday ? "today" : ""} ${isSelected ? "selected" : ""} ${heatClass}`,
          "data-day": String(dayNum),
          "data-row": String(r),
          onclick: () => selectDay(dayNum),
        });
        cell.appendChild(inner);
        grid.appendChild(cell);
      }

      if (state.selectedDay != null) {
        const row = Math.floor((state.selectedDay - 1 + startOffset) / 7);
        if (row === r) {
          grid.appendChild(el("div", {class:"day-detail-slot", style:"grid-column: span 7;"},
            renderDayDetail(state.selectedDay, scopeEmpId)));
        }
      }
    }
    return el("div", {class:"cal"}, dows, grid);
  }

  // Targeted day selection — no full re-render
  function selectDay(dayNum) {
    const grid = document.querySelector(".cal .grid");
    if (!grid) { state.selectedDay = dayNum; render(); return; }

    const scopeRaw = grid.dataset.scope;
    const scopeEmpId = scopeRaw ? Number(scopeRaw) : null;
    const year = Number(grid.dataset.year);
    const month = Number(grid.dataset.month);

    const prev = state.selectedDay;
    const next = (prev === dayNum) ? null : dayNum;
    state.selectedDay = next;

    // Toggle selected class on cells
    if (prev != null) {
      grid.querySelector(`.cell[data-day="${prev}"]`)?.classList.remove("selected");
    }
    if (next != null) {
      grid.querySelector(`.cell[data-day="${next}"]`)?.classList.add("selected");
    }

    // Remove any existing detail slot
    grid.querySelector(".day-detail-slot")?.remove();

    // Insert new detail slot at end of the selected row
    if (next != null) {
      const startOffset = new Date(year, month, 1).getDay();
      const row = Math.floor((next - 1 + startOffset) / 7);
      // Last cell in that row — scan from row*7+6 downward until we find one
      let anchor = null;
      for (let c = 6; c >= 0; c--) {
        const cell = grid.children[row*7 + c];
        if (cell && cell.classList.contains("cell")) { anchor = cell; break; }
      }
      if (anchor) {
        const slot = el("div", {class:"day-detail-slot", style:"grid-column: span 7;"},
          renderDayDetail(next, scopeEmpId));
        anchor.insertAdjacentElement("afterend", slot);
      }
    }
  }

  function renderDayDetail(dayNum, scopeEmpId=null) {
    const data = dataByDay(state.calYear, state.calMonth, scopeEmpId);
    const dayShifts = data[dayNum] || [];
    const d = new Date(state.calYear, state.calMonth, dayNum);
    const label = d.toLocaleDateString(locale(),
      { weekday:"long", month:"long", day:"numeric" }).replace(/^./, c => c.toUpperCase());
    const wrap = el("div", {class:"day-detail"}, el("div", {class:"date-label"}, label));
    if (!dayShifts.length) {
      wrap.appendChild(el("div", {class:"no-shifts"}, tr("noShifts")));
      return wrap;
    }
    const groups = {};
    for (const sh of dayShifts) (groups[sh.empId] = groups[sh.empId] || []).push(sh);
    const t = el("div", {class:"dd-table"});
    t.appendChild(el("div", {class:"head"},
      el("span", {}, state.lang === "es" ? "Empleado" : "Employee"),
      el("span", {class:"r"}, state.lang === "es" ? "Horario" : "Time"),
      el("span", {class:"r"}, state.lang === "es" ? "Horas" : "Hours"),
    ));
    for (const [empIdStr, list] of Object.entries(groups)) {
      const emp = userById[Number(empIdStr)];
      for (const sh of list) {
        t.appendChild(el("div", {class:"trow"},
          el("span", {class:"nm"},
            el("span", {class:"sw", style:`background:${emp.color}`}),
            el("span", {}, emp.displayName),
          ),
          el("span", {class:"tm"}, `${fmt12(sh.start)} – ${fmt12(sh.end)}`),
          el("span", {class:"hrs", style:`color:${emp.color}`}, sh.hours.toFixed(1)),
        ));
        if (sh.comment) t.appendChild(el("div", {class:"cmt"}, `"${sh.comment}"`));
      }
    }
    wrap.appendChild(t);
    return wrap;
  }

  // Summary card
  function monthStats(scopeEmpId=null) {
    const data = dataByDay(state.calYear, state.calMonth, scopeEmpId);
    let totalHours = 0, totalShifts = 0;
    const days = new Set();
    const empHours = {};
    for (const [dayStr, arr] of Object.entries(data)) {
      for (const sh of arr) {
        totalHours += sh.hours; totalShifts++;
        days.add(dayStr);
        empHours[sh.empId] = (empHours[sh.empId] || 0) + sh.hours;
      }
    }
    return {
      totalHours, totalShifts,
      activeDays: days.size,
      employees: Object.keys(empHours).length,
      avgPerDay: days.size ? totalHours / days.size : 0,
      empHours,
    };
  }
  function stat(kind, value, label) {
    return el("div", {class:`stat ${kind}`},
      el("div", {class:"value"}, value),
      el("div", {class:"label"}, label),
    );
  }
  function summaryCard(scopeEmpId=null) {
    const st = monthStats(scopeEmpId);
    if (scopeEmpId) {
      return el("div", {class:"info-card"},
        el("div", {class:"row"},
          stat("plain", st.totalHours.toFixed(1), tr("hours")),
          stat("plain", String(st.activeDays), tr("days")),
          stat("plain", st.avgPerDay.toFixed(1), tr("avgDay")),
        )
      );
    }
    const card = el("div", {class:"info-card legend"});
    card.appendChild(el("div", {class:"row"},
      stat("blue",  st.totalHours.toFixed(0), tr("hours")),
      stat("green", String(st.activeDays), tr("days")),
      stat("amber", String(st.totalShifts), tr("shifts")),
      stat("plain", String(st.employees), tr("staff")),
    ));
    const sorted = Object.entries(st.empHours).sort((a,b)=>b[1]-a[1]);
    const maxH = Math.max(...sorted.map(([,h])=>h), 1);
    const list = el("div", {class:"legend-list emp-breakdown"});
    for (const [empIdStr, hrs] of sorted) {
      const emp = userById[Number(empIdStr)];
      list.appendChild(el("div", {class:"brow"},
        el("div", {class:"swatch", style:`background:${emp.color}`}),
        el("div", {class:"name"}, emp.displayName),
        el("div", {class:"meter"}, el("span", {style:`width:${(hrs/maxH)*100}%; background:${emp.color}`})),
        el("div", {class:"hrs", style:`color:${emp.color}`}, hrs.toFixed(1)),
      ));
    }
    card.appendChild(list);
    return card;
  }

  function renderLogin() {
    const s = strings[state.lang];

    let errorBox = null;
    const userIn = el("input", { placeholder: s.username, autocomplete:"username" });
    const passIn = el("input", { placeholder: s.password, type:"password", autocomplete:"current-password" });

    function attempt(username, password) {
      const u = users.find(x => x.username === username && x.password === password);
      if (!u) {
        if (!errorBox) errorBox = el("div", {class:"err"}, s.invalidCreds);
        form.insertBefore(errorBox, goBtn);
        errorBox.textContent = s.invalidCreds;
        return;
      }
      login(u);
    }

    const goBtn = el("button", {
      class:"go",
      onclick: (e) => { e.preventDefault(); attempt(userIn.value.trim(), passIn.value); }
    }, s.signIn);

    const form = el("form", {class:"login-form", onsubmit: (e) => { e.preventDefault(); attempt(userIn.value.trim(), passIn.value); }},
      userIn, passIn, goBtn);

    const demo = el("div", {class:"demo-accounts"},
      el("div", {class:"demo-title"}, state.lang === "es" ? "Cuentas de demostración" : "Demo accounts"),

    [

      { u:"maria", p:"1234",  label: "Maria R.", kind:"emp" },

      { u:"viewer", p:"1234", label: s.readonly, kind:"readonly" },
    ].forEach(({u,p,label,kind}) => {
      demo.appendChild(el("button", {

  function weekSignoffCard() {
    const u = state.currentUser;
    const wkStart = thisWeekStart();
    const wkEnd = weekEndOf(wkStart);
    const wkShifts = shiftsForWeek(u.id, wkStart);
    const wkHours = wkShifts.reduce((s,x)=>s+x.hours,0);
    const status = weekStatus(u.id, wkStart);

    const card = el("div", {class:"week-submit"},
      el("div", {class:"left"},
        el("div", {class:"title"}, `${tr("thisWeek")} · ${fmtDateShort(wkStart)} – ${fmtDateShort(wkEnd)}`),
        el("div", {class:"sub"}, `${wkHours.toFixed(1)} ${tr("hours").toLowerCase()} · ${wkShifts.length} ${tr("shifts").toLowerCase()}`),
      ),
    );
    if (status === "approved") {
      card.appendChild(el("span", {class:"status-pill approved"}, tr("weekApproved")));
    } else if (status === "pending") {
      card.appendChild(el("span", {class:"status-pill pending"}, tr("weekPending")));
    } else {
      card.appendChild(el("button", {
        class:"btn",
        onclick: () => {
          setWeekStatus(u.id, wkStart, "pending");
          toast(tr("weekSubmitted"), {kind:"success", pill:"✓"});
          render();
        }
      }, tr("submitWeek")));
    }
    return card;
  }

  function clockSection() {
    const readonly = false; // employees are never readonly here
    if (state.clock === "idle") {
      return el("button", {
        class:"big-cta clock-in",
        onclick: () => {
          state.clock = "in";
          state.clockIn = new Date();
          state.clockInCoord = jitterLoc();
          render();
        }
      }, ICON("play", 32), el("div", {}, tr("clockIn")));
    }
    if (state.clock === "in") {
      const wrap = el("div", {});
      wrap.appendChild(el("div", {class:"clock-card"},
        el("div", {class:"pulse"}),
        el("div", {style:"flex:1"},
          el("div", {class:"label"}, tr("clockedInAt")),
          el("div", {class:"time"}, fmtTimeDate(state.clockIn)),
        )
      ));
      wrap.appendChild(el("div", {style:"height:14px"}));
      wrap.appendChild(el("button", {
        class:"big-cta clock-out",
        onclick: () => {
          state.clock = "out";
          state.clockOut = new Date();
          state.clockOutCoord = jitterLoc();
          render();
        }
      }, ICON("stop", 32), el("div", {}, tr("clockOut"))));
      return wrap;
    }
    // state.clock === "out": summary + comment + submit
    const diffMin = (state.clockOut - state.clockIn) / 60000;
    const hrs = diffMin / 60;
    const needsNote = hrs < 9 && !state.comment.trim();

    const commentField = el("textarea", {
      class: `comment-field ${needsNote ? "required" : ""}`,
      placeholder: tr("comments"),
      oninput: (e) => { state.comment = e.target.value; updateSubmitState(); },
    });
    commentField.value = state.comment;

    const wrap = el("div", {});
    const summaryEl = el("div", {class:"shift-summary"},
      el("div", {class:"row"},
        el("div", {class:"col"},
          el("div", {class:"l-label"}, tr("start")),
          el("div", {class:"time"}, fmtTimeDate(state.clockIn)),
        ),
        el("div", {class:"col r"},
          el("div", {class:"l-label"}, tr("end")),
          el("div", {class:"time"}, fmtTimeDate(state.clockOut)),
        ),
      ),
      el("div", {class:"total"},
        el("span", {class:`value ${hrs < 9 ? "warn":""}`}, hrs.toFixed(1)),
        el("span", {class:"unit"}, tr("hours").toLowerCase()),
      ),
      commentField,
    );

    if (hrs < 9) {
      summaryEl.appendChild(el("div", {class:"comment-required-note"}, tr("commentRequired")));
    }
    wrap.appendChild(summaryEl);
    wrap.appendChild(el("div", {style:"height:14px"}));
    const submitBtn = el("button", {
      class:`big-cta submit ${needsNote ? "disabled":""}`,
      onclick: () => {
        if (hrs < 9 && !state.comment.trim()) {
          commentField.focus();
          commentField.classList.add("required");
          return;
        }
        // Save shift
        const d = state.clockIn;
        const dateStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
        const pad = n => String(n).padStart(2,"0");
        addShift({
          empId: state.currentUser.id,
          date: dateStr,
          start: `${pad(state.clockIn.getHours())}:${pad(state.clockIn.getMinutes())}`,
          end:   `${pad(state.clockOut.getHours())}:${pad(state.clockOut.getMinutes())}`,
          comment: state.comment.trim(),
          loc: { in: state.clockInCoord, out: state.clockOutCoord },
        });
        state.clock = "idle";
        state.clockIn = state.clockOut = null;
        state.clockInCoord = state.clockOutCoord = null;
        state.comment = "";
        toast(tr("shiftLogged"), {kind:"success", pill:"✓"});
        render();
      }
    }, ICON("check", 32), el("div", {}, tr("submit")));
    wrap.appendChild(submitBtn);

    function updateSubmitState() {
      const stillNeeds = hrs < 9 && !state.comment.trim();
      submitBtn.classList.toggle("disabled", stillNeeds);
      commentField.classList.toggle("required", stillNeeds);
    }
    return wrap;
  }

          el("div", {class:"name"},
            el("span", {}, e.displayName),
            hasPending ? el("span", {class:"badge"}, tr("weekPending")) : null,
          ),
          el("div", {class:"meta"}, "@" + e.username),
        ),
        el("div", {class:"chev"}, ICON("chevRight")),
      ));
    }
    root.appendChild(el("div", {style:"height:60px"}));
  }

  function renderAdminEmployee() {
    const e = userById[state.viewingEmployeeId];
    const root = document.getElementById("scrollRoot");
    root.innerHTML = "";

    // Employee header
    root.appendChild(el("div", {class:"greeting", style:"display:flex; align-items:center; gap:14px;"},
      el("div", {
        style: `width:56px; height:56px; border-radius:50%; background:${e.color}26; color:${e.color}; display:grid; place-items:center; font-size:22px; font-weight:800;`
      }, e.displayName.charAt(0)),
      el("div", {style:"flex:1"},
        el("div", {class:"name", style:"font-size:22px;"}, e.displayName),
        el("div", {class:"hello", style:"font-size:12px;"}, "@" + e.username),
      ),
    ));

    // Admin view: show employee history (shift list + map)
    const empShifts = shifts.filter(s => s.empId === e.id)
      .sort((a,b) => b.date.localeCompare(a.date) || b.start.localeCompare(a.start));
    const total = empShifts.reduce((s,x)=>s+x.hours,0);

    root.appendChild(el("div", {class:"info-card"},
      el("div", {class:"row"},
        stat("blue", String(empShifts.length), tr("shifts")),
        stat("green", total.toFixed(1), tr("hours")),
      ),
    ));

    // Map
    const withCoords = empShifts.filter(s => s.clockIn || s.clockOut);
    if (withCoords.length > 0) {
      root.appendChild(miniMap(withCoords));
    }

    // Shift list
    for (const sh of empShifts) {
      root.appendChild(renderShiftCard(sh));
    }
    root.appendChild(el("div", {style:"height:40px"}));
  }

  function renderHistory() {
    const u = state.currentUser;
    const root = document.getElementById("scrollRoot");
    root.innerHTML = "";

    const mine = shifts.filter(s => s.empId === u.id)
      .sort((a,b) => b.date.localeCompare(a.date) || b.start.localeCompare(a.start));
    const total = mine.reduce((s,x)=>s+x.hours,0);

    root.appendChild(el("div", {class:"info-card"},
      el("div", {class:"row"},
        stat("blue", String(mine.length), tr("shifts")),
        stat("green", total.toFixed(1), tr("hours")),
      ),
    ));

    const withCoords = mine.filter(s => s.clockIn || s.clockOut);
    if (withCoords.length > 0) {
      root.appendChild(miniMap(withCoords));
    }

    for (const sh of mine) {
      root.appendChild(renderShiftCard(sh));
    }
    root.appendChild(el("div", {style:"height:40px"}));
  }

  function renderShiftCard(sh) {
    const emp = userById[sh.empId];
    const ok = sh.hours >= 9;
    const wkStart = weekStartOf(sh.date);
    const status = weekStatus(sh.empId, wkStart);
    return el("div", {class:"hist-shift-card"},
      el("div", {class:"top"},
        el("div", {class:"left"},
          el("div", {class:`status-dot ${ok ? "ok":"warn"}`}),
          el("div", {class:"date"}, fmtDateLong(sh.date)),
        ),
        el("div", {class:`hrs ${ok ? "ok":"warn"}`}, `${sh.hours.toFixed(1)}${tr("hoursShort")}`),
      ),
      el("div", {class:"chips"},
        el("span", {class:"chip"}, ICON("clock", 11), el("span", {}, `${tr("start")} ${fmt12(sh.start)}`)),
        el("span", {class:"chip"}, ICON("clock", 11), el("span", {}, `${tr("end")} ${fmt12(sh.end)}`)),
      ),
      sh.comment ? el("div", {class:"comment"}, `"${sh.comment}"`) : null,
      status ? el("div", {class:`week-status ${status}`}, status === "approved" ? tr("weekApproved") : tr("weekPending")) : null,
    );
  }

  // =============================================================
  // MAP
  // =============================================================
  // Tight-framed OSM tile map — 2x2 grid, minimal padding, high zoom.
  // Improves on the prior "too zoomed out" issue.
  function lng2tileX(lng, zoom) { const n = 1 << zoom; return (lng + 180) / 360 * n; }
  function lat2tileY(lat, zoom) {
    const n = 1 << zoom;
    return (1 - Math.log(Math.tan(lat*Math.PI/180) + 1/Math.cos(lat*Math.PI/180))/Math.PI)/2*n;
  }

  function miniMap(locatedShifts) {
    const pins = [];
    for (const sh of locatedShifts) {
      if (sh.clockIn)  pins.push({ lat: sh.clockIn.lat,  lng: sh.clockIn.lng,  in: true });
      if (sh.clockOut) pins.push({ lat: sh.clockOut.lat, lng: sh.clockOut.lng, in: false });
    }
    if (!pins.length) return el("div", {});
    const lats = pins.map(p => p.lat);
    const lngs = pins.map(p => p.lng);
    const minLat = Math.min(...lats), maxLat = Math.max(...lats);
    const minLng = Math.min(...lngs), maxLng = Math.max(...lngs);
    // Tight padding (was 30%; reduced to 12% to zoom in more)
    const latSpread = maxLat - minLat || 0.0005;
    const lngSpread = maxLng - minLng || 0.0005;
    const latPad = Math.max(latSpread * 0.12, 0.0003);
    const lngPad = Math.max(lngSpread * 0.12, 0.0003);
    const padMinLat = minLat - latPad, padMaxLat = maxLat + latPad;
    const padMinLng = minLng - lngPad, padMaxLng = maxLng + lngPad;
    // Use 2x2 grid instead of 3x2 for tighter framing
    const tilesWide = 2, tilesTall = 2;
    let zoom = 19;
    while (zoom > 1) {
      const minTX = lng2tileX(padMinLng, zoom), maxTX = lng2tileX(padMaxLng, zoom);
      const minTY = lat2tileY(padMaxLat, zoom), maxTY = lat2tileY(padMinLat, zoom);
      if ((maxTX - minTX) <= tilesWide && (maxTY - minTY) <= tilesTall) break;
      zoom--;
    }
    const centerLng = (padMinLng + padMaxLng) / 2;
    const centerLat = (padMinLat + padMaxLat) / 2;
    const centerTX = lng2tileX(centerLng, zoom);
    const centerTY = lat2tileY(centerLat, zoom);
    const startTX = Math.floor(centerTX - tilesWide / 2);
    const startTY = Math.floor(centerTY - tilesTall / 2);

    const mapEl = el("div", {class:"mini-map"});
    const tiles = el("div", {class:"tiles",
      style: `grid-template-columns: repeat(${tilesWide}, 1fr); grid-template-rows: repeat(${tilesTall}, 1fr);`});
    for (let r = 0; r < tilesTall; r++) {
      for (let c = 0; c < tilesWide; c++) {
        const tx = startTX + c;
        const ty = startTY + r;
        const url = `https://tile.openstreetmap.org/${zoom}/${tx}/${ty}.png`;
        tiles.appendChild(el("img", { src: url, alt:"", loading:"lazy" }));
      }
    }
    mapEl.appendChild(tiles);

    const pinsEl = el("div", {class:"pins"});
    for (const p of pins) {
      const tX = lng2tileX(p.lng, zoom), tY = lat2tileY(p.lat, zoom);
      const xPct = ((tX - startTX) / tilesWide) * 100;
      const yPct = ((tY - startTY) / tilesTall) * 100;
      pinsEl.appendChild(el("div", {
        class: `pin ${p.in ? "in" : "out"}`,
        style: `left:${xPct}%; top:${yPct}%`
      }));
    }
    mapEl.appendChild(pinsEl);
    mapEl.appendChild(el("div", {class:"legend"},
      el("span", {class:"in"}, tr("mapLegendIn")),
      el("span", {class:"out"}, tr("mapLegendOut")),
    ));
    return mapEl;
  }

  // =============================================================
  // MONTH NAV (shared)
  // =============================================================
  function monthNav() {
    const label = new Date(state.calYear, state.calMonth, 1)
      .toLocaleDateString(locale(), { month:"long", year:"numeric" })
      .replace(/^./, c => c.toUpperCase());
    return el("div", {class:"month-nav"},
      el("div", {class:"chev", onclick: () => {
        if (state.calMonth === 0) { state.calMonth = 11; state.calYear--; } else state.calMonth--;
        state.selectedDay = null; state.lastAnim = -1; render();
      }}, ICON("chevLeft")),
      el("div", {class:"label"}, label),
      el("div", {class:"chev", onclick: () => {
        if (state.calMonth === 11) { state.calMonth = 0; state.calYear++; } else state.calMonth++;
        state.selectedDay = null; state.lastAnim = 1; render();
      }}, ICON("chevRight")),
    );
  }

  // =============================================================
  // MODALS
  // =============================================================
  function renderModal() {
    const root = document.getElementById("modalRoot");
    root.innerHTML = "";
    if (!state.modal) return;

    const close = () => { state.modal = null; render(); };
    const card = el("div", {class:"modal-card"});
    const scrim = el("div", {
      class:"modal-scrim",
      onclick: (e) => { if (e.target === scrim) close(); },
    }, card);

    if (state.modal === "addEmployee") {
      const nameIn = el("input", { placeholder: strings[state.lang].fullName });
      const userIn = el("input", { placeholder: strings[state.lang].username });
      const passIn = el("input", { placeholder: strings[state.lang].password, type:"password" });
      const err = el("div", {class:"err", style:"display:none"});
      card.appendChild(el("h3", {}, tr("addEmployee")));
      card.appendChild(nameIn);
      card.appendChild(userIn);
      card.appendChild(passIn);
      card.appendChild(err);
      card.appendChild(el("div", {class:"actions"},
        el("button", {class:"btn", onclick: close}, tr("cancel")),
        el("button", {class:"btn primary", onclick: () => {
          const name = nameIn.value.trim(), u = userIn.value.trim(), p = passIn.value;
          if (!name || !u || !p) {
            err.textContent = state.lang === "es"
              ? "Todos los campos son obligatorios"
              : "All fields are required";
            err.style.display = "block";
            return;
          }
          if (users.some(x => x.username === u)) {
            err.textContent = state.lang === "es"
              ? "Ese nombre de usuario ya existe"
              : "Username already exists";
            err.style.display = "block";
            return;
          }
          const newId = Math.max(...users.map(x => x.id)) + 1;
          const colors = ["var(--emp-1)","var(--emp-2)","var(--emp-3)","var(--emp-4)","var(--emp-5)","var(--emp-6)","var(--emp-7)","var(--emp-8)","var(--emp-9)","var(--emp-10)"];
          users.push({
            id: newId, username: u, password: p, displayName: name,
            role: "employee", color: colors[newId % colors.length],
          });
          userById[newId] = users[users.length-1];
          toast(state.lang === "es" ? "Empleado agregado" : "Employee added", {kind:"success", pill:"+"});
          close();
        }}, tr("add")),
      ));
    } else if (state.modal === "approvals") {
      card.appendChild(el("h3", {}, tr("approvalsTitle")));
      const pending = pendingApprovals();
      if (!pending.length) {
        card.appendChild(el("p", {}, tr("noPending")));
      } else {
        for (const w of pending) {
          const emp = userById[w.empId];
          const wkShifts = shiftsForWeek(w.empId, w.weekStart);
          const wkHours = wkShifts.reduce((s,x)=>s+x.hours,0);
          const row = el("div", {class:"approval-row"},
            el("div", {class:"top"},
              el("div", {class:"who", style:`color:${emp.color}`}, emp.displayName),
              el("div", {class:"total"}, `${wkHours.toFixed(1)}${tr("hoursShort")}`),
            ),
            el("div", {class:"week"}, `${fmtDateShort(w.weekStart)} – ${fmtDateShort(weekEndOf(w.weekStart))} · ${wkShifts.length} ${tr("shifts").toLowerCase()}`),
          );
          if (state.currentUser?.role === "admin") {
            row.appendChild(el("div", {class:"actions"},
              el("button", {
                class:"reject",
                onclick: () => {
                  w.status = null;
                  const idx = weekApprovals.findIndex(x => x === w);
                  if (idx >= 0) weekApprovals.splice(idx, 1);
                  toast(tr("weekRejectedToast"), {kind:"warn", pill:"↺"});
                  render();
                }
              }, tr("reject")),
              el("button", {
                class:"approve",
                onclick: () => {
                  w.status = "approved";
                  toast(tr("weekApprovedToast"), {kind:"success", pill:"✓"});
                  render();
                }
              }, tr("approve")),
            ));
          }
          card.appendChild(row);
        }
      }
      card.appendChild(el("div", {class:"actions"},
        el("button", {class:"btn", onclick: close}, state.lang === "es" ? "Cerrar" : "Close"),
      ));
    }

    root.appendChild(scrim);
  }

  // =============================================================
  // ROOT RENDER
  // =============================================================
  function render() {
    const scroll = document.getElementById("scrollRoot");
    scroll.classList.remove("screen-enter");
    void scroll.offsetWidth;
    scroll.classList.add("screen-enter");

    renderTopbar();
    renderFab();

    if (state.screen === "login") {
      renderLogin();
    } else if (state.screen === "employee_home") {
      renderEmployeeHome();
    } else if (state.screen === "history") {
      renderHistory();
    } else if (state.screen === "admin_home") {
      renderAdminHome();
    } else if (state.screen === "admin_employee") {
      renderAdminEmployee();
    }

    renderModal();
  }

  render();
</script>
