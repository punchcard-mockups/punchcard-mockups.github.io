        el("button", {
          class:"btn danger",
          onclick: () => rejectEditRequest(editReq.id),
        }, tr("rejectEdit")),
      ));
    }
    // Admin/owner direct edit button — always available (even after approval)
    if (canApprove(u)) {
      root.appendChild(el("button", {
        class:"btn primary full",
        style: "margin-top:8px;",
        onclick: () => { state.modal = "adminEditShift"; history.pushState({ modal: true }, ""); render(); },
      }, tr("adminEditTitle")));
    } else if (!editReq && isEmployee(u) && u.id === sh.empId && !weekIsLocked) {
      // Employee actions on own shift in an active (not yet submitted,
      // not approved) week:
      //   - Edit note: direct save, no admin approval needed.
      //   - Request edit: time changes still go through the edit-request queue.
      // If the week is "pending" or "approved", both of these are hidden
      // via the weekIsLocked and !pending checks.
      const weekIsOpen = weekSt !== "pending";
      if (weekIsOpen) {
        root.appendChild(el("button", {
          class:"btn full",
          style: "margin-top:8px;",
          onclick: () => { state.modal = "editShiftComment"; history.pushState({ modal: true }, ""); render(); },
        }, sh.comment ? tr("editShiftCommentAction") : tr("addNoteAction")));
      }
      root.appendChild(el("button", {
        class:"btn primary full",
        style: "margin-top:8px;",
        onclick: () => { state.modal = "editShift"; history.pushState({ modal: true }, ""); render(); },
      }, tr("requestEdit")));
    } else if (!editReq && isEmployee(u) && u.id === sh.empId && weekIsLocked) {
      // Approved-week lock notice.
      root.appendChild(el("div", {class:"sd-locked-notice"}, tr("lockedAfterApproval")));
    }

    root.appendChild(el("div", {style:"height:40px"}));
  }

  async function approveEditRequest(reqId) {
    try {
      const { r: updated } = await api.decideEditRequest(reqId, "approved");
      // Worker also mutated the underlying shift + appended an adminEdits entry.
      // Re-hydrate so the shift change + audit log are visible everywhere.
      hydrateFromDb(await api.db());
      // hydrateFromDb resets the local editRequests array too, so the merged
      // object already reflects the updated status — no need to patch it.
      void updated;
      toast(tr("editApproved"), { kind:"success", pill:"✓" });
      render();
    } catch (e) {
      toastApiError(e, state.lang === "es" ? "No se pudo aprobar" : "Couldn't approve");
    }
  }
  async function rejectEditRequest(reqId) {
    try {
      const { r: updated } = await api.decideEditRequest(reqId, "rejected");
      const local = editRequests.find(x => x.id === reqId);
      if (local) Object.assign(local, updated);
      toast(tr("editRejected"), { kind:"warn", pill:"↺" });
      render();
    } catch (e) {
      toastApiError(e, state.lang === "es" ? "No se pudo rechazar" : "Couldn't reject");
    }
  }

  // Groups shifts by month → week and appends headers + cards to `root`.
  // Expects shifts already sorted newest-to-oldest.
  // Weeks other than the current one default to collapsed; click the header to toggle.
  function appendGroupedShifts(root, sortedShifts, empId) {
    if (!sortedShifts.length) return;
    if (state.expandedHistoryWeeks == null) {
      state.expandedHistoryWeeks = new Set();
    }

    const byMonth = new Map();
    for (const sh of sortedShifts) {
      const mKey = sh.date.slice(0, 7); // YYYY-MM
      if (!byMonth.has(mKey)) byMonth.set(mKey, []);
      byMonth.get(mKey).push(sh);
    }
    const mKeys = [...byMonth.keys()].sort().reverse();
    for (const mKey of mKeys) {
      const mShifts = byMonth.get(mKey);
      const mHours = mShifts.reduce((s,x)=>s+x.hours,0);
      const [y, m] = mKey.split("-").map(Number);
      const monthLabel = new Date(y, m-1, 1)
        .toLocaleDateString(locale(), {month:"long", year:"numeric"})
        .replace(/ de /, " ")
        .replace(/^./, c => c.toUpperCase());

      root.appendChild(el("div", {class:"hist-month-head"},
        el("div", {class:"m-title"}, monthLabel),
        el("div", {class:"m-stats"},
          `${mHours.toFixed(1)}${tr("hoursShort")} · ${mShifts.length} ${tr("shifts").toLowerCase()}`),
      ));

      const byWeek = new Map();
      for (const sh of mShifts) {
        const wkStart = weekStartOf(sh.date);
        if (!byWeek.has(wkStart)) byWeek.set(wkStart, []);
        byWeek.get(wkStart).push(sh);
      }
      const wKeys = [...byWeek.keys()].sort().reverse();
      for (const wkStart of wKeys) {
        // History uses the unified WeekRow (mode "history") — collapsible
        // header, status pill (with Reopen menu for admin/owner on approved
        // weeks), and shift cards inside when expanded.
        root.appendChild(renderWeekRow({
          empId, weekStart: wkStart, mode: "history",
        }));
      }
    }
  }

  // =============================================================
  // MAP
  // =============================================================
  // Leaflet-backed map. Auto-fits to pins, caps zoom so tight clusters
  // still show neighborhood context. Interactive: drag, pinch, zoom buttons.
  // Scroll-wheel zoom is disabled until the user clicks the map so it
  // doesn't hijack page scroll.
  const MAP_MAX_ZOOM = 15;
  const MAP_FIT_PADDING = 24;

  // Compact, non-interactive map for the clock-in/out card. No drag, no
  // zoom, no legend, no attribution bar — just a visual confirmation of
  // where the user was. Accepts a coord array: [{lat, lng, in: bool}].
  function miniMapThumb(coordPins) {
    const pins = coordPins.filter(p => p && Number.isFinite(p.lat) && Number.isFinite(p.lng));
    if (!pins.length) return el("div", {});
    const mapEl = el("div", {class: "mini-map mini-map--thumb"});
    requestAnimationFrame(() => {
      const map = L.map(mapEl, {
        scrollWheelZoom: false, zoomControl: false, attributionControl: false,
        dragging: false, touchZoom: false, doubleClickZoom: false,
        boxZoom: false, keyboard: false, tap: false,
      });
      L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", { maxZoom: 19 }).addTo(map);
      for (const p of pins) {
        L.marker([p.lat, p.lng], {
          icon: L.divIcon({
            className: "pin-marker",
            html: `<div class="pin ${p.in ? "in" : "out"}"></div>`,
            iconSize: [14, 14], iconAnchor: [7, 7],
          }),
          interactive: false,
        }).addTo(map);
      }
      if (pins.length === 1) {
        map.setView([pins[0].lat, pins[0].lng], 16);
      } else {
        map.fitBounds(L.latLngBounds(pins.map(p => [p.lat, p.lng])), {
          padding: [12, 12], maxZoom: 16,
        });
      }
    });
    return mapEl;
  }

  function miniMap(locatedShifts) {
    const pins = [];
    for (const sh of locatedShifts) {
      if (sh.clockIn)  pins.push({ lat: sh.clockIn.lat,  lng: sh.clockIn.lng,  in: true });
      if (sh.clockOut) pins.push({ lat: sh.clockOut.lat, lng: sh.clockOut.lng, in: false });
    }
    if (!pins.length) return el("div", {});

    const mapEl = el("div", {class: "mini-map mini-map--locked"});
    mapEl.appendChild(el("div", {class: "legend"},
      el("span", {class: "in"}, tr("mapLegendIn")),
      el("span", {class: "out"}, tr("mapLegendOut")),
    ));

    // Leaflet needs the element in the DOM with a measurable size.
    requestAnimationFrame(() => {
      const map = L.map(mapEl, {
        scrollWheelZoom: false,
        zoomControl: true,
        attributionControl: false,
      });
      L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 19,
        attribution: "© OpenStreetMap",
      }).addTo(map);
      L.control.attribution({ prefix: false, position: "bottomright" })
        .addAttribution("© OSM").addTo(map);

      for (const p of pins) {
        L.marker([p.lat, p.lng], {
          icon: L.divIcon({
            className: "pin-marker",
            html: `<div class="pin ${p.in ? "in" : "out"}"></div>`,
            iconSize: [16, 16],
            iconAnchor: [8, 8],
          }),
        }).addTo(map);
      }

      const bounds = L.latLngBounds(pins.map(p => [p.lat, p.lng]));
      map.fitBounds(bounds, {
        padding: [MAP_FIT_PADDING, MAP_FIT_PADDING],
        maxZoom: MAP_MAX_ZOOM,
      });

      // Click-to-activate scroll zoom. Also show a brief hint if the user
      // tries to scroll-wheel-zoom while it's still locked.
      const activate = () => {
        map.scrollWheelZoom.enable();
        mapEl.classList.remove("mini-map--locked");
      };
      map.once("click", activate);
      mapEl.addEventListener("wheel", (e) => {
        if (mapEl.classList.contains("mini-map--locked")) {
          mapEl.classList.add("show-hint");
          clearTimeout(mapEl._hintTimer);
          mapEl._hintTimer = setTimeout(() => mapEl.classList.remove("show-hint"), 900);
        }
      }, { passive: true });
    });

    return mapEl;
  }

  // MONTH NAV (shared)

  function monthLabelText() {
    return new Date(state.calYear, state.calMonth, 1)
      .toLocaleDateString(locale(), { month:"long", year:"numeric" })

  function monthNav() {
    return el("div", {class:"month-nav"},
      el("div", {class:"chev", onclick: () => {
        if (state.calMonth === 0) { state.calMonth = 11; state.calYear--; } else state.calMonth--;
        state.selectedDay = null; state.lastAnim = -1; updateCalendarInPlace();
      }}, ICON("chevLeft")),
      el("div", {class:"label cal-month-label"}, monthLabelText()),
      el("div", {class:"chev", onclick: () => {
        if (state.calMonth === 11) { state.calMonth = 0; state.calYear++; } else state.calMonth++;
        state.selectedDay = null; state.lastAnim = 1; updateCalendarInPlace();
      }}, ICON("chevRight")),
    );
  }

  // Targeted month-swap: replace just the calendar block + label,
  // without re-rendering the whole screen (topbar, greeting, etc. stay put).
  function updateCalendarInPlace() {
    const oldBlock = document.querySelector(".cal-block");
    const label = document.querySelector(".cal-month-label");
    if (!oldBlock || !label) { render(); return; }

    const scopeEmpId = isAdminLike(state.currentUser) ? null : state.currentUser.id;

    label.textContent = monthLabelText();

    const animClass = state.lastAnim === 1 ? "month-anim-next"
                    : state.lastAnim === -1 ? "month-anim-prev" : "";
    state.lastAnim = 0;
    const newBlock = el("div", { class: `cal-block ${animClass}`.trim() });
    newBlock.appendChild(renderCalendar(scopeEmpId));
    oldBlock.replaceWith(newBlock);
  }

  // =============================================================
  // MODALS
  // =============================================================
  let _lastRenderedModal = null;
  function renderModal() {
    const root = document.getElementById("modalRoot");
    // Only play the scrim fade-in + card slide-up animations when the modal
    // is actually being opened (state.modal transitioning from one value to
    // another). Intra-modal re-renders — expanding a pending-week row,
    // switching from Manage users → Edit employee, etc — replay the modal's
    // entrance otherwise, which looks like the whole sheet bouncing.
    const isFreshOpen = state.modal !== _lastRenderedModal;
    // Preserve modal scroll position across intra-modal re-renders.
    const prevScroll = !isFreshOpen ? (root.querySelector(".modal-card")?.scrollTop ?? 0) : 0;
    _lastRenderedModal = state.modal;
    root.innerHTML = "";
    if (!state.modal) return;

    const close = () => { history.back(); };
    const card = el("div", {class: "modal-card" + (isFreshOpen ? "" : " no-anim")});
    const scrim = el("div", {
      class: "modal-scrim" + (isFreshOpen ? "" : " no-anim"),
      onclick: (e) => { if (e.target === scrim) close(); },
    }, card);

    if (state.modal === "addEmployee") {
      const nameIn = el("input", { placeholder: strings[state.lang].fullName });
      const userIn = el("input", { placeholder: strings[state.lang].username, autocapitalize:"off", autocorrect:"off", spellcheck:"false" });
      const passIn = el("input", { placeholder: strings[state.lang].password, type:"password" });
      const roleSel = el("select", {},
        el("option", { value: "employee" }, tr("employee")),
        el("option", { value: "admin" }, tr("admin")),
        el("option", { value: "readonly" }, tr("readonly")),
      );
      const err = el("div", {class:"err", style:"display:none"});
      card.appendChild(el("h3", {}, tr("addUser")));
      card.appendChild(el("label", {class:"field-label"}, tr("fullName")));
      card.appendChild(nameIn);
      card.appendChild(el("label", {class:"field-label"}, tr("username")));
      card.appendChild(userIn);
      card.appendChild(el("label", {class:"field-label"}, tr("password")));
      card.appendChild(passIn);
      card.appendChild(el("label", {class:"field-label"}, tr("role")));
      card.appendChild(roleSel);
      card.appendChild(err);
      // Add user is opened as a sheet from the Manage users screen.
      // Cancel = dismiss the sheet (history.back). Save = dismiss + refresh
      // the list underneath.
      card.appendChild(el("div", {class:"actions"},
        el("button", {class:"btn", onclick: close}, tr("cancel")),
        el("button", {class:"btn primary", onclick: async (ev) => {
          const name = nameIn.value.trim(), u = userIn.value.trim(), p = passIn.value;
          const role = roleSel.value;
          if (!name || !u || !p) {
            err.textContent = state.lang === "es"
              ? "Todos los campos son obligatorios"
              : "All fields are required";
            err.style.display = "block";
            return;
          }
          if (users.some(x => x.username === u)) {
            err.textContent = state.lang === "es"
              ? "Ese nombre de usuario ya existe"
              : "Username already exists";
            err.style.display = "block";
            return;
          }
          if (ev.currentTarget.disabled) return;
          ev.currentTarget.disabled = true;
          const colors = ["var(--emp-1)","var(--emp-2)","var(--emp-3)","var(--emp-4)","var(--emp-5)","var(--emp-6)","var(--emp-7)","var(--emp-8)","var(--emp-9)","var(--emp-10)"];
          const likelyNextId = Math.max(...users.map(x => x.id)) + 1;
          try {
            const { user: added } = await api.createUser({
              username: u, password: p, displayName: name, role,
              color: colors[likelyNextId % colors.length],
            });
            users.push(added);
            userById[added.id] = added;
            toast(state.lang === "es" ? "Usuario agregado" : "User added", {kind:"success", pill:"+"});
            close();
          } catch (e) {
            ev.currentTarget.disabled = false;
            err.textContent = e.message || (state.lang === "es" ? "No se pudo agregar" : "Couldn't add user");
            err.style.display = "block";
          }
        }}, tr("add")),
      ));
    } else if (state.modal === "approvals") {
      // Legacy approvals modal — replaced by the Inbox tab (renderInbox).
      // Kept guarded as a no-op in case any in-flight history entry asks
      // for it; close immediately and route to inbox.
      state.modal = null;
      navTab("inbox");
      return;
    } else if (state.modal === "addShift") {
      const emp = userById[state.viewingEmployeeId];
      if (!emp) { close(); return; }
      const todayStr = new Date().toISOString().slice(0, 10);
      // Default the shift's timezone to this employee's most-recent shift
      // (hospice nurses work in Peru; admin may be elsewhere). Fall back to
      // admin's current zone if the employee has no prior shifts on file.
      const recentShift = shifts
        .filter(s => s.empId === emp.id && s.clockInTz)
        .sort((a, b) => b.date.localeCompare(a.date) || b.start.localeCompare(a.start))[0];
      const defaultTz = recentShift?.clockInTz || currentTimezone() || "America/Lima";
      const tzOptions = [
        { value: "America/Lima",        label: "Peru (PET)" },
        { value: "America/New_York",    label: "US Eastern (EDT/EST)" },
        { value: "America/Chicago",     label: "US Central (CDT/CST)" },
        { value: "America/Denver",      label: "US Mountain (MDT/MST)" },
        { value: "America/Los_Angeles", label: "US Pacific (PDT/PST)" },
      ];
      // If the admin's current zone isn't in the preset list, prepend it.
      const adminTz = currentTimezone();
      if (adminTz && !tzOptions.some(o => o.value === adminTz)) {
        tzOptions.unshift({ value: adminTz, label: adminTz });
      }
      // If the defaultTz isn't already in the list, prepend it.
      if (defaultTz && !tzOptions.some(o => o.value === defaultTz)) {
        tzOptions.unshift({ value: defaultTz, label: defaultTz });
      }
      const tzIn = el("select", {},
        ...tzOptions.map(o => el("option", { value: o.value }, o.label)),
      );
      tzIn.value = defaultTz;
      const dateIn  = el("input", { type: "date", value: todayStr });
      const startIn = el("input", { type: "time", value: "08:00" });
      const endIn   = el("input", { type: "time", value: "17:00" });
      const noteIn  = el("textarea", { rows: 2, placeholder: tr("addShiftReason") });
      const err = el("div", {class:"err", style:"display:none"});
      tzIn.classList.add("tz-select-compact");
      card.appendChild(el("h3", {}, tr("addShiftTitle")));
      card.appendChild(el("p", {style:"color:var(--text-muted); margin:-4px 0 10px;"}, emp.displayName));
      card.appendChild(el("label", {class:"field-label"}, tr("date")));
      card.appendChild(dateIn);
      card.appendChild(el("label", {class:"field-label"}, tr("start")));
      card.appendChild(startIn);
      card.appendChild(el("label", {class:"field-label"}, tr("end")));
      card.appendChild(endIn);
      card.appendChild(el("div", {class:"tz-row"},
        el("span", {class:"tz-row-label"}, tr("timezone")),
        tzIn,
      ));
      card.appendChild(el("label", {class:"field-label"}, tr("reasonRequiredLabel")));
      card.appendChild(noteIn);
      card.appendChild(err);
      card.appendChild(el("div", {class:"actions"},
        el("button", {class:"btn", onclick: close}, tr("cancel")),
        el("button", {class:"btn primary", onclick: async (ev) => {
          const note = noteIn.value.trim();
          if (!note) {
            err.textContent = tr("addShiftReasonRequired");
            err.style.display = "block";
            noteIn.focus();
            return;
          }
          const date = dateIn.value;
          const start = startIn.value;
          const end = endIn.value;
          if (!date || !start || !end) {
            err.textContent = state.lang === "es" ? "Fecha y horas son obligatorias" : "Date, start, and end are required";
            err.style.display = "block";
            return;
          }
          // Compute hours the same way clockSection does (end - start in minutes → hours).
          const [sh1, sm1] = start.split(":").map(Number);
          const [sh2, sm2] = end.split(":").map(Number);
          let mins = (sh2 * 60 + sm2) - (sh1 * 60 + sm1);
          if (mins < 0) mins += 24 * 60;
          const hours = Math.round((mins / 60) * 10) / 10;
          if (ev.currentTarget.disabled) return;
          ev.currentTarget.disabled = true;
          try {
            const { shift } = await api.adminAddShift({
              empId: emp.id, date, start, end, hours,
              clockInTz: tzIn.value || null,
              clockOutTz: tzIn.value || null,
              comment: note,
              reason: note,
            });
            shifts.push(shift);
            nextShiftId = Math.max(nextShiftId, shift.id + 1);
            toast(tr("shiftAdded"), {kind:"success", pill:"✓"});
            close();
          } catch (e) {
            ev.currentTarget.disabled = false;
            err.textContent = e.message || (state.lang === "es" ? "No se pudo añadir" : "Couldn't add shift");
            err.style.display = "block";
          }
        }}, tr("saveChanges")),
      ));
    } else if (state.modal === "editShiftComment") {
      const sh = shifts.find(s => s.id === state.viewingShiftId);
      if (!sh) { close(); return; }
      const noteIn = el("textarea", { rows: 4, placeholder: tr("editShiftCommentPlaceholder") });
      noteIn.value = sh.comment || "";
      const err = el("div", {class:"err", style:"display:none"});
      card.appendChild(el("h3", {}, tr("editShiftCommentTitle")));
      card.appendChild(el("p", {style:"color:var(--text-muted); margin:-4px 0 10px;"}, fmtDateLong(sh.date)));
      card.appendChild(noteIn);
      card.appendChild(err);
      card.appendChild(el("div", {class:"actions"},
        el("button", {class:"btn", onclick: close}, tr("cancel")),
        el("button", {class:"btn primary", onclick: async (ev) => {
          if (ev.currentTarget.disabled) return;
          ev.currentTarget.disabled = true;
          try {
            const { shift: updated } = await api.updateShiftComment(sh.id, noteIn.value);
            Object.assign(sh, updated);
            toast(tr("noteSaved"), {kind:"success", pill:"✓"});
            close();
          } catch (e) {
            ev.currentTarget.disabled = false;
            err.textContent = e.message || (state.lang === "es" ? "No se pudo guardar" : "Couldn't save");
            err.style.display = "block";
          }
        }}, tr("saveChanges")),
      ));
    } else if (state.modal === "editShift") {
      const sh = shifts.find(s => s.id === state.viewingShiftId);
      if (!sh) { close(); return; }
      const startIn = el("input", { type:"time", value: sh.start });
      const endIn   = el("input", { type:"time", value: sh.end });
      const noteIn  = el("textarea", { rows: 3, placeholder: tr("editComment") });
      const err = el("div", {class:"err", style:"display:none"});
      card.appendChild(el("h3", {}, tr("requestEditTitle")));
      card.appendChild(el("p", {}, fmtDateLong(sh.date) + " · " + tr("requestEditHelper")));
      card.appendChild(el("label", {class:"field-label"}, tr("start")));
      card.appendChild(startIn);
      card.appendChild(el("label", {class:"field-label"}, tr("end")));
      card.appendChild(endIn);
      card.appendChild(el("label", {class:"field-label"}, tr("reasonRequiredLabel")));
      card.appendChild(noteIn);
      card.appendChild(err);
      card.appendChild(el("div", {class:"actions"},
        el("button", {class:"btn", onclick: close}, tr("cancel")),
        el("button", {class:"btn primary", onclick: async (ev) => {
          const start = startIn.value;
          const end = endIn.value;
          const comment = noteIn.value.trim();
          if (!comment) {
            err.textContent = tr("editCommentRequired");
            err.style.display = "block";
            noteIn.focus();
            return;
          }
          if (!start || !end) {
            err.textContent = state.lang === "es"
              ? "Las horas de inicio y fin son obligatorias"
              : "Start and end times are required";
            err.style.display = "block";
            return;
          }
          if (ev.currentTarget.disabled) return;
          ev.currentTarget.disabled = true;
          try {
            const { request } = await api.createEditRequest({ shiftId: sh.id, start, end, comment });
            editRequests.push(request);
            nextEditReqId = Math.max(nextEditReqId, request.id + 1);
            toast(tr("editSubmitted"), {kind:"success", pill:"✓"});
            close();
          } catch (e) {
            ev.currentTarget.disabled = false;
            err.textContent = e.message || (state.lang === "es" ? "No se pudo enviar" : "Couldn't submit");
            err.style.display = "block";
          }
        }}, tr("requestEditSubmit")),
      ));
    } else if (state.modal === "adminEditShift") {
      // Admin/owner direct-edit: saves the shift immediately (no approval loop)
      // and appends an entry to sh.adminEdits so the change is visible in the
      // detail's audit log and surfaces on the week header.
      const sh = shifts.find(s => s.id === state.viewingShiftId);
      if (!sh) { close(); return; }
      const startIn = el("input", { type: "time", value: sh.start });
      const endIn   = el("input", { type: "time", value: sh.end });
      const noteIn  = el("textarea", { rows: 3, placeholder: tr("adminEditReason") });
      const err = el("div", {class:"err", style:"display:none"});
      card.appendChild(el("h3", {}, tr("adminEditTitle")));
      card.appendChild(el("p", {}, fmtDateLong(sh.date)));
      card.appendChild(el("label", {class:"field-label"}, tr("start")));
      card.appendChild(startIn);
      card.appendChild(el("label", {class:"field-label"}, tr("end")));
      card.appendChild(endIn);
      card.appendChild(el("label", {class:"field-label"}, tr("reasonRequiredLabel")));
      card.appendChild(noteIn);
      card.appendChild(err);
      card.appendChild(el("div", {class:"actions"},
        el("button", {class:"btn", onclick: close}, tr("cancel")),
        el("button", {class:"btn primary", onclick: async (ev) => {
          const start = startIn.value;
          const end = endIn.value;
          const comment = noteIn.value.trim();
          if (!comment) {
            err.textContent = tr("adminEditReasonRequired");
            err.style.display = "block";
            noteIn.focus();
            return;
          }
          if (!start || !end) {
            err.textContent = state.lang === "es"
              ? "Las horas de inicio y fin son obligatorias"
              : "Start and end times are required";
            err.style.display = "block";
            return;
          }
          if (ev.currentTarget.disabled) return;
          ev.currentTarget.disabled = true;
          try {
            const { shift: updated } = await api.adminEdit({ shiftId: sh.id, start, end, reason: comment });
            Object.assign(sh, updated);
            toast(tr("adminEditSaved"), {kind:"success", pill:"✓"});
            close();
          } catch (e) {
            ev.currentTarget.disabled = false;
            err.textContent = e.message || (state.lang === "es" ? "No se pudo guardar" : "Couldn't save");
            err.style.display = "block";
          }
        }}, tr("save")),
      ));
    } else if (state.modal === "resetPasswordUser") {
      // Sheet on top of the Edit User screen. Cancel = dismiss the sheet
      // (history.back); Save = dismiss + a success toast underneath.
      const target = users.find(x => x.id === state.manageTargetId);
      if (!target) { close(); return; }
      const passIn = el("input", { type: "password", placeholder: tr("newPassword"), autocapitalize:"off", autocorrect:"off", spellcheck:"false" });
      const err = el("div", {class:"err", style:"display:none"});
      card.appendChild(el("h3", {}, tr("resetPassword")));
      card.appendChild(el("p", {style:"color:var(--text-muted); margin:-4px 0 10px;"}, `${target.displayName} (@${target.username})`));
      card.appendChild(passIn);
      card.appendChild(err);
      card.appendChild(el("div", {class:"actions"},
        el("button", {class:"btn", onclick: close}, tr("cancel")),
        el("button", {class:"btn primary", onclick: async (ev) => {
          const pw = passIn.value.trim();
          if (!pw) { err.textContent = state.lang === "es" ? "Contraseña obligatoria" : "Password required"; err.style.display = "block"; return; }
          if (ev.currentTarget.disabled) return;
          ev.currentTarget.disabled = true;
          try {
            await api.resetPassword(target.id, pw);
            toast(tr("passwordChanged"), {kind:"success", pill:"✓"});
            close();
          } catch (e) {
            ev.currentTarget.disabled = false;
            err.textContent = e.message || (state.lang === "es" ? "No se pudo cambiar" : "Couldn't update");
            err.style.display = "block";
          }
        }}, tr("saveChanges")),
      ));
    } else if (state.modal === "confirmDeactivate") {
      // Confirmation sheet on top of Edit User. On confirm, dismiss the sheet
      // AND pop the Edit User screen (since the user no longer exists in the
      // active list); the underlying Manage Users screen rerenders with the
      // user moved to the Deactivated section.
      const target = users.find(x => x.id === state.manageTargetId);
      if (!target) { close(); return; }
      card.appendChild(el("h3", {}, tr("deactivateConfirmTitle")));
      card.appendChild(el("p", {}, tr("deactivateConfirmBody", target.displayName)));
      card.appendChild(el("div", {class:"actions"},
        el("button", {class:"btn", onclick: close}, tr("cancel")),
        el("button", {class:"btn danger-confirm", onclick: async (ev) => {
          if (ev.currentTarget.disabled) return;
          ev.currentTarget.disabled = true;
          try {
            await api.deactivateUser(target.id);
            hydrateFromDb(await api.db());
            toast(tr("userDeactivated"), {kind:"success", pill:"✓"});
            // Close the sheet, then pop the Edit User screen so the owner
            // lands back on Manage Users with the user now in Deactivated.
            state.modal = null;
            navBack();
          } catch (e) {
            ev.currentTarget.disabled = false;
            toastApiError(e, state.lang === "es" ? "No se pudo desactivar" : "Couldn't deactivate");
          }
        }}, tr("deactivate")),
      ));
    }

    root.appendChild(scrim);
    if (!isFreshOpen) card.scrollTop = prevScroll;
  }

  // =============================================================
  // ROOT RENDER
  // =============================================================
  let _lastRenderedScreen = null;
  function render() {
    const scroll = document.getElementById("scrollRoot");
    // Only replay the screen-enter transition when we're actually navigating
    // to a new screen. Without this gate, every render() caused by a
    // dropdown toggle, button state update, or in-place mutation looks like
    // a full-page flash because the scroll area fades+shifts.
    if (state.screen !== _lastRenderedScreen) {
      // Pick the right entrance for the navigation kind:
      //   navDir > 0  → forward push (slide in from the right)
      //   navDir < 0  → back pop    (slide in from the left)
      //   navDir = 0  → tab swap    (cross-fade; siblings, not parent/child)
      // Reset all class candidates first so the previous screen's animation
      // doesn't bleed into the new one.
      scroll.classList.remove("screen-enter", "screen-enter-fwd", "screen-enter-back", "screen-enter-tab");
      scroll.classList.remove("mu-screen", "eu-screen", "roster-screen");
      void scroll.offsetWidth;
      let cls = "screen-enter";
      if (state.navDir > 0) cls = "screen-enter-fwd";
      else if (state.navDir < 0) cls = "screen-enter-back";
      else if (_lastRenderedScreen != null) cls = "screen-enter-tab";
      scroll.classList.add(cls);
      _lastRenderedScreen = state.screen;
      state.navDir = 0;
    }

    renderTopbar();
    renderFab();
    renderBottomBar();

    if (state.screen === "login") {
      renderLogin();
    } else if (state.screen === "employee_home") {
      renderEmployeeHome();
    } else if (state.screen === "history") {
      renderHistory();
    } else if (state.screen === "admin_home") {
      renderAdminHome();
    } else if (state.screen === "inbox") {
      renderInbox();
    } else if (state.screen === "admin_employee") {
      renderAdminEmployee();
    } else if (state.screen === "shift_detail") {
      renderShiftDetail();
    } else if (state.screen === "manage_users") {
      renderManageUsers();
    } else if (state.screen === "edit_user") {
      renderEditUser();
    }

    renderModal();
  }

  // Close the account dropdown when the user taps anywhere outside it.
  // Children of the trigger / menu stop propagation so the menu survives
  // internal clicks.
  document.addEventListener("click", () => {
    let needsRender = false;
    if (state.userMenuOpen) {
      state.userMenuOpen = false;
      renderTopbar();
    }
    if (state.weekMenuKey) {
      state.weekMenuKey = null;
      state.weekReopenConfirm = false;
      needsRender = true;
    }
    if (needsRender) render();
  });

  // Keyboard-aware viewport: lift the bottom sheet (and anything that reads
  // --kb-inset) above the soft keyboard when it opens. iOS/Android both
  // overlay the keyboard on top of the layout viewport by default, so
  // elements anchored to the bottom end up hidden behind it. The
  // VisualViewport API reports the *visible* portion of the viewport; the
  // difference is the keyboard height.
  (function trackKeyboard() {
    const vv = window.visualViewport;
    if (!vv) return;
    const update = () => {
      const inset = Math.max(0, window.innerHeight - vv.height - vv.offsetTop);
      document.documentElement.style.setProperty("--kb-inset", inset + "px");
    };
    vv.addEventListener("resize", update);
    vv.addEventListener("scroll", update);
    update();
  })();

  loadDB().then(render).catch((err) => {
    console.error("Failed to load from the PunchCard API", err);
    const root = document.getElementById("scrollRoot");
    if (root) root.textContent = "Couldn't reach the PunchCard API — check your connection.";
  });
</script>
