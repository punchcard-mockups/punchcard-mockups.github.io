        t.appendChild(el("div", {class:"trow"},
          el("span", {class:"nm"},

            timeRangeWithTz(sh.start, sh.end, sh.clockInTz, sh.clockOutTz, new Date(sh.date + "T00:00:00")),

  // Summary card
  function monthStats(scopeEmpId=null) {
    const data = dataByDay(state.calYear, state.calMonth, scopeEmpId);
    let totalHours = 0, totalShifts = 0;
    const days = new Set();
    const empHours = {};
    for (const [dayStr, arr] of Object.entries(data)) {
      for (const sh of arr) {
        totalHours += sh.hours; totalShifts++;
        days.add(dayStr);
        empHours[sh.empId] = (empHours[sh.empId] || 0) + sh.hours;
      }
    }
    return {
      totalHours, totalShifts,
      activeDays: days.size,
      employees: Object.keys(empHours).length,
      avgPerDay: days.size ? totalHours / days.size : 0,
      empHours,
    };
  }
  function stat(kind, value, label) {
    return el("div", {class:`stat ${kind}`},
      el("div", {class:"value"}, value),
      el("div", {class:"label"}, label),
    );
  }
  function summaryCard(scopeEmpId=null) {
    const st = monthStats(scopeEmpId);
    if (scopeEmpId) {
      return el("div", {class:"info-card"},
        el("div", {class:"row"},
          stat("plain", st.totalHours.toFixed(1), tr("hours")),
          stat("plain", String(st.activeDays), tr("days")),
        )
      );
    }
    const card = el("div", {class:"info-card legend"});
    card.appendChild(el("div", {class:"row"},
      stat("blue",  st.totalHours.toFixed(0), tr("hours")),
      stat("green", String(st.activeDays), tr("days")),
    ));
    const sorted = Object.entries(st.empHours).sort((a,b)=>b[1]-a[1]);
    const list = el("div", {class:"legend-list emp-breakdown"});
    for (const [empIdStr, hrs] of sorted) {

      list.appendChild(el("div", {class:"brow"},

        el("div", {class:"hrs", style:`color:${emp.color}`}, hrs.toFixed(1)),
      ));
    }
    card.appendChild(list);
    return card;
  }

  // Shared compact shift list used by admin approvals drill-in,
  // employee sign-off card, past-weeks rows, and history week expansion.
  function weekShiftBreakdown(wkShifts) {
    const details = el("div", {class:"breakdown"});
    if (!wkShifts.length) {
      details.appendChild(el("div", {class:"empty"}, tr("noShifts")));
      return details;
    }
    const sorted = [...wkShifts].sort((a,b) =>
      a.date.localeCompare(b.date) || a.start.localeCompare(b.start));
    for (const sh of sorted) {
      const shDate = new Date(sh.date + "T00:00:00");
      const drow = el("div", {class:"drow"},
        el("div", {class:"d"}, fmtDateShort(sh.date)),
        el("div", {class:"t"},
          timeRangeWithTz(sh.start, sh.end, sh.clockInTz, sh.clockOutTz, shDate),
        ),
        el("div", {class:"h"}, `${sh.hours.toFixed(1)}${tr("hoursShort")}`),
      );
      if (sh.comment) {
        drow.appendChild(el("div", {class:"c"}, `"${sh.comment}"`));
      }
      details.appendChild(drow);
    }
    return details;
  }

  function weekSignoffCard() {
    const u = state.currentUser;
    const wkStart = thisWeekStart();
    const wkEnd = weekEndOf(wkStart);
    const wkShifts = shiftsForWeek(u.id, wkStart);
    const wkHours = wkShifts.reduce((s,x)=>s+x.hours,0);
    const status = weekStatus(u.id, wkStart);
    const rejectionComment = weekRejectionComment(u.id, wkStart);

    const left = el("div", {class:"left"},
      el("div", {class:"title"}, `${tr("thisWeek")} · ${fmtDateShort(wkStart)} – ${fmtDateShort(wkEnd)}`),
      el("div", {class:"sub"}, `${wkHours.toFixed(1)} ${tr("hours").toLowerCase()} · ${wkShifts.length} ${tr("shifts").toLowerCase()}`),
    );
    if (!status || status === "rejected") {
      left.appendChild(el("div", {class:"attest"}, tr("signoffAttest")));
    }

    const head = el("div", {class:"head"}, left);
    if (status === "approved") {
      head.appendChild(el("span", {class:"status-pill approved"}, tr("weekApproved")));
    } else if (status === "pending") {
      head.appendChild(el("span", {class:"status-pill pending"}, tr("weekPending")));
    } else {
      // Unsigned OR rejected — both show the submit button, rejected also shows the reason below.
      const label = status === "rejected" ? tr("resubmit") : tr("submitWeek");
      head.appendChild(el("button", {
        class:"btn",
        onclick: (ev) => {
          animateShrinkAndThen(ev.currentTarget, () => {
            setWeekStatus(u.id, wkStart, "pending");
            toast(tr("weekSubmitted"), {kind:"success", pill:"✓"});
            render();
            const pill = document.querySelector(".week-submit .status-pill.pending");
            if (pill) pill.classList.add("pop-in");
          });
        },
      }, label));
    }

    const card = el("div", {class:"week-submit"}, head);
    if (status === "rejected" && rejectionComment) {
      card.appendChild(rejectionNotice(rejectionComment));
    }
    if (wkShifts.length) {
      card.appendChild(weekShiftBreakdown(wkShifts));
    }
    return card;
  }

  // Amber-outlined banner showing the admin's rejection reason.
  function rejectionNotice(reason) {
    return el("div", {class:"rejection-notice"},
      el("div", {class:"label"}, tr("rejectedByAdmin")),
      el("div", {class:"reason"}, `"${reason}"`),
    );
  }

  // Past weeks that need the employee's action: unsigned (no status yet) OR
  // rejected (admin sent back). Approved / pending weeks are excluded.
  function unsignedPastWeeks(empId) {
    const thisWk = thisWeekStart();
    const weeks = new Map(); // wkStart -> {hours, count}
    for (const sh of shifts) {
      if (sh.empId !== empId) continue;
      const wkStart = weekStartOf(sh.date);
      if (wkStart >= thisWk) continue;
      const st = weekStatus(empId, wkStart);
      if (st === "pending" || st === "approved") continue;
      const agg = weeks.get(wkStart) || {hours:0, count:0};
      agg.hours += sh.hours;
      agg.count += 1;
      weeks.set(wkStart, agg);
    }
    return [...weeks.entries()]
      .map(([wkStart, agg]) => ({
        wkStart, ...agg,
        rejectionComment: weekRejectionComment(empId, wkStart),
      }))
      .sort((a,b) => b.wkStart.localeCompare(a.wkStart));
  }

  function pastWeeksSignoffSection() {
    const u = state.currentUser;
    const past = unsignedPastWeeks(u.id);
    if (!past.length) return null;
    const wrap = document.createDocumentFragment();
    wrap.appendChild(el("div", {class:"signoff-label"}, tr("pastWeeksSignoffTitle")));
    const list = el("div", {class:"past-weeks"});
    for (const w of past) {
      const wkShifts = shiftsForWeek(u.id, w.wkStart);
      const btnLabel = w.rejectionComment ? tr("resubmit") : tr("submitWeek");
      const prow = el("div", {class: `prow ${w.rejectionComment ? "rejected" : ""}`},
        el("div", {class:"head"},
          el("div", {class:"left"},
            el("div", {class:"title"}, `${fmtDateShort(w.wkStart)} – ${fmtDateShort(weekEndOf(w.wkStart))}`),
            el("div", {class:"sub"}, `${w.hours.toFixed(1)} ${tr("hours").toLowerCase()} · ${w.count} ${tr("shifts").toLowerCase()}`),
          ),
          el("button", {
            class:"btn",
            onclick: (ev) => {
              const rowNode = ev.currentTarget.closest(".prow");
              animateOutAndThen(rowNode, () => {
                setWeekStatus(u.id, w.wkStart, "pending");
                toast(tr("weekSubmitted"), {kind:"success", pill:"✓"});
                render();
              });
            },
          }, btnLabel),
        ),
        w.rejectionComment ? rejectionNotice(w.rejectionComment) : null,
        weekShiftBreakdown(wkShifts),
      );
      list.appendChild(prow);
    }
    wrap.appendChild(list);
    return wrap;
  }

  function clockSection() {
    const readonly = false; // employees are never readonly here
    if (state.clock === "idle") {
      return el("button", {
        class:"big-cta clock-in",
        onclick: async () => {
          state.clock = "in";
          state.clockIn = new Date();
          state.clockInCoord = null;
          state.clockInTz = currentTimezone();
          render();
          const c = await getCurrentCoord();
          state.clockInCoord = c.real ? { lat: c.lat, lng: c.lng } : null;
          const t = gpsToast(c, "Clock-in");
          toast(t.msg, { kind: t.kind, pill: t.pill });
          const lbl = document.querySelector(".gps-note");
          if (lbl) lbl.textContent = gpsNoteText(state.clockInCoord);
        }
      }, ICON("play", 32), el("div", {}, tr("clockIn")));
    }
    if (state.clock === "in") {
      const wrap = el("div", {});
      const inTz = tzShort(state.clockInTz, state.clockIn);
      wrap.appendChild(el("div", {class:"clock-card"},
        el("div", {class:"pulse"}),
        el("div", {style:"flex:1"},
          el("div", {class:"label"}, tr("clockedInAt")),
          el("div", {class:"time"},
            fmtTimeDate(state.clockIn),
            inTz ? el("span", {class:"tz-tag"}, inTz) : null,
          ),
          el("div", {class:"gps-note"}, gpsNoteText(state.clockInCoord)),
        )
      ));
      wrap.appendChild(el("div", {style:"height:14px"}));
      wrap.appendChild(el("button", {
        class:"big-cta clock-out",
        onclick: async () => {
          state.clock = "out";
          state.clockOut = new Date();
          state.clockOutCoord = null;
          state.clockOutTz = currentTimezone();
          render();
          const c = await getCurrentCoord();
          state.clockOutCoord = c.real ? { lat: c.lat, lng: c.lng } : null;
          const t = gpsToast(c, "Clock-out");
          toast(t.msg, { kind: t.kind, pill: t.pill });
          const lbl = document.querySelector(".gps-note-out");
          if (lbl) lbl.textContent = gpsNoteText(state.clockOutCoord);
        }
      }, ICON("stop", 32), el("div", {}, tr("clockOut"))));
      return wrap;
    }
    // state.clock === "out": summary + comment + submit
    const diffMin = (state.clockOut - state.clockIn) / 60000;
    const hrs = diffMin / 60;
    const needsNote = hrs < 9 && !state.comment.trim();

    const commentField = el("textarea", {
      class: `comment-field ${needsNote ? "required" : ""}`,
      placeholder: tr("comments"),
      oninput: (e) => { state.comment = e.target.value; updateSubmitState(); },
    });
    commentField.value = state.comment;

    const wrap = el("div", {});
    const inTzShort  = tzShort(state.clockInTz,  state.clockIn);
    const outTzShort = tzShort(state.clockOutTz, state.clockOut);
    const summaryEl = el("div", {class:"shift-summary"},
      el("div", {class:"row"},
        el("div", {class:"col"},
          el("div", {class:"l-label"}, tr("start")),
          el("div", {class:"time"},
            fmtTimeDate(state.clockIn),
            inTzShort ? el("span", {class:"tz-tag"}, inTzShort) : null,
          ),
          el("div", {class:"gps-note"}, gpsNoteText(state.clockInCoord)),
        ),
        el("div", {class:"col r"},
          el("div", {class:"l-label"}, tr("end")),
          el("div", {class:"time"},
            fmtTimeDate(state.clockOut),
            outTzShort ? el("span", {class:"tz-tag"}, outTzShort) : null,
          ),
          el("div", {class:"gps-note"}, gpsNoteText(state.clockOutCoord)),
        ),
      ),
      el("div", {class:"total"},
        el("span", {class:`value ${hrs < 9 ? "warn":""}`}, hrs.toFixed(1)),
        el("span", {class:"unit"}, tr("hours").toLowerCase()),
      ),
      commentField,
    );

    if (hrs < 9) {
      summaryEl.appendChild(el("div", {class:"comment-required-note"}, tr("commentRequired")));
    }
    wrap.appendChild(summaryEl);
    wrap.appendChild(el("div", {style:"height:14px"}));
    const submitBtn = el("button", {
      class:`big-cta submit ${needsNote ? "disabled":""}`,
      onclick: () => {
        if (hrs < 9 && !state.comment.trim()) {
          commentField.focus();
          commentField.classList.add("required");
          return;
        }
        // Save shift
        const d = state.clockIn;
        const dateStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
        const pad = n => String(n).padStart(2,"0");
        addShift({
          empId: state.currentUser.id,
          date: dateStr,
          start: `${pad(state.clockIn.getHours())}:${pad(state.clockIn.getMinutes())}`,
          end:   `${pad(state.clockOut.getHours())}:${pad(state.clockOut.getMinutes())}`,
          comment: state.comment.trim(),
          loc: { in: state.clockInCoord, out: state.clockOutCoord },
          tz:  { in: state.clockInTz,    out: state.clockOutTz    },
        });
        state.clock = "idle";
        state.clockIn = state.clockOut = null;
        state.clockInCoord = state.clockOutCoord = null;
        state.clockInTz = state.clockOutTz = null;
        state.comment = "";
        toast(tr("shiftLogged"), {kind:"success", pill:"✓"});
        render();
      }
    }, ICON("check", 32), el("div", {}, tr("submit")));
    wrap.appendChild(submitBtn);

    function updateSubmitState() {
      const stillNeeds = hrs < 9 && !state.comment.trim();
      submitBtn.classList.toggle("disabled", stillNeeds);
      commentField.classList.toggle("required", stillNeeds);
    }
    return wrap;
  }

  function approveEditRequest(reqId) {
    const req = editRequests.find(r => r.id === reqId);
    if (!req) return;
    const sh = shifts.find(s => s.id === req.shiftId);
    if (!sh) return;
    // Apply the changes
    sh.start = req.start;
    sh.end = req.end;
    const [sh_h, sh_m] = req.start.split(":").map(Number);
    const [eh, em] = req.end.split(":").map(Number);
    sh.hours = ((eh*60+em) - (sh_h*60+sh_m)) / 60;
    req.status = "approved";
    toast(tr("editApproved"), { kind:"success", pill:"✓" });
    render();
  }
  function rejectEditRequest(reqId) {
    const req = editRequests.find(r => r.id === reqId);
    if (!req) return;
    req.status = "rejected";
    toast(tr("editRejected"), { kind:"warn", pill:"↺" });
    render();
  }

  // Groups shifts by month → week and appends headers + cards to `root`.
  // Expects shifts already sorted newest-to-oldest.
  // Weeks other than the current one default to collapsed; click the header to toggle.
  function appendGroupedShifts(root, sortedShifts, empId) {
    if (!sortedShifts.length) return;
    if (state.expandedHistoryWeeks == null) {
      state.expandedHistoryWeeks = new Set([thisWeekStart()]);
    }
    const expanded = state.expandedHistoryWeeks;

    const byMonth = new Map();
    for (const sh of sortedShifts) {
      const mKey = sh.date.slice(0, 7); // YYYY-MM
      if (!byMonth.has(mKey)) byMonth.set(mKey, []);
      byMonth.get(mKey).push(sh);
    }
    const mKeys = [...byMonth.keys()].sort().reverse();
    for (const mKey of mKeys) {
      const mShifts = byMonth.get(mKey);
      const mHours = mShifts.reduce((s,x)=>s+x.hours,0);
      const [y, m] = mKey.split("-").map(Number);
      const monthLabel = new Date(y, m-1, 1)
        .toLocaleDateString(locale(), {month:"long", year:"numeric"})
        .replace(/ de /, " ")
        .replace(/^./, c => c.toUpperCase());

      root.appendChild(el("div", {class:"hist-month-head"},
        el("div", {class:"m-title"}, monthLabel),
        el("div", {class:"m-stats"},
          `${mHours.toFixed(1)}${tr("hoursShort")} · ${mShifts.length} ${tr("shifts").toLowerCase()}`),
      ));

      const byWeek = new Map();
      for (const sh of mShifts) {
        const wkStart = weekStartOf(sh.date);
        if (!byWeek.has(wkStart)) byWeek.set(wkStart, []);
        byWeek.get(wkStart).push(sh);
      }
      const wKeys = [...byWeek.keys()].sort().reverse();
      for (const wkStart of wKeys) {
        const wShifts = byWeek.get(wkStart);
        const wHours = wShifts.reduce((s,x)=>s+x.hours,0);
        const status = weekStatus(empId, wkStart);
        const isOpen = expanded.has(wkStart);

        const right = el("div", {class:"w-right"},
          el("span", {class:"w-hrs"}, `${wHours.toFixed(1)}${tr("hoursShort")}`),
        );
        if (status) {
          const label = status === "approved" ? tr("weekApproved")
                      : status === "rejected" ? tr("weekRejected")
                      : tr("weekPending");
          right.appendChild(el("span", {class:`w-status ${status}`}, label));
        }
        right.appendChild(el("span", {class: `chevron ${isOpen ? "up" : ""}`}, "▾"));

        const group = el("div", {class: `week-group ${status || ""}`});
        group.appendChild(el("div", {
          class:"hist-week-head expandable",
          onclick: () => {
            if (isOpen) expanded.delete(wkStart);
            else expanded.add(wkStart);
            render();
          },
        },
          el("div", {class:"w-title"},
            `${fmtDateShort(wkStart)} – ${fmtDateShort(weekEndOf(wkStart))}`),
          right,
        ));
        if (isOpen) {
          for (const sh of wShifts) {
            group.appendChild(renderShiftCard(sh));
          }
        }
        root.appendChild(group);
      }
    }
  }

  // =============================================================
  // MAP
  // =============================================================
  // Leaflet-backed map. Auto-fits to pins, caps zoom so tight clusters
  // still show neighborhood context. Interactive: drag, pinch, zoom buttons.
  // Scroll-wheel zoom is disabled until the user clicks the map so it
  // doesn't hijack page scroll.
  const MAP_MAX_ZOOM = 15;
  const MAP_FIT_PADDING = 24;

  function miniMap(locatedShifts) {
    const pins = [];
    for (const sh of locatedShifts) {
      if (sh.clockIn)  pins.push({ lat: sh.clockIn.lat,  lng: sh.clockIn.lng,  in: true });
      if (sh.clockOut) pins.push({ lat: sh.clockOut.lat, lng: sh.clockOut.lng, in: false });
    }
    if (!pins.length) return el("div", {});

    const mapEl = el("div", {class: "mini-map mini-map--locked"});
    mapEl.appendChild(el("div", {class: "legend"},
      el("span", {class: "in"}, tr("mapLegendIn")),
      el("span", {class: "out"}, tr("mapLegendOut")),
    ));

    // Leaflet needs the element in the DOM with a measurable size.
    requestAnimationFrame(() => {
      const map = L.map(mapEl, {
        scrollWheelZoom: false,
        zoomControl: true,
        attributionControl: false,
      });
      L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 19,
        attribution: "© OpenStreetMap",
      }).addTo(map);
      L.control.attribution({ prefix: false, position: "bottomright" })
        .addAttribution("© OSM").addTo(map);

      for (const p of pins) {
        L.marker([p.lat, p.lng], {
          icon: L.divIcon({
            className: "pin-marker",
            html: `<div class="pin ${p.in ? "in" : "out"}"></div>`,
            iconSize: [16, 16],
            iconAnchor: [8, 8],
          }),
        }).addTo(map);
      }

      const bounds = L.latLngBounds(pins.map(p => [p.lat, p.lng]));
      map.fitBounds(bounds, {
        padding: [MAP_FIT_PADDING, MAP_FIT_PADDING],
        maxZoom: MAP_MAX_ZOOM,
      });

      // Click-to-activate scroll zoom. Also show a brief hint if the user
      // tries to scroll-wheel-zoom while it's still locked.
      const activate = () => {
        map.scrollWheelZoom.enable();
        mapEl.classList.remove("mini-map--locked");
      };
      map.once("click", activate);
      mapEl.addEventListener("wheel", (e) => {
        if (mapEl.classList.contains("mini-map--locked")) {
          mapEl.classList.add("show-hint");
          clearTimeout(mapEl._hintTimer);
          mapEl._hintTimer = setTimeout(() => mapEl.classList.remove("show-hint"), 900);
        }
      }, { passive: true });
    });

    return mapEl;
  }

      .toLocaleDateString(locale(), { month:"long", year:"numeric" })

  // Targeted month-swap: replace just the calendar block + label,
  // without re-rendering the whole screen (topbar, greeting, etc. stay put).
  function updateCalendarInPlace() {
    const oldBlock = document.querySelector(".cal-block");
    const label = document.querySelector(".cal-month-label");
    if (!oldBlock || !label) { render(); return; }

    const scopeEmpId = isAdminLike(state.currentUser) ? null : state.currentUser.id;

    label.textContent = monthLabelText();

    const animClass = state.lastAnim === 1 ? "month-anim-next"
                    : state.lastAnim === -1 ? "month-anim-prev" : "";
    state.lastAnim = 0;
    const newBlock = el("div", { class: `cal-block ${animClass}`.trim() });
    newBlock.appendChild(renderCalendar(scopeEmpId));
    newBlock.appendChild(summaryCard(scopeEmpId));
    oldBlock.replaceWith(newBlock);
  }

  function renderModal() {
    const root = document.getElementById("modalRoot");
    root.innerHTML = "";
    if (!state.modal) return;

    const close = () => { state.modal = null; state.expandedApproval = null; render(); };
    const card = el("div", {class:"modal-card"});
    const scrim = el("div", {
      class:"modal-scrim",
      onclick: (e) => { if (e.target === scrim) close(); },
    }, card);

    if (state.modal === "addEmployee") {
      const nameIn = el("input", { placeholder: strings[state.lang].fullName });
      const userIn = el("input", { placeholder: strings[state.lang].username });
      const passIn = el("input", { placeholder: strings[state.lang].password, type:"password" });
      const err = el("div", {class:"err", style:"display:none"});
      card.appendChild(el("h3", {}, tr("addEmployee")));
      card.appendChild(nameIn);
      card.appendChild(userIn);
      card.appendChild(passIn);
      card.appendChild(err);
      card.appendChild(el("div", {class:"actions"},
        el("button", {class:"btn", onclick: close}, tr("cancel")),
        el("button", {class:"btn primary", onclick: () => {
          const name = nameIn.value.trim(), u = userIn.value.trim(), p = passIn.value;
          if (!name || !u || !p) {
            err.textContent = state.lang === "es"
              ? "Todos los campos son obligatorios"
              : "All fields are required";
            err.style.display = "block";
            return;
          }
          if (users.some(x => x.username === u)) {
            err.textContent = state.lang === "es"
              ? "Ese nombre de usuario ya existe"
              : "Username already exists";
            err.style.display = "block";
            return;
          }
          const newId = Math.max(...users.map(x => x.id)) + 1;
          const colors = ["var(--emp-1)","var(--emp-2)","var(--emp-3)","var(--emp-4)","var(--emp-5)","var(--emp-6)","var(--emp-7)","var(--emp-8)","var(--emp-9)","var(--emp-10)"];
          users.push({
            id: newId, username: u, password: p, displayName: name,
            role: "employee", color: colors[newId % colors.length],
          });
          userById[newId] = users[users.length-1];
          toast(state.lang === "es" ? "Empleado agregado" : "Employee added", {kind:"success", pill:"+"});
          close();
        }}, tr("add")),
      ));
    } else if (state.modal === "approvals") {
      card.appendChild(el("h3", {}, tr("approvalsTitle")));
      const pending = pendingApprovals();
      const pendingEdits = pendingEditRequests();
      if (!pending.length && !pendingEdits.length) {
        card.appendChild(el("p", {}, tr("noPending")));
      } else if (pending.length) {
        for (const w of pending) {
          const emp = userById[w.empId];
          const wkShifts = shiftsForWeek(w.empId, w.weekStart);
          const wkHours = wkShifts.reduce((s,x)=>s+x.hours,0);
          const key = `${w.empId}:${w.weekStart}`;
          const isExpanded = state.expandedApproval === key;
          const row = el("div", {class:"approval-row"},
            el("div", {
              class:"top expandable",
              onclick: () => {
                state.expandedApproval = isExpanded ? null : key;
                render();
              },
            },
              el("div", {class:"who", style:`color:${emp.color}`}, emp.displayName),
              el("div", {class:"total"},
                `${wkHours.toFixed(1)}${tr("hoursShort")}`,
                el("span", {class: `chevron ${isExpanded ? "up" : ""}`}, "▾"),
              ),
            ),
            el("div", {class:"week"}, `${fmtDateShort(w.weekStart)} – ${fmtDateShort(weekEndOf(w.weekStart))} · ${wkShifts.length} ${tr("shifts").toLowerCase()}`),
          );
          if (isExpanded) {
            row.appendChild(weekShiftBreakdown(wkShifts));
          }
          if (canApprove(state.currentUser)) {
            const actions = el("div", {class:"actions"},
              el("button", {
                class:"reject",
                onclick: (ev) => {
                  // Open inline rejection-reason form in place of the buttons.
                  const rowNode = ev.currentTarget.closest(".approval-row");
                  const reasonField = el("textarea", {
                    class: "reject-reason-field",
                    placeholder: tr("rejectReasonPlaceholder"),
                    rows: 3,
                  });
                  const err = el("div", {class:"reject-reason-err", style:"display:none;"});
                  const form = el("div", {class:"reject-form"},
                    el("div", {class:"reject-reason-title"}, tr("rejectReasonTitle")),
                    reasonField,
                    err,
                    el("div", {class:"reject-form-actions"},
                      el("button", {
                        class:"reject",
                        onclick: () => { form.remove(); actions.style.display = ""; },
                      }, tr("cancel")),
                      el("button", {
                        class:"reject confirm",
                        onclick: () => {
                          const reason = reasonField.value.trim();
                          if (!reason) {
                            err.textContent = tr("rejectReasonRequired");
                            err.style.display = "block";
                            reasonField.focus();
                            return;
                          }
                          animateOutAndThen(rowNode, () => {
                            w.status = "rejected";
                            w.rejectionComment = reason;
                            state.expandedApproval = null;
                            toast(tr("weekRejectedToast"), {kind:"warn", pill:"↺"});
                            render();
                          });
                        },
                      }, tr("confirmReject")),
                    ),
                  );
                  actions.style.display = "none";
                  rowNode.appendChild(form);
                  reasonField.focus();
                },
              }, tr("reject")),
              el("button", {
                class:"approve",
                onclick: (ev) => {
                  const rowNode = ev.currentTarget.closest(".approval-row");
                  animateOutAndThen(rowNode, () => {
                    w.status = "approved";
                    w.rejectionComment = null;
                    state.expandedApproval = null;
                    toast(tr("weekApprovedToast"), {kind:"success", pill:"✓"});
                    render();
                  });
                },
              }, tr("approve")),
            );
            row.appendChild(actions);
          }
          card.appendChild(row);
        }
      }
      // Show pending edit requests inline
      if (pendingEdits.length > 0) {
        card.appendChild(el("div", {
          style:"margin-top:18px; padding-top:12px; border-top:1px solid var(--outline-soft); font-size:11px; text-transform:uppercase; letter-spacing:0.4px; color:var(--text-muted); font-weight:700;"
        }, tr("editRequests")));
        for (const r of pendingEdits) {
          const emp = userById[r.empId];
          const sh = shifts.find(s => s.id === r.shiftId);
          const shDate = sh ? new Date(sh.date + "T00:00:00") : null;
          const row = el("div", {class:"approval-row", style:"margin-top:8px;"},
            el("div", {class:"top"},
              el("div", {class:"who", style:`color:${emp.color}`}, emp.displayName),
              el("div", {class:"total"}, fmtDateShort(sh?.date || "")),
            ),
            el("div", {class:"week", style:"margin-top:4px;"},
              el("span", {style:"color:var(--text-muted); text-decoration:line-through"},
                timeRangeWithTz(sh?.start || "00:00", sh?.end || "00:00", sh?.clockInTz, sh?.clockOutTz, shDate)),
              el("span", {style:"margin: 0 6px;"}, "→"),
              el("span", {style:"color:var(--text-primary); font-weight:600;"},
                timeRangeWithTz(r.start, r.end, sh?.clockInTz, sh?.clockOutTz, shDate)),
            ),
            el("div", {class:"week", style:"margin-top:6px; font-style:italic;"}, `"${r.comment}"`),
          );
          if (canApprove(state.currentUser)) {
            row.appendChild(el("div", {class:"actions"},
              el("button", {
                class:"reject",
                onclick: (ev) => {
                  const rowNode = ev.currentTarget.closest(".approval-row");
                  animateOutAndThen(rowNode, () => { rejectEditRequest(r.id); close(); });
                },
              }, tr("rejectEdit")),
              el("button", {
                class:"approve",
                onclick: (ev) => {
                  const rowNode = ev.currentTarget.closest(".approval-row");
                  animateOutAndThen(rowNode, () => { approveEditRequest(r.id); close(); });
                },
              }, tr("approveEdit")),
            ));
          }
          card.appendChild(row);
        }
      }
    } else if (state.modal === "editShift") {
      const sh = shifts.find(s => s.id === state.viewingShiftId);
      if (!sh) { close(); return; }
      const startIn = el("input", { type:"time", value: sh.start });
      const endIn   = el("input", { type:"time", value: sh.end });
      const noteIn  = el("textarea", { rows: 3, placeholder: tr("editComment") });
      const err = el("div", {class:"err", style:"display:none"});
      card.appendChild(el("h3", {}, tr("editShiftTitle")));
      card.appendChild(el("p", {}, fmtDateLong(sh.date)));
      card.appendChild(el("label", {style:"font-size:11px; color:var(--text-muted); letter-spacing:0.4px; text-transform:uppercase; font-weight:700; display:block; margin-bottom:4px;"}, tr("start")));
      card.appendChild(startIn);
      card.appendChild(el("label", {style:"font-size:11px; color:var(--text-muted); letter-spacing:0.4px; text-transform:uppercase; font-weight:700; display:block; margin-bottom:4px;"}, tr("end")));
      card.appendChild(endIn);
      card.appendChild(el("label", {style:"font-size:11px; color:var(--text-muted); letter-spacing:0.4px; text-transform:uppercase; font-weight:700; display:block; margin-bottom:4px;"}, tr("commentLabel")));
      card.appendChild(noteIn);
      card.appendChild(err);
      card.appendChild(el("div", {class:"actions"},
        el("button", {class:"btn", onclick: close}, tr("cancel")),
        el("button", {class:"btn primary", onclick: () => {
          const start = startIn.value;
          const end = endIn.value;
          const comment = noteIn.value.trim();
          if (!comment) {
            err.textContent = tr("editCommentRequired");
            err.style.display = "block";
            noteIn.focus();
            return;
          }
          if (!start || !end) {
            err.textContent = state.lang === "es"
              ? "Las horas de inicio y fin son obligatorias"
              : "Start and end times are required";
            err.style.display = "block";
            return;
          }
          editRequests.push({
            id: nextEditReqId++,
            shiftId: sh.id,
            empId: sh.empId,
            start, end, comment,
            status: "pending",
            submittedAt: new Date().toISOString(),
          });
          toast(tr("editSubmitted"), {kind:"success", pill:"✓"});
          close();
        }}, tr("save")),
      ));
    } else if (state.modal === "adminEditShift") {
      // Admin/owner direct-edit: saves the shift immediately (no approval loop)
      // and appends an entry to sh.adminEdits so the change is visible in the
      // detail's audit log and surfaces on the week header.
      const sh = shifts.find(s => s.id === state.viewingShiftId);
      if (!sh) { close(); return; }
      const startIn = el("input", { type: "time", value: sh.start });
      const endIn   = el("input", { type: "time", value: sh.end });
      const noteIn  = el("textarea", { rows: 3, placeholder: tr("adminEditReason") });
      const err = el("div", {class:"err", style:"display:none"});
      const labelStyle = "font-size:11px; color:var(--text-muted); letter-spacing:0.4px; text-transform:uppercase; font-weight:700; display:block; margin-bottom:4px;";
      card.appendChild(el("h3", {}, tr("adminEditTitle")));
      card.appendChild(el("p", {}, fmtDateLong(sh.date)));
      card.appendChild(el("label", {style: labelStyle}, tr("start")));
      card.appendChild(startIn);
      card.appendChild(el("label", {style: labelStyle}, tr("end")));
      card.appendChild(endIn);
      card.appendChild(el("label", {style: labelStyle}, tr("adminEditReason")));
      card.appendChild(noteIn);
      card.appendChild(err);
      card.appendChild(el("div", {class:"actions"},
        el("button", {class:"btn", onclick: close}, tr("cancel")),
        el("button", {class:"btn primary", onclick: () => {
          const start = startIn.value;
          const end = endIn.value;
          const comment = noteIn.value.trim();
          if (!comment) {
            err.textContent = tr("adminEditReasonRequired");
            err.style.display = "block";
            noteIn.focus();
            return;
          }
          if (!start || !end) {
            err.textContent = state.lang === "es"
              ? "Las horas de inicio y fin son obligatorias"
              : "Start and end times are required";
            err.style.display = "block";
            return;
          }
          // Record the edit on the shift
          if (!sh.adminEdits) sh.adminEdits = [];
          sh.adminEdits.push({
            by: state.currentUser.id,
            at: new Date().toISOString(),
            oldStart: sh.start, oldEnd: sh.end,
            newStart: start,   newEnd: end,
            comment,
          });
          // Apply changes
          sh.start = start;
          sh.end = end;
          const [sh_h, sh_m] = start.split(":").map(Number);
          const [eh, em] = end.split(":").map(Number);
          sh.hours = ((eh*60+em) - (sh_h*60+sh_m)) / 60;
          toast(tr("adminEditSaved"), {kind:"success", pill:"✓"});
          close();
        }}, tr("save")),
      ));
    }

    root.appendChild(scrim);
  }

  // =============================================================
  // ROOT RENDER
  // =============================================================
  function render() {
    const scroll = document.getElementById("scrollRoot");
    scroll.classList.remove("screen-enter");
    void scroll.offsetWidth;
    scroll.classList.add("screen-enter");

    renderTopbar();
    renderFab();

    if (state.screen === "login") {
      renderLogin();
    } else if (state.screen === "employee_home") {
      renderEmployeeHome();
    } else if (state.screen === "history") {
      renderHistory();
    } else if (state.screen === "admin_home") {
      renderAdminHome();
    } else if (state.screen === "admin_employee") {
      renderAdminEmployee();
    } else if (state.screen === "shift_detail") {
      renderShiftDetail();
    }

    renderModal();
  }

  // Close the account dropdown when the user taps anywhere outside it.
  // Children of the trigger / menu stop propagation so the menu survives
  // internal clicks.
  document.addEventListener("click", () => {
    if (state.userMenuOpen) {
      state.userMenuOpen = false;
      render();
    }
  });

  // Keyboard-aware viewport: lift the bottom sheet (and anything that reads
  // --kb-inset) above the soft keyboard when it opens. iOS/Android both
  // overlay the keyboard on top of the layout viewport by default, so
  // elements anchored to the bottom end up hidden behind it. The
  // VisualViewport API reports the *visible* portion of the viewport; the
  // difference is the keyboard height.
  (function trackKeyboard() {
    const vv = window.visualViewport;
    if (!vv) return;
    const update = () => {
      const inset = Math.max(0, window.innerHeight - vv.height - vv.offsetTop);
      document.documentElement.style.setProperty("--kb-inset", inset + "px");
    };
    vv.addEventListener("resize", update);
    vv.addEventListener("scroll", update);
    update();
  })();

  render();
</script>
