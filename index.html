    font-style: italic;
    font-size: var(--fs-xs);
    color: var(--text-muted);
    margin-top: 8px;
    line-height: 1.4;
  }
  .week-card .wc-warn {
    font-family: var(--tf-body);
    font-style: italic;
    font-size: var(--fs-xs);
    color: var(--accent-amber);
    margin-top: 8px;
    line-height: 1.4;
  }
  .week-card .wc-footer {
    margin-top: 12px;
    padding-top: 10px;
    border-top: 1px dashed var(--outline-soft);
  }
  .week-card .wc-footer-actions {
    display: flex; gap: 8px;
  }
  .week-card .wc-footer-actions > .btn { flex: 1; min-width: 0; }
  /* Lock notice replaces the old week-closed-card banner. Lives inside the
     week card itself — the week IS the locked thing. */
  .week-card .wc-lock {
    display: flex; align-items: center; gap: 10px;
    margin-top: 10px;
    padding: 10px 12px;
    border-radius: 10px;
    background: color-mix(in oklab, var(--accent-amber) 8%, transparent);
    border: 1px dashed color-mix(in oklab, var(--accent-amber) 40%, transparent);
    color: var(--text-secondary);
    font-family: var(--tf-body);
    font-size: var(--fs-sm);
    line-height: 1.4;
  }
  .week-card .wc-lock.approved {
    background: color-mix(in oklab, var(--accent-green) 6%, transparent);
    border-color: color-mix(in oklab, var(--accent-green) 35%, transparent);
  }
  .week-card .wc-lock svg { width: 16px; height: 16px; flex: 0 0 auto; color: var(--accent-amber); }
  .week-card .wc-lock.approved svg { color: var(--accent-green); }

  /* The shift cards inside a week-card share the .week-rollup compact treatment
     (already defined for .week-rollup .hist-shift-card up above). */

  /* Inbox screen — section headers between week-cards and edit-requests. */
  .inbox-empty {
    margin: 40px 4px;
    padding: 24px 16px;
    text-align: center;
    font-family: var(--tf-body);
    font-style: italic;
    font-size: var(--fs-base);
    color: var(--text-muted);
    background: var(--surface-card);
    border: 1px dashed var(--outline-soft);
    border-radius: 14px;
  }
  .inbox-section-label {
    font-family: var(--tf-body);
    font-size: var(--fs-xs);
    font-weight: 500;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin: 18px 4px 6px;
  }
  .edit-req-card {
    margin-top: 8px;
    padding: 14px 16px;
    border-radius: 14px;
    background: var(--surface-dark);
  }
  .edit-req-card .er-head {
    display: flex; align-items: baseline; justify-content: space-between;
    gap: 10px; margin-bottom: 6px;
  }
  .edit-req-card .er-name {
    font-family: var(--tf-display);
    font-weight: 400;
    font-size: var(--fs-lg);
    line-height: 1.1;
  }
  .edit-req-card .er-date {
    font-family: var(--tf-mono);
    font-size: var(--fs-xs);
    color: var(--text-muted);
    font-variant-numeric: tabular-nums;
  }
  .edit-req-card .er-times {
    font-family: var(--tf-mono);
    font-size: var(--fs-sm);
    color: var(--text-primary);
    font-variant-numeric: tabular-nums;
  }
  .edit-req-card .er-times .strike {
    color: var(--text-muted);
    text-decoration: line-through;
    margin-right: 8px;
  }
  .edit-req-card .er-times .arrow { color: var(--text-muted); margin: 0 6px; }
  .edit-req-card .er-times .new { color: var(--text-primary); font-weight: 700; }
  .edit-req-card .er-reason {
    font-family: var(--tf-body);
    font-style: italic;
    font-size: var(--fs-sm);
    color: var(--text-secondary);
    line-height: 1.4;
    margin-top: 6px;
  }
  .edit-req-card .er-actions {
    display: flex; gap: 8px;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px dashed var(--outline-soft);
  }
  .edit-req-card .er-actions > .btn { flex: 1; }

  /* =========================================================
     MANAGE USERS — full screen (was a stack of modals).
     Reuses .emp-row visuals so the surface feels consistent
     with the admin Roster tab.
     ========================================================= */
  .mu-screen .mu-row {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 4px;
    border-bottom: 1px solid var(--outline-soft);
    cursor: pointer;
    touch-action: manipulation;
    transition: background 120ms ease;
  }
  .mu-screen .mu-row.inactive { cursor: default; opacity: .65; }
  .mu-screen .mu-row:active { background: var(--surface-card-hi); }
  .mu-screen .mu-row .mu-body { flex: 1; min-width: 0; }
  .mu-screen .mu-row .mu-name {
    font-family: var(--tf-display);

</style>
</head>
<body>

<div class="app-root">
  <div class="version-tag" id="versionTag"></div>
  <div class="topbar" id="topbarRoot"></div>
  <div class="scroll" id="scrollRoot"></div>
  <div id="bottomBarRoot"></div>
  <div id="fabRoot"></div>
  <div class="toast-wrap" id="toastWrap"></div>
  <div id="modalRoot"></div>
</div>

<script>
    // =============================================================
  // STATE
  // =============================================================
  const state = {
    currentUser: null,
    screen: "login",
    viewingEmployeeId: null,
    nav: [],            // screen history for back button
    lang: "en",
    // calendar
    calYear: 2026,
    calMonth: 3,
    selectedDay: null,
    lastAnim: 0,
    // clock flow (employee)
    clock: "idle",
    clockIn: null,
    clockOut: null,
    clockInCoord: null,
    clockOutCoord: null,
    clockInTz: null,
    clockOutTz: null,
    comment: "",
    // modals
    modal: null,        // "addEmployee" | "approvals" | "submitWeek"
    // drill-in: "empId:weekStart" of approval row currently expanded in approvals modal
    expandedApproval: null,
    // key of the approval row currently in rejection-reason entry mode
    rejectingApproval: null,
    // history week-expansion: Set<weekStart>. Lazy-init.
    expandedHistoryWeeks: null,
    // inbox week-expansion: Set<`${empId}|${weekStart}`>
    expandedInboxWeeks: null,
    // direction tracker for screen transitions: 1 = forward push, -1 = back
    navDir: 0,
    // user menu (account dropdown) open state
    userMenuOpen: false,
    // admin-only: which approved-week pill dropdown is open. Format:
    // `${empId}|${wkStart}` or null.
    weekMenuKey: null,
    // whether the open reopen-menu is primed for confirm (first tap
    // switched the button into "tap again" state).
    weekReopenConfirm: false,
    // flashing toast for banner animation
  };

  // =============================================================
  // DATA
  // =============================================================

  // Hydrated from db.json by loadDB() before first render.
  const users = [];
  const userById = {};
  const employees = () => users.filter(u => u.role === "employee");

  // Shifts: id, empId, date (YYYY-MM-DD), start, end, hours, comment, coords.
  // Hydrated by loadDB() → hydrateFromDb(). Runtime writes go through
  // api.createShift(); the server returns the canonical shift which we push.
  let nextShiftId = 100;
  const shifts = [];

  // IANA timezone of the device at call time. Falls back to null if
  // Intl isn't available (very old browsers).
  function currentTimezone() {
    try {
      return Intl.DateTimeFormat().resolvedOptions().timeZone || null;
    } catch {
      return null;
    }
  }

  // Short timezone name ("EDT", "PST", "CEST", etc.) for display. Falls back to
  // the IANA string if the short name can't be resolved for any reason.
  function tzShort(tz, when) {
    if (!tz) return "";
    try {
      const parts = new Intl.DateTimeFormat("en", {
        timeZone: tz,
        timeZoneName: "short",
      }).formatToParts(when || new Date());
      const p = parts.find(x => x.type === "timeZoneName");
      return p ? p.value : tz;
    } catch {
      return tz;
    }
  }

  // Fake business next to the Pentagon (Arlington, VA)
  const BIZ = { lat: 38.87185, lng: -77.0563 };
  function gpsNoteText(coord) {
    if (!coord) return "Locating…";
    return `📍 ${coord.lat.toFixed(5)}, ${coord.lng.toFixed(5)}`;
  }

  // Real-GPS capture. Returns a promise that resolves to one of:
  //   { lat, lng, real: true }                  — user granted, coord captured
  //   { real: false, reason: "blocked" }        — site permission is cached as denied; browser won't prompt
  //   { real: false, reason: "declined" }       — user saw the prompt and chose not to allow
  //   { real: false, reason: "unavailable" }    — position couldn't be determined (OS Location Services off, GPS hardware unavailable, etc.)
  //   { real: false, reason: "timeout" }        — browser gave up acquiring a position
  //   { real: false, reason: "unsupported" }    — browser has no geolocation API
  //
  // Notes:
  //  - We check `navigator.permissions` first so we can distinguish "cached denied" (won't re-prompt)
  //    from "user declined just now". Different messages, different remediation.
  //  - We explicitly do NOT set enableHighAccuracy:true. That forces GPS and fails often indoors / in
  //    dense urban areas; the default (Wi-Fi / IP) is plenty for a "did you clock in where you said
  //    you did" map pin and works almost everywhere.
  //  - No outer timeout from our side — the native permission prompt can sit open for 10+ seconds on
  //    mobile, and racing it silently discards the user's answer. The browser's own timeout below
  //    handles the acquire-position phase.
  async function getCurrentCoord() {
    if (!navigator.geolocation) {
      console.warn("[gps] navigator.geolocation is not available");
      return { real: false, reason: "unsupported" };
    }

    // Pre-check permission state (supported in Chrome/Firefox/Edge; modern Safari as of 16+).
    let permState = "prompt";
    if (navigator.permissions && navigator.permissions.query) {
      try {
        const r = await navigator.permissions.query({ name: "geolocation" });
        permState = r.state;
      } catch (e) {
        console.info("[gps] permissions.query unsupported; falling through", e);
      }
    }
    console.info("[gps] permission state:", permState);

    if (permState === "denied") {
      // Browser has this site blocked — getCurrentPosition will fail instantly with no prompt.
      return { real: false, reason: "blocked" };
    }

    return new Promise((resolve) => {
      navigator.geolocation.getCurrentPosition(
        (pos) => {
          console.info("[gps] position acquired:", pos.coords.latitude, pos.coords.longitude, `±${Math.round(pos.coords.accuracy)}m`);
          resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude, real: true });
        },
        (err) => {
          console.warn("[gps] getCurrentPosition error:", err.code, err.message);
          // code 1 PERMISSION_DENIED can mean either the user just declined, or (on some
          // OSes) the browser was allowed at site level but the OS blocked it. We use
          // `permState === "prompt"` above as a rough signal: if the permission state was
          // "prompt" moments ago and we got code 1, the user almost certainly just declined.
          let reason;
          if (err.code === 1) reason = permState === "prompt" ? "declined" : "blocked";
          else if (err.code === 2) reason = "unavailable";
          else if (err.code === 3) reason = "timeout";
          else reason = "unknown";
          resolve({ real: false, reason });
        },
        { enableHighAccuracy: false, timeout: 20000, maximumAge: 30000 }
      );
    });
  }

  // Map a getCurrentCoord() result to a user-facing toast.
  function gpsToast(result, action) {
    if (result.real) {
      return { msg: `${action} location captured`, kind: "success", pill: "📍" };
    }
    const reasons = {
      blocked:     "Location blocked — enable it for this site in your browser settings",
      declined:    "Location not shared",
      unavailable: "Location unavailable — check that Location Services are on",
      timeout:     "Location timed out — try again",
      unsupported: "Location not supported by this browser",
      unknown:     "Location not captured",
    };
    return { msg: reasons[result.reason] || reasons.unknown, kind: "warn", pill: "⚠" };
  }

  // Hydrated from db.json by loadDB(). Weekly Mon–Sun approvals keyed by
  // (empId, weekStart). Statuses: pending | approved | rejected. Rejected
  // entries may carry a rejectionComment.
  const weekApprovals = [];

  // =============================================================
  // API CLIENT — talks to the Cloudflare Worker
  // =============================================================
  //
  // All runtime writes are persisted there (one commit per write into the
  // private punchcard-data repo). The Worker is on a different eTLD+1
  // (workers.dev) from the page (github.io), so cross-site SameSite=None
  // cookies get silently dropped by iOS Safari ITP. Session is therefore a
  // bearer token in localStorage, sent in the Authorization header.
  const API_BASE = "https://app.punchcard-api.workers.dev";
  const TOKEN_KEY = "pc_token";

  function getToken() { try { return localStorage.getItem(TOKEN_KEY); } catch { return null; } }
  function setToken(t) { try { t ? localStorage.setItem(TOKEN_KEY, t) : localStorage.removeItem(TOKEN_KEY); } catch {} }

  // Mid-shift clock state ("in" or "out", with start time, coords, tz, and
  // comment-in-progress) must survive a reload — closing the tab in the
  // middle of a shift used to lose everything because state.clock and
  // friends are in-memory only. Persist per-user so signing in as a
  // different user doesn't inherit the previous user's open shift.
  const CLOCK_KEY = (uid) => `pc_clock_${uid}`;
  function saveClockState() {
    const u = state.currentUser;
    if (!u) return;
    const key = CLOCK_KEY(u.id);
    if (state.clock === "idle") {
      try { localStorage.removeItem(key); } catch {}
      return;
    }
    const payload = {
      clock: state.clock,
      clockIn:  state.clockIn  ? state.clockIn.toISOString()  : null,
      clockOut: state.clockOut ? state.clockOut.toISOString() : null,
      clockInCoord:  state.clockInCoord  || null,
      clockOutCoord: state.clockOutCoord || null,
      clockInTz:  state.clockInTz  || null,
      clockOutTz: state.clockOutTz || null,
      comment: state.comment || "",
    };
    try { localStorage.setItem(key, JSON.stringify(payload)); } catch {}
  }
  function restoreClockState() {
    const u = state.currentUser;
    if (!u) return;
    const key = CLOCK_KEY(u.id);
    let raw;
    try { raw = localStorage.getItem(key); } catch { return; }
    if (!raw) return;
    let p;
    try { p = JSON.parse(raw); } catch { return; }
    if (!p || !p.clock || p.clock === "idle") return;
    state.clock = p.clock;
    state.clockIn  = p.clockIn  ? new Date(p.clockIn)  : null;
    state.clockOut = p.clockOut ? new Date(p.clockOut) : null;
    state.clockInCoord  = p.clockInCoord  || null;
    state.clockOutCoord = p.clockOutCoord || null;
    state.clockInTz  = p.clockInTz  || null;
    state.clockOutTz = p.clockOutTz || null;
    state.comment = p.comment || "";
  }

  class ApiError extends Error {
    constructor(status, message) { super(message); this.status = status; }
  }

  async function apiCall(method, path, body) {
    const headers = {};
    if (body !== undefined) headers["Content-Type"] = "application/json";
    const token = getToken();
    if (token) headers["Authorization"] = `Bearer ${token}`;
    let res;
    try {
      res = await fetch(API_BASE + path, {
        method,
        headers,
        body: body !== undefined ? JSON.stringify(body) : undefined,
      });
    } catch (e) {
      throw new ApiError(0, "network"); // offline / CORS / DNS
    }
    const data = await res.json().catch(() => ({}));
    if (res.status === 401) {
      // Session expired or never existed. If we thought we were logged in,
      // drop to the login screen; otherwise (pre-login /me probe) just bubble.
      setToken(null);
      if (state.currentUser) logout();
      throw new ApiError(401, data.error || "unauthenticated");
    }
    if (!res.ok) throw new ApiError(res.status, data.error || res.statusText);
    return data;
  }

  const api = {
    me:                ()              => apiCall("GET",  "/me"),
    login:             (u, p)          => apiCall("POST", "/login",         { username: u, password: p }),
    logout:            ()              => apiCall("POST", "/logout"),
    db:                ()              => apiCall("GET",  "/db"),
    createShift:       (body)          => apiCall("POST", "/shifts",        body),
    updateShiftComment: (shiftId, comment) => apiCall("POST", "/shifts/comment", { shiftId, comment }),
    setApproval:       (empId, ws, status, reason) =>
                                          apiCall("POST", "/approvals",     { empId, weekStart: ws, status, rejectionComment: reason }),
    createEditRequest: (body)          => apiCall("POST", "/edit-requests", body),
    decideEditRequest: (id, status)    => apiCall("POST", "/edit-requests", { action: "decide", id, status }),
    adminEdit:         (body)          => apiCall("POST", "/admin-edits",   body),
    adminAddShift:     (body)          => apiCall("POST", "/admin-shifts",  body),
    createUser:        (body)          => apiCall("POST", "/users",         body),
    updateUser:        (body)          => apiCall("POST", "/users/update",          body),
    resetPassword:     (id, password)  => apiCall("POST", "/users/reset-password",  { id, password }),
    deactivateUser:    (id)            => apiCall("POST", "/users/deactivate",      { id }),
    reactivateUser:    (id)            => apiCall("POST", "/users/reactivate",      { id }),
  };

  // Present a Worker error as a user-facing toast. Network/5xx get a generic
  // retry nudge; 4xx surface the Worker's error string so the user knows
  // which validation tripped (missing reason, username taken, etc.).
  function toastApiError(e, fallback) {
    if (e instanceof ApiError && e.status >= 400 && e.status < 500) {
      toast(e.message || fallback, { kind: "warn", pill: "⚠" });
    } else {
      toast(fallback, { kind: "warn", pill: "⚠" });
      console.error(e);
    }
  }

  // Reassigns the contents of every in-memory store from a /db response.
  // Used on boot and after any write that might have cascading effects
  // (edit-request approval → shift mutation + new adminEdits entry).
  function hydrateFromDb(resp) {
    users.length = 0;
    users.push(...resp.db.users);
    for (const k in userById) delete userById[k];
    for (const u of resp.db.users) userById[u.id] = u;

    shifts.length = 0;
    shifts.push(...resp.db.shifts);
    nextShiftId = resp.db.shifts.reduce((m, s) => Math.max(m, s.id), 99) + 1;

    weekApprovals.length = 0;
    weekApprovals.push(...resp.db.weekApprovals);

    editRequests.length = 0;
    editRequests.push(...resp.db.editRequests);
    nextEditReqId = resp.db.editRequests.reduce((m, r) => Math.max(m, r.id), 0) + 1;
  }

  // One-time data bootstrap. Calls /me first — if a session cookie is valid
  // we silently restore to that user's home. Otherwise we leave state.screen
  // at "login" (its initial value) and the login screen renders.
  async function loadDB() {
    let me;
    try { me = await api.me(); }
    catch (e) { return; /* 401 or network — show login */ }

    state.currentUser = me.user;
    state.screen = isAdminLike(me.user) ? "admin_home" : "employee_home";
    state.calYear = 2026; state.calMonth = 3;
    const dbResp = await api.db();
    hydrateFromDb(dbResp);
    // Restore an in-progress clock state if we left one on a previous
    // visit. No-op for admins (they never clock); no-op if the user has
    // no saved state (the common case).
    restoreClockState();
  }

  // Version tag reads Last-Modified from the current page — which GitHub
  // Pages sets to the commit time of the most recent deploy. Rendered in
  // the viewer's local time as v.YYYY-MM-DD.HHMM. If the header is missing
  // (e.g., file:// or a dev server that doesn't emit it), leave it blank.
  (async function setVersionTag() {
    const el = document.getElementById("versionTag");
    if (!el) return;
    try {
      const res = await fetch(location.href, { method: "HEAD", cache: "no-cache" });
      const lm = res.headers.get("Last-Modified");
      if (!lm) return;
      const d = new Date(lm);
      if (isNaN(d)) return;
      const pad = (n) => String(n).padStart(2, "0");
      const ymd = `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
      const hm = `${pad(d.getHours())}${pad(d.getMinutes())}`;
      el.textContent = `v.${ymd}.${hm}`;
    } catch { /* offline / blocked — leave empty */ }
  })();

  // Role helpers
  const isOwner      = (u) => u?.role === "owner";
  const isAdmin      = (u) => u?.role === "admin";
  const isReadonly   = (u) => u?.role === "readonly";
  const isEmployee   = (u) => u?.role === "employee";
  const canApprove   = (u) => isOwner(u) || isAdmin(u);          // approvals, edit approvals
  const canManage    = (u) => isOwner(u) || isAdmin(u);           // add employees, manage
  const isAdminLike  = (u) => isOwner(u) || isAdmin(u) || isReadonly(u); // sees admin home
  const roleLabel    = (u) => {
    if (isOwner(u))    return tr("owner");
    if (isAdmin(u))    return tr("admin");
    if (isReadonly(u)) return tr("readonly");
    return "";
  };

  // Greeting block for home screens. Full "Welcome, / Name / [ROLE]" on the
  // very first home render of a session; compact single line "Name · Role"
  // after that, since the user just saw it. The flag is per-tab — opening a
  // fresh tab gets the full greeting again. Returns a DOM node.
  function greetingBlock(u, opts={}) {
    const showRole = opts.showRole !== false;
    const greeted = (() => { try { return sessionStorage.getItem("pc_greeted"); } catch { return null; } })();
    if (greeted) {
      return el("div", {class:"greeting greeting--compact"},
        el("span", {class:"name"}, u.displayName),
        showRole && roleLabel(u) ? el("span", {class:`role-inline ${isReadonly(u) ? "readonly" : ""}`}, "· " + roleLabel(u)) : null,
      );
    }
    try { sessionStorage.setItem("pc_greeted", "1"); } catch { /* private mode */ }
    return el("div", {class:"greeting"},
      el("div", {class:"hello"}, tr("welcome")),
      el("div", {class:"name"}, u.displayName),
      showRole && roleLabel(u) ? el("div", {class:`role ${isReadonly(u) ? "readonly" : ""}`}, roleLabel(u)) : null,
    );
  }

  function weekStatus(empId, weekStart) {
    const wa = weekApprovals.find(w => w.empId === empId && w.weekStart === weekStart);
    return wa ? wa.status : null;
  }
  function weekRejectionComment(empId, weekStart) {
    const wa = weekApprovals.find(w => w.empId === empId && w.weekStart === weekStart);
    return wa?.status === "rejected" ? (wa.rejectionComment || "") : "";
  }
  // Count of admin direct-edits across every shift in the given week.
  // Used for the "N admin edits" badge on the week header.
  function weekAdminEditCount(empId, weekStart) {
    const start = new Date(weekStart + "T00:00:00");
    const end = new Date(start); end.setDate(end.getDate() + 7);
    let n = 0;
    for (const sh of shifts) {
      if (sh.empId !== empId) continue;
      const d = new Date(sh.date + "T00:00:00");
      if (d < start || d >= end) continue;
      n += (sh.adminEdits?.length || 0);
    }
    return n;
  }
  // Merge a server-authoritative week approval entry into the local array.
  // Called after POST /approvals returns — replaces a matching (empId, weekStart)
  // row with the server's version, or pushes a new one.
  function upsertWeekApproval(entry) {
    const i = weekApprovals.findIndex(w => w.empId === entry.empId && w.weekStart === entry.weekStart);
    if (i >= 0) weekApprovals[i] = entry;
    else weekApprovals.push(entry);
  }

  // =============================================================
  // LOCALIZATION
  // =============================================================
  const strings = {
    en: {
      appName: "PunchCard",
      tagline: "Simple shift tracking",
      welcome: "Welcome,",
      owner: "Owner",
      admin: "Admin",
      readonly: "Read-only",
      employees: "Employees",
      registered: "registered",
      hours: "Hours", days: "Days", shifts: "Shifts", staff: "Staff", avgDay: "Avg/day",
      thisMonth: "this month",
      clockIn: "Clock In", clockOut: "Clock Out",
      submit: "Submit shift",
      clockedInAt: "Clocked in at",
      start: "Start", end: "End",
      today: "Today",
      noShifts: "No shifts",
      home: "Home",
      history: "History",
      logout: "Sign out",
      signIn: "Sign in",
      username: "Username", password: "Password",
      invalidCreds: "Wrong username or password",
      addEmployee: "Add employee",
      fullName: "Full name",
      cancel: "Cancel", add: "Add", save: "Save",
      viewEmployee: "Viewing",
      shiftLogged: "Shift logged",
      hoursShort: "h",
      comments: "Add a note…",
      commentRequired: "A note is required for shifts under 9 hours",
      commentLabel: "Note",
      mapLegendIn: "Clock-in",
      mapLegendOut: "Clock-out",
      submitWeek: "Submit",
      weekSubmitted: "Week submitted",
      weekPending: "Pending review",
      weekApproved: "Approved",
      weekRejected: "Rejected",
      weeklySignoff: "Current week",
      signoffAttest: "By submitting you confirm these hours are accurate.",
      pastWeeksSignoffTitle: "Past weeks to submit",
      noPastWeeks: "All past weeks submitted.",
      rejectReasonTitle: "Why are you rejecting this week?",
      rejectReasonPlaceholder: "Explain what needs to change…",
      rejectReasonRequired: "A reason is required — the employee will see this.",
      confirmReject: "Reject with reason",

  function fmt12(hhmm) {

    const ampm = h >= 12 ? "PM" : "AM";

  // Render a single time-of-day followed by its tz tag (if any) as a span.
  function timeWithTz(timeStr, tz, dateHint) {
    const short = tz ? tzShort(tz, dateHint) : "";
    return el("span", {class:"twtz"},
      fmt12(timeStr),

  // Render a "start – end" range with tz suffix. If both ends are in the same
  // tz, append it once at the end; if they differ, tag each end separately.
  function timeRangeWithTz(startStr, endStr, startTz, endTz, dateHint) {
    const s = startTz ? tzShort(startTz, dateHint) : "";
    const e = endTz   ? tzShort(endTz,   dateHint) : "";
    if (s && e && s === e) {
      return el("span", {class:"twtz"},
        `${fmt12(startStr)} – ${fmt12(endStr)}`,
        el("span", {class:"tz-inline"}, s),
      );
    }
    const parts = [fmt12(startStr)];
    if (s) parts.push(el("span", {class:"tz-inline"}, s));
    parts.push(" – ");
    parts.push(fmt12(endStr));
    if (e) parts.push(el("span", {class:"tz-inline"}, e));

  function toast(msg, opts={}) {

    if (pill) node.appendChild(el("span", {class:"pill"}, pill));

  // Collapse + fade a node out (height + opacity + sideways nudge), then call

  function animateOutAndThen(node, next, opts) {
    const ms = (opts && opts.ms) || 280;
    if (!node || typeof node.getBoundingClientRect !== "function") {

    node.style.overflow = "hidden";
    node.style.pointerEvents = "none";
    void node.offsetHeight; // force reflow so initial max-height applies

      `opacity ${ms}ms ease, ` +
      `transform ${ms}ms cubic-bezier(.4,0,.2,1), ` +
      `max-height ${ms}ms cubic-bezier(.4,0,.2,1), ` +
      `margin ${ms}ms ease, padding ${ms}ms ease`;

      node.style.marginTop = "0";
      node.style.marginBottom = "0";
      node.style.paddingTop = "0";

  function dataByDay(year, month, scopeEmpId=null) {

      if (scopeEmpId && s.empId !== scopeEmpId) continue;

  }

      ? ["L","M","M","J","V","S","D"]
      : ["M","T","W","T","F","S","S"];
    const dows = el("div", {class:"dows"}, ...dowKey.map(d => el("span", {}, d)));
    const grid = el("div", {class:"grid"});
    grid.dataset.scope = scopeEmpId == null ? "" : String(scopeEmpId);
    grid.dataset.year = String(state.calYear);
    grid.dataset.month = String(state.calMonth);
    const maxHrs = Math.max(0, ...Object.values(data).map(arr => arr.reduce((s,x)=>s+x.hours,0)));
    const totalCells = startOffset + daysInMonth;
    const rows = Math.ceil(totalCells / 7);

    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < 7; c++) {
        const cellIdx = r*7 + c;
        const dayNum = cellIdx - startOffset + 1;
        if (dayNum < 1 || dayNum > daysInMonth) {
          grid.appendChild(el("div", {class:"cell empty"}));
          continue;
        }
        const dayShifts = data[dayNum] || [];
        const dayHours = dayShifts.reduce((s,x)=>s+x.hours,0);
        const hasShifts = dayShifts.length > 0;
        const isToday = today.getFullYear() === state.calYear && today.getMonth() === state.calMonth && dayNum === today.getDate();
        const isSelected = state.selectedDay === dayNum;

        const inner = el("div", {class:"inner"});
        inner.appendChild(el("span", {class:"num"}, String(dayNum)));

        const byEmp = hasShifts
          ? Object.entries(dayShifts.reduce((m,sh)=>{m[sh.empId]=(m[sh.empId]||0)+sh.hours;return m;}, {}))
              .sort((a,b)=>b[1]-a[1])
          : [];
        const empCount = byEmp.length;

        const displayedHours = scopeEmpId
          ? (byEmp.find(([id])=>Number(id)===scopeEmpId)?.[1] || 0)
          : dayHours;
        const showHoursText = displayedHours >= 1
          ? `${Math.round(displayedHours)}${tr("hoursShort")}`
          : displayedHours > 0 ? `${displayedHours.toFixed(1)}${tr("hoursShort")}` : "";

        if (hasShifts) {
          if (scopeEmpId) {
            // Employee view: the little "8h" hour total under the date.
            if (showHoursText) {
              inner.appendChild(el("span", {class:"pair"}, el("span", {}, showHoursText)));
            }
          } else {
            // Admin view: one colored dot per unique employee who worked
            // that day, in order of most-hours first. Tells "who worked"
            // at a glance without needing to tap in.
            const dots = el("span", {class:"dots"});
            for (const [empIdStr] of byEmp) {
              const emp = userById[Number(empIdStr)];
              if (!emp) continue;
              dots.appendChild(el("span", {
                class: "dot",
                style: `background:${emp.color}`,
                title: emp.displayName,
              }));
            }
            inner.appendChild(dots);
          }
        }

        let heatClass = "";
        if (hasShifts && maxHrs > 0) {
          const ratio = dayHours / maxHrs;
          if (ratio > 0.8) heatClass = "heat-4";
          else if (ratio > 0.55) heatClass = "heat-3";
          else if (ratio > 0.3) heatClass = "heat-2";
          else heatClass = "heat-1";
        }

        const cell = el("div", {
          class: `cell ${hasShifts ? "has-shifts" : ""} ${isToday ? "today" : ""} ${isSelected ? "selected" : ""} ${heatClass}`,
          "data-day": String(dayNum),
          "data-row": String(r),
          onclick: () => selectDay(dayNum),
        });
        cell.appendChild(inner);
        grid.appendChild(cell);
      }

      if (state.selectedDay != null) {
        const row = Math.floor((state.selectedDay - 1 + startOffset) / 7);
        if (row === r) {
          grid.appendChild(el("div", {class:"day-detail-slot", style:"grid-column: span 7;"},
            renderDayDetail(state.selectedDay, scopeEmpId)));
        }
      }
    }
    return el("div", {class:"cal"}, dows, grid);
  }

  // Targeted day selection — no full re-render
  function selectDay(dayNum) {
    const grid = document.querySelector(".cal .grid");
    if (!grid) { state.selectedDay = dayNum; render(); return; }

    const scopeRaw = grid.dataset.scope;
    const scopeEmpId = scopeRaw ? Number(scopeRaw) : null;
    const year = Number(grid.dataset.year);
    const month = Number(grid.dataset.month);

    const prev = state.selectedDay;
    const next = (prev === dayNum) ? null : dayNum;
    state.selectedDay = next;

    // Toggle selected class on cells
    if (prev != null) {
      grid.querySelector(`.cell[data-day="${prev}"]`)?.classList.remove("selected");
    }
    if (next != null) {
      grid.querySelector(`.cell[data-day="${next}"]`)?.classList.add("selected");
    }

    // Remove any existing detail slot
    grid.querySelector(".day-detail-slot")?.remove();

    // Insert new detail slot at end of the selected row
    if (next != null) {
      const startOffset = new Date(year, month, 1).getDay();
      const row = Math.floor((next - 1 + startOffset) / 7);
      // Last cell in that row — scan from row*7+6 downward until we find one
      let anchor = null;
      for (let c = 6; c >= 0; c--) {
        const cell = grid.children[row*7 + c];
        if (cell && cell.classList.contains("cell")) { anchor = cell; break; }
      }
      if (anchor) {
        const slot = el("div", {class:"day-detail-slot", style:"grid-column: span 7;"},
          renderDayDetail(next, scopeEmpId));
        anchor.insertAdjacentElement("afterend", slot);
      }
    }
  }

  function renderDayDetail(dayNum, scopeEmpId=null) {
    const data = dataByDay(state.calYear, state.calMonth, scopeEmpId);
    const dayShifts = data[dayNum] || [];
    const d = new Date(state.calYear, state.calMonth, dayNum);
    const label = d.toLocaleDateString(locale(),
      { weekday:"long", month:"long", day:"numeric" }).replace(/^./, c => c.toUpperCase());
    const wrap = el("div", {class:"day-detail"}, el("div", {class:"date-label"}, label));
    if (!dayShifts.length) {
      wrap.appendChild(el("div", {class:"no-shifts"}, tr("noShifts")));
      return wrap;
    }
    const groups = {};
    for (const sh of dayShifts) (groups[sh.empId] = groups[sh.empId] || []).push(sh);
    const t = el("div", {class:"dd-table"});
    t.appendChild(el("div", {class:"head"},
      el("span", {}, state.lang === "es" ? "Empleado" : "Employee"),
      el("span", {class:"r"}, state.lang === "es" ? "Horario" : "Time"),
      el("span", {class:"r"}, state.lang === "es" ? "Horas" : "Hours"),
    ));
    for (const [empIdStr, list] of Object.entries(groups)) {
      const emp = userById[Number(empIdStr)];
      for (const sh of list) {
        t.appendChild(el("div", {
          class:"trow",
          style:"cursor:pointer; touch-action:manipulation;",
          onclick: () => navTo("shift_detail", { viewingShiftId: sh.id }),
        },
          el("span", {class:"nm", style:`color:${emp.color}`},
            el("span", {class:"sw", style:`background:${emp.color}`}),
            el("span", {}, emp.displayName),
          ),
          el("span", {class:"tm"},
            timeRangeWithTz(sh.start, sh.end, sh.clockInTz, sh.clockOutTz, new Date(sh.date + "T00:00:00")),
          ),
          el("span", {class:"hrs", style:`color:${emp.color}`},
            el("span", {}, sh.hours.toFixed(1)),
            el("span", {class:"chev"}, "›"),
          ),
        ));
        if (sh.comment) t.appendChild(el("div", {class:"cmt"}, `"${sh.comment}"`));
      }
    }
    wrap.appendChild(t);
    return wrap;
  }

  // Account / sign-out dropdown. Replaces what used to be a single-tap
  // sign-out icon — a mis-tap on that wiped the session. Now tapping
  // opens a menu, and the user has to hit "Sign out" deliberately.
  function renderUserMenu() {
    const u = state.currentUser;
    const roleKey =
      u?.role === "owner" ? "owner" :
      u?.role === "admin" ? "admin" :
      u?.role === "readonly" ? "readonly" :
      null;
    const trigger = el("div", {
      class: "icon-btn user-trigger" + (state.userMenuOpen ? " open" : ""),
      title: tr("account"),
      onclick: (e) => {
        e.stopPropagation();
        state.userMenuOpen = !state.userMenuOpen;
        // Just re-render the topbar — a full render() replays the
        // screen-enter transition on the main content, which reads like a
        // page flash every time you open the menu.
        renderTopbar();
      },
    }, ICON("user"));
    if (state.userMenuOpen) {
      const menu = el("div", {
        class: "user-menu",
        onclick: (e) => e.stopPropagation(),
      },
        el("div", {class: "user-menu-header"},
          el("div", {class: "user-menu-greeting"}, tr("signedInAs")),
          el("div", {class: "user-menu-name"}, u?.displayName || ""),
          roleKey
            ? el("div", {class: "user-menu-role"}, tr(roleKey))
            : null,
        ),
        u?.role === "owner"
          ? el("button", {
              class: "user-menu-add",
              onclick: () => {
                state.userMenuOpen = false;
                navTo("manage_users");
              },
            },
              ICON("user", 14),
              el("span", {}, tr("manageEmployees")),
            )
          : null,
        el("button", {
          class: "user-menu-signout",
          onclick: () => { state.userMenuOpen = false; logout(); },
        },
          ICON("logout", 14),
          el("span", {}, tr("logout")),
        ),
      );
      trigger.appendChild(menu);
    }
    return trigger;
  }

  // Bottom bar: tab bar for the role's root screens.
  //   Employee  → Home / History
  //   Admin/Owner/Readonly → Today (admin_home) / Roster / Inbox (badge=count)
  // Drill-in screens (admin_employee, shift_detail) hide the bar so the user
  // sees a back-arrow + content only.
  function renderBottomBar() {
    const root = document.getElementById("bottomBarRoot");
    root.innerHTML = "";
    const u = state.currentUser;
    if (!u) return;

    const tab = (iconName, labelKey, screen, badge=null) => {
      const node = el("div", {
        class: `tab ${state.screen === screen ? "active" : ""}`,
        onclick: () => navTab(screen),
      }, ICON(iconName), el("span", {class: "tab-label"}, tr(labelKey)));
      if (badge != null && badge > 0) {
        node.appendChild(el("div", {class:"tab-badge"}, String(badge > 99 ? "99+" : badge)));
      }
      return node;
    };

    // Employee: Home / History tabs. The History tab carries a badge
    // with the count of unsubmitted/rejected past weeks — same pattern
    // as the admin Inbox badge. Past weeks themselves live in History;
    // the badge is the affordance that pulls users there.
    if (isEmployee(u) && (state.screen === "employee_home" || state.screen === "history")) {
      const unsignedCount = unsignedPastWeeks(u.id).length;
      root.appendChild(el("div", {class: "tabbar"},
        tab("home", "home", "employee_home"),
        tab("history", "history", "history", unsignedCount),
      ));
      return;
    }

    // Admin / owner / readonly: Home / Inbox. Inbox carries a badge with
    // the count of pending weeks + edit requests. (The roster lives inside
    // Home — having a dedicated tab for it left both screens too thin.)
    if (isAdminLike(u) && (state.screen === "admin_home" || state.screen === "inbox")) {
      const inboxCount = canApprove(u)
        ? (pendingApprovals().length + pendingEditRequests().length)
        : 0;
      root.appendChild(el("div", {class: "tabbar"},
        tab("home", "home", "admin_home"),
        tab("inbox", "inbox", "inbox", inboxCount),
      ));
    }
  }

  // =============================================================
  // SCREENS
  // =============================================================
  function renderLogin() {
    const s = strings[state.lang];
    const root = document.getElementById("scrollRoot");
    root.innerHTML = "";
    root.className = "scroll";

    let errorBox = null;
    const userIn = el("input", {
      placeholder: s.username,
      autocomplete: "username",
      autocapitalize: "off",
      autocorrect: "off",
      spellcheck: "false",
      inputmode: "text",
    });
    const passIn = el("input", {
      placeholder: s.password,
      type: "password",
      autocomplete: "current-password",
      autocapitalize: "off",
      autocorrect: "off",
      spellcheck: "false",
    });

    async function attempt(username, password) {
      if (goBtn.disabled) return;
      goBtn.disabled = true;
      try {
        const { user, token } = await api.login(username, password);
        setToken(token);
        const dbResp = await api.db();
        hydrateFromDb(dbResp);
        login(user);
      } catch (e) {
        if (!errorBox) errorBox = el("div", {class:"err"}, s.invalidCreds);
        form.insertBefore(errorBox, goBtn);
        errorBox.textContent = e.status === 401 ? s.invalidCreds :
          (state.lang === "es" ? "No se pudo iniciar sesión — revisa tu conexión"
                               : "Couldn't sign in — check your connection");
      } finally {
        goBtn.disabled = false;
      }
    }

    const goBtn = el("button", {
      class:"go",
      onclick: (e) => { e.preventDefault(); attempt(userIn.value.trim(), passIn.value); }
    }, s.signIn);

    const form = el("form", {class:"login-form", onsubmit: (e) => { e.preventDefault(); attempt(userIn.value.trim(), passIn.value); }},
      userIn, passIn, goBtn);

    const langRow = el("div", {style:"display:flex; justify-content:flex-end; width:100%;"},
      langToggle()
    );

    root.appendChild(el("div", {class:"login-wrap screen-enter"},
      langRow,
      el("div", {class:"brand"}, s.appName.slice(0,5), el("span", {class:"accent"}, s.appName.slice(5))),
      el("div", {class:"tag"}, s.tagline),
      form,
    ));
  }

  function renderEmployeeHome() {
    const u = state.currentUser;
    const root = document.getElementById("scrollRoot");
    root.innerHTML = "";

    root.appendChild(greetingBlock(u, { showRole: false }));

    // Today's date + Clock-in (primary action, at the top)

  // ============================================================
  // UNIFIED WEEK CARD — used on Home (current + past weeks),
  // History, and Inbox. Header (range + hours + status) +
  // optional body (shift cards) + optional footer (actions).
  // Variants:
  //   mode "home-current"  — always-expanded, footer = Submit/Resubmit
  //                          or Pull-back, or lock notice if approved.
  //   mode "home-past"     — always-expanded, footer = Submit/Resubmit.
  //   mode "history"       — collapsible, status pill (Reopen menu for admin
  //                          on approved). No primary footer action.
  //   mode "inbox"         — collapsible. Footer = Approve / Reject (or
  //                          a reject-reason form when in rejecting mode).
  // ============================================================
  function renderWeekRow(opts) {
    const {
      empId, weekStart, mode,
      showEmployee = false,
      forceExpanded = false,
    } = opts;

    const wkShifts = shiftsForWeek(empId, weekStart);
    const wkHours = wkShifts.reduce((s, x) => s + x.hours, 0);
    const status = weekStatus(empId, weekStart);
    const rejectionComment = weekRejectionComment(empId, weekStart);
    const wkEnd = weekEndOf(weekStart);
    const emp = userById[empId];
    const u = state.currentUser;

    // ---- expansion state ----
    let expanded;
    let toggleExpand = null;
    if (forceExpanded || mode === "home-current" || mode === "home-past") {
      expanded = true;
    } else if (mode === "history") {
      if (state.expandedHistoryWeeks == null) state.expandedHistoryWeeks = new Set();
      const set = state.expandedHistoryWeeks;
      expanded = set.has(weekStart);
      toggleExpand = () => {
        if (expanded) set.delete(weekStart); else set.add(weekStart);
        render();
      };
    } else if (mode === "inbox") {
      if (state.expandedInboxWeeks == null) state.expandedInboxWeeks = new Set();
      const key = `${empId}|${weekStart}`;
      const set = state.expandedInboxWeeks;
      expanded = set.has(key);
      toggleExpand = () => {
        if (expanded) set.delete(key); else set.add(key);
        render();
      };
    }

    // ---- card classes ----
    // Urgent/rejected styling applies wherever a past, unsubmitted-or-
    // rejected week appears — home-past AND history. Drives the colored
    // border so the eye lands on the weeks that need action first.
    const classes = ["week-card", "week-rollup"];
    const isPastWeek = weekStart < thisWeekStart();
    const needsAction = !status || status === "rejected";
    if (mode === "home-past" || (mode === "history" && isPastWeek && needsAction)) {
      classes.push(rejectionComment ? "rejected" : "urgent");
    }

    // ---- title + meta block ----
    const titleBlock = el("div", {class:"wc-title-block"});
    if (showEmployee && emp) {
      titleBlock.appendChild(el("div", {class:"wc-employee", style:`color:${emp.color}`}, emp.displayName));
    }
    titleBlock.appendChild(el("div", {class:"wc-title"},
      `${fmtDateShort(weekStart)} – ${fmtDateShort(wkEnd)}`));
    titleBlock.appendChild(el("div", {class:"wc-sub"},
      `${wkHours.toFixed(1)}${tr("hoursShort")} · ${wkShifts.length} ${tr("shifts").toLowerCase()}`));

    // ---- right side: hours + optional status pill + chevron ----
    const right = el("div", {class:"wc-right"});
    // Past unsubmitted weeks get a filled amber "Unsubmitted" pseudo-pill
    // wherever they appear (history + home-past). Same visual slot as the
    // other status pills, so the eye learns "right side = state of this
    // week" — there's never an empty/ambiguous past row.
    const showUnsubmittedPill = !status
      && isPastWeek
      && (mode === "history" || mode === "home-past");
    if (showUnsubmittedPill) {
      right.appendChild(el("span", {class:"wc-status unsubmitted"}, tr("weekUnsubmitted")));
    } else if (status) {
      const label = status === "approved" ? tr("weekApproved")
                  : status === "rejected" ? tr("weekRejected")
                  : tr("weekPending");
      const canReopen = mode === "history"
        && status === "approved"
        && canApprove(u);
      const menuKey = `${empId}|${weekStart}`;
      const isMenuOpen = canReopen && state.weekMenuKey === menuKey;
      const pill = el("span", {
        class: `wc-status ${status}${canReopen ? " has-menu" : ""}${isMenuOpen ? " open" : ""}`,
      }, label);
      if (canReopen) {
        pill.addEventListener("click", (ev) => {
          ev.stopPropagation();
          state.weekMenuKey = isMenuOpen ? null : menuKey;
          state.weekReopenConfirm = false;
          render();
        });
        if (isMenuOpen) {
          const primed = state.weekReopenConfirm;
          const menu = el("div", {class:"w-status-menu"},
            el("button", {
              class: `w-status-menu-item${primed ? " confirm" : ""}`,
              onclick: async (ev) => {
                ev.stopPropagation();
                if (!primed) { state.weekReopenConfirm = true; render(); return; }
                if (ev.currentTarget.disabled) return;
                ev.currentTarget.disabled = true;
                try {
                  await api.setApproval(empId, weekStart, "unsubmitted");
                  const i = weekApprovals.findIndex(w => w.empId === empId && w.weekStart === weekStart);
                  if (i >= 0) weekApprovals.splice(i, 1);
                  state.weekMenuKey = null;
                  state.weekReopenConfirm = false;
                  toast(tr("weekReopened"), {kind:"warn", pill:"↺"});
                  render();
                } catch (e) {
                  ev.currentTarget.disabled = false;
                  toastApiError(e, state.lang === "es" ? "No se pudo reabrir" : "Couldn't reopen");
                }
              },
            }, primed ? tr("reopenWeekConfirm") : tr("reopenWeek")),
          );
          pill.appendChild(menu);
        }
      }
      right.appendChild(pill);
    } else {
      right.appendChild(el("span", {class:"wc-hrs"}, `${wkHours.toFixed(1)}${tr("hoursShort")}`));
    }
    if (toggleExpand) {
      right.appendChild(el("span", {class:`chevron ${expanded ? "up" : ""}`}, "›"));
    }

    // ---- header (tappable when collapsible) ----
    const head = el("div", {
      class: "wc-head" + (toggleExpand ? " tappable" : ""),
      onclick: toggleExpand || null,
    }, titleBlock, right);

    const card = el("div", {class: classes.join(" ")}, head);

    // attestation line for unsigned/rejected current week
    if (mode === "home-current" && (!status || status === "rejected")) {
      card.appendChild(el("div", {class:"wc-attest"}, tr("signoffAttest")));
    }

    // rejection notice (employee sees admin's reason). Visible everywhere
    // except inbox (where the admin already sees the week and chose to
    // reject — they don't need their own reason echoed back).
    if (rejectionComment && mode !== "inbox") {
      card.appendChild(el("div", {style:"margin-top:10px"}, rejectionNotice(rejectionComment)));
    }

    // expanded body — list of shift cards
    if (expanded && wkShifts.length > 0) {
      const sorted = [...wkShifts].sort((a,b) =>
        a.date.localeCompare(b.date) || a.start.localeCompare(b.start));
      for (const sh of sorted) card.appendChild(renderShiftCard(sh));
    }

    // footer: contextual actions / lock notice
    const footer = renderWeekFooter({ mode, empId, weekStart, status, wkShifts });
    if (footer) card.appendChild(footer);

    return card;
  }

  // Builds the contextual footer for a week-card. Returns null if the week
  // has nothing to do at the moment (e.g., approved week in history).
  function renderWeekFooter(opts) {
    const { mode, empId, weekStart, status, wkShifts } = opts;
    const u = state.currentUser;

    // Approved week on home: a calm "approved & locked" notice. No action.
    if (mode === "home-current" && status === "approved") {
      return el("div", {class:"wc-footer"},
        el("div", {class:"wc-lock approved"},
          ICON("lock", 16),
          el("span", {}, tr("weekClosedBody")),
        ),
      );
    }
    // Pending week on home (employee submitted, awaiting admin):
    // lock notice + Pull Back action.
    if (mode === "home-current" && status === "pending") {
      return el("div", {class:"wc-footer"},
        el("div", {class:"wc-lock"},
          ICON("eye", 16),
          el("span", {}, tr("weekPendingBody")),
        ),
        el("div", {class:"wc-footer-actions", style:"margin-top:10px;"},
          el("button", {
            class:"btn",
            onclick: async (ev) => {
              if (ev.currentTarget.disabled) return;
              ev.currentTarget.disabled = true;
              try {
                await api.setApproval(empId, weekStart, "unsubmitted");
                const i = weekApprovals.findIndex(w => w.empId === empId && w.weekStart === weekStart);
                if (i >= 0) weekApprovals.splice(i, 1);
                toast(tr("weekPulledBack"), {kind:"warn", pill:"↺"});
                render();
              } catch (e) {
                ev.currentTarget.disabled = false;
                toastApiError(e, state.lang === "es" ? "No se pudo retirar" : "Couldn't pull back");
              }
            },
          }, tr("pullBack")),
        ),
      );
    }

    // History mode: a past unsubmitted/rejected week shown to its owning
    // employee gets the same Submit/Resubmit footer that home-past used to
    // show. Admins viewing the same row get no footer — they shouldn't be
    // submitting on the employee's behalf from this surface (they have
    // admin-edit and add-shift for that). Implemented by treating it as a
    // home-past mode for the subsequent generic block.
    let effectiveMode = mode;
    if (mode === "history"
        && weekStart < thisWeekStart()
        && (!status || status === "rejected")
        && isEmployee(u) && empId === u.id) {
      effectiveMode = "home-past";
    }

    // Unsigned current or past week (or rejected — same Submit affordance):
    // Submit / Resubmit. Disabled if user is currently clocked in.
    if ((effectiveMode === "home-current" || effectiveMode === "home-past")
        && (!status || status === "rejected")) {
      const openShift = state.clock === "in";
      const label = status === "rejected" ? tr("resubmit") : tr("submitWeek");
      const wrap = el("div", {class:"wc-footer"});
      if (openShift) {
        wrap.appendChild(el("div", {class:"wc-warn"}, tr("submitBlockedOpenShift")));
      }
      wrap.appendChild(el("div", {class:"wc-footer-actions", style: openShift ? "margin-top:8px;" : ""},
        el("button", {
          class:"btn primary",
          disabled: openShift || undefined,
          onclick: async (ev) => {
            if (ev.currentTarget.disabled) return;
            const btn = ev.currentTarget;
            btn.disabled = true;
            const cardNode = btn.closest(".week-card");
            try {
              const { entry } = await api.setApproval(empId, weekStart, "pending");
              if (mode === "home-past") {
                animateOutAndThen(cardNode, () => {
                  upsertWeekApproval(entry);
                  toast(tr("weekSubmitted"), {kind:"success", pill:"✓"});
                  render();
                });
              } else {
                upsertWeekApproval(entry);
                animateShrinkAndThen(btn, () => {
                  toast(tr("weekSubmitted"), {kind:"success", pill:"✓"});
                  render();
                  const pill = document.querySelector(".week-card .wc-status.pending");
                  if (pill) pill.classList.add("pop-in");
                });
              }
            } catch (e) {
              btn.disabled = false;
              toastApiError(e, state.lang === "es" ? "No se pudo enviar la semana" : "Couldn't submit week");
            }
          },
        }, label),
      ));
      return wrap;
    }

    // Inbox row: Approve / Reject. If currently in rejecting-reason mode
    // for this row, swap actions for the textarea + danger-confirm submit.
    if (mode === "inbox" && status === "pending" && canApprove(u)) {
      const key = `${empId}|${weekStart}`;
      const isRejecting = state.rejectingApproval === key;
      const wrap = el("div", {class:"wc-footer"});
      if (isRejecting) {
        let submitBtn;
        const reasonField = el("textarea", {
          class:"reject-reason-field",
          placeholder: tr("rejectReasonPlaceholder"),
          rows: 3,
          oninput: () => { if (submitBtn) submitBtn.disabled = !reasonField.value.trim(); },
        });
        wrap.appendChild(el("div", {class:"reject-reason-title"}, tr("rejectReasonTitle")));
        wrap.appendChild(reasonField);
        submitBtn = el("button", {
          class:"btn danger-confirm",
          disabled: true,
          onclick: async (ev) => {
            const reason = reasonField.value.trim();
            if (!reason) { reasonField.focus(); return; }
            if (ev.currentTarget.disabled) return;
            ev.currentTarget.disabled = true;
            const cardNode = ev.currentTarget.closest(".week-card");
            try {
              const { entry } = await api.setApproval(empId, weekStart, "rejected", reason);
              animateOutAndThen(cardNode, () => {
                upsertWeekApproval(entry);
                state.rejectingApproval = null;
                state.expandedInboxWeeks?.delete(key);
                toast(tr("weekRejectedToast"), {kind:"warn", pill:"↺"});
                render();
              });
            } catch (e) {
              ev.currentTarget.disabled = false;
              toastApiError(e, state.lang === "es" ? "No se pudo rechazar" : "Couldn't reject");
            }
          },
        }, tr("reject"));
        const cancelBtn = el("button", {
          class:"btn",
          onclick: () => { state.rejectingApproval = null; render(); },
        }, tr("cancel"));
        wrap.appendChild(el("div", {class:"wc-footer-actions", style:"margin-top:10px;"}, submitBtn, cancelBtn));
        setTimeout(() => reasonField.focus(), 0);
      } else {
        wrap.appendChild(el("div", {class:"wc-footer-actions"},
          el("button", {
            class:"btn danger",
            onclick: () => { state.rejectingApproval = key; render(); },
          }, tr("reject")),
          el("button", {
            class:"btn primary",
            onclick: async (ev) => {
              if (ev.currentTarget.disabled) return;
              ev.currentTarget.disabled = true;
              const cardNode = ev.currentTarget.closest(".week-card");
              try {
                const { entry } = await api.setApproval(empId, weekStart, "approved");
                animateOutAndThen(cardNode, () => {
                  upsertWeekApproval(entry);
                  state.expandedInboxWeeks?.delete(key);
                  toast(tr("weekApprovedToast"), {kind:"success", pill:"✓"});
                  render();
                });
              } catch (e) {
                ev.currentTarget.disabled = false;
                toastApiError(e, state.lang === "es" ? "No se pudo aprobar" : "Couldn't approve");
              }
            },
          }, tr("approve")),
        ));
      }
      return wrap;
    }

    return null;
  }

  // Shared compact shift list used by admin approvals drill-in,
  // employee sign-off card, past-weeks rows, and history week expansion.
  function weekShiftBreakdown(wkShifts) {
    const details = el("div", {class:"breakdown"});
    if (!wkShifts.length) {
      details.appendChild(el("div", {class:"empty"}, tr("noShifts")));
      return details;
    }
    const sorted = [...wkShifts].sort((a,b) =>
      a.date.localeCompare(b.date) || a.start.localeCompare(b.start));
    for (const sh of sorted) {
      const shDate = new Date(sh.date + "T00:00:00");
      const hrsCls = sh.hours < 9 ? "h warn" : "h ok";
      const drow = el("div", {
        class: "drow tappable",
        onclick: () => {
          // Close any open modal (e.g. the weekly approvals sheet) before
          // routing, otherwise shift-detail renders under the scrim.
          if (state.modal) {
            state.modal = null;
            state.expandedApproval = null;
            state.rejectingApproval = null;
          }
          navTo("shift_detail", { viewingShiftId: sh.id });
        },
      },
        el("div", {class:"d"}, fmtDateWD(sh.date)),
        el("div", {class:"t"},
          timeRangeWithTz(sh.start, sh.end, sh.clockInTz, sh.clockOutTz, shDate),
        ),
        el("div", {class: hrsCls}, `${sh.hours.toFixed(1)}${tr("hoursShort")}`),
      );
      if (sh.comment) {
        drow.appendChild(el("div", {class:"c"}, `"${sh.comment}"`));
      }
      details.appendChild(drow);
    }
    return details;
  }

  function weekSignoffCard() {
    const u = state.currentUser;
    return renderWeekRow({
      empId: u.id,
      weekStart: thisWeekStart(),
      mode: "home-current",
    });
  }

  // Amber-outlined banner showing the admin's rejection reason.
  function rejectionNotice(reason) {
    return el("div", {class:"rejection-notice"},
      el("div", {class:"label"}, tr("rejectedByAdmin")),
      el("div", {class:"reason"}, `"${reason}"`),
    );
  }

  // Past weeks that need the employee's action: unsigned (no status yet) OR
  // rejected (admin sent back). Approved / pending weeks are excluded.
  function unsignedPastWeeks(empId) {
    const thisWk = thisWeekStart();
    const weeks = new Map(); // wkStart -> {hours, count}
    for (const sh of shifts) {
      if (sh.empId !== empId) continue;
      const wkStart = weekStartOf(sh.date);
      if (wkStart >= thisWk) continue;
      const st = weekStatus(empId, wkStart);
      if (st === "pending" || st === "approved") continue;
      const agg = weeks.get(wkStart) || {hours:0, count:0};
      agg.hours += sh.hours;
      agg.count += 1;
      weeks.set(wkStart, agg);
    }
    return [...weeks.entries()]
      .map(([wkStart, agg]) => ({
        wkStart, ...agg,
        rejectionComment: weekRejectionComment(empId, wkStart),
      }))
      .sort((a,b) => b.wkStart.localeCompare(a.wkStart));
  }

  function pastWeeksSignoffSection() {
    const u = state.currentUser;
    const past = unsignedPastWeeks(u.id);
    if (!past.length) return null;
    const wrap = document.createDocumentFragment();
    wrap.appendChild(el("div", {
      id: "past-weeks-section",
      class: "signoff-label signoff-label--urgent",
    }, tr("needsAttention")));
    for (const w of past) {
      wrap.appendChild(renderWeekRow({
        empId: u.id,
        weekStart: w.wkStart,
        mode: "home-past",
      }));
    }
    return wrap;
  }

  function clockSection() {
    const u = state.currentUser;
    // Three states only — Idle / In progress / Just finished. Week-locked
    // signaling (approved / pending) lives on the WeekRow below: the week
    // IS the locked thing. When the week is locked AND the user is idle,
    // we render the Clock In button disabled with a calm explanation; the
    // weekRow's footer carries the actionable lock notice + Pull Back.
    const wkStart = thisWeekStart();
    const wkSt = state.clock === "idle" ? weekStatus(u.id, wkStart) : null;
    const weekIsLocked = wkSt === "approved" || wkSt === "pending";

    if (state.clock === "idle") {
      const btn = el("button", {
        class: `btn hero clock-in${weekIsLocked ? " disabled" : ""}`,
        disabled: weekIsLocked || undefined,
        onclick: weekIsLocked ? null : async () => {
          state.clock = "in";
          state.clockIn = new Date();
          state.clockInCoord = null;
          state.clockInTz = currentTimezone();
          saveClockState();
          render();
          const c = await getCurrentCoord();
          state.clockInCoord = c.real ? { lat: c.lat, lng: c.lng } : null;
          saveClockState();
          const t = gpsToast(c, "Clock-in");
          toast(t.msg, { kind: t.kind, pill: t.pill });
          render();
        },
      }, ICON("play", 32), el("div", {}, tr("clockIn")));
      return btn;
    }
    if (state.clock === "in") {
      const wrap = el("div", {});
      const inTz = tzShort(state.clockInTz, state.clockIn);
      wrap.appendChild(el("div", {class:"clock-card"},
        el("div", {class:"pulse"}),
        el("div", {style:"flex:1"},
          el("div", {class:"label"}, tr("clockedInAt")),
          el("div", {class:"time"},
            fmtTimeDate(state.clockIn),
            inTz ? el("span", {class:"tz-inline"}, inTz) : null,
          ),
        )
      ));
      if (state.clockInCoord) {
        wrap.appendChild(miniMapThumb([{...state.clockInCoord, in: true}]));
      }
      wrap.appendChild(el("div", {style:"height:14px"}));
      wrap.appendChild(el("button", {
        class:"btn hero clock-out",
        onclick: async () => {
          state.clock = "out";
          state.clockOut = new Date();
          state.clockOutCoord = null;
          state.clockOutTz = currentTimezone();
          saveClockState();
          render();
          const c = await getCurrentCoord();
          state.clockOutCoord = c.real ? { lat: c.lat, lng: c.lng } : null;
          saveClockState();
          const t = gpsToast(c, "Clock-out");
          toast(t.msg, { kind: t.kind, pill: t.pill });
          render();
        }
      }, ICON("stop", 32), el("div", {}, tr("clockOut"))));
      return wrap;
    }
    // state.clock === "out": summary + comment + submit
    const diffMin = (state.clockOut - state.clockIn) / 60000;
    const hrs = diffMin / 60;

    const commentField = el("textarea", {
      class: "comment-field",
      placeholder: tr("comments"),
      oninput: (e) => { state.comment = e.target.value; saveClockState(); updateSubmitState(); },
    });
    commentField.value = state.comment;

    const wrap = el("div", {});
    const inTzShort  = tzShort(state.clockInTz,  state.clockIn);
    const outTzShort = tzShort(state.clockOutTz, state.clockOut);
    const summaryPins = [];
    if (state.clockInCoord)  summaryPins.push({...state.clockInCoord,  in: true });
    if (state.clockOutCoord) summaryPins.push({...state.clockOutCoord, in: false });

    const summaryEl = el("div", {class:"shift-summary"},
      el("div", {class:"row"},
        el("div", {class:"col"},
          el("div", {class:"l-label"}, tr("start")),
          el("div", {class:"time"},
            fmtTimeDate(state.clockIn),
            inTzShort ? el("span", {class:"tz-inline"}, inTzShort) : null,
          ),
        ),
        el("div", {class:"col r"},
          el("div", {class:"l-label"}, tr("end")),
          el("div", {class:"time"},
            fmtTimeDate(state.clockOut),
            outTzShort ? el("span", {class:"tz-inline"}, outTzShort) : null,
          ),
        ),
      ),
      summaryPins.length ? miniMapThumb(summaryPins) : null,
      el("div", {class:"total"},
        el("span", {class:`value ${hrs < 9 ? "warn":""}`}, hrs.toFixed(1)),
        el("span", {class:"unit"}, tr("hours").toLowerCase()),
      ),
      commentField,
    );

    if (hrs < 9) {
      summaryEl.appendChild(el("div", {class:"comment-required-note"}, tr("commentRequired")));
    }
    wrap.appendChild(summaryEl);
    wrap.appendChild(el("div", {style:"height:14px"}));
    const submitBtn = el("button", {
      class: "btn primary full",
      onclick: async (ev) => {
        if (hrs < 9 && !state.comment.trim()) {
          commentField.focus();
          commentField.classList.add("required");
          return;
        }
        if (ev.currentTarget.disabled) return;
        ev.currentTarget.disabled = true;
        const d = state.clockIn;
        const dateStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
        const pad = n => String(n).padStart(2,"0");
        const start = `${pad(state.clockIn.getHours())}:${pad(state.clockIn.getMinutes())}`;
        const end   = `${pad(state.clockOut.getHours())}:${pad(state.clockOut.getMinutes())}`;
        const [sh, sm] = start.split(":").map(Number);
        const [eh, em] = end.split(":").map(Number);
        const computedHours = ((eh*60+em) - (sh*60+sm)) / 60;
        try {
          const { shift } = await api.createShift({
            date: dateStr,
            start, end,
            hours: computedHours,
            comment: state.comment.trim(),
            clockIn:  state.clockInCoord,
            clockOut: state.clockOutCoord,
            clockInTz:  state.clockInTz,
            clockOutTz: state.clockOutTz,
          });
          shifts.push(shift);
          nextShiftId = Math.max(nextShiftId, shift.id + 1);
          state.clock = "idle";
          state.clockIn = state.clockOut = null;
          state.clockInCoord = state.clockOutCoord = null;
          state.clockInTz = state.clockOutTz = null;
          state.comment = "";
          saveClockState(); // clears the per-user localStorage key
          toast(tr("shiftLogged"), {kind:"success", pill:"✓"});
          render();
        } catch (e) {
          ev.currentTarget.disabled = false;
          toastApiError(e, state.lang === "es" ? "No se pudo guardar el turno" : "Couldn't save the shift");
        }
      }
    }, el("span", {}, tr("submit")));
    wrap.appendChild(submitBtn);

    function updateSubmitState() {
      // Only clear a prior "required" state once the user has typed. We don't
      // pre-warn them with red — the comment-required-note pill does that
      // calmly in amber. The red state only appears if they try to submit
      // without a comment.
      if (state.comment.trim()) commentField.classList.remove("required");
    }
    return wrap;
  }

  // Admin "Inbox" tab — pending weeks + edit requests in a single feed.
  // Replaces the old `state.modal === "approvals"` pop-up. Each week is a
  // unified WeekRow (mode "inbox") with Approve/Reject in the footer.
  function renderInbox() {
    const u = state.currentUser;
    const root = document.getElementById("scrollRoot");
    root.innerHTML = "";

    root.appendChild(greetingBlock(u, { showRole: true }));

    const pending = pendingApprovals();
    const pendingEdits = pendingEditRequests();

    if (!pending.length && !pendingEdits.length) {
      root.appendChild(el("div", {class:"inbox-empty"}, tr("inboxNothing")));
      root.appendChild(el("div", {style:"height:60px"}));
      return;
    }

    if (pending.length) {
      root.appendChild(el("div", {class:"inbox-section-label"}, tr("inboxPendingWeeks")));
      for (const w of pending) {
        root.appendChild(renderWeekRow({
          empId: w.empId,
          weekStart: w.weekStart,
          mode: "inbox",
          showEmployee: true,
        }));
      }
    }

    if (pendingEdits.length) {
      root.appendChild(el("div", {class:"inbox-section-label", style:"margin-top:24px"}, tr("editRequests")));
      for (const r of pendingEdits) {
        const emp = userById[r.empId];
        const sh = shifts.find(s => s.id === r.shiftId);
        const shDate = sh ? new Date(sh.date + "T00:00:00") : null;
        root.appendChild(el("div", {class:"edit-req-card"},
          el("div", {class:"er-head"},

            el("span", {class:"er-date"}, sh ? fmtDateWD(sh.date) : ""),
          ),
          el("div", {class:"er-times"},
            sh ? el("span", {class:"strike"},
              timeRangeWithTz(sh.start, sh.end, sh.clockInTz, sh.clockOutTz, shDate)) : null,
            el("span", {class:"arrow"}, "→"),
            el("span", {class:"new"},
              timeRangeWithTz(r.start, r.end, sh?.clockInTz, sh?.clockOutTz, shDate)),
          ),
          el("div", {class:"er-reason"}, `"${r.comment}"`),
          canApprove(u) ? el("div", {class:"er-actions"},
            el("button", {
              class:"btn danger",
              onclick: (ev) => {
                const cardNode = ev.currentTarget.closest(".edit-req-card");
                animateOutAndThen(cardNode, () => rejectEditRequest(r.id));

            el("button", {
              class:"btn primary",
              onclick: (ev) => {
                const cardNode = ev.currentTarget.closest(".edit-req-card");
                animateOutAndThen(cardNode, () => approveEditRequest(r.id));

    root.appendChild(el("div", {style:"height:60px"}));

  // Owner-only: full-page list of users. Tap an active user to edit them
  // (push to `edit_user`); tap Add user to open the "addEmployee" sheet

    root.innerHTML = "";
    root.classList.add("mu-screen");

    root.appendChild(el("div", {class:"section-header"},
      el("h3", {}, tr("manageUsersTitle")),

    ));

    const me = state.currentUser;
    const active = users.filter(u => u.active !== false);

        onclick: () => navTo("edit_user", { manageTargetId: u.id }),
      },

        ),
        el("div", {class:"chev"}, ICON("chevRight")),
      ));
    }

    root.appendChild(el("button", {
      class:"add-user-btn",
      onclick: () => { state.modal = "addEmployee"; history.pushState({ modal: true }, ""); render(); },
    }, ICON("addUser", 18), el("span", {}, tr("addUser"))));

    if (inactive.length) {
      root.appendChild(el("div", {class:"mu-section-label"}, tr("deactivated")));
      for (const u of inactive) {
        const row = el("div", {class:"mu-row inactive"},
          el("div", {class:"mu-body"},
            el("div", {class:"mu-name"}, u.displayName),
            el("div", {class:"mu-meta"}, `@${u.username} · ${tr(u.role)}`),
          ),
        );
        row.appendChild(el("button", {class:"btn primary", style:"padding:8px 14px;", onclick: async (ev) => {
          if (ev.currentTarget.disabled) return;
          ev.currentTarget.disabled = true;
          try {
            await api.reactivateUser(u.id);
            hydrateFromDb(await api.db());
            toast(tr("userReactivated"), {kind:"success", pill:"✓"});

  // --- Edit request store ---

  // --- Shift detail screen ---
  function renderShiftDetail() {
    const root = document.getElementById("scrollRoot");
    root.innerHTML = "";
    const sh = shifts.find(s => s.id === state.viewingShiftId);
    if (!sh) {
      root.appendChild(el("div", {style:"text-align:center; padding:40px; color:var(--text-muted);"}, "Shift not found"));
      return;
    }
    const emp = userById[sh.empId];
    // Hospice nurses typically work full ≥9-hour shifts; anything shorter is
    // usually an incomplete clock-out, half-day, or accidental tap. Surface it
    // visually (red `warn` vs green `ok`) so admins notice on glance — not a
    // hard error, just a nudge.
    const ok = sh.hours >= 9;
    const u = state.currentUser;
    const editReq = pendingEditRequestFor(sh.id);

    // Header: who + when + hours.
    // For an employee viewing their OWN shift, the avatar + name are pure
    // chrome — they already know who they are. Strip them and lead with the
    // date so the eye lands on the relevant info (when + hours) faster.
    const isSelfView = isEmployee(u) && sh.empId === u.id;
    root.appendChild(el("div", {
      style:"display:flex; align-items:center; gap:12px; padding: 4px 0 2px;"
    },
      isSelfView ? null : el("div", {
        style:`width:40px;height:40px;border-radius:50%;background:color-mix(in oklab, ${emp.color} 22%, transparent);color:${emp.color};display:grid;place-items:center;font-weight:700;font-size:15px;flex:0 0 auto;`
      }, emp.displayName.charAt(0)),
      el("div", {style:"flex:1; min-width:0"},
        isSelfView ? null : el("div", {class:"sd-name", style:`color:${emp.color}`}, emp.displayName),
        el("div", {class:"sd-date"}, fmtDateLong(sh.date)),
      ),
      el("div", {
        class: `sd-total-hrs ${ok ? "ok":"warn"}`
      }, `${sh.hours.toFixed(1)}${tr("hoursShort")}`),
    ));

    // Start / End rows (compact, not stats-card giant text)
    const shDate = new Date(sh.date + "T00:00:00");
    const inTz = sh.clockInTz ? tzShort(sh.clockInTz, shDate) : null;
    const outTz = sh.clockOutTz ? tzShort(sh.clockOutTz, shDate) : null;
    const times = el("div", {class:"sd-rows"});
    const startRow = el("div", {class:"sd-row"},
      el("span", {class:"sd-label"}, tr("start")),
      el("span", {class:"sd-value"}, fmt12(sh.start)),
    );
    if (inTz) startRow.appendChild(el("span", {class:"sd-tz"}, inTz));
    times.appendChild(startRow);
    const endRow = el("div", {class:"sd-row"},
      el("span", {class:"sd-label"}, tr("end")),
      el("span", {class:"sd-value"}, fmt12(sh.end)),
    );
    if (outTz) endRow.appendChild(el("span", {class:"sd-tz"}, outTz));
    times.appendChild(endRow);
    root.appendChild(times);
    // Heads-up if the employee clocked out in a different tz than they clocked in
    if (sh.clockInTz && sh.clockOutTz && sh.clockInTz !== sh.clockOutTz) {
      root.appendChild(el("div", {class:"sd-tz-note"},
        `Clocked in ${inTz}, clocked out ${outTz}`));
    }

    // Comment (if present)
    if (sh.comment) {
      root.appendChild(el("div", {class:"sd-section-label"}, tr("commentLabel")));
      root.appendChild(el("div", {class:"sd-comment"}, `"${sh.comment}"`));
    }

    // Map for just this shift
    const locShifts = [];
    if (sh.clockIn || sh.clockOut) locShifts.push(sh);
    if (locShifts.length > 0) {
      root.appendChild(el("div", {class:"sd-section-label"}, tr("locationCaptured")));
      root.appendChild(miniMap(locShifts));
    } else {
      root.appendChild(el("div", {class:"sd-no-loc"}, tr("noLocation")));
    }

    // Pending edit request banner
    if (editReq) {
      root.appendChild(el("div", {class:"sd-section-label", style:"color:var(--accent-amber);"}, tr("editPending")));
      root.appendChild(el("div", {class:"sd-edit-req"},
        el("div", {class:"sd-edit-times"},
          el("span", {style:"color:var(--text-muted); text-decoration:line-through; font-variant-numeric:tabular-nums;"},
            timeRangeWithTz(sh.start, sh.end, sh.clockInTz, sh.clockOutTz, shDate)),
          el("span", {style:"margin: 0 8px; color:var(--text-muted);"}, "→"),
          el("span", {style:"font-weight:700; font-variant-numeric:tabular-nums;"},
            timeRangeWithTz(editReq.start, editReq.end, sh.clockInTz, sh.clockOutTz, shDate)),
        ),
        el("div", {class:"sd-edit-comment"}, `"${editReq.comment}"`),
      ));
    }

    // Admin edit log — every direct edit by admin/owner is recorded here and
    // visible to everyone who can see the shift.
    if (sh.adminEdits && sh.adminEdits.length > 0) {
      root.appendChild(el("div", {class:"sd-section-label"}, tr("adminEditLog")));
      const logWrap = el("div", {class:"sd-admin-log"});
      for (const entry of [...sh.adminEdits].reverse()) {
        const editor = userById[entry.by];
        const when = new Date(entry.at);
        logWrap.appendChild(el("div", {class:"sd-admin-log-entry"},
          el("div", {class:"meta"},
            el("span", {class:"who"}, editor ? editor.displayName : tr("admin")),
            el("span", {class:"when"}, when.toLocaleString(locale(), {
              month: "short", day: "numeric", hour: "numeric", minute: "2-digit",
            })),
          ),
          (entry.oldStart !== entry.newStart || entry.oldEnd !== entry.newEnd)
            ? el("div", {class:"diff"},
                el("span", {class:"before"}, `${fmt12(entry.oldStart)} – ${fmt12(entry.oldEnd)}`),
                el("span", {class:"arrow"}, "→"),
                el("span", {class:"after"}, `${fmt12(entry.newStart)} – ${fmt12(entry.newEnd)}`),
              )
            : null,
          el("div", {class:"reason"}, `"${entry.comment}"`),
        ));
      }
      root.appendChild(logWrap);
    }

    // Actions:
    //   - owner/admin: can approve/reject a pending employee edit request,
    //     and can directly edit the shift (requires a reason, logged).
    //   - employee on own shift: can request an edit — UNLESS the week has
    //     already been admin-approved, in which case the shift is locked.
    const weekSt = weekStatus(sh.empId, weekStartOf(sh.date));
    const weekIsLocked = weekSt === "approved";

    if (editReq && canApprove(u)) {
      root.appendChild(el("div", {class:"sd-action-row"},
        el("button", {
          class:"btn primary",
          onclick: () => approveEditRequest(editReq.id),
