      el("div", {style:"flex:1; min-width:0;"},
        el("div", {class:"name", style:"font-size:var(--fs-xl);"}, e.displayName),
        el("div", {class:"hello", style:"font-size:var(--fs-sm);"}, "@" + e.username),
      ),
      canApprove(state.currentUser) ? el("button", {
        class: "btn primary",
        style: "padding:10px 14px; font-size:var(--fs-xs); flex:0 0 auto;",
        onclick: () => { state.modal = "addShift"; history.pushState({ modal: true }, ""); render(); },
      }, tr("addShiftAction")) : null,
    ));

    // Admin view: show employee history (shift list + map)
    const empShifts = shifts.filter(s => s.empId === e.id && s.end)
      .sort((a,b) => b.date.localeCompare(a.date) || b.start.localeCompare(a.start));

    // Map
    const withCoords = empShifts.filter(s => s.clockIn || s.clockOut);
    if (withCoords.length > 0) {
      root.appendChild(miniMap(withCoords));
    }

    // Shift list (grouped by month → week)
    appendGroupedShifts(root, empShifts, e.id);
    root.appendChild(el("div", {style:"height:40px"}));
  }

  function renderHistory() {
    const u = state.currentUser;
    const root = document.getElementById("scrollRoot");
    root.innerHTML = "";

    // Calendar at the top — moved here from the clock-in home screen. Scoped
    // to the current employee so it filters to their own shifts.
    root.appendChild(monthNav());
    const calBlock = el("div", {class: "cal-block " + (state.lastAnim === 1 ? "month-anim-next" : state.lastAnim === -1 ? "month-anim-prev" : "")});
    state.lastAnim = 0;
    calBlock.appendChild(renderCalendar(u.id));
    root.appendChild(calBlock);

    const mine = shifts.filter(s => s.empId === u.id && s.end)
      .sort((a,b) => b.date.localeCompare(a.date) || b.start.localeCompare(a.start));

    appendGroupedShifts(root, mine, u.id);
    root.appendChild(el("div", {style:"height:40px"}));
  }

  // --- Edit request store ---
  // Each request: { id, shiftId, empId, start, end, comment, status: pending|approved|rejected, submittedAt }
  // Hydrated from db.json by loadDB().
  const editRequests = [];
  let nextEditReqId = 1;
  function pendingEditRequestFor(shiftId) {
    return editRequests.find(r => r.shiftId === shiftId && r.status === "pending");
  }
  function pendingEditRequests() {
    return editRequests.filter(r => r.status === "pending");
  }

  // --- Shift detail screen ---
  function renderShiftDetail(rootEl) {
    const root = rootEl;
    const sh = shifts.find(s => s.id === state.viewingShiftId);
    if (!sh) {
      root.appendChild(el("div", {style:"text-align:center; padding:40px; color:var(--text-muted);"}, tr("shiftNotFound")));
      return;
    }
    const emp = userById[sh.empId];
    // Hospice nurses typically work full ≥9-hour shifts; anything shorter is
    // usually an incomplete clock-out, half-day, or accidental tap. Surface it
    // visually (red `warn` vs green `ok`) so admins notice on glance — not a
    // hard error, just a nudge. Suppressed for users with the noteOptional
    // bypass (part-time hires whose shift length is intentionally short).
    const ok = sh.hours >= 9 || emp?.noteOptional === true;
    const u = state.currentUser;
    const editReq = pendingEditRequestFor(sh.id);

    // Header: who + when + hours.
    // For an employee viewing their OWN shift, the avatar + name are pure
    // chrome — they already know who they are. Strip them and lead with the
    // date so the eye lands on the relevant info (when + hours) faster.
    const isSelfView = isEmployee(u) && sh.empId === u.id;
    root.appendChild(el("div", {
      style:"display:flex; align-items:center; gap:12px; padding: 4px 44px 2px 0;"
    },
      isSelfView ? null : el("div", {
        style:`width:40px;height:40px;border-radius:50%;background:color-mix(in oklab, ${emp.color} 22%, transparent);color:${emp.color};display:grid;place-items:center;font-weight:700;font-size:var(--fs-sm);flex:0 0 auto;`
      }, emp.displayName.charAt(0)),
      el("div", {style:"flex:1; min-width:0"},
        isSelfView ? null : el("div", {class:"sd-name", style:`color:${emp.color}`}, emp.displayName),
        el("div", {class:"sd-date"}, fmtDateLong(bizDate(sh)), prevDayBadge(sh)),
      ),
      el("div", {
        class: `sd-total-hrs ${ok ? "ok":"warn"}`
      }, `${sh.hours.toFixed(1)}${tr("hoursShort")}`),
    ));

    // Start / End rows (compact, not stats-card giant text)
    const shDate = new Date(sh.date + "T00:00:00");
    const inTz = sh.clockInTz ? tzShort(sh.clockInTz, shDate) : null;
    const outTz = sh.clockOutTz ? tzShort(sh.clockOutTz, shDate) : null;
    const times = el("div", {class:"sd-rows"});
    const startRow = el("div", {class:"sd-row"},
      el("span", {class:"sd-label"}, tr("start")),
      el("span", {class:"sd-value"}, fmtHM(sh.start)),
    );
    if (inTz) startRow.appendChild(el("span", {class:"sd-tz"}, inTz));
    times.appendChild(startRow);
    // Group value + overnight badge so the row stays a 3-element flex
    // layout (label · value · tz). Without this, the +1d badge becomes a
    // fourth child and `justify-content: space-between` shoves the time
    // off-center.
    const overnight = isOvernight(sh.start, sh.end);
    const endValue = el("span", {class:"sd-value-wrap"},
      el("span", {class:"sd-value"}, fmtHM(sh.end)),
      overnight ? el("span", {class:"overnight-badge"}, "+1d") : null,
    );
    const endRow = el("div", {class:"sd-row"},
      el("span", {class:"sd-label"}, tr("end")),
      endValue,
    );
    if (outTz) endRow.appendChild(el("span", {class:"sd-tz"}, outTz));
    times.appendChild(endRow);
    root.appendChild(times);

    // Why this shift sits on the previous calendar day: clock-in landed before
    // the 3:30am books boundary, so it's counted to the day before.
    if (bookedToPrevDay(sh)) {
      root.appendChild(el("div", {class:"sd-prevday-note"},
        ICON("moon", 15),
        el("span", {}, tr("prevDayNote", fmtDateShort(sh.date), fmtHM(sh.start), fmtDateShort(bizDate(sh)))),
      ));
    }
    // Heads-up if the employee clocked out in a different tz than they clocked in
    if (sh.clockInTz && sh.clockOutTz && sh.clockInTz !== sh.clockOutTz) {
      root.appendChild(el("div", {class:"sd-tz-note"},
        tr("tzCrossNote", inTz, outTz)));
    }

    const canEditComment = isEmployee(u) && u.id === sh.empId;

    // Map for just this shift — admins/owners only. Employees viewing their
    // own shifts don't need to see GPS pins; that's a glance-tool for whoever
    // is reviewing them.
    if (!isSelfView) {
      const locShifts = [];
      if (sh.clockIn || sh.clockOut) locShifts.push(sh);
      if (locShifts.length > 0) {
        root.appendChild(el("div", {class:"sd-section-label"}, tr("locationCaptured")));
        root.appendChild(miniMap(locShifts));
      } else {
        root.appendChild(el("div", {class:"sd-no-loc"}, tr("noLocation")));
      }
    }

    // Pending edit request banner
    if (editReq) {
      root.appendChild(el("div", {class:"sd-section-label", style:"color:var(--accent-amber);"}, tr("editPending")));
      root.appendChild(el("div", {class:"sd-edit-req"},
        el("div", {class:"sd-edit-times"},
          el("span", {style:"color:var(--text-muted); text-decoration:line-through; font-variant-numeric:tabular-nums;"},
            timeRangeWithTz(sh.start, sh.end, sh.clockInTz, sh.clockOutTz, shDate)),
          el("span", {style:"margin: 0 8px; color:var(--text-muted);"}, "→"),
          el("span", {style:"font-weight:700; font-variant-numeric:tabular-nums;"},
            timeRangeWithTz(editReq.start, editReq.end, sh.clockInTz, sh.clockOutTz, shDate)),
        ),
        el("div", {class:"sd-edit-comment"}, `"${editReq.comment}"`),
      ));
    }

    // Unified comment log: every entry — admin direct-edits AND the
    // employee's own note — sits in a single chronological timeline,
    // sorted oldest-first. Each entry shows the author's name and body.
    // For the employee on their own shift, their entry renders as an
    // editable textarea instead of a static block.
    const empComment = sh.comment || "";
    // Fallback timestamp for legacy data where commentAt was never recorded:
    // use the shift's date + start so the comment lands roughly when the
    // shift was logged.
    const empCommentAt = sh.commentAt
      || (empComment ? `${sh.date}T${sh.start}:00` : null);
    const entries = [];
    for (const e of (sh.adminEdits ?? [])) {
      entries.push({ kind: "admin", at: e.at, e });
    }
    if (empComment || canEditComment) {
      entries.push({ kind: "self", at: empCommentAt });
    }
    entries.sort((a, b) => (a.at || "").localeCompare(b.at || ""));

    if (entries.length > 0) {
      root.appendChild(el("div", {class:"sd-section-label"}, tr("commentsLabel")));
      const logWrap = el("div", {class:"sd-admin-log"});
      for (const item of entries) {
        if (item.kind === "admin") {
          const e = item.e;
          const editor = userById[e.by];
          const when = e.at ? new Date(e.at) : null;
          logWrap.appendChild(el("div", {class:"sd-admin-log-entry"},
            el("div", {class:"meta"},
              el("span", {class:"who"}, editor ? editor.displayName : tr("admin")),
              when ? el("span", {class:"when"}, when.toLocaleString(locale(), {
                month: "short", day: "numeric", hour: "2-digit", minute: "2-digit", hour12: false,
              })) : null,
            ),
            e.action === "created" || !e.oldStart || !e.oldEnd
              ? el("div", {class:"diff"},
                  el("span", {class:"after"}, `${fmtHM(e.newStart)} – ${fmtHM(e.newEnd)}`),
                  isOvernight(e.newStart, e.newEnd) ? el("span", {class:"overnight-badge"}, "+1d") : null,
                )
              : (e.oldStart !== e.newStart || e.oldEnd !== e.newEnd)
                ? el("div", {class:"diff"},
                    el("span", {class:"before"}, `${fmtHM(e.oldStart)} – ${fmtHM(e.oldEnd)}`),
                    isOvernight(e.oldStart, e.oldEnd) ? el("span", {class:"overnight-badge"}, "+1d") : null,
                    el("span", {class:"arrow"}, "→"),
                    el("span", {class:"after"}, `${fmtHM(e.newStart)} – ${fmtHM(e.newEnd)}`),
                    isOvernight(e.newStart, e.newEnd) ? el("span", {class:"overnight-badge"}, "+1d") : null,
                  )
                : null,
            e.comment ? el("div", {class:"reason"}, `"${e.comment}"`) : null,
          ));
        } else {
          // Employee entry — editable for self, read-only otherwise. Name
          // is colored with the user's profile color so a roster of
          // employees stays visually distinct.
          const emp = userById[sh.empId];
          const empName = emp?.displayName ?? "";
          const empStyle = emp?.color ? `color:${emp.color}` : "";
          const when = item.at ? new Date(item.at) : null;
          const whenEl = when ? el("span", {class:"when"}, when.toLocaleString(locale(), {
            month: "short", day: "numeric", hour: "2-digit", minute: "2-digit", hour12: false,
          })) : null;
          if (canEditComment) {
            const ta = el("textarea", {
              class: "sd-comment-input",
              rows: 1,
              placeholder: tr("editShiftCommentPlaceholder"),
            });
            ta.value = empComment;
            const autosize = () => {
              ta.style.height = "auto";
              ta.style.height = ta.scrollHeight + "px";
            };
            ta.addEventListener("input", autosize);
            queueMicrotask(autosize);
            logWrap.appendChild(el("div", {class:"sd-admin-log-entry"},
              el("div", {class:"meta"},
                el("span", {class:"who", style: empStyle}, empName),
                whenEl,
              ),
              ta,
            ));
            const shiftId = sh.id;
            pendingCommentFlush = async () => {
              const next = ta.value;
              if (next === empComment) return;
              // Optimistic local write so an immediate re-open of the sheet
              // shows the new comment even before the server round-trips.
              const localSh = shifts.find(s => s.id === shiftId);
              if (localSh) localSh.comment = next;
              try {
                const { shift: updated } = await api.updateShiftComment(shiftId, next);
                if (localSh) Object.assign(localSh, updated);
                toast(tr("noteSaved"), {kind:"success", pill:"✓"});
              } catch (e) {
                if (localSh) localSh.comment = empComment;
                toastApiError(e, tr("errCouldntSave"));
              }
            };
          } else {
            logWrap.appendChild(el("div", {class:"sd-admin-log-entry"},
              el("div", {class:"meta"},
                el("span", {class:"who", style: empStyle}, empName),
                whenEl,
              ),
              empComment ? el("div", {class:"reason"}, `"${empComment}"`) : null,
            ));
          }
        }
      }
      root.appendChild(logWrap);
    }

    // Actions:
    //   - owner/admin: can approve/reject a stale pending employee edit
    //     request that's still in the data, and can directly edit the shift
    //     (requires a reason, logged).
    //   - employees no longer have any action surface here — they'll text
    //     the owner if a shift needs fixing.

    if (editReq && canApprove(u)) {
      root.appendChild(el("div", {class:"sd-action-row"},
        el("button", {
          class:"btn primary",
          onclick: () => approveEditRequest(editReq.id),
        }, tr("approveEdit")),
        el("button", {
          class:"btn danger",
          onclick: () => rejectEditRequest(editReq.id),
        }, tr("rejectEdit")),
      ));
    }
    // Admin/owner direct edit button — always available (even after approval)
    if (canApprove(u)) {
      root.appendChild(el("button", {
        class:"btn primary full",
        style: "margin-top:8px;",
        onclick: () => openModal("adminEditShift"),
      }, tr("adminEditTitle")));
    }
    // Owner-only: hard-delete the shift. Logged via the data repo's commit
    // history (the row itself is gone, so there's no adminEdits to attach).
    if (isOwner(u)) {
      root.appendChild(el("button", {
        class:"btn danger full",
        style: "margin-top:8px;",
        onclick: () => openModal("confirmDeleteShift"),
      }, tr("deleteShift")));
    }
    // No "Request edit" button for employees — they'll text the owner if
    // a shift's times need fixing. Comment edits happen inline via the
    // editable textarea rendered above.

    root.appendChild(el("div", {style:"height:40px"}));
  }

  async function approveEditRequest(reqId) {
    try {
      const { r: updated } = await api.decideEditRequest(reqId, "approved");
      // Worker also mutated the underlying shift + appended an adminEdits entry.
      // Re-hydrate so the shift change + audit log are visible everywhere.
      hydrateFromDb(await api.db());
      // hydrateFromDb resets the local editRequests array too, so the merged
      // object already reflects the updated status — no need to patch it.
      void updated;
      toast(tr("editApproved"), { kind:"success", pill:"✓" });
      render();
    } catch (e) {
      toastApiError(e, tr("errCouldntApprove"));
    }
  }
  async function rejectEditRequest(reqId) {
    try {
      const { r: updated } = await api.decideEditRequest(reqId, "rejected");
      const local = editRequests.find(x => x.id === reqId);
      if (local) Object.assign(local, updated);
      toast(tr("editRejected"), { kind:"warn", pill:"↺" });
      render();
    } catch (e) {
      toastApiError(e, tr("errCouldntReject"));
    }
  }

  function renderShiftCard(sh) {
    // <9h flags potentially anomalous shifts (incomplete clock-out, half-day,
    // accidental). Real shifts under this threshold are uncommon for hospice
    // work — surface for admin glance, not a hard error. Suppressed for
    // users with the noteOptional bypass (intentional part-time shifts).
    const ok = sh.hours >= 9 || userById[sh.empId]?.noteOptional === true;
    const shDate = new Date(sh.date + "T00:00:00");
    const editedN = sh.adminEdits?.length || 0;
    return el("div", {
      class: `hist-shift-card ${editedN > 0 ? "edited" : ""}`,
      style:"cursor:pointer",
      onclick: () => openModal("shiftDetail", { viewingShiftId: sh.id }),
    },
      el("div", {class:"top"},
        el("div", {class:"left"},
          el("div", {class:`status-dot ${ok ? "ok":"warn"}`}),
          el("div", {class:"date"}, fmtDateLong(bizDate(sh))),
          prevDayBadge(sh),
          editedN > 0 ? el("span", {class:"edit-badge", title: tr("editedByAdmin")}, "✎") : null,
        ),
        el("div", {class:`hrs ${ok ? "ok":"warn"}`}, `${sh.hours.toFixed(1)}${tr("hoursShort")}`),
      ),
      // Single-line time range (was two `.chip` rectangles for Start / End,
      // which created a heavy second row of visual noise on the history list).
      // Matches the day-detail table treatment.
      el("div", {class:"shift-time-line"},
        timeRangeWithTz(sh.start, sh.end, sh.clockInTz, sh.clockOutTz, shDate),
      ),
      sh.comment ? el("div", {class:"comment"}, `"${sh.comment}"`) : null,
    );
  }

  // Groups shifts by month → week and appends headers + cards to `root`.
  // Expects shifts already sorted newest-to-oldest.
  // Weeks other than the current one default to collapsed; click the header to toggle.
  function appendGroupedShifts(root, sortedShifts, empId) {
    if (!sortedShifts.length) return;
    if (state.expandedHistoryWeeks == null) {
      state.expandedHistoryWeeks = new Set();
      // Pre-expand the current week so the most relevant shifts are visible
      // without an extra tap. Older weeks stay collapsed and can be opened
      // individually.
      state.expandedHistoryWeeks.add(thisWeekStart());
    }

    const byMonth = new Map();
    for (const sh of sortedShifts) {
      const mKey = bizDate(sh).slice(0, 7); // YYYY-MM (booked month)
      if (!byMonth.has(mKey)) byMonth.set(mKey, []);
      byMonth.get(mKey).push(sh);
    }
    const mKeys = [...byMonth.keys()].sort().reverse();
    for (const mKey of mKeys) {
      const mShifts = byMonth.get(mKey);
      const mHours = mShifts.reduce((s,x)=>s+x.hours,0);
      const [y, m] = mKey.split("-").map(Number);
      const monthLabel = new Date(y, m-1, 1)
        .toLocaleDateString(locale(), {month:"long", year:"numeric"})
        .replace(/ de /, " ")
        .replace(/^./, c => c.toUpperCase());

      root.appendChild(el("div", {class:"hist-month-head"},
        el("div", {class:"m-title"}, monthLabel),
        el("div", {class:"m-stats"},
          `${mHours.toFixed(1)}${tr("hoursShort")} · ${mShifts.length} ${tr("shifts").toLowerCase()}`),
      ));

      const byWeek = new Map();
      for (const sh of mShifts) {
        const wkStart = weekStartOf(bizDate(sh));
        if (!byWeek.has(wkStart)) byWeek.set(wkStart, []);
        byWeek.get(wkStart).push(sh);
      }
      const wKeys = [...byWeek.keys()].sort().reverse();
      for (const wkStart of wKeys) {
        // Collapsible week roll-up; expands into shift cards on tap.
        root.appendChild(renderWeekRow({
          empId, weekStart: wkStart,
        }));
      }
    }
  }

  // =============================================================
  // MAP
  // =============================================================
  // Leaflet-backed map. Auto-fits to pins, caps zoom so tight clusters
  // still show neighborhood context. Interactive: drag, pinch, zoom buttons.
  // Scroll-wheel zoom is disabled until the user clicks the map so it
  // doesn't hijack page scroll.
  const MAP_MAX_ZOOM = 15;
  const MAP_FIT_PADDING = 24;

  // Compact, non-interactive map for the clock-in/out card. No drag, no
  // zoom, no legend, no attribution bar — just a visual confirmation of
  // where the user was. Accepts a coord array: [{lat, lng, in: bool}].
  function miniMapThumb(coordPins) {
    const pins = coordPins.filter(p => p && Number.isFinite(p.lat) && Number.isFinite(p.lng));
    if (!pins.length) return el("div", {});
    const mapEl = el("div", {class: "mini-map mini-map--thumb"});
    requestAnimationFrame(() => {
      const map = L.map(mapEl, {
        scrollWheelZoom: false, zoomControl: false, attributionControl: false,
        dragging: false, touchZoom: false, doubleClickZoom: false,
        boxZoom: false, keyboard: false, tap: false,
      });
      L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", { maxZoom: 19 }).addTo(map);
      for (const p of pins) {
        L.marker([p.lat, p.lng], {
          icon: L.divIcon({
            className: "pin-marker",
            html: `<div class="pin ${p.in ? "in" : "out"}"></div>`,
            iconSize: [14, 14], iconAnchor: [7, 7],
          }),
          interactive: false,
        }).addTo(map);
      }
      if (pins.length === 1) {
        map.setView([pins[0].lat, pins[0].lng], 16);
      } else {
        map.fitBounds(L.latLngBounds(pins.map(p => [p.lat, p.lng])), {
          padding: [12, 12], maxZoom: 16,
        });
      }
    });
    return mapEl;
  }

  function miniMap(locatedShifts) {
    const pins = [];
    for (const sh of locatedShifts) {
      if (sh.clockIn)  pins.push({ lat: sh.clockIn.lat,  lng: sh.clockIn.lng,  in: true });
      if (sh.clockOut) pins.push({ lat: sh.clockOut.lat, lng: sh.clockOut.lng, in: false });
    }
    if (!pins.length) return el("div", {});

    const mapEl = el("div", {class: "mini-map mini-map--locked"});
    mapEl.appendChild(el("div", {class: "legend"},
      el("span", {class: "in"}, tr("mapLegendIn")),
      el("span", {class: "out"}, tr("mapLegendOut")),
    ));

    // Leaflet needs the element in the DOM with a measurable size.
    requestAnimationFrame(() => {
      const map = L.map(mapEl, {
        scrollWheelZoom: false,
        zoomControl: true,
        attributionControl: false,
      });
      L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom: 19,
        attribution: "© OpenStreetMap",
      }).addTo(map);
      L.control.attribution({ prefix: false, position: "bottomright" })
        .addAttribution("© OSM").addTo(map);

      for (const p of pins) {
        L.marker([p.lat, p.lng], {
          icon: L.divIcon({
            className: "pin-marker",
            html: `<div class="pin ${p.in ? "in" : "out"}"></div>`,
            iconSize: [16, 16],
            iconAnchor: [8, 8],
          }),
        }).addTo(map);
      }

      const bounds = L.latLngBounds(pins.map(p => [p.lat, p.lng]));
      map.fitBounds(bounds, {
        padding: [MAP_FIT_PADDING, MAP_FIT_PADDING],
        maxZoom: MAP_MAX_ZOOM,
      });

      // Click-to-activate scroll zoom. Also show a brief hint if the user
      // tries to scroll-wheel-zoom while it's still locked.
      const activate = () => {
        map.scrollWheelZoom.enable();
        mapEl.classList.remove("mini-map--locked");
      };
      map.once("click", activate);
      mapEl.addEventListener("wheel", (e) => {
        if (mapEl.classList.contains("mini-map--locked")) {
          mapEl.classList.add("show-hint");
          clearTimeout(mapEl._hintTimer);
          mapEl._hintTimer = setTimeout(() => mapEl.classList.remove("show-hint"), 900);
        }
      }, { passive: true });
    });

    return mapEl;
  }

  // MONTH NAV (shared)
  // =============================================================
  function monthLabelText() {
    return new Date(state.calYear, state.calMonth, 1)
      .toLocaleDateString(locale(), { month:"long", year:"numeric" })
      .replace(/ de /, " ")   // "abril de 2026" → "abril 2026" in Spanish
      .replace(/^./, c => c.toUpperCase());
  }

  function monthNav() {
    return el("div", {class:"month-nav"},
      el("div", {class:"chev", onclick: () => {
        if (state.calMonth === 0) { state.calMonth = 11; state.calYear--; } else state.calMonth--;
        state.selectedDay = null; state.lastAnim = -1; updateCalendarInPlace();
      }}, ICON("chevLeft")),
      el("div", {class:"label cal-month-label"}, monthLabelText()),
      el("div", {class:"chev", onclick: () => {
        if (state.calMonth === 11) { state.calMonth = 0; state.calYear++; } else state.calMonth++;
        state.selectedDay = null; state.lastAnim = 1; updateCalendarInPlace();
      }}, ICON("chevRight")),

    const oldBlock = document.querySelector(".cal-block");

    if (!oldBlock || !label) { render(); return; }

    const scopeEmpId = isAdminLike(state.currentUser) ? null : state.currentUser.id;

    oldBlock.replaceWith(newBlock);

  // =============================================================
  // ROOT RENDER
  // =============================================================
  let _lastRenderedScreen = null;
  function render() {
    const scroll = document.getElementById("scrollRoot");
    // Only replay the screen-enter transition when we're actually navigating
    // to a new screen. Without this gate, every render() caused by a
    // dropdown toggle, button state update, or in-place mutation looks like
    // a full-page flash because the scroll area fades+shifts.
    if (state.screen !== _lastRenderedScreen) {
      // Pick the right entrance for the navigation kind:
      //   navDir > 0  → forward push (slide in from the right)
      //   navDir < 0  → back pop    (slide in from the left)
      //   navDir = 0  → tab swap    (cross-fade; siblings, not parent/child)
      // Reset all class candidates first so the previous screen's animation
      // doesn't bleed into the new one.
      scroll.classList.remove("screen-enter", "screen-enter-fwd", "screen-enter-back", "screen-enter-tab");
      scroll.classList.remove("mu-screen", "eu-screen", "roster-screen");
      void scroll.offsetWidth;
      let cls = "screen-enter";
      if (state.navDir > 0) cls = "screen-enter-fwd";
      else if (state.navDir < 0) cls = "screen-enter-back";
      else if (_lastRenderedScreen != null) cls = "screen-enter-tab";
      scroll.classList.add(cls);
      _lastRenderedScreen = state.screen;
      state.navDir = 0;
    }

    renderTopbar();
    renderFab();
    renderBottomBar();

    if (state.screen === "login") {
      renderLogin();
    } else if (state.screen === "employee_home") {
      renderEmployeeHome();
    } else if (state.screen === "history") {
      renderHistory();
    } else if (state.screen === "admin_home") {
      renderAdminHome();
    } else if (state.screen === "admin_employee") {
      renderAdminEmployee();
    } else if (state.screen === "manage_users") {
      renderManageUsers();
    } else if (state.screen === "edit_user") {
      renderEditUser();
    }

    renderModal();
  }

  // Close the account dropdown when the user taps anywhere outside it.
  // Children of the trigger / menu stop propagation so the menu survives
  // internal clicks.
  document.addEventListener("click", () => {

  // Keyboard-aware viewport: lift the bottom sheet (and anything that reads
  // --kb-inset) above the soft keyboard when it opens. iOS/Android both
  // overlay the keyboard on top of the layout viewport by default, so
  // elements anchored to the bottom end up hidden behind it. The
  // VisualViewport API reports the *visible* portion of the viewport; the
  // difference is the keyboard height.
  (function trackKeyboard() {
    const vv = window.visualViewport;
    if (!vv) return;
    const update = () => {
      const inset = Math.max(0, window.innerHeight - vv.height - vv.offsetTop);
      document.documentElement.style.setProperty("--kb-inset", inset + "px");
    };
    vv.addEventListener("resize", update);
    vv.addEventListener("scroll", update);
    update();
  })();

  loadDB().then(render).catch((err) => {
    console.error("Failed to load from the PunchCard API", err);
    const root = document.getElementById("scrollRoot");
    if (root) root.textContent = tr("apiUnreachable");
  });
</script>
