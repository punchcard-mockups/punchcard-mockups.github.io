<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,interactive-widget=resizes-content" />
<title>PunchCard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Azeret+Mono:wght@400;500;600;700&family=Gloock&family=Vollkorn:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<style>
  :root {
    --navy: #0D1B2A;
    --deep-blue: #1B2838;
    --slate: #2C3E50;
    --surface-dark: #1E293B;
    --surface-card: #263548;
    --surface-card-hi: #2e4058;
    --accent-blue: #3B82F6;
    --accent-blue-bright: #60A5FA;
    --accent-green: #10B981;
    --accent-green-light: #34D399;
    --accent-red: #EF4444;
    --accent-red-light: #F87171;
    --accent-amber: #F59E0B;
    --text-primary: #F1F5F9;
    --text-secondary: #94A3B8;
    --text-muted: #64748B;
    --outline-soft: rgba(148,163,184,.15);

    /* Employee colors — deep jewel tones, not pastel.
       Each sits in a distinct hue band, avoiding the semantic
       red/green/amber zones reserved for warnings/ok/pending. */
    --emp-1: #1D4ED8;  /* royal blue */
    --emp-2: #0F766E;  /* dark teal */
    --emp-3: #831843;  /* plum */
    --emp-4: #4338CA;  /* indigo-blue */
    --emp-5: #6D28D9;  /* deep violet */
    --emp-6: #A21CAF;  /* magenta */
    --emp-7: #0E7490;  /* deep cyan */
    --emp-8: #78350F;  /* dark bronze */
    --emp-9: #155E75;  /* teal-blue */
    --emp-10: #581C87; /* dark purple */
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: #0A1220;
    color: var(--text-primary);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Inter", system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  header.page {
    padding: 24px 32px 12px;
    display: flex;
    align-items: baseline;
    gap: 16px;
    flex-wrap: wrap;
  }
  header.page h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; margin: 0; }
  header.page p { margin: 0; color: var(--text-secondary); font-size: 13px; }

  .stage {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
    gap: 28px;
    padding: 12px 32px 60px;
    align-items: start;
  }

  /* Phone shell */
  .phone {
    justify-self: center;
    width: 380px;
    height: 780px;
    border-radius: 44px;
    background: var(--navy);
    padding: 14px;
    box-shadow: 0 30px 80px rgba(0,0,0,.5), 0 0 0 10px #0a0f1a, 0 0 0 11px #1e293b;
    position: relative;
  }
  .phone::before {
    content: "";
    position: absolute;
    top: 18px; left: 50%;
    transform: translateX(-50%);
    width: 110px; height: 26px;
    background: #000;
    border-radius: 14px;
    z-index: 5;
  }
  .screen {
    border-radius: 32px;
    background: var(--navy);
    overflow: hidden;
    position: relative;
    height: 100%;
    padding: 56px 18px 24px;
    display: flex;
    flex-direction: column;
  }
  .scroll {
    flex: 1;
    overflow-y: auto;
    overscroll-behavior: contain;
    padding: 0 6px;
    margin: 0 -6px;
  }
  .scroll::-webkit-scrollbar { width: 6px; }
  .scroll::-webkit-scrollbar-thumb { background: var(--surface-dark); border-radius: 3px; }

  /* Topbar */
  .topbar {
    display: flex;
    align-items: center;
    gap: 4px;
    height: 38px;
    margin-bottom: 6px;
  }
  .topbar .spacer { flex: 1; }
  .topbar .back {
    width: 44px; height: 44px;
    border-radius: 12px;
    display: grid; place-items: center;
    color: var(--text-secondary);
    cursor: pointer;
    touch-action: manipulation;
    transition: background 150ms ease, transform 100ms ease;
  }
  .topbar .back:hover { background: var(--surface-dark); color: var(--text-primary); }
  .topbar .back:active { transform: scale(.92); }
  .topbar .title { font-size: 15px; font-weight: 600; color: var(--text-primary); }
  .topbar .icon-btn {
    width: 44px; height: 44px;
    border-radius: 12px;
    display: grid; place-items: center;
    color: var(--text-secondary);
    cursor: pointer;
    touch-action: manipulation;
    position: relative;
    transition: background 150ms ease, transform 100ms ease;
  }
  .topbar .icon-btn:hover { background: var(--surface-dark); color: var(--text-primary); }
  .topbar .icon-btn:active { transform: scale(.92); }
  .lang-toggle {
    position: relative;
    display: inline-flex;
    align-items: center;
    min-height: 44px;
    background: var(--surface-dark);
    border-radius: 999px;
    padding: 4px;
    cursor: pointer;
    user-select: none;
    border: 1px solid var(--outline-soft);
    transition: background 150ms ease;
    touch-action: manipulation;
  }
  .lang-toggle:hover { background: var(--surface-card-hi); }
  .lang-toggle .slider {
    position: absolute;
    top: 4px; bottom: 4px;
    width: calc(50% - 4px);
    background: var(--accent-blue);
    border-radius: 999px;
    transition: transform 220ms cubic-bezier(.2,.8,.2,1);
    box-shadow: 0 2px 6px rgba(59,130,246,.3);
  }
  .lang-toggle.es .slider { transform: translateX(100%); }
  .lang-toggle .opt {
    position: relative;
    z-index: 1;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.5px;
    padding: 8px 12px;
    color: var(--text-secondary);
    transition: color 180ms ease;
    min-width: 26px;
    text-align: center;
  }
  .lang-toggle .opt.active { color: #fff; }

  /* Account dropdown — opened by tapping the sign-out icon. Replaces the old
     one-tap sign-out (which was too easy to mis-tap and wiped the session). */
  .user-trigger { overflow: visible; }
  .user-trigger.open { background: var(--surface-dark); color: var(--text-primary); }
  .user-menu {
    position: absolute;
    top: calc(100% + 6px);
    right: 0;
    min-width: 200px;
    background: var(--surface-card);
    border: 1px solid var(--outline-soft);
    border-radius: 14px;
    padding: 8px;
    box-shadow: 0 8px 24px rgba(0,0,0,.35), 0 2px 6px rgba(0,0,0,.2);
    z-index: 60;
    text-align: left;
    cursor: default;
    animation: fade-up 140ms ease both;
  }
  .user-menu-header {
    padding: 10px 12px 12px;
    border-bottom: 1px solid var(--outline-soft);
    margin-bottom: 6px;
  }
  .user-menu-greeting {
    font-size: 11px;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    font-weight: 600;
  }
  .user-menu-name {
    font-size: 15px;
    font-weight: 700;
    color: var(--text-primary);
    margin-top: 3px;
  }
  .user-menu-role {
    display: inline-block;
    margin-top: 6px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.5px;
    padding: 2px 8px;
    border-radius: 999px;
    background: var(--surface-dark);
    color: var(--text-secondary);
  }
  .user-menu-signout {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    min-height: 44px;
    padding: 0 12px;
    background: transparent;
    border: 0;
    color: var(--accent-red-light);
    font-size: 14px;
    font-weight: 600;
    font-family: inherit;
    text-align: left;
    border-radius: 10px;
    cursor: pointer;
    touch-action: manipulation;
    transition: background 120ms ease;
  }
  .user-menu-signout:active { background: var(--surface-dark); }
  @media (hover: hover) {
    .user-menu-signout:hover { background: var(--surface-dark); }
  }

  /* Greeting */
  .greeting { padding: 2px 6px 10px; }
  .greeting .hello { font-size: 15px; color: var(--text-secondary); }
  .greeting .name {
    font-size: 26px; font-weight: 700; letter-spacing: -0.4px;
  }
  .greeting .role {
    margin-top: 4px;
    font-size: 12px; font-weight: 700; letter-spacing: 0.4px;
    color: var(--accent-blue-bright);
    text-transform: uppercase;
  }
  .greeting .role.readonly { color: var(--accent-amber); }

  /* Month nav */
  .month-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 2px;
  }
  .month-nav .chev {
    width: 44px; height: 44px;
    border-radius: 12px;
    display: grid; place-items: center;
    color: var(--text-secondary);
    cursor: pointer;
    touch-action: manipulation;
    transition: background 150ms ease, transform 100ms ease;
  }
  .month-nav .chev:hover { background: var(--surface-dark); color: var(--text-primary); }
  .month-nav .chev:active { transform: scale(.92); }
  .month-nav .label { font-size: 17px; font-weight: 600; }

  /* Calendar */
  .cal { padding: 4px 2px 0; }
  .cal .dows {
    display: grid; grid-template-columns: repeat(7, 1fr); margin-bottom: 4px;
  }
  .cal .dows span {
    text-align: center;
    font-size: 10px; font-weight: 700;
    color: var(--text-secondary);
    letter-spacing: 0.6px;
  }
  .cal .grid { display: grid; grid-template-columns: repeat(7, 1fr); }
  .cal .cell {
    aspect-ratio: 1/1;
    padding: 2px;
    cursor: pointer;
    touch-action: manipulation;
    transition: transform 110ms cubic-bezier(.2,.8,.2,1);
  }
  .cal .cell:active { transform: scale(.92); }
  .cal .cell:active .inner { background: rgba(59,130,246,.18); }
  .cal .inner {
    width: 100%; height: 100%;
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    transition: background 120ms ease;
  }
  .cal .inner .num { font-size: 14px; font-weight: 500; color: var(--text-primary); }
  .cal .cell.empty .num { opacity: 0.3; font-weight: 400; }
  .cal .cell.has-shifts .num { font-weight: 600; }
  .cal .cell.today .inner { background: rgba(59,130,246,.12); }
  .cal .cell.today .num { font-weight: 700; }
  .cal .cell.selected .inner { background: var(--accent-blue); }
  .cal .cell.selected .num { color: #fff; font-weight: 700; }
  .cal .pair {
    font-size: 9px; font-weight: 700; line-height: 1;
    display: flex; align-items: center; gap: 3px;
    color: var(--accent-blue-bright);
  }
  .cal .pair .mid { color: var(--text-muted); font-weight: 500; }
  .cal .pair .emp { color: var(--accent-green-light); }
  .cal .cell.selected .pair,
  .cal .cell.selected .pair .mid,
  .cal .cell.selected .pair .emp { color: rgba(255,255,255,.9); }
  .cal .heat-1 .inner { background: rgba(59,130,246,.04); }
  .cal .heat-2 .inner { background: rgba(59,130,246,.08); }
  .cal .heat-3 .inner { background: rgba(59,130,246,.12); }
  .cal .heat-4 .inner { background: rgba(59,130,246,.16); }

  /* Day detail — table header */
  .day-detail {
    margin: 6px 0 0;
    padding: 12px;
    border-radius: 14px;
    background: rgba(44,62,80,0.6);
  }
  .day-detail .date-label {
    font-size: 12px; font-weight: 700; letter-spacing: 0.3px; margin-bottom: 8px;
  }
  .day-detail .no-shifts { font-size: 12px; color: var(--text-muted); }
  .dd-table { display: flex; flex-direction: column; }
  .dd-table .head {
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 10px;
    padding: 4px 2px 6px;
    font-size: 9px;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    font-weight: 700;
    color: var(--text-muted);
    border-bottom: 1px solid var(--outline-soft);
  }
  .dd-table .head .r { text-align: right; }
  .dd-table .trow {
    display: grid;
    grid-template-columns: 1fr auto auto;
    align-items: center;
    gap: 10px;
    padding: 7px 2px;
    border-bottom: 1px solid var(--outline-soft);
  }
  .dd-table .trow:last-of-type { border-bottom: 0; }
  .dd-table .nm {
    font-size: 13px; font-weight: 600;
    display: flex; align-items: center; gap: 8px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .dd-table .nm .sw { width: 4px; height: 16px; border-radius: 2px; flex: 0 0 auto; }
  .dd-table .tm {
    font-size: 12px; color: var(--text-secondary);
    font-variant-numeric: tabular-nums;
  }
  .dd-table .hrs {
    font-size: 13px; font-weight: 700;
    font-variant-numeric: tabular-nums;
    text-align: right; min-width: 34px;
  }
  .dd-table .cmt {
    grid-column: 1 / -1;
    font-size: 11px; color: var(--text-secondary);
    font-style: italic; margin-top: 2px; opacity: .8;
  }

  /* Info card */
  .info-card {
    background: var(--surface-card);
    border-radius: 16px;
    padding: 16px;
    margin-top: 12px;
  }
  .info-card.clickable { cursor: pointer; transition: background 150ms ease; }
  .info-card.clickable:hover { background: var(--surface-card-hi); }
  .info-card .row {
    display: flex; justify-content: space-evenly; gap: 8px;
  }
  .info-card .stat {
    display: flex; flex-direction: column; align-items: center; gap: 2px;
  }
  .info-card .stat .value {
    font-size: 24px; font-weight: 700; letter-spacing: -0.3px;
  }
  .info-card .stat .label {
    font-size: 10px; letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--text-secondary); font-weight: 600;
  }
  .info-card .stat.blue .value { color: var(--accent-blue-bright); }
  .info-card .stat.green .value { color: var(--accent-green-light); }
  .info-card .stat.amber .value { color: var(--accent-amber); }
  .info-card .stat.plain .value { color: var(--text-primary); }

  .info-card.legend .legend-list {
    display: flex; flex-direction: column; gap: 8px;
    margin-top: 10px;
    border-top: 1px solid var(--outline-soft);
    padding-top: 10px;
  }
  .emp-breakdown .brow {
    display: flex; align-items: center; gap: 10px; padding: 4px 0;
  }
  .emp-breakdown .brow .swatch {
    width: 10px; height: 10px; border-radius: 3px; flex: 0 0 auto;
  }
  .emp-breakdown .brow .name { flex: 1; font-size: 12px; }
  .emp-breakdown .brow .hrs {
    font-size: 11px; font-weight: 700;
    min-width: 34px; text-align: right;
    font-variant-numeric: tabular-nums;
  }

  /* Section header */
  .section-header {
    display: flex; align-items: baseline; justify-content: space-between;
    margin: 16px 4px 8px;
  }
  .section-header h3 { margin: 0; font-size: 16px; font-weight: 600; }
  .section-header small { font-size: 11px; color: var(--text-secondary); }

  /* Employee row card */
  .emp-row {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 16px;
    background: var(--surface-card);
    border-radius: 16px;
    margin-top: 10px;
    cursor: pointer;
    transition: background 150ms ease;
  }
  .emp-row:hover { background: var(--surface-card-hi); }
  .emp-row .av {
    width: 40px; height: 40px;
    border-radius: 50%;
    display: grid; place-items: center;
    font-weight: 700; font-size: 14px;
  }
  .emp-row .body { flex: 1; }
  .emp-row .name { font-size: 14px; font-weight: 600; }
  .emp-row .meta { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
  .emp-row .badge {
    font-size: 9px; font-weight: 700;
    padding: 3px 7px;
    border-radius: 999px;
    background: rgba(245,158,11,.2);
    color: var(--accent-amber);
    letter-spacing: 0.4px;
    margin-left: 6px;
  }
  .emp-row .chev { color: var(--text-secondary); }

  /* FAB */
  .fab {
    position: absolute;
    right: 28px; bottom: 28px;
    width: 56px; height: 56px;
    border-radius: 18px;
    background: var(--accent-blue);
    color: #fff;
    border: 0;
    display: grid; place-items: center;
    cursor: pointer;
    box-shadow: 0 10px 24px rgba(59,130,246,.3);
    transition: transform 120ms ease, filter 150ms ease;
    z-index: 5;
  }
  .fab:hover { filter: brightness(1.1); }
  .fab:active { transform: scale(.96); }
  .fab svg { width: 26px; height: 26px; }

  /* Login */
  .login-wrap {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 100%;
    padding: 20px 12px;
    gap: 20px;
  }
  .login-wrap .brand {
    font-size: 28px; font-weight: 800;
    letter-spacing: -0.6px;
    color: var(--text-primary);
    margin-top: auto;
  }
  .login-wrap .brand .accent { color: var(--accent-blue-bright); }
  .login-wrap .tag {
    color: var(--text-secondary);
    font-size: 13px;
    margin-top: -10px;
    margin-bottom: 10px;
  }
  .login-form {
    width: 100%;
    display: flex; flex-direction: column; gap: 10px;
  }
  .login-form input {
    background: var(--surface-card);
    border: 1px solid var(--outline-soft);
    border-radius: 12px;
    padding: 12px 14px;
    color: var(--text-primary);
    font-size: 14px;
    font-family: inherit;
    outline: none;
    transition: border-color 150ms ease;
  }
  .login-form input:focus { border-color: var(--accent-blue); }
  .login-form .go {
    background: linear-gradient(180deg, var(--accent-blue), #1d4ed8);
    color: #fff;
    border: 0;
    border-radius: 12px;
    padding: 13px;
    font-size: 14px; font-weight: 700; letter-spacing: 0.3px;
    cursor: pointer;
    margin-top: 6px;
    transition: transform 100ms ease, filter 150ms ease;
  }
  .login-form .go:hover { filter: brightness(1.1); }
  .login-form .go:active { transform: scale(.98); }
  .login-form .err {
    font-size: 12px; color: var(--accent-red-light);
    background: rgba(239,68,68,.08);
    border-radius: 10px;
    padding: 8px 10px;
  }
  .demo-accounts {
    width: 100%;
    padding: 12px;
    background: var(--surface-dark);
    border-radius: 12px;
    margin-top: auto;
  }
  .demo-accounts .demo-title {
    font-size: 10px; font-weight: 700; letter-spacing: 0.5px;
    color: var(--text-secondary);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .demo-chip {
    display: block;
    width: 100%;
    text-align: left;
    background: var(--surface-card);
    color: var(--text-primary);
    border: 1px solid var(--outline-soft);
    border-radius: 10px;
    padding: 8px 12px;
    margin-top: 6px;
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
    transition: background 150ms ease;
  }
  .demo-chip:hover { background: var(--surface-card-hi); }
  .demo-chip b { color: var(--accent-blue-bright); }
  .demo-chip .tag {
    float: right;
    font-size: 10px; font-weight: 700;
    padding: 2px 6px;
    border-radius: 999px;
    letter-spacing: 0.3px;
  }
  .demo-chip .tag.owner { background: rgba(139,92,246,.2); color: #c4b5fd; }
  .demo-chip .tag.admin { background: rgba(59,130,246,.2); color: var(--accent-blue-bright); }
  .demo-chip .tag.emp { background: rgba(16,185,129,.2); color: var(--accent-green-light); }
  .demo-chip .tag.readonly { background: rgba(245,158,11,.2); color: var(--accent-amber); }

  /* Clock-in flow */
  .big-cta {
    border: 0;
    width: 100%;
    height: 116px;
    border-radius: 24px;
    color: #fff;
    font-size: 18px; font-weight: 700;
    cursor: pointer;
    display: flex; flex-direction: column;
    gap: 4px; align-items: center; justify-content: center;
    letter-spacing: 0.3px;
    transition: transform 100ms ease, filter 150ms ease;
  }
  .big-cta:active { transform: scale(.985); }
  .big-cta.clock-in { background: linear-gradient(180deg, var(--accent-green), #059669); }
  .big-cta.clock-out { background: linear-gradient(180deg, var(--accent-red), #dc2626); }
  .big-cta.submit { background: linear-gradient(180deg, var(--accent-blue), #1d4ed8); }
  .big-cta.disabled {
    filter: grayscale(0.4) brightness(.7);
    cursor: not-allowed;
  }
  .big-cta svg { width: 32px; height: 32px; }

  .clock-card {
    display: flex; align-items: center; gap: 14px;
    padding: 18px 20px;
    background: var(--surface-card);
    border-radius: 18px;
  }
  .clock-card .pulse {
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--accent-green);
    position: relative;
  }
  .clock-card .pulse::after {
    content: "";
    position: absolute;
    inset: -6px;
    border-radius: 50%;
    background: var(--accent-green);
    opacity: .3;
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse {
    0% { transform: scale(.85); opacity: .35; }
    70% { transform: scale(1.5); opacity: 0; }
    100% { transform: scale(.85); opacity: 0; }
  }
  .clock-card .label {
    font-size: 11px; color: var(--text-secondary);
    letter-spacing: 0.4px; text-transform: uppercase; font-weight: 700;

  .shift-summary {

  .comment-field {

  /* Toast */
  .toast-wrap {
    position: absolute;
    left: 14px; right: 14px; bottom: 28px;
    display: flex; flex-direction: column; gap: 8px;
    pointer-events: none; z-index: 30;
  }
  .toast {
    background: var(--surface-card-hi);
    border: 1px solid var(--outline-soft);
    color: var(--text-primary);
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,.4);
    display: flex; gap: 10px; align-items: center;
    animation: toast-in 220ms ease both;
    pointer-events: auto;
  }
  .toast.leave { animation: toast-out 220ms ease both; }
  .toast .pill {
    background: var(--accent-blue);
    color: #fff;
    font-weight: 700;
    font-size: 10px; letter-spacing: 0.4px; text-transform: uppercase;
    padding: 3px 7px; border-radius: 999px;
  }
  .toast.success .pill { background: var(--accent-green); }
  .toast.warn .pill { background: var(--accent-amber); color: #000; }
  .toast.error .pill { background: var(--accent-red); }
  @keyframes toast-in {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes toast-out {
    from { opacity: 1; transform: translateY(0); }
    to   { opacity: 0; transform: translateY(8px); }
  }

  /* Month slide animation */
  .month-anim-next { animation: slide-left 260ms ease both; }
  .month-anim-prev { animation: slide-right 260ms ease both; }
  @keyframes slide-left {
    from { opacity: 0; transform: translateX(18px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  @keyframes slide-right {
    from { opacity: 0; transform: translateX(-18px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  /* Screen transition */
  .screen-enter { animation: fade-up 260ms ease both; }
  @keyframes fade-up {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Modal */
  .modal-scrim {
    position: absolute;
    inset: 0;
    background: rgba(5, 10, 20, .7);
    border-radius: 32px;
    display: grid; place-items: center;
    z-index: 20;
    animation: fade-in 180ms ease both;
  }
  @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
  .modal-card {
    background: var(--surface-card);
    border-radius: 22px;
    padding: 22px 20px;
    width: calc(100% - 36px);
    max-height: calc(100% - 40px);
    overflow-y: auto;
    animation: modal-in 220ms cubic-bezier(.2,.8,.2,1) both;
  }
  @keyframes modal-in {
    from { opacity: 0; transform: translateY(12px) scale(.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  /* Status pill entrance — applied as a one-shot class (.pop-in) after a
     button→pill swap so the newly-rendered pill scales in from zero. */
  @keyframes pillPop {
    0%   { opacity: 0; transform: scale(.55); }
    60%  { opacity: 1; transform: scale(1.12); }
    100% { opacity: 1; transform: scale(1); }
  }
  .status-pill.pop-in,
  .w-status.pop-in {
    animation: pillPop 360ms cubic-bezier(.34, 1.56, .64, 1);
    transform-origin: center;
  }
  .modal-card h3 {
    margin: 0 0 6px;
    font-size: 18px; font-weight: 700;
  }
  .modal-card p { margin: 0 0 14px; color: var(--text-secondary); font-size: 13px; }
  .modal-card input, .modal-card textarea, .modal-card select {
    display: block;
    width: 100%;
    background: var(--surface-dark);
    border: 1px solid var(--outline-soft);
    border-radius: 10px;
    padding: 10px 12px;
    color: var(--text-primary);
    font-size: 13px;
    font-family: inherit;
    margin-bottom: 10px;
    outline: none;
    transition: border-color 150ms ease;
  }
  .modal-card input:focus, .modal-card textarea:focus { border-color: var(--accent-blue); }

  /* Prevent iOS Safari from auto-zooming the viewport when a form field is
     focused. It only zooms if the focused field's computed font-size is under
     16px, so bump form fields to 16px on touch devices. Desktop stays compact. */
  @media (pointer: coarse) {
    .login-form input,
    .modal-card input,
    .modal-card textarea,
    .modal-card select { font-size: 16px; }
  }

  /* Bottom-sheet modal on narrow viewports (phones). On tablet/desktop the
     modal stays centered. Bottom sheet is the native pattern on both Android
     (Material) and iOS, and it keeps the confirm button in thumb reach.

     The --kb-inset variable is updated live by the VisualViewport JS below
     so the sheet lifts above the soft keyboard when a field inside it is
     focused. Without this, the keyboard overlays the sheet and hides the
     textarea + confirm button. */
  @media (max-width: 640px) {
    .modal-scrim {
      place-items: end stretch;
      padding: 0;
      padding-bottom: var(--kb-inset, 0px);
      transition: padding-bottom 180ms ease;
    }
    .modal-card {
      width: 100%;
      max-width: 100%;
      max-height: calc(88vh - var(--kb-inset, 0px));
      border-radius: 22px 22px 0 0;
      padding-bottom: max(22px, calc(env(safe-area-inset-bottom) + 12px));
      animation: sheet-in 260ms cubic-bezier(.2,.8,.2,1) both;
    }
    @keyframes sheet-in {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }
  }
  .modal-card .actions {
    display: flex; justify-content: flex-end; gap: 8px;
    margin-top: 6px;
  }
  .modal-card .btn {
    border: 0;
    background: transparent;
    color: var(--text-secondary);
    font-size: 13px; font-weight: 700;
    padding: 10px 16px;
    border-radius: 10px;
    cursor: pointer;
    font-family: inherit;
    transition: background 150ms ease, color 150ms ease;
  }
  .modal-card .btn:hover { background: var(--surface-dark); color: var(--text-primary); }
  .modal-card .btn.primary {
    background: var(--accent-blue); color: #fff;
  }
  .modal-card .btn.primary:hover { filter: brightness(1.1); background: var(--accent-blue); }
  .modal-card .btn.danger {
    background: rgba(239,68,68,.2); color: var(--accent-red-light);

  .modal-card .err {

    margin-bottom: 10px;

  /* History screen */
  .hist-shift-card {

    border-radius: 16px;
    padding: 14px 16px;

  /* History grouping */
  .hist-month-head {

  /* Map */
  .mini-map {
    position: relative;
    width: 100%;
    height: 180px;
    border-radius: 16px;
    overflow: hidden;
    margin-top: 10px;
    background: #0a1b2e;
  }
  .mini-map .tiles {
    position: absolute;
    inset: 0;
    display: grid;
  }
  .mini-map .tiles img,
  .mini-map .leaflet-tile {
    width: 100%; height: 100%;
    display: block;
    filter: hue-rotate(190deg) saturate(.35) brightness(.7) contrast(1.1);
  }
  .mini-map .leaflet-container { width: 100%; height: 100%; background: #0a1b2e; font: inherit; }
  .mini-map .pins {
    position: absolute; inset: 0;
    pointer-events: none;
  }
  .mini-map .pin,
  .mini-map .leaflet-marker-icon .pin {
    width: 16px; height: 16px;
    border-radius: 50%;
    border: 3px solid #fff;
    box-shadow: 0 0 0 2px rgba(0,0,0,.4), 0 2px 6px rgba(0,0,0,.5);
    box-sizing: border-box;
  }
  .mini-map .pins .pin {
    position: absolute;
    transform: translate(-50%, -50%);
  }
  .mini-map .pin.in { background: var(--accent-green); }
  .mini-map .pin.out { background: var(--accent-red); }
  .mini-map .legend {
    position: absolute;
    left: 10px; bottom: 10px;
    z-index: 500;
    pointer-events: none;
    display: flex; gap: 10px;
    font-size: 10px; font-weight: 600;
    background: rgba(13,27,42,.85);
    padding: 4px 8px;
    border-radius: 999px;
    backdrop-filter: blur(4px);
  }
  .mini-map .leaflet-bar a { border-radius: 0; }
  .mini-map.mini-map--locked::after {
    content: "Click map to enable scroll zoom";
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 12px; font-weight: 600;
    background: rgba(10, 27, 46, 0);
    pointer-events: none;
    opacity: 0;
    transition: opacity .18s ease, background .18s ease;
    z-index: 400;
  }
  .mini-map.mini-map--locked.show-hint::after {
    opacity: 1;
    background: rgba(10, 27, 46, .35);
  }
  .mini-map .legend span {
    display: inline-flex; align-items: center; gap: 4px;
  }
  .mini-map .legend span::before {
    content: ""; width: 7px; height: 7px; border-radius: 50%;
  }
  .mini-map .legend .in::before { background: var(--accent-green); }
  .mini-map .legend .out::before { background: var(--accent-red); }

  }
  .approvals-banner .icon svg { width: 20px; height: 20px; }
  .approvals-banner .body { flex: 1; }
  .approvals-banner .title { font-size: 13px; font-weight: 700; }
  .approvals-banner .meta { font-size: 11px; color: var(--text-secondary); margin-top: 1px; }

  /* Week submission card */
  .week-submit {
    background: var(--surface-card);
    border-radius: 16px;
    padding: 14px 16px;
    margin-top: 12px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .week-submit .head {
    display: flex; align-items: center; gap: 12px;
  }
  .week-submit .left { flex: 1; min-width: 0; }
  .week-submit .title { font-size: 13px; font-weight: 700; }
  .week-submit .sub { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
  .week-submit .btn,
  .past-weeks .prow .btn {
    background: var(--accent-blue);
    color: #fff;
    border: 0;
    font-size: 12px; font-weight: 700;
    padding: 8px 14px;
    border-radius: 10px;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: 0.3px;
    transition: filter 150ms ease;
  }
  .week-submit .btn:hover,
  .past-weeks .prow .btn:hover { filter: brightness(1.1); }
  .week-submit .btn:disabled {
    filter: grayscale(.5) brightness(.7);
    cursor: default;
  }
  .week-submit .status-pill {
    font-size: 10px; font-weight: 700; letter-spacing: 0.4px; text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 999px;
  }
  .week-submit .status-pill.pending { background: rgba(245,158,11,.2); color: var(--accent-amber); }
  .week-submit .status-pill.approved { background: rgba(16,185,129,.2); color: var(--accent-green-light); }
  .week-submit .attest {
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 4px;
    letter-spacing: 0.1px;
    line-height: 1.35;
  }
  .signoff-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin: 18px 4px 6px;
  }
  .past-weeks {
    background: var(--surface-card);
    border-radius: 16px;
    padding: 4px 4px;
    margin-top: 6px;
  }
  .past-weeks .prow {
    display: flex; flex-direction: column; gap: 8px;
    padding: 10px 12px;
    border-bottom: 1px solid var(--outline-soft);
  }
  .past-weeks .prow:last-child { border-bottom: 0; }
  .past-weeks .prow .head {
    display: flex; align-items: center; gap: 12px;
  }
  .past-weeks .prow .left { flex: 1; min-width: 0; }
  .past-weeks .prow .title { font-size: 12px; font-weight: 600; }
  .past-weeks .prow .sub {
    font-size: 10px;
    color: var(--text-secondary);
    margin-top: 1px;
    font-variant-numeric: tabular-nums;
  }
  .past-weeks .empty {
    font-size: 11px;
    color: var(--text-muted);
    text-align: center;
    padding: 10px;
    font-style: italic;
  }

  /* Approval row (in modal) */
  .approval-row {
    background: var(--surface-dark);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 8px;
  }
  .approval-row .top {
    display: flex; justify-content: space-between; align-items: center;
  }
  .approval-row .who { font-size: 13px; font-weight: 700; }
  .approval-row .total {
    font-size: 14px; font-weight: 700;
    color: var(--accent-blue-bright);
    font-variant-numeric: tabular-nums;
  }
  .approval-row .week { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }
  .approval-row .actions {
    display: flex; gap: 8px; margin-top: 10px;
  }
  .approval-row .actions button {
    flex: 1;
    font-family: inherit;
    border: 0;
    border-radius: 8px;
    padding: 8px 10px;
    font-size: 12px; font-weight: 700;
    cursor: pointer;
    transition: filter 150ms ease;
  }
  .approval-row .approve { background: var(--accent-green); color: #fff; }
  .approval-row .reject { background: rgba(239,68,68,.2); color: var(--accent-red-light); }
  .approval-row .approve:hover, .approval-row .reject:hover { filter: brightness(1.1); }

  /* Inline "why are you rejecting" form that swaps in for the actions row */
  .reject-form {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px dashed var(--outline-soft);
    animation: fade-in 180ms ease both;
  }
  .reject-reason-title {
    font-size: 11px;
    font-weight: 700;
    color: var(--accent-red-light);
    letter-spacing: 0.3px;
    margin-bottom: 6px;
  }
  .reject-reason-field {
    width: 100%;
    box-sizing: border-box;
    font-family: inherit;
    font-size: 12px;
    padding: 8px 10px;
    border-radius: 8px;
    border: 1px solid var(--outline-soft);
    background: var(--surface-dark);
    color: var(--text-primary);
    resize: vertical;
    min-height: 64px;
  }
  .reject-reason-field:focus { outline: 2px solid var(--accent-red-light); outline-offset: -1px; }
  .reject-reason-err {
    font-size: 11px;
    color: var(--accent-red-light);
    margin-top: 4px;
  }
  .reject-form-actions {
    display: flex; gap: 8px; margin-top: 8px;
  }
  .reject-form-actions button {
    flex: 1;
    font-family: inherit;
    border: 0;
    border-radius: 8px;
    padding: 8px 10px;
    font-size: 12px; font-weight: 700;
    cursor: pointer;
    transition: filter 150ms ease;
    background: rgba(239,68,68,.2);
    color: var(--accent-red-light);
  }
  .reject-form-actions button.confirm {
    background: var(--accent-red, #ef4444);
    color: #fff;
  }
  .reject-form-actions button:hover { filter: brightness(1.1); }

  /* Rejection notice shown to the employee (on weekSignoffCard + past-week row)
     with the admin's reason for rejecting. */
  .rejection-notice {
    background: rgba(239,68,68,.08);
    border: 1px dashed rgba(239,68,68,.35);
    border-radius: 10px;
    padding: 8px 12px;
    animation: fade-in 220ms ease both;
  }
  .rejection-notice .label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--accent-red-light, #fca5a5);
    margin-bottom: 2px;
  }
  .rejection-notice .reason {
    font-size: 12px;
    font-style: italic;
    color: var(--text-primary);
    line-height: 1.35;
  }
  /* Rejected past-week rows get a subtle red left accent */
  .past-weeks .prow.rejected {
    box-shadow: inset 3px 0 0 var(--accent-red, #ef4444);
  }

  /* Admin edit audit log on the shift detail screen */
  .sd-admin-log {
    display: flex; flex-direction: column; gap: 10px;
    margin-top: 6px;
  }
  .sd-admin-log-entry {
    background: var(--surface-dark);
    border-left: 3px solid var(--accent-amber);
    border-radius: 6px;
    padding: 8px 10px;
  }
  .sd-admin-log-entry .meta {
    display: flex; align-items: baseline; justify-content: space-between;
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.3px;
    margin-bottom: 4px;
  }
  .sd-admin-log-entry .meta .who {
    font-weight: 700;
    color: var(--accent-amber);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .sd-admin-log-entry .diff {
    font-size: 12px;
    font-variant-numeric: tabular-nums;
    margin-bottom: 4px;
  }
  .sd-admin-log-entry .diff .before {
    color: var(--text-muted);
    text-decoration: line-through;
  }
  .sd-admin-log-entry .diff .arrow {
    margin: 0 8px;
    color: var(--text-muted);
  }
  .sd-admin-log-entry .diff .after {
    font-weight: 700;
    color: var(--text-primary);
  }
  .sd-admin-log-entry .reason {
    font-size: 11px;
    font-style: italic;
    color: var(--text-secondary);
    line-height: 1.35;
  }

  /* "Approved — locked for editing" notice shown to the employee when they
     try to open a shift in an admin-approved week. */
  .sd-locked-notice {
    margin-top: 8px;
    padding: 10px 12px;
    font-size: 12px;
    color: var(--accent-green-light);
    background: rgba(16,185,129,.08);
    border: 1px dashed rgba(16,185,129,.35);
    border-radius: 8px;
    text-align: center;
    font-weight: 600;
    letter-spacing: 0.2px;
  }

  /* "✎" admin-edit marker on a shift card — placed next to the date so the
     user can see which specific day was edited without opening the detail. */
  .hist-shift-card .edit-badge {
    display: inline-grid;
    place-items: center;
    width: 20px; height: 20px;
    border-radius: 50%;
    background: var(--accent-amber);
    color: #1a1a1a;
    font-size: 11px;
    font-weight: 700;
    margin-left: 2px;
    flex: 0 0 auto;
  }
  .hist-shift-card.edited {
    box-shadow: inset 3px 0 0 var(--accent-amber);
  }
  .approval-row .top.expandable,
  .hist-week-head.expandable {
    cursor: pointer;
    user-select: none;
    transition: background 120ms ease;
  }
  .approval-row .top.expandable {
    margin: -12px -14px 0;
    padding: 12px 14px;
    border-radius: 12px 12px 0 0;
  }
  .approval-row .top.expandable:hover { background: rgba(255,255,255,.04); }
  .hist-week-head.expandable {
    padding: 4px 6px;
    margin: 14px -2px 0;
    border-radius: 8px;
  }
  .hist-week-head.expandable:hover { background: rgba(0,0,0,.03); }
  .approval-row .total { display: flex; align-items: center; gap: 8px; }
  .chevron {
    font-size: 10px; color: var(--text-muted);
    transition: transform 150ms ease;
    display: inline-block;
  }
  .chevron.up { transform: rotate(180deg); }

  /* Shared shift breakdown list */
  .breakdown {
    display: flex; flex-direction: column; gap: 8px;
  }
  .breakdown .drow {
    display: grid;
    grid-template-columns: 64px 1fr auto;
    column-gap: 10px;
    row-gap: 2px;
    align-items: baseline;
    font-size: 12px;
  }
  .breakdown .drow .d {
    color: var(--text-secondary);
    font-variant-numeric: tabular-nums;
    font-weight: 600;
  }
  .breakdown .drow .t {
    color: var(--text-primary);
    font-variant-numeric: tabular-nums;
  }
  .breakdown .drow .h {
    color: var(--accent-blue-bright);
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    text-align: right;
  }
  .breakdown .drow .c {
    grid-column: 2 / -1;
    font-size: 11px;
    color: var(--text-muted);
    font-style: italic;
  }
  .breakdown .empty {
    font-size: 11px;
    color: var(--text-muted);
    font-style: italic;
    text-align: center;
    padding: 4px 0;
  }
  /* When breakdown appears inside another card, add a divider on top */
  .approval-row .breakdown,
  .week-submit .breakdown,
  .past-weeks .prow .breakdown {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px dashed var(--outline-soft);
  }

  /* Read-only badge */
  .readonly-banner {
    background: rgba(245,158,11,.1);
    border: 1px dashed rgba(245,158,11,.35);
    color: var(--accent-amber);
    font-size: 11px;
    padding: 6px 10px;
    border-radius: 10px;
    margin-top: 6px;
    font-weight: 600;
    letter-spacing: 0.3px;
    display: flex; gap: 6px; align-items: center;
  }
  .readonly-banner svg { width: 14px; height: 14px; }

  /* Sidebar */
  .side {
    padding: 0 8px;
  }
  .phone-caption {
    text-align: center;
    color: var(--text-secondary);
    font-size: 12px;
    margin-top: 10px;
    font-weight: 600;
  }
  .phone-caption b { color: var(--text-primary); }
  .info-panel {
    margin-top: 16px;
    background: var(--surface-dark);
    border-radius: 16px;
    padding: 16px;
    color: var(--text-secondary);
    font-size: 13px;
    line-height: 1.55;
  }
  .info-panel h3 {
    margin: 0 0 8px;
    color: var(--text-primary);
    font-size: 14px;
    font-weight: 700;
  }
  .info-panel ul { margin: 0; padding-left: 18px; }
  .info-panel li { margin: 4px 0; }
  .info-panel code {
    background: var(--surface-card);
    padding: 1px 5px; border-radius: 4px;
    font-size: 12px;
  }

  .todo-list { display: flex; flex-direction: column; gap: 6px; }
  .todo-list .item {
    display: flex; gap: 8px; align-items: flex-start;
  }
  .todo-list .check {
    flex: 0 0 auto;
    width: 16px; height: 16px; border-radius: 4px;
    display: grid; place-items: center;
    margin-top: 2px;
  }
  .todo-list .check.done { background: var(--accent-green); }
  .todo-list .check.done::after { content: "✓"; color: #fff; font-size: 11px; font-weight: 700; }
  .todo-list .check.discuss { background: rgba(148,163,184,.2); color: var(--text-secondary); border: 1px dashed var(--outline-soft); }
  .todo-list .check.discuss::after { content: "?"; font-size: 11px; font-weight: 700; }
  .todo-list .txt { font-size: 12px; }
  .todo-list .txt b { color: var(--text-primary); }

  /* =========================================================
     THEME SWITCH (page header)
     ========================================================= */
  .theme-switch {
    margin-left: auto;
    display: inline-flex;
    background: var(--surface-dark);
    border: 1px solid var(--outline-soft);
    border-radius: 999px;
    padding: 3px;
    gap: 2px;
    user-select: none;
  }
  .theme-switch .opt {
    border: 0;
    background: transparent;
    color: var(--text-secondary);
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.2px;
    padding: 6px 14px;
    border-radius: 999px;
    cursor: pointer;
    transition: background 220ms ease, color 220ms ease;
    white-space: nowrap;
  }
  .theme-switch .opt:hover { color: var(--text-primary); }
  .theme-switch .opt.active {
    background: var(--accent-blue);
    color: #fff;
  }

  /* =========================================================
     SHARED: common tweaks applied to all non-default themes
     ========================================================= */
  body.theme-minimal,
  body.theme-warm,
  body.theme-nordic,
  body.theme-tactile {
    background: var(--t-bg);
  }

  /* =========================================================
     THEME: MINIMALIST  — Linear-ish, high contrast
     Off-white, near-black ink, electric orange accent.
     Red Hat Display / Red Hat Text + Azeret Mono.
     ========================================================= */
  body.theme-minimal {
    --t-bg: oklch(97% 0.004 250);
    --navy: oklch(99% 0.003 250);
    --deep-blue: oklch(94% 0.005 250);
    --surface-dark: oklch(95% 0.004 250);
    --surface-card: oklch(99% 0.003 250);
    --surface-card-hi: oklch(96% 0.005 250);
    --accent-blue: oklch(62% 0.2 45);
    --accent-blue-bright: oklch(55% 0.21 45);
    --accent-green: oklch(55% 0.14 160);
    --accent-green-light: oklch(50% 0.15 160);
    --accent-red: oklch(55% 0.19 28);
    --accent-red-light: oklch(52% 0.18 28);
    --accent-amber: oklch(70% 0.16 75);
    --text-primary: oklch(18% 0.01 250);
    --text-secondary: oklch(42% 0.01 250);
    --text-muted: oklch(62% 0.01 250);
    --outline-soft: oklch(89% 0.005 250);

    --tf-display: "Red Hat Display", system-ui, sans-serif;
    --tf-body: "Red Hat Text", system-ui, sans-serif;
    --tf-mono: "Azeret Mono", ui-monospace, monospace;
    font-family: var(--tf-body);
    color: var(--text-primary);
  }
  body.theme-minimal .phone {
    background: var(--t-bg);
    box-shadow:
      0 24px 60px oklch(18% 0.01 250 / .12),
      0 0 0 1px oklch(88% 0.005 250),
      0 0 0 10px oklch(94% 0.005 250);
  }
  body.theme-minimal .phone::before { background: oklch(18% 0.01 250); }
  body.theme-minimal .screen { background: var(--t-bg); }
  body.theme-minimal .topbar .title,
  body.theme-minimal .greeting .name,
  body.theme-minimal .month-nav .label,
  body.theme-minimal .section-header h3,
  body.theme-minimal .modal-card h3,
  body.theme-minimal .login-wrap .brand,
  body.theme-minimal .approvals-banner .title,
  body.theme-minimal .week-submit .title,
  body.theme-minimal .info-panel h3 {
    font-family: var(--tf-display);
    font-weight: 800;
    letter-spacing: -0.8px;
  }
  body.theme-minimal .greeting .name { font-size: 30px; }
  body.theme-minimal .login-wrap .brand { font-size: 40px; }
  body.theme-minimal .info-card .stat .value,
  body.theme-minimal .cal .inner .num,
  body.theme-minimal .cal .pair,
  body.theme-minimal .dd-table .tm,
  body.theme-minimal .dd-table .hrs,
  body.theme-minimal .clock-card .time,
  body.theme-minimal .shift-summary .time,
  body.theme-minimal .shift-summary .total .value,
  body.theme-minimal .hist-shift-card .hrs,
  body.theme-minimal .hist-shift-card .chip,
  body.theme-minimal .emp-breakdown .brow .hrs,
  body.theme-minimal .approval-row .total,
  body.theme-minimal .week-submit .sub {
    font-family: var(--tf-mono);
    font-feature-settings: "tnum" 1;
    letter-spacing: -0.6px;
  }
  body.theme-minimal .greeting .hello { color: var(--text-secondary); font-weight: 400; }
  body.theme-minimal .greeting .role {
    background: var(--text-primary);
    color: oklch(98% 0.003 250);
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 3px;
    font-size: 10px;
    letter-spacing: 1.4px;
    display: inline-block;
  }
  body.theme-minimal .greeting .role.readonly {
    background: var(--accent-amber);
    color: var(--text-primary);
  }
  body.theme-minimal .topbar .lang-toggle,
  body.theme-minimal .topbar .icon-btn,
  body.theme-minimal .topbar .back,
  body.theme-minimal .month-nav .chev {
    color: var(--text-primary);
  }
  body.theme-minimal .lang-toggle {
    background: oklch(94% 0.005 250);
    border: 1px solid var(--outline-soft);
  }
  body.theme-minimal .lang-toggle .slider { background: var(--text-primary); box-shadow: none; }
  body.theme-minimal .topbar .icon-btn:hover,
  body.theme-minimal .topbar .back:hover,
  body.theme-minimal .month-nav .chev:hover {
    background: oklch(93% 0.005 250);
  }
  body.theme-minimal .info-card {
    background: oklch(99% 0.003 250);
    border: 1px solid var(--outline-soft);
    border-radius: 6px;
    box-shadow: none;
  }
  body.theme-minimal .info-card .stat .value { font-size: 30px; font-weight: 600; }
  body.theme-minimal .info-card .stat .label { font-size: 9px; letter-spacing: 1.2px; }
  body.theme-minimal .info-card .stat.blue .value { color: var(--accent-blue); }
  body.theme-minimal .info-card .stat.green .value { color: var(--accent-green); }
  body.theme-minimal .info-card .stat.amber .value { color: var(--accent-amber); }
  body.theme-minimal .info-card .stat.plain .value { color: var(--text-primary); }
  body.theme-minimal .info-card.legend .legend-list {
    border-top: 1px solid var(--outline-soft); padding-top: 12px;
  }
  body.theme-minimal .emp-breakdown .brow .name { font-size: 13px; font-weight: 500; }
  /* Calendar */
  body.theme-minimal .cal .dows span {
    color: var(--text-muted);
    font-size: 10px;
    letter-spacing: 1.2px;
    font-weight: 600;
  }
  body.theme-minimal .cal .inner { border-radius: 4px; }
  body.theme-minimal .cal .cell.today .inner {
    background: transparent;
    outline: 1.5px solid var(--accent-blue);
    outline-offset: -2px;
  }
  body.theme-minimal .cal .cell.today .num { color: var(--accent-blue); font-weight: 700; }
  body.theme-minimal .cal .cell.selected .inner { background: var(--accent-blue); }
  body.theme-minimal .cal .pair { color: var(--accent-blue); font-weight: 600; }
  body.theme-minimal .cal .pair .emp { color: var(--text-primary); }
  body.theme-minimal .cal .heat-1 .inner { background: oklch(95% 0.02 50); }
  body.theme-minimal .cal .heat-2 .inner { background: oklch(92% 0.05 50); }
  body.theme-minimal .cal .heat-3 .inner { background: oklch(88% 0.08 50); }
  body.theme-minimal .cal .heat-4 .inner { background: oklch(82% 0.12 50); }
  /* Day detail */
  body.theme-minimal .day-detail {
    background: oklch(99% 0.003 250);
    border: 1px solid var(--outline-soft);
    border-radius: 6px;
  }
  body.theme-minimal .day-detail .date-label {
    font-family: var(--tf-display); font-weight: 700;
    font-size: 14px; letter-spacing: -0.3px;
    text-transform: none;
  }
  body.theme-minimal .dd-table .head {
    color: var(--text-muted); font-size: 10px; letter-spacing: 1px;
    border-bottom: 1px solid var(--outline-soft);
  }
  body.theme-minimal .dd-table .nm { font-weight: 600; }
  body.theme-minimal .dd-table .trow { border-bottom: 1px solid var(--outline-soft); }
  /* Section */
  body.theme-minimal .section-header { border-bottom: 1px solid var(--outline-soft); padding-bottom: 6px; }
  body.theme-minimal .section-header h3 { font-size: 18px; }
  body.theme-minimal .section-header small {
    font-family: var(--tf-mono); letter-spacing: 1px; font-size: 10px; text-transform: uppercase;
  }
  /* Emp row */
  body.theme-minimal .emp-row {
    background: transparent;
    border: 0;
    border-bottom: 1px solid var(--outline-soft);
    border-radius: 0;
    padding: 14px 6px;
    margin-top: 0;
  }
  body.theme-minimal .emp-row:hover { background: oklch(95% 0.005 250); }

  /* =========================================================
     APP SHELL — overrides for real app page
     Fixed to viewport edges so it can never overflow.
     Works on any device by definition.
     ========================================================= */
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    overscroll-behavior: none;
  }
  body {
    background: var(--navy);
  }

  .app-root {
    position: fixed;
    inset: 0;
    background: var(--navy);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .version-tag {
    position: absolute;
    top: max(6px, env(safe-area-inset-top, 0px));
    left: max(8px, env(safe-area-inset-left, 0px));
    font-size: 9px;
    font-family: ui-monospace, Menlo, monospace;
    color: var(--text-muted);
    opacity: 0.45;
    letter-spacing: 0.3px;
    pointer-events: none;
    user-select: none;
    z-index: 50;
  }

  .topbar {
    padding: 14px 18px 0;
    height: auto;
    min-height: 44px;
    box-sizing: content-box;
    flex: 0 0 auto;
    margin-bottom: 0;
    /* The scroll area below gets transform-based screen-enter animations
       which create a stacking context — without this, dropdowns anchored
       inside the topbar (account menu) would paint behind the scroll. */
    position: relative;
    z-index: 10;
  }

  .scroll {
    flex: 1 1 auto;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 6px 22px 24px 20px;
    margin: 0;
    -webkit-overflow-scrolling: touch;
  }
  /* Prevent any child from forcing horizontal overflow */
  .scroll > * { max-width: 100%; box-sizing: border-box; }

  /* Calendar cells must shrink with the viewport, not expand to content.
     Without `minmax(0, 1fr)` the grid widens when a cell's content (e.g. the
     day-detail expansion spanning 7 columns) has a larger intrinsic size. */
  .cal .grid { grid-template-columns: repeat(7, minmax(0, 1fr)); }
  .day-detail-slot { min-width: 0; overflow: hidden; }
  .day-detail { max-width: 100%; box-sizing: border-box; }
  .dd-table,
  .dd-table .head,
  .dd-table .trow,
  .dd-table .nm { min-width: 0; }
  .dd-table .tm { min-width: 0; white-space: nowrap; }
  /* Approval row, employee row, etc. all need the safety too */
  .info-card, .emp-row, .hist-shift-card, .approvals-banner,
  .week-submit, .clock-card, .shift-summary { min-width: 0; }

  /* Toast / FAB / Modal stay anchored to the shell */
  .toast-wrap {
    position: absolute;
    left: 14px;
    right: 14px;
    bottom: 20px;
  }
  .fab {
    position: absolute;
    right: 20px;
    bottom: 24px;
  }
  .modal-scrim {
    position: absolute;
    inset: 0;
    border-radius: 0;
  }

  /* Safe-area respect on iOS phones (notch / home indicator) */
  @supports (padding: max(0px)) {
    .topbar {
      padding-top: max(14px, env(safe-area-inset-top));
      padding-left: max(18px, env(safe-area-inset-left));
      padding-right: max(18px, env(safe-area-inset-right));
    }
    .scroll {
      padding-left: max(20px, env(safe-area-inset-left));
      padding-right: max(22px, env(safe-area-inset-right));
      padding-bottom: max(24px, env(safe-area-inset-bottom));
    }
    .toast-wrap {
      bottom: max(20px, env(safe-area-inset-bottom));
    }
    .fab {
      bottom: max(24px, calc(env(safe-area-inset-bottom) + 8px));
    }
  }

  /* Sticky-hover fix for touch devices.
     On iOS Safari (and some Android browsers) a tap triggers :hover and the
     hover style remains painted until the user taps elsewhere. On elements
     where hover adds a visible background/color, that leaves a "ghost"
     highlight on the previously-tapped control. Neutralise those specific
     hover effects when the device has no hover pointer. :active still fires
     for press feedback. */
  @media (hover: none) {
    .topbar .back:hover,
    .topbar .icon-btn:hover,
    .month-nav .chev:hover,
    body[class*="theme-"] .topbar .back:hover,
    body[class*="theme-"] .topbar .icon-btn:hover,
    body[class*="theme-"] .month-nav .chev:hover {
      background: transparent;
      color: var(--text-secondary);
    }
    .lang-toggle:hover { background: var(--surface-dark); }
    .info-card.clickable:hover { background: var(--surface-card); }
    .emp-row:hover,
    body[class*="theme-"] .emp-row:hover {
      background: var(--surface-card);

    }
    .demo-chip:hover,

    .approval-row .top.expandable:hover { background: transparent; }
    .hist-week-head.expandable:hover { background: transparent; }
    .theme-switch .opt:hover { color: var(--text-secondary); }
    .modal-card .btn:hover { background: transparent; color: var(--text-secondary); }
  }

<div class="app-root">
  <div class="version-tag" id="versionTag">v.2026-04-14.1230</div>

  <div class="toast-wrap" id="toastWrap"></div>
  <div id="modalRoot"></div>
</div>

<script>
    // =============================================================
  // STATE
  // =============================================================
  const state = {
    currentUser: null,
    screen: "login",
    viewingEmployeeId: null,
    nav: [],            // screen history for back button
    lang: "en",
    // calendar
    calYear: 2026,
    calMonth: 3,
    selectedDay: null,
    lastAnim: 0,
    // clock flow (employee)
    clock: "idle",
    clockIn: null,
    clockOut: null,
    clockInCoord: null,
    clockOutCoord: null,
    clockInTz: null,
    clockOutTz: null,
    comment: "",
    // modals
    modal: null,        // "addEmployee" | "approvals" | "submitWeek"
    // drill-in: "empId:weekStart" of approval row currently expanded in approvals modal
    expandedApproval: null,
    // history week-expansion: Set<weekStart>. Lazy-init to { thisWeekStart() }.
    expandedHistoryWeeks: null,
    // user menu (account dropdown) open state
    userMenuOpen: false,
    // flashing toast for banner animation
  };

  // =============================================================
  // DATA
  // =============================================================

  const users = [
    // Employee colors chosen to avoid overlap with semantic colors
    // (accent = action, green = approved/ok, red = warn, amber = pending).
    // Roles: owner > admin > readonly > employee.
    // Owner and admin can approve; readonly can view only; employees clock in/out.
    // Owner (Alejandra)
    { id: 1, username: "alee",   password: "1234",  displayName: "Alejandra A.", role: "owner",   color: "var(--emp-3)"  }, // plum
    // Admins (backup approvers)
    { id: 2, username: "admin2", password: "1234",  displayName: "Marisol G.",   role: "admin",   color: "var(--emp-5)"  }, // violet
    { id: 3, username: "admin3", password: "1234",  displayName: "Carlos N.",    role: "admin",   color: "var(--emp-10)" }, // dark purple
    // Read-only (accountants)
    { id: 4, username: "acct1",  password: "1234",  displayName: "Accountant",   role: "readonly", color: "var(--emp-8)" }, // bronze
    { id: 5, username: "acct2",  password: "1234",  displayName: "Bookkeeper",   role: "readonly", color: "var(--emp-9)" }, // teal-blue
    // Employees (clock in/out)
    { id: 6, username: "maria",  password: "1234",  displayName: "Maria R.",     role: "employee", color: "var(--emp-2)" }, // dark teal
    { id: 7, username: "jose",   password: "1234",  displayName: "Jose A.",      role: "employee", color: "var(--emp-1)" }, // royal blue
    { id: 8, username: "luis",   password: "1234",  displayName: "Luis F.",      role: "employee", color: "var(--emp-6)" }, // magenta
  ];
  const userById = Object.fromEntries(users.map(u => [u.id, u]));
  const employees = () => users.filter(u => u.role === "employee");

  // Shifts: id, empId, date (YYYY-MM-DD), start, end, hours, comment, coords
  // Curated April 2026 data (roughly matches prior mockup)
  let nextShiftId = 100;
  const shifts = [];
  function addShift({empId, date, start, end, comment="", loc, tz}) {
    const [sh, sm] = start.split(":").map(Number);
    const [eh, em] = end.split(":").map(Number);
    const hours = ((eh*60+em) - (sh*60+sm)) / 60;
    shifts.push({
      id: nextShiftId++,
      empId, date, start, end, hours, comment,
      clockIn: loc?.in || null,
      clockOut: loc?.out || null,
      clockInTz: tz?.in || null,
      clockOutTz: tz?.out || null,
    });
  }

  // IANA timezone of the device at call time. Falls back to null if
  // Intl isn't available (very old browsers).
  function currentTimezone() {
    try {
      return Intl.DateTimeFormat().resolvedOptions().timeZone || null;
    } catch {
      return null;
    }
  }

  // Short timezone name ("EDT", "PST", "CEST", etc.) for display. Falls back to
  // the IANA string if the short name can't be resolved for any reason.
  function tzShort(tz, when) {
    if (!tz) return "";
    try {
      const parts = new Intl.DateTimeFormat("en", {
        timeZone: tz,
        timeZoneName: "short",
      }).formatToParts(when || new Date());
      const p = parts.find(x => x.type === "timeZoneName");
      return p ? p.value : tz;
    } catch {
      return tz;
    }
  }

  // Fake business next to the Pentagon (Arlington, VA)
  const BIZ = { lat: 38.87185, lng: -77.0563 };
  function gpsNoteText(coord) {
    if (!coord) return "Locating…";
    return `📍 ${coord.lat.toFixed(5)}, ${coord.lng.toFixed(5)}`;
  }

  // Real-GPS capture. Returns a promise that resolves to one of:
  //   { lat, lng, real: true }                  — user granted, coord captured
  //   { real: false, reason: "blocked" }        — site permission is cached as denied; browser won't prompt
  //   { real: false, reason: "declined" }       — user saw the prompt and chose not to allow
  //   { real: false, reason: "unavailable" }    — position couldn't be determined (OS Location Services off, GPS hardware unavailable, etc.)
  //   { real: false, reason: "timeout" }        — browser gave up acquiring a position
  //   { real: false, reason: "unsupported" }    — browser has no geolocation API
  //
  // Notes:
  //  - We check `navigator.permissions` first so we can distinguish "cached denied" (won't re-prompt)
  //    from "user declined just now". Different messages, different remediation.
  //  - We explicitly do NOT set enableHighAccuracy:true. That forces GPS and fails often indoors / in
  //    dense urban areas; the default (Wi-Fi / IP) is plenty for a "did you clock in where you said
  //    you did" map pin and works almost everywhere.
  //  - No outer timeout from our side — the native permission prompt can sit open for 10+ seconds on
  //    mobile, and racing it silently discards the user's answer. The browser's own timeout below
  //    handles the acquire-position phase.
  async function getCurrentCoord() {
    if (!navigator.geolocation) {
      console.warn("[gps] navigator.geolocation is not available");
      return { real: false, reason: "unsupported" };
    }

    // Pre-check permission state (supported in Chrome/Firefox/Edge; modern Safari as of 16+).
    let permState = "prompt";
    if (navigator.permissions && navigator.permissions.query) {
      try {
        const r = await navigator.permissions.query({ name: "geolocation" });
        permState = r.state;
      } catch (e) {
        console.info("[gps] permissions.query unsupported; falling through", e);
      }
    }
    console.info("[gps] permission state:", permState);

    if (permState === "denied") {
      // Browser has this site blocked — getCurrentPosition will fail instantly with no prompt.
      return { real: false, reason: "blocked" };
    }

    return new Promise((resolve) => {
      navigator.geolocation.getCurrentPosition(
        (pos) => {
          console.info("[gps] position acquired:", pos.coords.latitude, pos.coords.longitude, `±${Math.round(pos.coords.accuracy)}m`);
          resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude, real: true });
        },
        (err) => {
          console.warn("[gps] getCurrentPosition error:", err.code, err.message);
          // code 1 PERMISSION_DENIED can mean either the user just declined, or (on some
          // OSes) the browser was allowed at site level but the OS blocked it. We use
          // `permState === "prompt"` above as a rough signal: if the permission state was
          // "prompt" moments ago and we got code 1, the user almost certainly just declined.
          let reason;
          if (err.code === 1) reason = permState === "prompt" ? "declined" : "blocked";
          else if (err.code === 2) reason = "unavailable";
          else if (err.code === 3) reason = "timeout";
          else reason = "unknown";
          resolve({ real: false, reason });
        },
        { enableHighAccuracy: false, timeout: 20000, maximumAge: 30000 }
      );
    });
  }

  // Map a getCurrentCoord() result to a user-facing toast.
  function gpsToast(result, action) {
    if (result.real) {
      return { msg: `${action} location captured`, kind: "success", pill: "📍" };
    }
    const reasons = {
      blocked:     "Location blocked — enable it for this site in your browser settings",
      declined:    "Location not shared",
      unavailable: "Location unavailable — check that Location Services are on",
      timeout:     "Location timed out — try again",
      unsupported: "Location not supported by this browser",
      unknown:     "Location not captured",
    };
    return { msg: reasons[result.reason] || reasons.unknown, kind: "warn", pill: "⚠" };
  }

  // Seed a few deterministic locations so map isn't flickery
  const FIXED_LOCS = [
    { in:{lat:38.87195, lng:-77.05618}, out:{lat:38.87173, lng:-77.05642} },
    { in:{lat:38.87168, lng:-77.05655}, out:{lat:38.87190, lng:-77.05612} },
    { in:{lat:38.87201, lng:-77.05602}, out:{lat:38.87178, lng:-77.05675} },
    { in:{lat:38.87160, lng:-77.05631}, out:{lat:38.87205, lng:-77.05608} },
    { in:{lat:38.87218, lng:-77.05660}, out:{lat:38.87182, lng:-77.05599} },
    { in:{lat:38.87155, lng:-77.05592}, out:{lat:38.87198, lng:-77.05650} },
  ];
  let locIdx = 0;
  const nextLoc = () => FIXED_LOCS[(locIdx++) % FIXED_LOCS.length];

  // Seed April 2026 shifts
  const aprilPattern = [
    [1, 2, "07:30","15:30"],
    [1, 2, "08:00","16:00"],
    [2, 2, "09:00","17:00"],
    [3, 2, "07:30","15:00"],
    [3, 3, "08:30","17:30"],
    [6, 2, "08:00","13:30", "Left early for dentist"],
    [7, 3, "08:00","17:00"],
    [7, 4, "09:00","15:00"],
    [8, 2, "07:30","16:30"],
    [8, 3, "08:00","17:00"],
    [8, 5, "12:00","20:00"],
    [9, 4, "07:00","15:30"],
    [10, 2, "08:00","17:00"],
    [10, 3, "08:00","16:00"],
    [10, 4, "08:00","16:00"],
    [10, 5, "10:00","18:00"],
    [13, 2, "07:30","16:30"],
    [13, 3, "08:00","16:00"],
    [14, 3, "08:00","12:00", "Half day — appointment"],
    [14, 4, "08:00","17:00"],
    [15, 2, "08:00","16:00"],
    [15, 5, "09:00","17:00"],
    [16, 2, "07:30","17:00"],
    [16, 3, "08:00","17:00"],
    [16, 4, "09:00","15:00"],
    [17, 2, "07:30","16:30"],
    [17, 3, "08:00","16:00"],
    [17, 4, "08:30","16:30"],
    [17, 5, "10:00","18:00"],
    [20, 2, "08:00","16:00"],
    [20, 3, "08:00","16:00"],
    [21, 4, "09:00","17:00"],
    [21, 5, "09:00","17:00"],
    [22, 2, "07:30","15:30"],
    [22, 3, "08:00","17:00"],
    [22, 4, "08:00","16:00"],
    [23, 2, "08:00","16:00"],
    [24, 2, "07:30","17:00"],
    [24, 3, "08:00","16:30"],
    [24, 5, "10:00","18:00"],
    // jose with some short shifts to test 9-hr rule
    [11, 3, "09:00","13:00", "School pickup — ran long"],
    [18, 3, "10:00","18:30"],
  ];
  // Remap old seed IDs (Maria=2, Jose=3, Luis=4, Sofia=5) to new schema
  // where employees start at id 6. Sofia is no longer a user; her shifts
  // get reassigned round-robin to keep the month's activity level realistic.
  const OLD_TO_NEW_EMP = { 2: 6, 3: 7, 4: 8 };
  const SOFIA_FALLBACK = [6, 7, 8];
  let sofiaIdx = 0;
  for (const [day, emp, start, end, comment] of aprilPattern) {
    const dateStr = `2026-04-${String(day).padStart(2,"0")}`;
    const newEmp = OLD_TO_NEW_EMP[emp] ?? SOFIA_FALLBACK[sofiaIdx++ % SOFIA_FALLBACK.length];
    addShift({
      empId: newEmp, date: dateStr, start, end,
      comment: comment || "",
      loc: nextLoc(),
      tz: { in: "America/New_York", out: "America/New_York" },
    });
  }

  // Week approvals: weekStart (Monday date, Mon–Sun week) + employeeId -> status.
  // "Today" in the demo is Mon Apr 13 2026 — so Apr 6–12 is last week.
  // Maria & Jose both submitted last week and are awaiting approval.
  // Everyone's older week (Mar 30–Apr 5) has no record yet → surfaces in their
  // "past weeks to submit" list.
  const weekApprovals = [
    { empId: 6, weekStart: "2026-04-06", status: "pending" }, // Maria
    { empId: 7, weekStart: "2026-04-06", status: "pending" }, // Jose
    // Luis submitted his last week, admin bounced it back with a reason — he needs to fix + resubmit.
    { empId: 8, weekStart: "2026-04-06", status: "rejected",
      rejectionComment: "Thursday's hours look off — 9:00 AM start but the GPS was still at home. Please double-check and resubmit." },
  ];

  // Seed one admin direct-edit so the audit-log surface is visible on first load.
  // Alee (owner, id=1) retroactively shortened one of Maria's earlier shifts.
  {
    const targetShift = shifts.find(s => s.empId === 6 && s.date === "2026-04-01");
    if (targetShift) {
      if (!targetShift.adminEdits) targetShift.adminEdits = [];
      targetShift.adminEdits.push({
        by: 1,
        at: new Date("2026-04-05T14:30:00").toISOString(),
        oldStart: targetShift.start,
        oldEnd: targetShift.end,
        newStart: targetShift.start,
        newEnd: "15:00",
        comment: "Cut short — Maria left 30 min early for dentist; she forgot to clock out.",
      });
      targetShift.end = "15:00";
      const [sh, sm] = targetShift.start.split(":").map(Number);
      targetShift.hours = ((15*60) - (sh*60+sm)) / 60;
    }
  }

  // Role helpers
  const isOwner      = (u) => u?.role === "owner";
  const isAdmin      = (u) => u?.role === "admin";
  const isReadonly   = (u) => u?.role === "readonly";
  const isEmployee   = (u) => u?.role === "employee";
  const canApprove   = (u) => isOwner(u) || isAdmin(u);          // approvals, edit approvals
  const canManage    = (u) => isOwner(u) || isAdmin(u);           // add employees, manage
  const isAdminLike  = (u) => isOwner(u) || isAdmin(u) || isReadonly(u); // sees admin home
  const roleLabel    = (u) => {
    if (isOwner(u))    return tr("owner");
    if (isAdmin(u))    return tr("admin");
    if (isReadonly(u)) return tr("readonly");
    return "";
  };

  function weekStatus(empId, weekStart) {
    const wa = weekApprovals.find(w => w.empId === empId && w.weekStart === weekStart);
    return wa ? wa.status : null;
  }
  function weekRejectionComment(empId, weekStart) {
    const wa = weekApprovals.find(w => w.empId === empId && w.weekStart === weekStart);
    return wa?.status === "rejected" ? (wa.rejectionComment || "") : "";
  }
  // Count of admin direct-edits across every shift in the given week.

  function fmt12(hhmm) {
    const [h, m] = hhmm.split(":").map(Number);
    const ampm = h >= 12 ? "PM" : "AM";
    const hr = ((h + 11) % 12) + 1;
    return `${hr}:${String(m).padStart(2,"0")} ${ampm}`;
  }
  function fmtTimeDate(d) {
    return d.toLocaleTimeString(locale(), { hour: "numeric", minute: "2-digit" });
  }

  // Render a single time-of-day followed by its tz tag (if any) as a span.
  function timeWithTz(timeStr, tz, dateHint) {
    const short = tz ? tzShort(tz, dateHint) : "";
    return el("span", {class:"twtz"},
      fmt12(timeStr),
      short ? el("span", {class:"tz-inline"}, short) : null,
    );
  }

  // Render a "start – end" range with tz suffix. If both ends are in the same
  // tz, append it once at the end; if they differ, tag each end separately.
  function timeRangeWithTz(startStr, endStr, startTz, endTz, dateHint) {
    const s = startTz ? tzShort(startTz, dateHint) : "";
    const e = endTz   ? tzShort(endTz,   dateHint) : "";
    if (s && e && s === e) {
      return el("span", {class:"twtz"},
        `${fmt12(startStr)} – ${fmt12(endStr)}`,
        el("span", {class:"tz-inline"}, s),
      );
    }
    const parts = [fmt12(startStr)];
    if (s) parts.push(el("span", {class:"tz-inline"}, s));
    parts.push(" – ");
    parts.push(fmt12(endStr));
    if (e) parts.push(el("span", {class:"tz-inline"}, e));
    return el("span", {class:"twtz"}, ...parts);
  }
  function fmtDateLong(dateStr) {
    const d = new Date(dateStr + "T00:00:00");
    return d.toLocaleDateString(locale(),
      { weekday:"long", month:"long", day:"numeric" }).replace(/^./, c => c.toUpperCase());
  }
  function fmtDateShort(dateStr) {
    const d = new Date(dateStr + "T00:00:00");
    return d.toLocaleDateString(locale(), { month:"short", day:"numeric" });
  }
  // Weeks run Monday–Sunday (payroll alignment).
  function weekStartOf(dateStr) {
    const d = new Date(dateStr + "T00:00:00");
    const dow = d.getDay();                 // 0=Sun..6=Sat
    const backToMon = (dow + 6) % 7;        // 0=Mon..6=Sun
    d.setDate(d.getDate() - backToMon);
    return d.toISOString().slice(0, 10);
  }
  function weekEndOf(dateStr) {
    const d = new Date(weekStartOf(dateStr) + "T00:00:00");
    d.setDate(d.getDate() + 6);             // Monday + 6 = Sunday
    return d.toISOString().slice(0, 10);
  }

    return shifts.filter(s => s.empId === empId &&

  function toast(msg, opts={}) {

    const wrap = document.getElementById("toastWrap");
    const node = el("div", { class: `toast ${kind}` });
    if (pill) node.appendChild(el("span", {class:"pill"}, pill));
    node.appendChild(el("span", {}, msg));

  // Collapse + fade a node out (height + opacity + sideways nudge), then call
  // `next`. Used for rows that disappear from a list — approvals, past-weeks —
  // so the user sees the thing they acted on leave, instead of the whole
  // surface blinking via the global re-render.
  function animateOutAndThen(node, next, opts) {
    const ms = (opts && opts.ms) || 280;
    if (!node || typeof node.getBoundingClientRect !== "function") {
      next();
      return;
    }
    const h = node.getBoundingClientRect().height;
    node.style.maxHeight = h + "px";
    node.style.overflow = "hidden";
    node.style.pointerEvents = "none";
    void node.offsetHeight; // force reflow so initial max-height applies
    node.style.transition =
      `opacity ${ms}ms ease, ` +
      `transform ${ms}ms cubic-bezier(.4,0,.2,1), ` +
      `max-height ${ms}ms cubic-bezier(.4,0,.2,1), ` +
      `margin ${ms}ms ease, padding ${ms}ms ease`;
    requestAnimationFrame(() => {
      node.style.opacity = "0";
      node.style.transform = "translateX(14px)";
      node.style.maxHeight = "0";
      node.style.marginTop = "0";
      node.style.marginBottom = "0";
      node.style.paddingTop = "0";
      node.style.paddingBottom = "0";
    });
    setTimeout(next, ms);
  }

  // Shrink+fade a button in place, then call `next`. After next() runs render(),
  // caller can find the freshly-rendered status pill and add `.pop-in` so it
  // scales in where the button was — a button→pill crossfade.
  function animateShrinkAndThen(node, next, opts) {
    const ms = (opts && opts.ms) || 220;
    if (!node) { next(); return; }
    node.style.pointerEvents = "none";
    node.style.transition = `opacity ${ms}ms ease, transform ${ms}ms cubic-bezier(.4,0,.2,1)`;
    requestAnimationFrame(() => {
      node.style.opacity = "0";
      node.style.transform = "scale(.85)";
    });
    setTimeout(next, ms);
  }

  // =============================================================
  // CALENDAR / DAY DETAIL
  // =============================================================
  function dataByDay(year, month, scopeEmpId=null) {
    const out = {};
    for (const s of shifts) {
      const d = new Date(s.date + "T00:00:00");
      if (d.getFullYear() !== year || d.getMonth() !== month) continue;
      if (scopeEmpId && s.empId !== scopeEmpId) continue;
      (out[d.getDate()] = out[d.getDate()] || []).push(s);
    }
    return out;
  }

  function renderCalendar(scopeEmpId=null) {
    const firstOfMonth = new Date(state.calYear, state.calMonth, 1);
    const daysInMonth = new Date(state.calYear, state.calMonth+1, 0).getDate();
    // Calendar runs Mon–Sun: shift getDay() so Monday = 0, Sunday = 6.
    const startOffset = (firstOfMonth.getDay() + 6) % 7;
    const data = dataByDay(state.calYear, state.calMonth, scopeEmpId);
    const today = new Date(2026, 3, 13); // fixed "today" for demo

    const dowKey = state.lang === "es"
      ? ["L","M","M","J","V","S","D"]
      : ["M","T","W","T","F","S","S"];
    const dows = el("div", {class:"dows"}, ...dowKey.map(d => el("span", {}, d)));
    const grid = el("div", {class:"grid"});
    grid.dataset.scope = scopeEmpId == null ? "" : String(scopeEmpId);
    grid.dataset.year = String(state.calYear);
    grid.dataset.month = String(state.calMonth);
    const maxHrs = Math.max(0, ...Object.values(data).map(arr => arr.reduce((s,x)=>s+x.hours,0)));
    const totalCells = startOffset + daysInMonth;
    const rows = Math.ceil(totalCells / 7);

    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < 7; c++) {
        const cellIdx = r*7 + c;
        const dayNum = cellIdx - startOffset + 1;
        if (dayNum < 1 || dayNum > daysInMonth) {
          grid.appendChild(el("div", {class:"cell empty"}));
          continue;
        }
        const dayShifts = data[dayNum] || [];
        const dayHours = dayShifts.reduce((s,x)=>s+x.hours,0);
        const hasShifts = dayShifts.length > 0;
        const isToday = today.getFullYear() === state.calYear && today.getMonth() === state.calMonth && dayNum === today.getDate();
        const isSelected = state.selectedDay === dayNum;

        const inner = el("div", {class:"inner"});
        inner.appendChild(el("span", {class:"num"}, String(dayNum)));

        const byEmp = hasShifts
          ? Object.entries(dayShifts.reduce((m,sh)=>{m[sh.empId]=(m[sh.empId]||0)+sh.hours;return m;}, {}))
              .sort((a,b)=>b[1]-a[1])
          : [];
        const empCount = byEmp.length;

        const displayedHours = scopeEmpId
          ? (byEmp.find(([id])=>Number(id)===scopeEmpId)?.[1] || 0)
          : dayHours;
        const showHoursText = displayedHours >= 1
          ? `${Math.round(displayedHours)}${tr("hoursShort")}`
          : displayedHours > 0 ? `${displayedHours.toFixed(1)}${tr("hoursShort")}` : "";

        if (hasShifts && showHoursText) {
          const pair = el("span", {class:"pair"}, el("span", {}, showHoursText));
          if (!scopeEmpId && empCount > 0) {
            pair.appendChild(el("span", {class:"mid"}, "·"));
            pair.appendChild(el("span", {class:"emp"}, String(empCount)));
          }
          inner.appendChild(pair);
        }

        let heatClass = "";
        if (hasShifts && maxHrs > 0) {
          const ratio = dayHours / maxHrs;
          if (ratio > 0.8) heatClass = "heat-4";
          else if (ratio > 0.55) heatClass = "heat-3";
          else if (ratio > 0.3) heatClass = "heat-2";
          else heatClass = "heat-1";
        }

        const cell = el("div", {
          class: `cell ${hasShifts ? "has-shifts" : ""} ${isToday ? "today" : ""} ${isSelected ? "selected" : ""} ${heatClass}`,
          "data-day": String(dayNum),
          "data-row": String(r),
          onclick: () => selectDay(dayNum),
        });
        cell.appendChild(inner);
        grid.appendChild(cell);
      }

      if (state.selectedDay != null) {
        const row = Math.floor((state.selectedDay - 1 + startOffset) / 7);
        if (row === r) {
          grid.appendChild(el("div", {class:"day-detail-slot", style:"grid-column: span 7;"},
            renderDayDetail(state.selectedDay, scopeEmpId)));
        }
      }
    }
    return el("div", {class:"cal"}, dows, grid);
  }

  // Targeted day selection — no full re-render
  function selectDay(dayNum) {
    const grid = document.querySelector(".cal .grid");
    if (!grid) { state.selectedDay = dayNum; render(); return; }

    const scopeRaw = grid.dataset.scope;
    const scopeEmpId = scopeRaw ? Number(scopeRaw) : null;
    const year = Number(grid.dataset.year);
    const month = Number(grid.dataset.month);

    const prev = state.selectedDay;
    const next = (prev === dayNum) ? null : dayNum;
    state.selectedDay = next;

    // Toggle selected class on cells
    if (prev != null) {
      grid.querySelector(`.cell[data-day="${prev}"]`)?.classList.remove("selected");
    }
    if (next != null) {
      grid.querySelector(`.cell[data-day="${next}"]`)?.classList.add("selected");
    }

    // Remove any existing detail slot
    grid.querySelector(".day-detail-slot")?.remove();

    // Insert new detail slot at end of the selected row
    if (next != null) {
      const startOffset = new Date(year, month, 1).getDay();
      const row = Math.floor((next - 1 + startOffset) / 7);
      // Last cell in that row — scan from row*7+6 downward until we find one
      let anchor = null;
      for (let c = 6; c >= 0; c--) {
        const cell = grid.children[row*7 + c];
        if (cell && cell.classList.contains("cell")) { anchor = cell; break; }
      }
      if (anchor) {
        const slot = el("div", {class:"day-detail-slot", style:"grid-column: span 7;"},
          renderDayDetail(next, scopeEmpId));
        anchor.insertAdjacentElement("afterend", slot);
      }
    }
  }

  function renderDayDetail(dayNum, scopeEmpId=null) {
    const data = dataByDay(state.calYear, state.calMonth, scopeEmpId);
    const dayShifts = data[dayNum] || [];
    const d = new Date(state.calYear, state.calMonth, dayNum);
    const label = d.toLocaleDateString(locale(),
      { weekday:"long", month:"long", day:"numeric" }).replace(/^./, c => c.toUpperCase());
    const wrap = el("div", {class:"day-detail"}, el("div", {class:"date-label"}, label));
    if (!dayShifts.length) {
      wrap.appendChild(el("div", {class:"no-shifts"}, tr("noShifts")));
      return wrap;
    }
    const groups = {};
    for (const sh of dayShifts) (groups[sh.empId] = groups[sh.empId] || []).push(sh);
    const t = el("div", {class:"dd-table"});
    t.appendChild(el("div", {class:"head"},
      el("span", {}, state.lang === "es" ? "Empleado" : "Employee"),
      el("span", {class:"r"}, state.lang === "es" ? "Horario" : "Time"),
      el("span", {class:"r"}, state.lang === "es" ? "Horas" : "Hours"),
    ));
    for (const [empIdStr, list] of Object.entries(groups)) {
