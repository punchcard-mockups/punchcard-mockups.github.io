<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,interactive-widget=resizes-content" />
<title>PunchCard</title>
<script>
  // Set <html lang> BEFORE any other parsing so Chrome's language detector
  // doesn't offer to translate the page (e.g. asking to translate-to-Spanish
  // on a Spanish-speaking grandparent's phone because the static
  // <html lang="en"> attribute outranked the visible text).
  //
  // Default is Spanish — the audience for this app is Spanish-speaking
  // nurses, and the previous browser-locale fallback meant English browsers
  // landed in English by default. The toggle (now in the account menu) lets
  // anyone flip to English; we just don't make the toggle the gate.
  (function () {
    try {
      var v = localStorage.getItem("pc_lang");
      if (v !== "en" && v !== "es") v = "es";
      document.documentElement.lang = v;
      var m = document.createElement("meta");
      m.httpEquiv = "content-language";
      m.content = v;
      document.head.appendChild(m);
    } catch (e) {}
  })();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Azeret+Mono:wght@400;500;600;700&family=Gloock&family=Vollkorn:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<style>
  /* ============================================================
     Design tokens — warm white, deep oxblood, big serif.
     Magazine-typographic. Gloock display + Vollkorn body.
     ============================================================ */
  :root {
    --t-bg: oklch(96% 0.015 85);
    --surface-dark: oklch(93% 0.02 85);
    --surface-card: oklch(99% 0.008 85);
    --surface-card-hi: oklch(95% 0.018 85);
    --accent-blue: oklch(48% 0.11 58);         /* caramel default */
    --accent-blue-bright: oklch(54% 0.13 58);
    --accent-green: oklch(40% 0.1 155);
    --accent-green-light: oklch(44% 0.11 155);
    --accent-red: oklch(42% 0.18 25);
    --accent-red-light: oklch(45% 0.18 25);
    --accent-amber: oklch(55% 0.15 60);
    --text-primary: oklch(16% 0.015 30);       /* ink */
    --text-secondary: oklch(40% 0.018 30);
    --text-muted: oklch(58% 0.015 30);
    --outline-soft: oklch(82% 0.018 85);

    --tf-display: "Gloock", Georgia, serif;
    --tf-body: "Vollkorn", Georgia, serif;
    --tf-mono: "Azeret Mono", ui-monospace, monospace;

    /* Type scale — one source of truth.
       16px is the hard floor — comments are read at body weight, and
       nothing in the app should ask the eye to drop below that. The
       cap/xs/sm aliases collapse to base on purpose so existing rules
       still type-check, but every "small" surface renders at 16.
       Android at arm's length, end-of-shift readability is the bar. */
    --fs-cap:  16px;  /* was 11 — uppercase/letterspaced badges & pills */
    --fs-xs:   16px;  /* was 13 — metadata, captions, table-head */
    --fs-sm:   16px;  /* was 14 — secondary text, hint copy */
    --fs-base: 16px;  /* default body */
    --fs-md:   17px;  /* emphasized body */
    --fs-lg:   20px;  /* small section titles */
    --fs-xl:   24px;  /* screen section headers (.section-header h3) */
    --fs-2xl:  30px;  /* modal titles */
    --fs-3xl:  36px;  /* greeting display */
    --fs-stat: 44px;  /* total-hours hero stat */
    --fs-display: 52px; /* login brand only — sized to fit iPhone SE width */

    /* Spacing scale — 4px base. */
    --space-1: 4px;
    --space-2: 8px;
    --space-3: 12px;
    --space-4: 16px;
    --space-5: 20px;
    --space-6: 24px;
    --space-7: 32px;
    --space-8: 48px;

    /* Employee colors — deep jewel tones, not pastel.
       Each sits in a distinct hue band, avoiding the semantic
       red/green/amber zones reserved for warnings/ok/pending. */
    --emp-1: #1D4ED8;  /* royal blue */
    --emp-2: #0F766E;  /* dark teal */
    --emp-3: #831843;  /* plum */
    --emp-4: #4338CA;  /* indigo-blue */
    --emp-5: #6D28D9;  /* deep violet */
    --emp-6: #A21CAF;  /* magenta */
    --emp-7: #0E7490;  /* deep cyan */
    --emp-8: #78350F;  /* dark bronze */
    --emp-9: #155E75;  /* teal-blue */
    --emp-10: #581C87; /* dark purple */
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--t-bg);
    color: var(--text-primary);
    font-family: var(--tf-body);
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
  }

  .scroll {
    flex: 1;
    overflow-y: auto;
    overscroll-behavior: contain;
    /* Top padding clears the floating back/account buttons (44px button + 8px
       safe-area top margin + 4px breathing room). */
    padding: 56px 6px 0;
    margin: 0 -6px;
  }
  .scroll::-webkit-scrollbar { width: 6px; }
  .scroll::-webkit-scrollbar-thumb { background: var(--surface-dark); border-radius: 3px; }

  /* Floating chrome — back button (top-left) and account menu (top-right)
     float over the scroll area with safe-area insets. The page itself
     reserves padding-top: 56px so the first row of content sits clear of
     them. They live above the scroll's transform stacking context (z:10)
     and below the toast layer (z:1000). */
  .float-back, .float-account {
    position: fixed;
    top: max(8px, env(safe-area-inset-top, 0px));
    z-index: 12;
    display: flex;
    align-items: center;
  }
  .float-back    { left:  max(10px, env(safe-area-inset-left,  0px)); }
  .float-account { right: max(10px, env(safe-area-inset-right, 0px)); }
  .float-back:empty, .float-account:empty { display: none; }
  .icon-btn {
    width: 44px; height: 44px;
    border-radius: 12px;
    display: grid; place-items: center;
    color: var(--text-secondary);
    cursor: pointer;
    touch-action: manipulation;
    position: relative;
    transition: background 150ms ease, transform 100ms ease;
  }
  .icon-btn:hover { background: var(--surface-dark); color: var(--text-primary); }
  .icon-btn:active { transform: scale(.92); }
  .lang-toggle {
    position: relative;
    display: inline-flex;
    align-items: center;
    min-height: 44px;
    background: var(--surface-dark);
    border-radius: 999px;
    padding: 4px;
    cursor: pointer;
    user-select: none;
    border: 1px solid var(--outline-soft);
    transition: background 150ms ease;
    touch-action: manipulation;
  }
  .lang-toggle:hover { background: var(--surface-card-hi); }
  .lang-toggle .slider {
    position: absolute;
    top: 4px; bottom: 4px;
    width: calc(50% - 4px);
    background: var(--accent-blue);
    border-radius: 999px;
    transition: transform 220ms cubic-bezier(.2,.8,.2,1);
  }
  .lang-toggle.es .slider { transform: translateX(100%); }
  .lang-toggle .opt {
    position: relative;
    z-index: 1;
    font-size: var(--fs-cap);
    font-weight: 700;
    letter-spacing: 0.5px;
    padding: 8px 12px;
    color: var(--text-secondary);
    transition: color 180ms ease;
    min-width: 26px;
    text-align: center;
  }
  .lang-toggle .opt.active { color: #fff; }

  /* Account dropdown — opened by tapping the sign-out icon. Replaces the old
     one-tap sign-out (which was too easy to mis-tap and wiped the session). */
  .user-trigger { overflow: visible; }
  .user-trigger.open { background: var(--surface-dark); color: var(--text-primary); }
  .user-menu {
    position: absolute;
    top: calc(100% + 6px);
    right: 0;
    min-width: 200px;
    background: var(--surface-card);
    border: 1px solid var(--outline-soft);
    border-radius: 14px;
    padding: 8px;
    box-shadow: 0 8px 24px rgba(0,0,0,.35), 0 2px 6px rgba(0,0,0,.2);
    z-index: 60;
    text-align: left;
    cursor: default;
    animation: fade-up 140ms ease both;
  }
  .user-menu-header {
    padding: 10px 12px 12px;
    border-bottom: 1px solid var(--outline-soft);
    margin-bottom: 6px;
  }
  .user-menu-greeting {
    font-size: var(--fs-cap);
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    font-weight: 600;
  }
  .user-menu-name {
    font-size: var(--fs-base);
    font-weight: 700;
    color: var(--text-primary);
    margin-top: 3px;
  }
  .user-menu-role {
    display: inline-block;
    margin-top: 6px;
    font-size: var(--fs-cap);
    font-weight: 700;
    letter-spacing: 0.5px;
    padding: 2px 8px;
    border-radius: 999px;
    background: var(--surface-dark);
    color: var(--text-secondary);
  }
  .user-menu-lang {
    display: flex;
    justify-content: center;
    padding: 6px 12px 8px;
    margin-bottom: 4px;
    border-bottom: 1px solid var(--outline-soft);
  }
  .user-menu-signout,
  .user-menu-add {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    min-height: 44px;
    padding: 0 12px;
    background: transparent;
    border: 0;
    font-size: var(--fs-base);
    font-weight: 600;
    font-family: inherit;
    text-align: left;
    border-radius: 10px;
    cursor: pointer;
    touch-action: manipulation;
    transition: background 120ms ease;
  }
  .user-menu-signout { color: var(--accent-red-light); }
  .user-menu-add     { color: var(--text-primary); }
  .user-menu-signout:active,
  .user-menu-add:active { background: var(--surface-dark); }
  @media (hover: hover) {
    .user-menu-signout:hover,
    .user-menu-add:hover { background: var(--surface-dark); }
  }

  /* Greeting */
  .greeting { padding: 2px 6px 10px; }
  .greeting .hello {
    font-family: var(--tf-body);
    font-style: italic;
    color: var(--text-secondary);
    font-size: var(--fs-base);
  }
  /* font-family/weight come from the display-face multi-selector below */
  .greeting .name {
    font-size: var(--fs-3xl);
    line-height: 1.05;
    letter-spacing: -0.5px;
  }
  .greeting .role {
    display: inline-block;
    margin-top: 4px;
    padding: 3px 10px;
    background: transparent;
    border: 1px solid var(--text-secondary);
    border-radius: 2px;
    font-family: var(--tf-body);
    font-size: var(--fs-xs);
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-secondary);
  }
  .greeting .role.readonly {
    color: var(--accent-amber);
    border-color: var(--accent-amber);
  }

  /* Compact greeting variant — used after the first render in a session.
     Single-line, smaller, so the home doesn't keep spending ~120px above
     the fold on a "Welcome, Alejandra A. / OWNER" block the user just saw. */
  .greeting.greeting--compact {
    padding: 6px 6px 8px;
    display: flex;
    align-items: baseline;
    gap: 8px;
    flex-wrap: wrap;
  }
  .greeting.greeting--compact .name {
    font-size: var(--fs-xl);
    line-height: 1.1;
    letter-spacing: -0.2px;
  }
  .greeting.greeting--compact .role-inline {
    font-family: var(--tf-body);
    font-style: italic;
    font-size: var(--fs-sm);
    color: var(--text-muted);
  }
  .greeting.greeting--compact .role-inline.readonly { color: var(--accent-amber); }

  /* Month nav */
  .month-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 2px;
  }
  .month-nav .chev {
    width: 44px; height: 44px;
    border-radius: 12px;
    display: grid; place-items: center;
    color: var(--text-secondary);
    cursor: pointer;
    touch-action: manipulation;
    transition: background 150ms ease, transform 100ms ease;
  }
  .month-nav .chev:hover { background: var(--surface-dark); color: var(--text-primary); }
  .month-nav .chev:active { transform: scale(.92); }
  .month-nav .label { font-size: var(--fs-md); font-weight: 600; }

  /* Calendar */
  .cal { padding: 4px 2px 0; }
  .cal .dows {
    display: grid; grid-template-columns: repeat(7, 1fr); margin-bottom: 4px;
  }
  .cal .dows span {
    text-align: center;
    font-size: var(--fs-xs); font-weight: 700;
    color: var(--text-secondary);
    letter-spacing: 0.6px;
  }
  .cal .grid { display: grid; grid-template-columns: repeat(7, 1fr); }
  .cal .cell {
    aspect-ratio: 1/1;
    padding: 2px;
    cursor: pointer;
    touch-action: manipulation;
    transition: transform 110ms cubic-bezier(.2,.8,.2,1);
  }
  .cal .cell:active { transform: scale(.92); }
  .cal .cell:active .inner { background: rgba(59,130,246,.18); }
  .cal .inner {
    width: 100%; height: 100%;
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    transition: background 120ms ease;
  }
  .cal .inner .num { font-size: var(--fs-base); font-weight: 500; color: var(--text-primary); }
  .cal .cell.empty .num { opacity: 0.3; font-weight: 400; }
  .cal .cell.has-shifts .num { font-weight: 600; }
  .cal .cell.today .inner { background: rgba(59,130,246,.12); }
  .cal .cell.today .num { font-weight: 700; }
  .cal .cell.selected .inner { background: var(--accent-blue); }
  .cal .cell.selected .num { color: #fff; font-weight: 700; }
  .cal .pair {
    font-size: var(--fs-cap); font-weight: 700; line-height: 1;
    display: flex; align-items: center; gap: 3px;
    color: var(--accent-blue-bright);
  }
  .cal .pair .mid { color: var(--text-muted); font-weight: 500; }
  .cal .pair .emp { color: var(--accent-green-light); }
  .cal .cell.selected .pair,
  .cal .cell.selected .pair .mid,
  .cal .cell.selected .pair .emp { color: rgba(255,255,255,.9); }
  /* Admin-view dots: one per employee who worked that day, colored by
     the employee's accent. Sits under the day number; wraps as needed. */
  .cal .inner .dots {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
    gap: 3px;
    margin-top: 2px;
    min-height: 6px;
  }
  .cal .inner .dots .dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    display: inline-block;
  }
  .cal .cell.selected .inner .dots .dot {
    outline: 1px solid rgba(255,255,255,.6);
    outline-offset: 1px;
  }
  .cal .heat-1 .inner { background: rgba(59,130,246,.04); }
  .cal .heat-2 .inner { background: rgba(59,130,246,.08); }
  .cal .heat-3 .inner { background: rgba(59,130,246,.12); }
  .cal .heat-4 .inner { background: rgba(59,130,246,.16); }

  /* Day detail — table header */
  .day-detail {
    margin: 6px 0 0;
    padding: 12px;
    border-radius: 14px;
    background: rgba(44,62,80,0.6);
  }
  .day-detail .date-label {
    font-size: var(--fs-sm); font-weight: 700; letter-spacing: 0.3px; margin-bottom: 8px;
  }
  .day-detail .no-shifts { font-size: var(--fs-sm); color: var(--text-muted); }
  .dd-table { display: flex; flex-direction: column; }
  .dd-table .head {
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 10px;
    padding: 4px 2px 6px;
    font-size: var(--fs-xs);
    letter-spacing: 0.8px;
    text-transform: uppercase;
    font-weight: 700;
    color: var(--text-muted);
    border-bottom: 1px solid var(--outline-soft);
  }
  .dd-table .head .r { text-align: right; }
  .dd-table .trow {
    display: grid;
    grid-template-columns: 1fr auto auto;
    align-items: center;
    gap: 10px;
    padding: 7px 2px;
    border-bottom: 1px solid var(--outline-soft);
  }
  /* Tappable-row affordance: small right-pointing chev tucked into the hours
     cell so the name column keeps its full width (a separate chev column
     squeezed names like "Maria R." down to "Maria"). */
  .dd-table .trow .hrs {
    display: inline-flex;
    align-items: baseline;
    gap: 6px;
    justify-content: flex-end;
  }
  .dd-table .trow .hrs .chev {
    color: var(--text-muted);
    font-size: 14px;
    line-height: 1;
    font-weight: 400;
  }
  .dd-table .trow:last-of-type { border-bottom: 0; }
  .dd-table .nm {
    font-size: var(--fs-sm); font-weight: 600;
    display: flex; align-items: center; gap: 8px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .dd-table .nm .sw { width: 4px; height: 16px; border-radius: 2px; flex: 0 0 auto; }
  .dd-table .tm {
    font-size: var(--fs-sm); color: var(--text-secondary);
    font-variant-numeric: tabular-nums;
  }
  .dd-table .hrs {
    font-size: var(--fs-sm); font-weight: 700;
    font-variant-numeric: tabular-nums;
    text-align: right; min-width: 34px;
  }
  .dd-table .cmt {
    grid-column: 1 / -1;
    font-size: var(--fs-sm); color: var(--text-secondary);
    font-style: italic; margin-top: 2px; opacity: .8;
  }

  /* Section header */
  .section-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin: 24px 4px 8px;
    padding-bottom: 4px;
    border-bottom: 1.5px solid var(--text-primary);
  }
  .section-header h3 {
    margin: 0;
    font-size: var(--fs-xl);
    letter-spacing: -0.3px;
  }
  .section-header small {
    font-family: var(--tf-body);
    font-style: italic;
    font-size: var(--fs-xs);
    letter-spacing: 0.2px;
    color: var(--text-secondary);
  }

  /* Employee row card */
  .emp-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 4px;
    background: transparent;
    border-bottom: 1px solid var(--outline-soft);
    cursor: pointer;
    transition: background 150ms ease;
  }
  .emp-row:hover { background: var(--surface-card-hi); }
  .emp-row .av {
    width: 40px; height: 40px;
    border-radius: 50%;
    display: grid; place-items: center;
    font-weight: 700; font-size: var(--fs-sm);
  }
  .emp-row .body { flex: 1; }
  .emp-row .name { font-size: var(--fs-base); font-weight: 600; }
  .emp-row .meta { font-size: var(--fs-xs); color: var(--text-secondary); margin-top: 2px; }
  .emp-row .badge {
    font-size: var(--fs-cap); font-weight: 700;
    padding: 3px 7px;
    border-radius: 999px;
    background: rgba(245,158,11,.2);
    color: var(--accent-amber);
    letter-spacing: 0.4px;
    margin-left: 6px;
  }
  .emp-row .chev { color: var(--text-secondary); }

  /* FAB */
  .fab {
    position: absolute;
    right: 28px; bottom: 28px;
    width: 56px; height: 56px;
    border-radius: 50%;
    background: var(--accent-blue);
    color: var(--t-bg);
    border: 0;
    display: grid; place-items: center;
    cursor: pointer;
    box-shadow: 0 10px 24px oklch(48% 0.11 58 / .35);
    transition: transform 120ms ease, filter 150ms ease;
    z-index: 5;
  }
  .fab:hover { filter: brightness(1.1); }
  .fab:active { transform: scale(.96); }
  .fab svg { width: 26px; height: 26px; }

  /* Login */
  .login-wrap {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 100%;
    padding: 20px 12px;
    /* Lift the form above the soft keyboard on mobile. --kb-inset is
       maintained live by the VisualViewport handler at the bottom of the
       script; it's 0 on desktop / any time no keyboard is open. */
    padding-bottom: calc(20px + var(--kb-inset, 0px));
    transition: padding-bottom 150ms ease;
    gap: 20px;
  }
  .login-wrap .brand {
    font-size: var(--fs-2xl); font-weight: 800;
    letter-spacing: -0.6px;
    color: var(--text-primary);
  }
  .login-wrap .brand .accent { color: var(--accent-blue-bright); }
  .login-wrap .tag {
    color: var(--text-secondary);
    font-size: var(--fs-sm);
    margin-top: -10px;
    margin-bottom: 10px;
  }
  .login-form {
    width: 100%;
    display: flex; flex-direction: column; gap: 10px;
  }
  .login-form input {
    background: transparent;
    border: 0;
    border-bottom: 1.5px solid var(--outline-soft);
    padding: 12px 4px;
    color: var(--text-primary);
    font-family: var(--tf-body);
    font-size: var(--fs-base);
    outline: none;
    transition: border-color 150ms ease;
  }
  .login-form input:focus { border-color: var(--accent-blue); }
  .login-form .go {
    background: var(--accent-blue);
    color: var(--t-bg);
    border: 0;
    border-radius: 2px;
    padding: 13px;
    font-family: var(--tf-display);
    font-size: var(--fs-base);
    font-weight: 400;
    letter-spacing: 0.5px;
    cursor: pointer;
    margin-top: 6px;
    transition: transform 100ms ease, filter 150ms ease;
  }
  .login-form .go:hover { filter: brightness(1.1); }
  .login-form .go:active { transform: scale(.98); }
  .login-form .err {
    font-size: var(--fs-sm);
    color: var(--accent-red);
    background: oklch(92% 0.05 25);
    border-radius: 2px;
    padding: 8px 10px;
  }
  /* ========================================================================
     Buttons — one system.
       .btn                default ghost: transparent, uppercase Vollkorn
       .btn.primary        filled accent (caramel in editorial)
       .btn.danger         outlined red — "I intend to do the destructive thing"
       .btn.danger-confirm filled red — the committing action after confirmation
       .btn.hero           oversized clock-in/out on the employee home
       .btn.full           stretches to 100% width
     Every button meets the 44px tap target (Android primary).
     ======================================================================== */
  .btn {
    -webkit-appearance: none;
    appearance: none;
    border: 0;
    background: transparent;
    color: var(--text-primary);
    font-family: var(--tf-body);
    font-size: var(--fs-sm);
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 12px 16px;
    min-height: 44px;
    border-radius: 2px;
    cursor: pointer;
    touch-action: manipulation;
    transition: filter 120ms ease, background 120ms ease;
  }
  .btn:active { filter: brightness(.94); }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  @media (hover: hover) { .btn:hover { filter: brightness(1.08); } }

  .btn.primary {
    background: var(--accent-blue);
    color: var(--t-bg);
  }
  .btn.danger {
    background: transparent;
    color: var(--accent-red);
    border: 1px solid var(--accent-red);
  }
  .btn.danger-confirm {
    background: var(--accent-red);
    color: var(--t-bg);
    border: 1px solid var(--accent-red);
  }

  /* Hero: the clock-in/out button on the employee home.
     Calm by design — no gradient, no shadow — the tool stays out of the way. */
  .btn.hero {
    width: 100%;
    min-height: 80px;
    padding: 18px;
    font-family: var(--tf-display);
    font-size: var(--fs-xl);
    font-weight: 400;
    letter-spacing: 0.3px;
    text-transform: none;
    display: flex;
    flex-direction: column;
    gap: 6px;
    align-items: center;
    justify-content: center;
    background: var(--accent-blue);
    color: var(--t-bg);
  }
  .btn.hero svg { width: 22px; height: 22px; }
  .btn.hero.clock-out { background: var(--text-primary); color: var(--t-bg); }
  .btn.hero:disabled,
  .btn.hero.disabled {
    background: oklch(88% 0.02 85);
    color: var(--text-muted);
    opacity: 1;
    cursor: not-allowed;
  }

  .btn.full { width: 100%; }

  /* In horizontal action clusters (approvals row, shift-detail), buttons share space equally */
  .approval-row .actions > .btn,
  .sd-action-row > .btn { flex: 1; min-width: 0; }

  .clock-card {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 4px;
    background: transparent;
    border-top: 1.5px solid var(--text-primary);
    border-bottom: 1px solid var(--outline-soft);
  }
  .clock-card .pulse {
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--accent-green);
    position: relative;
  }
  .clock-card .pulse::after {
    content: "";
    position: absolute;
    inset: -6px;
    border-radius: 50%;
    background: var(--accent-green);
    opacity: .3;
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse {
    0% { transform: scale(.85); opacity: .35; }
    70% { transform: scale(1.5); opacity: 0; }
    100% { transform: scale(.85); opacity: 0; }
  }
  .clock-card .label {
    font-family: var(--tf-body);
    font-style: italic;
    font-size: var(--fs-xs);
    letter-spacing: 0.5px;
    color: var(--text-muted);
  }
  .clock-card .time {
    font-size: var(--fs-xl);
    font-weight: 500;
    color: var(--accent-green);
  }
  /* Compact inline tz suffix used wherever a time or time-range is shown — lives
     beside the time itself ("7:30 AM EDT") rather than on its own line. Fixed
     size + letter-spacing so the tz stays legible as a tiny caps badge
     regardless of whether the surrounding text is body, mono, or chip-small. */
  .tz-inline {
    display: inline-block;
    font-family: var(--tf-body);
    font-size: var(--fs-cap);
    font-weight: 700;
    letter-spacing: 1.2px;
    margin-left: 5px;
    padding: 1px 5px;
    border-radius: 2px;
    background: var(--surface-dark);
    color: var(--text-muted);
    text-transform: uppercase;
    font-variant-numeric: tabular-nums;
    vertical-align: 1px;
  }
  .twtz { white-space: nowrap; }
  /* "+1d" badge appended to a time range when the end time is on the next
     calendar day. Same shape as .tz-inline, but tinted amber so it reads as
     a small alert rather than a passive zone tag. */
  .overnight-badge {
    display: inline-block;
    font-family: var(--tf-body);
    font-size: var(--fs-cap);
    font-weight: 700;
    letter-spacing: 0.6px;
    margin-left: 5px;
    padding: 1px 5px;
    border-radius: 2px;
    background: color-mix(in oklab, var(--accent-amber) 22%, transparent);
    color: var(--accent-amber);
    text-transform: uppercase;
    font-variant-numeric: tabular-nums;
    vertical-align: 1px;
    white-space: nowrap;
  }
  /* "Booked one day back" marker — clock-in before the 3:30am books boundary.
     Cool/night tone so it never reads as the warm amber +1d overnight badge;
     the two can co-exist on the same shift (clocked in 1am, out next day). */
  .prevday-badge {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    font-family: var(--tf-body);
    font-size: var(--fs-cap);
    font-weight: 700;
    letter-spacing: 0.4px;
    margin-left: 6px;
    padding: 1px 6px 1px 4px;
    border-radius: 999px;
    background: color-mix(in oklab, oklch(52% 0.1 268) 16%, transparent);
    color: oklch(52% 0.1 268);
    font-variant-numeric: tabular-nums;
    vertical-align: 1px;
    white-space: nowrap;
  }
  .prevday-badge svg { width: 11px; height: 11px; flex: 0 0 auto; }
  /* Spelled-out explanation inside the shift-detail sheet. */
  .sd-prevday-note {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    margin-top: 12px;
    padding: 9px 11px;
    border-radius: 8px;
    background: color-mix(in oklab, oklch(52% 0.1 268) 10%, transparent);
    border: 1px solid color-mix(in oklab, oklch(52% 0.1 268) 28%, transparent);
    font-family: var(--tf-body);
    font-size: var(--fs-sm);
    line-height: 1.35;
    color: var(--text-secondary);
  }
  .sd-prevday-note svg { width: 15px; height: 15px; flex: 0 0 auto; margin-top: 2px; color: oklch(52% 0.1 268); }
  /* Live hours readout under the Add Shift / Edit Shift time inputs. */
  .shift-hours-readout {
    font-family: var(--tf-mono);
    font-size: var(--fs-xs);
    color: var(--text-muted);
    letter-spacing: 0.4px;
    margin: -4px 0 8px;
    min-height: 14px;
  }
  .gps-note {
    font-size: var(--fs-xs);
    color: var(--text-muted);
    letter-spacing: 0.2px;
    margin-top: 2px;
    font-family: ui-monospace, Menlo, monospace;
  }

  /* =========================================================
     SHIFT DETAIL — compact layout
     ========================================================= */
  .sd-name {
    font-size: var(--fs-base);
    font-weight: 600;
    line-height: 1.2;
  }
  .sd-date {
    font-size: var(--fs-sm);
    color: var(--text-secondary);
    margin-top: 2px;
    letter-spacing: 0.1px;
  }
  .sd-total-hrs {
    font-size: var(--fs-xl);
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.3px;
    flex: 0 0 auto;
  }
  .sd-total-hrs.ok { color: var(--accent-green); }
  .sd-total-hrs.warn { color: var(--accent-red); }

  .sd-rows {
    margin-top: 14px;
    border-top: 1px solid var(--outline-soft);
    border-bottom: 1px solid var(--outline-soft);
  }
  .sd-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    padding: 10px 2px;
    border-bottom: 1px dotted var(--outline-soft);
  }
  .sd-row:last-child { border-bottom: 0; }
  .sd-label {
    font-size: var(--fs-cap);
    color: var(--text-muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    font-weight: 600;
  }
  .sd-value {
    font-size: var(--fs-md);
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    color: var(--text-primary);
  }
  .sd-value-wrap {
    display: inline-flex;
    align-items: baseline;
    gap: 6px;
  }
  .sd-row .sd-tz {
    font-size: var(--fs-cap);
    font-weight: 700;
    letter-spacing: 0.5px;
    color: var(--text-muted);
    margin-left: 8px;
    padding: 2px 6px;
    border-radius: 4px;
    background: var(--surface-dark);
    font-variant-numeric: tabular-nums;
  }
  .sd-tz-note {
    margin-top: 8px;
    padding: 8px 10px;
    font-size: var(--fs-xs);
    color: var(--accent-amber);
    background: rgba(245,158,11,.08);
    border: 1px dashed rgba(245,158,11,.35);
    border-radius: 8px;
    font-weight: 600;
  }

  .sd-section-label {
    font-size: var(--fs-cap);
    color: var(--text-muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    font-weight: 600;
    margin-top: 18px;
    margin-bottom: 6px;
  }
  .sd-comment {
    padding: 10px 12px;
    background: var(--surface-card);
    border: 1px solid var(--outline-soft);
    border-radius: 8px;
    font-size: var(--fs-base);
    color: var(--text-secondary);
    font-style: italic;
    line-height: 1.45;
  }
  /* Same shape as the read-only .sd-comment so the two render identically
     at a glance; the textarea variant just becomes editable on focus. Starts
     at a single line and grows naturally as the user types (see the JS
     autosize wiring on input). No manual resize handle. */
  .sd-comment-input {
    display: block;
    width: 100%;
    padding: 10px 12px;
    background: var(--surface-card);
    border: 1px solid var(--outline-soft);
    border-radius: 8px;
    font-size: var(--fs-base);
    color: var(--text-secondary);
    font-style: italic;
    line-height: 1.45;
    font-family: inherit;
    resize: none;
    overflow: hidden;
    min-height: 44px;
    outline: none;
    transition: border-color 150ms ease, background 150ms ease;
  }
  .sd-comment-input:hover { border-color: var(--text-muted); }
  .sd-comment-input:focus {
    border-color: var(--accent-blue);
    background: var(--surface-card-hi, var(--surface-card));
    color: var(--text-primary);
    font-style: normal;
  }
  @media (pointer: coarse) { .sd-comment-input { font-size: 16px; } }
  .sd-no-loc {
    margin-top: 14px;
    padding: 14px;
    border: 1px dashed var(--outline-soft);
    border-radius: 8px;
    font-size: var(--fs-sm);
    color: var(--text-muted);
    text-align: center;
  }

  .sd-edit-req {
    padding: 10px 12px;
    background: color-mix(in oklab, var(--accent-amber) 10%, transparent);
    border: 1px solid color-mix(in oklab, var(--accent-amber) 35%, transparent);
    border-radius: 8px;
  }
  .sd-edit-times {
    font-size: var(--fs-sm);
    color: var(--text-primary);
  }
  .sd-edit-comment {
    margin-top: 6px;
    font-size: var(--fs-base);
    font-style: italic;
    color: var(--text-secondary);
    line-height: 1.45;
  }

  .sd-action-row {
    display: flex;
    gap: 10px;
    margin-top: 16px;
  }
  /* Shift-detail action row uses the global .btn system. */

  /* Explicit overrides so Editorial's big serif stat styles
     never leak into the shift-detail compact values. */
  .sd-name { font-family: var(--tf-display); font-weight: 400; font-size: var(--fs-md); letter-spacing: -0.2px; }
  .sd-date { font-family: var(--tf-body); font-style: italic; font-size: var(--fs-sm); }
  .sd-total-hrs { font-family: var(--tf-mono); }
  .sd-value { font-family: var(--tf-mono); }
  .sd-label,
  .sd-section-label {
    font-family: var(--tf-body); font-style: italic; font-weight: 400;
    letter-spacing: 0.4px; text-transform: none; font-size: var(--fs-xs);
  }
  .sd-comment { font-family: var(--tf-body); background: transparent; }
  .sd-edit-comment { font-family: var(--tf-body); }


  .shift-summary {
    background: transparent;
    border-top: 1.5px solid var(--text-primary);
    border-bottom: 1px solid var(--outline-soft);
    padding: 16px 4px;
  }
  .shift-summary .row {
    display: flex; justify-content: space-between; align-items: flex-end;
  }
  .shift-summary .col { display: flex; flex-direction: column; gap: 2px; }
  .shift-summary .col.r { align-items: flex-end; }
  .shift-summary .l-label {
    font-family: var(--tf-body);
    font-style: italic;
    font-size: var(--fs-xs);
    letter-spacing: 0.5px;
    color: var(--text-muted);
  }
  .shift-summary .time { font-size: var(--fs-xl); font-weight: 700; }
  .shift-summary .total {
    text-align: center; margin-top: 12px;
    border-top: 1px solid var(--outline-soft);
    padding-top: 14px;
  }
  .shift-summary .total .value {
    font-size: var(--fs-stat); font-weight: 800;
    color: var(--accent-green);
    letter-spacing: -1px;
  }
  .shift-summary .total .value.warn { color: var(--accent-red); }
  .shift-summary .total .unit {
    font-family: var(--tf-body);
    font-style: italic;
    font-size: var(--fs-base);
    color: var(--text-secondary);
    margin-left: 6px;
  }
  .comment-field {
    margin-top: 12px;
    padding: 10px 0;
    background: transparent;
    border: 0;
    border-bottom: 1.5px solid var(--outline-soft);
    color: var(--text-primary);
    font-family: var(--tf-body);
    font-size: var(--fs-base);
    width: 100%;
    resize: none;
    outline: none;
    min-height: 52px;
    transition: border-color 150ms ease;
  }
  .comment-field:focus { border-color: var(--accent-blue); }
  /* Only applied after a failed submit attempt — calm by default. Uses
     !important to override per-theme border/background treatments. */
  .comment-field.required {
    border: 1px solid rgba(239,68,68,.55) !important;
    border-radius: 10px !important;
    background: rgba(239,68,68,.06) !important;
  }
  /* Hint (amber pill) shown whenever a shift is under 9 hours. Informative,
     not alarming — only promotes to red once the user submits without one. */
  .comment-required-note {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 8px;
    padding: 4px 10px;
    font-size: var(--fs-xs);
    font-weight: 600;
    line-height: 1.3;
    background: rgba(245,158,11,.15);
    border: 1px solid rgba(245,158,11,.35);
    color: var(--accent-amber);
    border-radius: 999px;
  }
  .comment-required-note::before {
    content: "ⓘ";
    font-weight: 700;
  }
  .comment-field.required + .comment-required-note {
    background: rgba(239,68,68,.14);
    border-color: rgba(239,68,68,.4);
    color: var(--accent-red-light);
  }

  /* Toast */
  .toast-wrap {
    position: absolute;
    left: 14px; right: 14px; bottom: 28px;
    display: flex; flex-direction: column; gap: 8px;
    pointer-events: none; z-index: 30;
  }
  .toast {
    background: var(--surface-card-hi);
    border: 1px solid var(--outline-soft);
    color: var(--text-primary);
    padding: 10px 14px;
    border-radius: 12px;
    font-size: var(--fs-sm);
    box-shadow: 0 10px 30px rgba(0,0,0,.4);
    display: flex; gap: 10px; align-items: center;
    animation: toast-in 220ms ease both;
    pointer-events: auto;
  }
  .toast.leave { animation: toast-out 220ms ease both; }
  .toast .pill {
    background: var(--accent-blue);
    color: #fff;
    font-weight: 700;
    font-size: var(--fs-cap); letter-spacing: 0.4px; text-transform: uppercase;
    padding: 3px 7px; border-radius: 999px;
  }
  .toast.success .pill { background: var(--accent-green); }
  .toast.warn .pill { background: var(--accent-amber); color: #000; }
  .toast.error .pill { background: var(--accent-red); }
  @keyframes toast-in {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes toast-out {
    from { opacity: 1; transform: translateY(0); }
    to   { opacity: 0; transform: translateY(8px); }
  }

  /* Month slide animation */
  .month-anim-next { animation: slide-left 260ms ease both; }
  .month-anim-prev { animation: slide-right 260ms ease both; }
  @keyframes slide-left {
    from { opacity: 0; transform: translateX(18px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  @keyframes slide-right {
    from { opacity: 0; transform: translateX(-18px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  /* Screen transition */
  .screen-enter { animation: fade-up 260ms ease both; }
  @keyframes fade-up {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Modal */
  .modal-scrim {
    position: absolute;
    inset: 0;
    background: oklch(16% 0.015 30 / .45);
    display: grid; place-items: center;
    z-index: 20;
    animation: fade-in 180ms ease both;
  }
  @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
  .modal-card {
    position: relative;
    background: var(--t-bg);
    border: 1px solid var(--outline-soft);
    border-radius: 2px;
    padding: 22px 20px;
    width: calc(100% - 36px);
    max-height: calc(100% - 40px);
    overflow-y: auto;
    animation: modal-in 220ms cubic-bezier(.2,.8,.2,1) both;
  }
  /* Close affordance in the top-right of every modal/sheet. Same icon-btn
     visual as the floating back/account buttons on full-page screens —
     44px hit target, transparent fill with hover surface-dark, x-icon at
     20px. The scrim still closes on tap-out; this is the explicit option. */
  .modal-close {
    position: absolute;
    top: 6px;
    right: 6px;
    width: 44px; height: 44px;
    border-radius: 12px;
    display: grid; place-items: center;
    background: transparent;
    border: 0;
    padding: 0;
    color: var(--text-secondary);
    cursor: pointer;
    touch-action: manipulation;
    transition: background 150ms ease, color 100ms ease, transform 100ms ease;
    z-index: 2;
  }
  .modal-close:hover { background: var(--surface-dark); color: var(--text-primary); }
  .modal-close:active { transform: scale(.92); }
  .modal-close svg { width: 20px; height: 20px; }
  /* Intra-modal re-renders (expand/collapse, switch sub-modals) keep the
     scrim and card in place visually — skip the entrance animations. */
  .modal-scrim.no-anim, .modal-card.no-anim { animation: none !important; }
  @keyframes modal-in {
    from { opacity: 0; transform: translateY(12px) scale(.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  /* Status pill entrance — applied as a one-shot class (.pop-in) after a
     button→pill swap so the newly-rendered pill scales in from zero. */
  @keyframes pillPop {
    0%   { opacity: 0; transform: scale(.55); }
    60%  { opacity: 1; transform: scale(1.12); }
    100% { opacity: 1; transform: scale(1); }
  }
  .status-pill.pop-in,
  .w-status.pop-in {
    animation: pillPop 360ms cubic-bezier(.22, 1, .36, 1);
    transform-origin: center;
  }
  .modal-card h3 {
    margin: 0 0 4px;
    /* Reserve the top-right 44px hit zone for .modal-close. Without this,
       a long title like "Eliminar usuario permanentemente" runs under the X. */
    padding-right: 44px;
    font-size: var(--fs-xl);
    font-weight: 400;
    letter-spacing: -0.4px;
    line-height: 1.15;
  }
  .modal-card p {
    margin: 0 0 18px;
    color: var(--text-secondary);
    font-family: var(--tf-body);
    font-style: italic;
    font-size: var(--fs-sm);
  }
  .modal-card input, .modal-card textarea, .modal-card select {
    display: block;
    width: 100%;
    background: var(--surface-dark);
    border: 1px solid var(--outline-soft);
    border-radius: 2px;
    padding: 10px 12px;
    color: var(--text-primary);
    font-size: var(--fs-sm);
    font-family: inherit;
    margin-bottom: 10px;
    outline: none;
    transition: border-color 150ms ease;
  }
  .modal-card input:focus, .modal-card textarea:focus { border-color: var(--accent-blue); }

  /* Password input + inline reveal toggle. The wrapper carries the
     bottom-margin so the underlying input still flows like every other
     `.modal-card input`; the input itself drops its own margin and adds
     right-padding so text doesn't slide under the eye button. The toggle
     is a 44×44 hit target (mobile-first rule) with the icon centered. */
  .pw-wrap { position: relative; margin-bottom: 10px; }
  .pw-wrap input { margin-bottom: 0 !important; padding-right: 44px !important; }
  .pw-toggle {
    position: absolute; top: 50%; right: 0;
    transform: translateY(-50%);
    width: 44px; height: 44px;
    display: grid; place-items: center;
    background: transparent; border: 0; padding: 0; margin: 0;
    color: var(--text-muted); cursor: pointer;
    border-radius: 2px;
    touch-action: manipulation;
  }
  .pw-toggle:hover { color: var(--text-primary); }
  .pw-toggle:focus-visible { outline: 2px solid var(--accent-blue); outline-offset: -2px; }

  /* On the login form (underline-style fields, not the boxed modal style)
     the toggle sits a hair above the underline to stay visually balanced. */
  .login-form .pw-wrap { margin-bottom: 0; }
  .login-form .pw-wrap input { padding-right: 44px !important; }

  /* Reveal-after-reset card: the password is shown back to the owner in a
     monospace pill so they can read it back to the user without misreading
     l/I/1/0/O. Tap the pill to copy. */
  .pw-reveal {
    display: flex; align-items: center; gap: 8px;
    background: var(--surface-dark);
    border: 1px solid var(--outline-soft);
    border-radius: 2px;
    padding: 10px 12px;
    margin: 6px 0 10px;
  }
  .pw-reveal .pw-reveal-value {
    flex: 1; min-width: 0;
    font-family: var(--tf-mono, ui-monospace, Menlo, monospace);
    font-size: var(--fs-lg);
    letter-spacing: 0.5px;
    color: var(--text-primary);
    word-break: break-all;
    user-select: all;
  }
  .pw-reveal .pw-reveal-copy {
    flex: 0 0 auto;
    background: transparent;
    border: 1px solid var(--outline-soft);
    border-radius: 2px;
    padding: 6px 10px;
    color: var(--text-primary);
    font-family: inherit;
    font-size: var(--fs-sm);
    cursor: pointer;
    min-height: 32px;
  }
  /* Marker class: textarea auto-grows from one line via JS (see the
     `autosize` handler attached per field). Disable manual resize + hide
     the transient scrollbar that briefly appears while scrollHeight settles. */
  .modal-card textarea.ta-autosize { resize: none; overflow: hidden; }

  /* Prevent iOS Safari from auto-zooming the viewport when a form field is
     focused. It only zooms if the focused field's computed font-size is under
     16px, so bump form fields to 16px on touch devices. Desktop stays compact. */
  @media (pointer: coarse) {
    .login-form input,
    .modal-card input,
    .modal-card textarea,
    .modal-card select { font-size: 16px; }
  }

  /* Bottom-sheet modal on narrow viewports (phones). On tablet/desktop the
     modal stays centered. Bottom sheet is the native pattern on both Android
     (Material) and iOS, and it keeps the confirm button in thumb reach.

     The --kb-inset variable is updated live by the VisualViewport JS below
     so the sheet lifts above the soft keyboard when a field inside it is
     focused. Without this, the keyboard overlays the sheet and hides the
     textarea + confirm button. */
  @media (max-width: 640px) {
    .modal-scrim {
      place-items: end stretch;
      padding: 0;
      padding-bottom: var(--kb-inset, 0px);
      transition: padding-bottom 180ms ease;
    }
    .modal-card {
      width: 100%;
      max-width: 100%;
      /* `dvh` tracks the *visible* viewport height on iOS Safari — so the
         sheet can't extend under the URL bar the way `88vh` allowed. */
      max-height: calc(80dvh - var(--kb-inset, 0px));
      border-radius: 22px 22px 0 0;
      padding-bottom: max(22px, calc(env(safe-area-inset-bottom) + 12px));
      animation: sheet-in 260ms cubic-bezier(.2,.8,.2,1) both;
    }
    @keyframes sheet-in {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }
  }
  .modal-card .actions {
    display: flex; justify-content: flex-end; gap: 8px;
    margin-top: 6px;
  }
  /* Modal buttons use the global .btn system — no overrides needed. */

  /* Small field labels above inputs — one class, consistent spacing. */
  .field-label {
    display: block;
    margin-bottom: var(--space-1);
    font-family: var(--tf-body);
    font-style: italic;
    font-size: var(--fs-xs);
    letter-spacing: 0.5px;
    color: var(--text-muted);
  }
  /* Compact inline timezone picker inside the add-shift modal. The zone is
     secondary metadata — don't give it a full-width labeled row like Date /
     Start / End. */
  .modal-card .tz-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 2px 0 14px;
  }
  .modal-card .tz-row-label {
    font-family: var(--tf-body);
    font-style: italic;
    font-size: var(--fs-xs);
    letter-spacing: 0.5px;
    color: var(--text-muted);
    flex-shrink: 0;
  }
  .modal-card select.tz-select-compact {
    width: auto;
    margin: 0;
    padding: 6px 8px;
    font-size: var(--fs-sm);
  }
  @media (pointer: coarse) {
    .modal-card select.tz-select-compact { font-size: 16px; padding: 8px 10px; }
  }
  .modal-card .err {
    font-size: var(--fs-sm); color: var(--accent-red-light);
    background: rgba(239,68,68,.08);
    border-radius: 10px;
    padding: 8px 10px;
    margin-bottom: 10px;
  }
  /* Manage employees — stacked so names and role sub-text always get the
     full row width, and action buttons live on their own row below. With
     the old horizontal layout, narrow viewports squeezed the left column
     hard enough to wrap "Alejandra A." and "READ-ONLY" onto two lines
     despite plenty of empty vertical space on each card. */
  .modal-card .manage-list {
    display: flex; flex-direction: column; gap: 8px;
    margin-bottom: 12px;
  }
  .modal-card .manage-row {
    display: flex; align-items: center; gap: 10px;
    padding: 14px 16px;
    border-radius: 12px;
    background: var(--surface-dark);
  }
  .modal-card .manage-row.tappable {
    cursor: pointer;
    touch-action: manipulation;
    transition: background 150ms ease;
  }
  .modal-card .manage-row.tappable:hover { background: var(--surface-card-hi); }
  .modal-card .manage-row.tappable:active { filter: brightness(.96); }
  .modal-card .manage-row .left { flex: 1; min-width: 0; }
  .modal-card .manage-row .name {
    font-weight: 700; color: var(--text-primary);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .modal-card .manage-row .sub {
    font-size: var(--fs-xs); color: var(--text-muted); margin-top: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .modal-card .manage-row .chev {
    color: var(--text-secondary); flex-shrink: 0;
  }
  .modal-card .manage-section-label {
    font-size: var(--fs-xs); font-weight: 700; letter-spacing: 0.4px;
    text-transform: uppercase; color: var(--text-muted);
    margin: 8px 0 6px;
  }

  /* History screen */
  /* Each shift renders as a real tappable card, iOS-style: solid surface
     fill + rounded corners + a prominent right-edge chevron + press
     highlight. No border-bottom divider — separation comes from the gap
     between cards and the contrast between card surface and page background. */
  .hist-shift-card {
    position: relative;
    background: var(--surface-card);
    border: 1px solid var(--outline-soft);
    border-radius: 12px;
    padding: 12px 36px 12px 14px;
    margin-top: 8px;
    min-height: 44px;
    touch-action: manipulation;
    transition: background 150ms ease, border-color 150ms ease, transform 80ms ease;
  }
  .hist-shift-card:first-of-type { margin-top: 10px; }
  .hist-shift-card::after {
    content: "";
    position: absolute;
    right: 14px;
    top: 50%;
    width: 9px;
    height: 9px;
    border-right: 2px solid var(--text-muted);
    border-top: 2px solid var(--text-muted);
    transform: translateY(-50%) rotate(45deg);
    pointer-events: none;
    transition: border-color 150ms ease, right 150ms ease;
  }
  @media (hover: hover) {
    .hist-shift-card:hover {
      background: var(--surface-card-hi, color-mix(in oklab, var(--text-primary) 4%, var(--surface-card)));
      border-color: color-mix(in oklab, var(--text-primary) 14%, transparent);
    }
    .hist-shift-card:hover::after {
      border-right-color: var(--text-secondary);
      border-top-color: var(--text-secondary);
      right: 12px;
    }
  }
  .hist-shift-card:active {
    background: color-mix(in oklab, var(--text-primary) 7%, var(--surface-card));
    transform: scale(.995);
  }
  .hist-shift-card:active::after {
    border-right-color: var(--text-primary);
    border-top-color: var(--text-primary);
  }
  .hist-shift-card .top {
    display: flex; justify-content: space-between; align-items: center;
  }
  .hist-shift-card .left {
    display: flex; align-items: center; gap: 10px;
  }
  .hist-shift-card .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
  }
  .hist-shift-card .status-dot.ok { background: var(--accent-green); }
  .hist-shift-card .status-dot.warn { background: var(--accent-red); }
  .hist-shift-card .date {
    font-family: var(--tf-display);
    font-weight: 400;
    font-size: var(--fs-base);
  }
  .hist-shift-card .hrs {
    font-size: var(--fs-base); font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  .hist-shift-card .hrs.ok { color: var(--accent-green); }
  .hist-shift-card .hrs.warn { color: var(--accent-red); }
  /* Single-line time range under the date/hours row. Matches the visual
     weight of `.dd-table .tm` so history and day-detail read consistently. */
  .hist-shift-card .shift-time-line {
    margin-top: 6px;
    font-family: var(--tf-body);
    font-size: var(--fs-sm);
    color: var(--text-secondary);
    font-variant-numeric: tabular-nums;
  }
  .hist-shift-card .comment {
    margin-top: 8px;
    font-family: var(--tf-body);
    font-size: var(--fs-base);
    font-style: italic;
    font-weight: 400;
    color: var(--text-muted);
  }
  .hist-shift-card .week-status {
    margin-top: 8px; display: inline-flex;
    font-family: var(--tf-body);
    font-size: var(--fs-cap); font-weight: 700; letter-spacing: 1.2px;
    padding: 3px 8px; border-radius: 999px; text-transform: uppercase;
  }
  .hist-shift-card .week-status.pending { background: rgba(245,158,11,.2); color: var(--accent-amber); }
  .hist-shift-card .week-status.approved { background: rgba(16,185,129,.2); color: var(--accent-green-light); }

  /* History grouping */
  .hist-month-head {
    display: flex; align-items: baseline; justify-content: space-between;
    margin: 28px 4px 2px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--outline-soft);
  }
  .hist-month-head:first-child { margin-top: 8px; }
  /* Month is a divider, not a heading — the week cards are the content.
     Small uppercase label, letterspaced, muted. Matches the m-stats row
     on its right so the two feel like one horizontal meta rule. */
  .hist-month-head .m-title {
    font-family: var(--tf-body);
    font-size: var(--fs-xs);
    font-weight: 500;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .hist-month-head .m-stats {
    font-family: var(--tf-mono);
    font-size: var(--fs-xs);
    font-weight: 500;
    color: var(--text-muted);
    font-variant-numeric: tabular-nums;
  }
  /* Each week is a substantial card (Manage-Users pattern): rounded,
     surface-dark background, fat padding. The whole header row is the
     tap target; expanded shifts render INSIDE the card so the week
     reads as a single visual unit. Status comes from the .w-status pill. */
  .week-group {
    margin-top: 12px;
    padding: 14px 16px;
    border-radius: 12px;
    background: var(--surface-dark);
  }
  .hist-week-head {
    display: flex; align-items: center; justify-content: space-between;
    gap: 10px;
  }
  .hist-week-head .w-title {
    font-family: var(--tf-display);
    font-weight: 400;
    font-size: var(--fs-xl);
    letter-spacing: -0.4px;
    line-height: 1.1;
    color: var(--text-primary);
    font-variant-numeric: tabular-nums;
  }
  .hist-week-head .w-right {
    display: flex; align-items: center; gap: 10px;
  }
  .hist-week-head .w-hrs {
    font-family: var(--tf-mono);
    font-size: var(--fs-base);
    font-weight: 700;
    color: var(--text-primary);
    font-variant-numeric: tabular-nums;
  }
  .hist-week-head .w-status {
    font-family: var(--tf-body);
    font-size: var(--fs-cap);
    font-weight: 700;
    letter-spacing: 1.2px;
    padding: 3px 8px;
    border-radius: 999px;
    text-transform: uppercase;
  }
  .hist-week-head .w-status.pending  { background: rgba(245,158,11,.2); color: var(--accent-amber); }
  .hist-week-head .w-status.approved { background: rgba(16,185,129,.2); color: var(--accent-green-light); }
  .hist-week-head .w-status.rejected { background: rgba(239,68,68,.2); color: var(--accent-red-light, #fca5a5); }
  /* Admin-only: approved pill doubles as a dropdown trigger. Menu
     anchors relative to the pill. Click is not allowed to bubble to the
     row expand/collapse (handled in JS via stopPropagation). */
  .hist-week-head .w-status.has-menu {
    position: relative;
    cursor: pointer;
    touch-action: manipulation;
  }
  .hist-week-head .w-status.has-menu::after {
    content: "▾";
    margin-left: 4px;
    opacity: .7;
  }
  .hist-week-head .w-status.has-menu.open::after { transform: rotate(180deg); }
  .w-status-menu {
    position: absolute;
    top: calc(100% + 6px);
    right: 0;
    min-width: 140px;
    background: var(--surface-card);
    border: 1px solid var(--outline-soft);
    border-radius: 2px;
    padding: 6px;
    box-shadow: 0 8px 24px rgba(0,0,0,.15), 0 2px 6px rgba(0,0,0,.08);
    z-index: 40;
    text-align: left;
    cursor: default;
    animation: fade-up 140ms ease both;
  }
  .w-status-menu-item {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    min-height: 36px;
    padding: 0 12px;
    background: transparent;
    border: 0;
    font-family: var(--tf-body);
    font-size: var(--fs-sm);
    font-weight: 500;
    text-align: left;
    color: var(--text-primary);
    border-radius: 2px;
    cursor: pointer;
    touch-action: manipulation;
    transition: background 120ms ease;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .w-status-menu-item:active { background: var(--surface-dark); }
  @media (hover: hover) {
    .w-status-menu-item:hover { background: var(--surface-dark); }
  }
  .w-status-menu-item.confirm {
    background: var(--accent-red);
    color: var(--t-bg);
  }
  .w-status-menu-item.confirm:active { background: var(--accent-red); }
  @media (hover: hover) {
    .w-status-menu-item.confirm:hover { background: var(--accent-red); }
  }
  /* Shifts nested inside a "week roll-up" card (history `.week-group`,
     home `.week-submit`, and `.past-weeks .prow`) all share the same
     compact treatment: dashed separator above the first, dotted between,
     date demoted from a Gloock headline to a body-font data row. The
     marker class `.week-rollup` is added to every container that wants
     this so we don't have to chain three selectors here. */
  /* Inside an expanded week (on History or the admin employee profile),
     shift cards keep the same tappable card treatment as on Home. They
     stack with a small gap between each so the week reads as a grouped
     list, but each card still feels like its own distinct tap target. */
  .week-rollup .hist-shift-card {
    margin-top: 8px;
    padding: 12px 36px 12px 14px;
  }
  .week-rollup .hist-shift-card:first-of-type { margin-top: 10px; }
  .week-rollup .hist-shift-card .date {
    font-family: var(--tf-body);
    font-weight: 600;
    font-size: var(--fs-base);
    letter-spacing: 0;
    color: var(--text-secondary);
  }

  /* Map */
  /* Compact thumbnail variant for the clock-in/out card: shorter, no legend,
     no interaction hint. Applied alongside .mini-map. */
  .mini-map--thumb {
    height: 88px !important;
    border-radius: 10px !important;
    margin-top: 8px;
    margin-bottom: 2px;
  }
  .mini-map--thumb .legend,
  .mini-map--thumb .mini-map--locked::after { display: none !important; }
  .mini-map--thumb .leaflet-control-attribution { display: none !important; }

  .mini-map {
    position: relative;
    width: 100%;
    height: 180px;
    border-radius: 16px;
    overflow: hidden;
    margin-top: 10px;
    background: #0a1b2e;
  }
  .mini-map .tiles {
    position: absolute;
    inset: 0;
    display: grid;
  }
  .mini-map .tiles img,
  .mini-map .leaflet-tile {
    width: 100%; height: 100%;
    display: block;
    filter: hue-rotate(190deg) saturate(.35) brightness(.7) contrast(1.1);
  }
  .mini-map .leaflet-container { width: 100%; height: 100%; background: #0a1b2e; font: inherit; }
  .mini-map .pins {
    position: absolute; inset: 0;
    pointer-events: none;
  }
  .mini-map .pin,
  .mini-map .leaflet-marker-icon .pin {
    width: 16px; height: 16px;
    border-radius: 50%;
    border: 3px solid #fff;
    box-shadow: 0 0 0 2px rgba(0,0,0,.4), 0 2px 6px rgba(0,0,0,.5);
    box-sizing: border-box;
  }
  .mini-map .pins .pin {
    position: absolute;
    transform: translate(-50%, -50%);
  }
  .mini-map .pin.in { background: var(--accent-green); }
  .mini-map .pin.out { background: var(--accent-red); }
  .mini-map .legend {
    position: absolute;
    left: 10px; bottom: 10px;
    z-index: 500;
    pointer-events: none;
    display: flex; gap: 10px;
    font-size: var(--fs-xs); font-weight: 600;
    background: rgba(13,27,42,.85);
    padding: 4px 8px;
    border-radius: 999px;
    backdrop-filter: blur(4px);
  }
  .mini-map .leaflet-bar a { border-radius: 0; }
  .mini-map.mini-map--locked::after {
    /* Set from JS via --mini-map-hint so the string is i18n'd. */
    content: var(--mini-map-hint, "Click map to enable scroll zoom");
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: var(--fs-sm); font-weight: 600;
    background: rgba(10, 27, 46, 0);
    pointer-events: none;
    opacity: 0;
    transition: opacity .18s ease, background .18s ease;
    z-index: 400;
  }
  .mini-map.mini-map--locked.show-hint::after {
    opacity: 1;
    background: rgba(10, 27, 46, .35);
  }
  .mini-map .legend span {
    display: inline-flex; align-items: center; gap: 4px;
  }
  .mini-map .legend span::before {
    content: ""; width: 7px; height: 7px; border-radius: 50%;
  }
  .mini-map .legend .in::before { background: var(--accent-green); }
  .mini-map .legend .out::before { background: var(--accent-red); }

  /* Weekly approvals banner */
  .approvals-banner {
    background: transparent;
    border-top: 1.5px solid var(--accent-amber);
    border-bottom: 1px solid var(--accent-amber);
    padding: 14px 4px;
    margin-top: 12px;
    display: flex; align-items: center; gap: 10px;
    cursor: pointer;
    transition: background 150ms ease;
  }
  .approvals-banner:hover { background: rgba(245,158,11,.08); }
  .approvals-banner .icon {
    width: 36px; height: 36px;
    border-radius: 2px;
    background: var(--accent-amber);
    color: var(--t-bg);
    display: grid; place-items: center;
    flex: 0 0 auto;
  }
  .approvals-banner .icon svg { width: 20px; height: 20px; }
  .approvals-banner .body { flex: 1; }
  .approvals-banner .title {
    font-family: var(--tf-display);
    font-size: var(--fs-lg);
    color: var(--accent-amber);
  }
  .approvals-banner .meta {
    font-family: var(--tf-mono);
    font-size: var(--fs-xs);
    color: var(--text-muted);
    margin-top: 1px;
  }

  /* Week submission card */
  .week-submit {
    background: transparent;
    border-top: 1.5px solid var(--text-primary);
    border-bottom: 1px solid var(--outline-soft);
    padding: 14px 4px;
    margin-top: 12px;
    display: flex; flex-direction: column; gap: 10px;
  }
  .week-submit .head {
    display: flex; align-items: center; gap: 12px;
  }
  .week-submit .left { flex: 1; min-width: 0; }
  /* Week date-range reads as a lede: Gloock display, sized up enough to
     anchor the card without an "ESTA SEMANA / THIS WEEK" prefix. Matches
     .hist-week-head .w-title treatment so the role stays consistent across
     home and history. */
  .week-submit .title {
    font-family: var(--tf-display);
    font-weight: 400;
    font-size: var(--fs-lg);
    letter-spacing: -0.3px;
    line-height: 1.15;
  }
  .week-submit .sub {
    font-family: var(--tf-mono);
    font-size: var(--fs-xs);
    font-weight: 500;
    color: var(--text-muted);
    font-variant-numeric: tabular-nums;
    margin-top: 4px;
  }
  /* Week-submit / past-weeks buttons use the global .btn.primary system. */
  .week-submit .status-pill {
    font-family: var(--tf-body);
    font-size: var(--fs-cap);
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 999px;
  }
  .week-submit .status-pill.pending { background: rgba(245,158,11,.2); color: var(--accent-amber); }
  .week-submit .status-pill.approved { background: rgba(16,185,129,.2); color: var(--accent-green-light); }
  .week-submit .attest {
    font-family: var(--tf-body);
    font-style: italic;
    font-size: var(--fs-xs);
    color: var(--text-muted);
    margin-top: 6px;
    line-height: 1.4;
  }
  .signoff-label--urgent { color: var(--accent-amber) !important; }
  /* Urgent past-weeks card: full amber border + tinted background. The previous
     treatment used a thick left-stripe (`border-left-width: 3px`) which is
     BAN 1 in `.impeccable.md` — never use a side stripe as an accent indicator. */
  .past-weeks--urgent {
    border: 1px solid rgba(245,158,11,.5);
    background: color-mix(in oklab, var(--accent-amber) 5%, var(--surface-card));
  }

  .signoff-label {
    font-family: var(--tf-body);
    font-size: var(--fs-xs);
    font-weight: 500;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin: 18px 4px 6px;
  }
  /* Today marker above the clock-in button. Small caps label, not a
     heading — the big name greeting is the heading. */
  .today-label {
    text-align: center;
    font-family: var(--tf-body);
    font-size: var(--fs-xs);
    font-weight: 500;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-top: 4px;
  }
  .past-weeks {
    background: var(--surface-card);
    border-radius: 16px;
    padding: 4px 4px;
    margin-top: 6px;
  }
  .past-weeks .prow {
    display: flex; flex-direction: column; gap: 8px;
    padding: 10px 12px;
    border-bottom: 1px solid var(--outline-soft);
  }
  .past-weeks .prow:last-child { border-bottom: 0; }
  .past-weeks .prow .head {
    display: flex; align-items: center; gap: 12px;
  }
  .past-weeks .prow .left { flex: 1; min-width: 0; }
  .past-weeks .prow .title { font-size: var(--fs-sm); font-weight: 600; }
  .past-weeks .prow .sub {
    font-size: var(--fs-xs);
    color: var(--text-secondary);
    margin-top: 1px;
    font-variant-numeric: tabular-nums;
  }
  .past-weeks .empty {
    font-size: var(--fs-xs);
    color: var(--text-muted);
    text-align: center;
    padding: 10px;
    font-style: italic;
  }

  /* Approval row (in modal) */
  .approval-row {
    background: var(--surface-dark);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 8px;
  }
  .approval-row .top {
    display: flex; justify-content: space-between; align-items: center;
  }
  .approval-row .who { font-size: var(--fs-sm); font-weight: 700; }
  .approval-row .total {
    font-size: var(--fs-base); font-weight: 700;
    color: var(--accent-blue-bright);
    font-variant-numeric: tabular-nums;
  }
  .approval-row .week { font-size: var(--fs-xs); color: var(--text-secondary); margin-top: 2px; }
  .approval-row .actions {
    display: flex; gap: 8px; margin-top: 10px;
  }
  /* Approval row action buttons use the global .btn system (.primary / .danger / .danger-confirm). */

  /* Inline "why are you rejecting" form that swaps in for the actions row */
  .reject-form {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px dashed var(--outline-soft);
    animation: fade-in 180ms ease both;
  }
  .reject-reason-title {
    font-size: var(--fs-xs);
    font-weight: 700;
    color: var(--accent-red-light);
    letter-spacing: 0.3px;
    margin-bottom: 6px;
  }
  .reject-reason-field {
    width: 100%;
    box-sizing: border-box;
    font-family: inherit;
    font-size: var(--fs-base);
    padding: 8px 10px;
    border-radius: 8px;
    border: 1px solid var(--outline-soft);
    background: var(--surface-dark);
    color: var(--text-primary);
    resize: vertical;
    min-height: 64px;
  }
  .reject-reason-field:focus { outline: 2px solid var(--accent-red-light); outline-offset: -1px; }
  .reject-reason-err {
    font-size: var(--fs-xs);
    color: var(--accent-red-light);
    margin-top: 4px;
  }
  /* Rejection notice shown to the employee (on weekSignoffCard + past-week row)
     with the admin's reason for rejecting. */
  .rejection-notice {
    background: rgba(239,68,68,.08);
    border: 1px dashed rgba(239,68,68,.35);
    border-radius: 10px;
    padding: 8px 12px;
    animation: fade-in 220ms ease both;
  }
  .rejection-notice .label {
    font-size: var(--fs-cap);
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--accent-red-light, #fca5a5);
    margin-bottom: 2px;
  }
  .rejection-notice .reason {
    font-size: var(--fs-base);
    font-style: italic;
    color: var(--text-primary);
    line-height: 1.45;
  }
  /* Rejected past-week rows — status already visible via rejectionNotice banner. */

  /* Admin edit audit log on the shift detail screen */
  .sd-admin-log {
    display: flex; flex-direction: column; gap: 10px;
    margin-top: 6px;
  }
  .sd-admin-log-entry {
    background: var(--surface-dark);
    border-radius: 6px;
    padding: 8px 10px;
  }
  .sd-admin-log-entry .meta {
    display: flex; align-items: baseline; justify-content: space-between;
    font-size: var(--fs-cap);
    color: var(--text-muted);
    letter-spacing: 0.3px;
    margin-bottom: 4px;
  }
  .sd-admin-log-entry .meta .who {
    font-weight: 700;
    /* Admin/owner entries default to amber. Self (employee) entries get
       their personal user color set inline at render time so a roster of
       employees stays visually distinct in shared views. */
    color: var(--accent-amber);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .sd-admin-log-entry .diff {
    font-size: var(--fs-sm);
    font-variant-numeric: tabular-nums;
    margin-bottom: 4px;
  }
  .sd-admin-log-entry .diff .before {
    color: var(--text-muted);
    text-decoration: line-through;
  }
  .sd-admin-log-entry .diff .arrow {
    margin: 0 8px;
    color: var(--text-muted);
  }
  .sd-admin-log-entry .diff .after {
    font-weight: 700;
    color: var(--text-primary);
  }
  .sd-admin-log-entry .reason {
    font-size: var(--fs-base);
    font-style: italic;
    color: var(--text-secondary);
    line-height: 1.45;
  }
  /* Editable textarea inside a comment entry — blend into the card instead
     of standing out as a white input field. */
  .sd-admin-log-entry .sd-comment-input {
    margin-top: 4px;
    background: transparent;
    border-color: transparent;
    padding: 0;
    font-style: italic;
    color: var(--text-secondary);
    font-size: var(--fs-base);
    line-height: 1.45;
    min-height: 0;
  }
  .sd-admin-log-entry .sd-comment-input:hover { border-color: transparent; }
  .sd-admin-log-entry .sd-comment-input:focus {
    border-color: transparent;
    background: transparent;
    box-shadow: none;
  }
  @media (pointer: coarse) {
    .sd-admin-log-entry .sd-comment-input { font-size: 16px; }
  }

  /* "✎" admin-edit marker on a shift card — placed next to the date so the
     user can see which specific day was edited without opening the detail. */
  .hist-shift-card .edit-badge {
    display: inline-grid;
    place-items: center;
    width: 24px; height: 24px;
    border-radius: 50%;
    background: var(--accent-amber);
    color: #1a1a1a;
    font-size: var(--fs-cap);
    font-weight: 700;
    margin-left: 2px;
    flex: 0 0 auto;
  }
  /* edited shifts are signaled by the ✎ edit-badge, no stripe */
  .approval-row .top.expandable,
  .hist-week-head.expandable {
    cursor: pointer;
    user-select: none;
    transition: background 120ms ease;
  }
  .approval-row .top.expandable {
    margin: -12px -14px 0;
    padding: 12px 14px;
    border-radius: 12px 12px 0 0;
  }
  .approval-row .top.expandable:hover { background: rgba(255,255,255,.04); }
  /* The week card itself provides padding; the header just stretches
     across it and lifts the cursor to hint tappability. */
  .approval-row .total { display: flex; align-items: center; gap: 8px; }
  /* Row-expand chevron: right-pointing when collapsed, rotates to down when
     open. The previous treatment used a downward arrow that read like a
     dropdown trigger. */
  .chevron {
    font-size: 14px; color: var(--text-muted);
    transition: transform 180ms cubic-bezier(.2,.8,.2,1);
    display: inline-block;
    line-height: 1;
  }
  .chevron.up { transform: rotate(90deg); }

  /* Shared shift breakdown list */
  .breakdown {
    display: flex; flex-direction: column; gap: 8px;
  }
  .breakdown .drow {
    display: grid;
    grid-template-columns: 84px 1fr auto;
    column-gap: 12px;
    row-gap: 4px;
    align-items: baseline;
    padding: 10px 4px;
    font-size: var(--fs-sm);
    border-bottom: 1px dotted var(--outline-soft);
  }
  .breakdown .drow:last-child { border-bottom: 0; }
  .breakdown .drow.tappable {
    cursor: pointer;
    touch-action: manipulation;
    transition: background 120ms ease;
  }
  .breakdown .drow.tappable:hover { background: var(--surface-card-hi); }
  .breakdown .drow.tappable:active { filter: brightness(.96); }
  .breakdown .drow .d {
    color: var(--text-secondary);
    font-variant-numeric: tabular-nums;
    font-weight: 600;
  }
  .breakdown .drow .t {
    color: var(--text-primary);
    font-variant-numeric: tabular-nums;
  }
  .breakdown .drow .h {
    color: var(--accent-blue-bright);
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    text-align: right;
  }
  .breakdown .drow .h.ok { color: var(--accent-green); }
  .breakdown .drow .h.warn { color: var(--accent-red); }
  .breakdown .drow .c {
    grid-column: 2 / -1;
    font-size: var(--fs-xs);
    color: var(--text-muted);
    font-style: italic;
  }
  .breakdown .empty {
    font-size: var(--fs-xs);
    color: var(--text-muted);
    font-style: italic;
    text-align: center;
    padding: 4px 0;
  }
  /* When breakdown appears inside another card, add a divider on top.
     Only the admin approvals modal still uses `.breakdown` — home and
     past-weeks render `renderShiftCard()` instead via `.week-rollup`. */
  .approval-row .breakdown {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px dashed var(--outline-soft);
  }

  /* Read-only badge */
  .readonly-banner {
    background: transparent;
    border-top: 1px solid var(--accent-amber);
    border-bottom: 1px solid var(--accent-amber);
    color: var(--accent-amber);
    font-family: var(--tf-body);
    font-size: var(--fs-xs);
    padding: 6px 10px;
    margin-top: 6px;
    font-weight: 600;
    letter-spacing: 0.3px;
    display: flex; gap: 6px; align-items: center;
  }
  .readonly-banner svg { width: 14px; height: 14px; }

  /* ON SHIFT NOW — live roster of employees who have clocked in but not yet
     clocked out. Admin/owner/read-only see this at the top of the home screen.
     The pulsing dot reuses the employee clock-card's live indicator so "live"
     reads consistently across roles. */
  .live-head {
    display: flex; align-items: baseline; justify-content: space-between;
    margin: 4px 4px 0;
    padding-bottom: 6px;
    border-bottom: 1.5px solid var(--accent-green);
  }
  .live-head h3 {
    margin: 0;
    font-size: var(--fs-lg);
    letter-spacing: -0.2px;
    color: var(--accent-green);
    display: flex; align-items: center; gap: 10px;
  }
  .live-head small {
    font-family: var(--tf-body);
    font-style: italic;
    font-size: var(--fs-xs);
    color: var(--text-secondary);
  }
  .live-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--accent-green); position: relative; flex: 0 0 auto;
  }
  .live-dot::after {
    content: ""; position: absolute; inset: -5px;
    border-radius: 50%; background: var(--accent-green);
    opacity: .3; animation: pulse 1.6s ease-in-out infinite;
  }
  .live-row {
    display: flex; align-items: center; gap: 14px;
    padding: 13px 4px;
    border-bottom: 1px solid var(--outline-soft);
    cursor: pointer;
    transition: background 150ms ease;
  }
  .live-row:hover { background: var(--surface-card-hi); }
  .live-row .av {
    width: 40px; height: 40px; border-radius: 50%;
    display: grid; place-items: center;
    font-weight: 700; font-size: var(--fs-sm); flex: 0 0 auto;
  }
  .live-row .body { flex: 1; min-width: 0; }
  .live-row .name { font-size: var(--fs-base); font-weight: 600; }
  .live-row .since {
    font-size: var(--fs-xs); color: var(--text-secondary); margin-top: 2px;
  }
  .live-row .elapsed {
    font-size: var(--fs-md); font-weight: 700;
    color: var(--accent-green);
    font-variant-numeric: tabular-nums;
    flex: 0 0 auto;
  }
  /* Quiet state — nobody on shift. Kept visible (not hidden) so the absence
     reads as "checked and empty", not "feature missing". */
  .live-empty {
    margin-top: 2px;
    padding: 16px 4px;
    border-bottom: 1px solid var(--outline-soft);
    font-family: var(--tf-body); font-style: italic;
    font-size: var(--fs-sm); color: var(--text-muted);
    display: flex; align-items: center; gap: 10px;
  }
  /* Green "ON SHIFT" badge on the matching roster row below, so the live
     status is also visible in the full employee list (mirrors the amber
     .emp-row .badge). */
  .emp-row .badge.live {
    background: color-mix(in oklab, var(--accent-green) 18%, transparent);
    color: var(--accent-green);
  }

  /* Replaces the clock-in hero when the current week has already been
     approved by an admin — prevents silently adding new shifts to a
     closed week. Employee must wait for the next week or ask for reopen. */
  .week-closed-card {
    display: flex; gap: 14px; align-items: flex-start;
    padding: 16px 18px;
    background: transparent;
    border-top: 1.5px solid var(--text-primary);
    border-bottom: 1px solid var(--outline-soft);
  }
  .week-closed-card .icon {
    flex: 0 0 auto;
    width: 36px; height: 36px;
    display: grid; place-items: center;
    border: 1px solid var(--text-primary);
    color: var(--text-primary);
    border-radius: 2px;
  }
  .week-closed-card .body { flex: 1; min-width: 0; }
  .week-closed-card .title {
    font-family: var(--tf-display);
    font-weight: 400;
    font-size: var(--fs-lg);
    color: var(--text-primary);
    letter-spacing: -0.2px;
  }
  .week-closed-card .meta {
    font-family: var(--tf-body);
    font-size: var(--fs-sm);
    line-height: 1.45;
    color: var(--text-secondary);
    margin-top: 4px;
  }

  /* Display-face family — every heading and brand element uses Gloock. */
  .greeting .name,
  .month-nav .label,
  .section-header h3,
  .modal-card h3,
  .login-wrap .brand,
  .approvals-banner .title,
  .week-submit .title {
    font-family: var(--tf-display);
    font-weight: 400;
  }
  .login-wrap .brand { font-size: var(--fs-display); letter-spacing: -1.5px; line-height: .95; }
  .login-wrap .brand .accent { color: var(--accent-blue); }
  .login-wrap .tag {
    font-family: var(--tf-body); font-style: italic;
    color: var(--text-secondary); font-size: var(--fs-sm);
  }
  .cal .inner .num,
  .cal .pair,
  .dd-table .tm,
  .dd-table .hrs,
  .clock-card .time,
  .shift-summary .time,
  .shift-summary .total .value,
  .hist-shift-card .hrs,
  .approval-row .total,
  .week-submit .sub {
    font-family: var(--tf-mono);
    font-feature-settings: "tnum" 1;
    letter-spacing: -0.4px;
  }
  .icon-btn:hover,
  .month-nav .chev:hover { background: oklch(92% 0.02 85); }
  .lang-toggle { background: oklch(93% 0.02 85); border: 1px solid var(--outline-soft); }
  .lang-toggle .slider { background: var(--accent-blue); box-shadow: none; }
  .lang-toggle .opt.active { color: oklch(96% 0.015 85); }
  /* Calendar — single-letter dow labels need to be legible at arm's length
     end-of-shift, so we bump from 10px italic to 12px upright. The italic
     read like noise at small sizes on Android. */
  .cal .dows span {
    font-family: var(--tf-body);
    font-style: normal;
    font-weight: 600;
    color: var(--text-muted);
    font-size: var(--fs-xs);
    letter-spacing: 0.8px;
    text-transform: none;
  }
  .cal .inner { border-radius: 2px; }
  .cal .cell.today .inner {
    background: transparent;
    outline: 1.5px solid var(--text-primary);
    outline-offset: -2px;
  }
  .cal .cell.today .num { color: var(--text-primary); font-weight: 700; font-family: var(--tf-display); }
  .cal .cell.selected .inner { background: var(--accent-blue); }
  .cal .cell.selected .num,
  .cal .cell.selected .pair,
  .cal .cell.selected .pair .mid,
  .cal .cell.selected .pair .emp { color: oklch(96% 0.015 85); }
  .cal .inner .num { font-family: var(--tf-display); font-weight: 400; font-size: var(--fs-base); }
  .cal .pair { color: var(--text-primary); font-weight: 600; }
  .cal .pair .emp { color: var(--text-secondary); }
  .cal .heat-1 .inner { background: oklch(94% 0.02 85); }
  .cal .heat-2 .inner { background: oklch(90% 0.028 85); }
  .cal .heat-3 .inner { background: oklch(85% 0.035 85); }
  .cal .heat-4 .inner { background: oklch(79% 0.042 85); }
  .day-detail {
    background: transparent; border: 0;
    border-top: 1.5px solid var(--text-primary);
    border-bottom: 1px solid var(--outline-soft);
    border-radius: 0; padding: 14px 2px;
  }
  .day-detail .date-label {
    font-family: var(--tf-display); font-weight: 400;
    font-size: var(--fs-lg); letter-spacing: -0.2px;
    text-transform: none;
    margin-bottom: 10px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--outline-soft);
  }
  .dd-table .head {
    font-family: var(--tf-body);
    font-style: italic;
    font-weight: 400;
    letter-spacing: 0.5px;
    text-transform: none;
    color: var(--text-muted);
    border-bottom: 1px solid var(--text-primary);
  }
  .dd-table .trow { border-bottom: 1px dotted var(--outline-soft); }
  .dd-table .nm { font-family: var(--tf-display); font-weight: 400; font-size: var(--fs-sm); }
  /* Emp-row typography — ex-editorial overrides to the base rules above */
  .emp-row .name { font-family: var(--tf-display); font-weight: 400; font-size: var(--fs-md); }
  .emp-row .meta { font-family: var(--tf-mono); font-size: var(--fs-xs); color: var(--text-muted); }
  .emp-row .badge {
    background: transparent;
    color: var(--accent-amber);
    border: 1px solid var(--accent-amber);
    border-radius: 2px;
    letter-spacing: 1.2px;
    font-family: var(--tf-body);
  }
  /* Buttons live in the global .btn system — see top of stylesheet. */
