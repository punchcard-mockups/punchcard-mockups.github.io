  /* Status pills in week-submit: outlined, no fill, editorial letter-spacing */
  .week-submit .status-pill {
    background: transparent;
    border: 1px solid currentColor;
    border-radius: 2px;
    letter-spacing: 1.2px;
    font-family: var(--tf-body);
  }
  .week-submit .status-pill.pending { color: var(--accent-amber); }
  .week-submit .status-pill.approved { color: var(--accent-green); }
  /* History shift comment + week-status typography */
  .hist-shift-card .week-status { background: transparent; border: 1px solid currentColor; border-radius: 2px; letter-spacing: 1.2px; font-family: var(--tf-body); }
  .hist-shift-card .week-status.pending { color: var(--accent-amber); }
  .hist-shift-card .week-status.approved { color: var(--accent-green); }
  /* Map */
  .mini-map { border-radius: 2px; border: 1px solid var(--outline-soft); background: oklch(90% 0.018 85); }
  .mini-map .tiles img,
  .mini-map .leaflet-tile { filter: sepia(0.22) saturate(0.8) brightness(0.95) contrast(1.05); }
  .mini-map .legend { background: oklch(16% 0.015 30 / .85); color: oklch(96% 0.015 85); border-radius: 2px; font-family: var(--tf-body); }
  /* Modal */
  /* On narrow viewports the modal is a bottom sheet — the rounded top
     corners are the affordance that tells the user "this is a sheet,"
     so the editorial border-radius:2px override has to give way here. */
  @media (max-width: 640px) {
    .modal-card {
      border-radius: 22px 22px 0 0;
      border-bottom: 0; border-left: 0; border-right: 0;
    }
  }
  .modal-card input, .modal-card textarea {
    background: transparent; border: 0; border-bottom: 1.5px solid var(--outline-soft); border-radius: 0; padding: 10px 4px;
    font-family: var(--tf-body);
  }
  .approval-row { background: transparent; border: 0; border-bottom: 1px dotted var(--outline-soft); border-radius: 0; padding: 14px 4px; }
  .approval-row .who { font-family: var(--tf-display); font-weight: 400; font-size: var(--fs-base); }
  .toast { background: var(--text-primary); color: var(--t-bg); border: 1px solid var(--text-primary); border-radius: 2px; font-family: var(--tf-body); }
  .toast .pill { background: var(--accent-blue); color: var(--t-bg); border-radius: 2px; font-family: var(--tf-body); }
  .toast.success .pill { background: var(--accent-green); color: var(--t-bg); }
  .toast.warn .pill { background: var(--accent-amber); color: var(--t-bg); }
  .toast.error .pill { background: var(--accent-red); color: var(--t-bg); }


  /* =========================================================
     APP SHELL — fixed to viewport edges so it can never overflow.
     Works on any device by definition.
     ========================================================= */
  html, body {
    overflow: hidden;
    overscroll-behavior: none;
  }

  .app-root {
    position: fixed;
    inset: 0;
    background: var(--t-bg);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Hidden in the page chrome — its text is read into the account-menu
     footer (see renderUserMenu) so the version tag still ships, but
     doesn't claim screen real estate on every page. */
  .version-tag { display: none; }
  .user-menu-version {
    padding: 6px 12px 4px;
    font-size: var(--fs-cap);
    font-family: ui-monospace, Menlo, monospace;
    color: var(--text-muted);
    letter-spacing: 0.3px;
    text-align: right;
    user-select: none;
    /* Hyphens in the date portion are soft break points; without nowrap
       the browser splits "v.2026-05-06.1948" across two lines. */
    white-space: nowrap;
  }

  /* Bottom bar — home for the tabbar (employees) and pinned-approvals
     (admin). Either content may render into it; the empty state collapses. */
  #bottomBarRoot {
    flex: 0 0 auto;
    position: relative;
    z-index: 10;
  }
  .tabbar {
    display: flex;
    background: var(--t-bg);
    border-top: 1px solid var(--outline-soft);
    padding-bottom: env(safe-area-inset-bottom, 0);
  }
  .tabbar .tab {
    flex: 1;
    min-height: 56px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    color: var(--text-muted);
    cursor: pointer;
    touch-action: manipulation;
    transition: color 120ms ease, background 120ms ease;
    position: relative;
    border-right: 1px solid var(--outline-soft);
  }
  .tabbar .tab:last-child { border-right: 0; }
  .tabbar .tab .tab-label {
    font-family: var(--tf-body);
    font-size: var(--fs-xs);
    font-weight: 500;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  .tabbar .tab svg { width: 20px; height: 20px; }
  .tabbar .tab.active {
    color: var(--accent-blue);
    background: var(--surface-card);
  }
  /* Active-tab overline — the tab-shaped affordance */
  .tabbar .tab.active::before {
    content: "";
    position: absolute;
    top: -1px; left: 0; right: 0;
    height: 2px;
    background: var(--accent-blue);
  }
  .tabbar .tab:active { background: var(--surface-dark); }

  .pinned-approvals {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 18px;
    padding-bottom: max(14px, calc(env(safe-area-inset-bottom, 0) + 14px));
    background: rgba(245,158,11,.14);
    border-top: 1px solid rgba(245,158,11,.35);
    color: var(--text-primary);
    cursor: pointer;
    touch-action: manipulation;
  }
  .pinned-approvals:active { filter: brightness(.95); }
  .pinned-approvals .icon {
    width: 36px; height: 36px;
    border-radius: 2px;
    display: grid; place-items: center;
    background: rgba(245,158,11,.28);
    color: var(--accent-amber);
    flex: 0 0 auto;
  }
  .pinned-approvals .body { flex: 1; min-width: 0; }
  .pinned-approvals .title {
    font-family: var(--tf-body);
    font-size: var(--fs-base);
    font-weight: 700;
  }
  .pinned-approvals .meta {
    font-family: var(--tf-body);
    font-size: var(--fs-xs);
    color: var(--text-secondary);
    margin-top: 2px;
  }
  .pinned-approvals .chev {
    color: var(--text-secondary);
    flex: 0 0 auto;
  }

  .scroll {
    flex: 1 1 auto;
    overflow-y: auto;
    overflow-x: hidden;
    /* 60px top clears the floating back/account buttons (44px + safe-area top
       inset + breathing room). The horizontal/bottom padding is the page's
       content gutters. */
    padding: 60px 22px 24px 20px;
    margin: 0;
    -webkit-overflow-scrolling: touch;
  }
  /* Prevent any child from forcing horizontal overflow */
  .scroll > * { max-width: 100%; box-sizing: border-box; }

  /* Calendar cells must shrink with the viewport, not expand to content.
     Without `minmax(0, 1fr)` the grid widens when a cell's content (e.g. the
     day-detail expansion spanning 7 columns) has a larger intrinsic size. */
  .cal .grid { grid-template-columns: repeat(7, minmax(0, 1fr)); }
  .day-detail-slot { min-width: 0; overflow: hidden; }
  .day-detail { max-width: 100%; box-sizing: border-box; }
  .dd-table,
  .dd-table .head,
  .dd-table .trow,
  .dd-table .nm { min-width: 0; }
  .dd-table .tm { min-width: 0; white-space: nowrap; }

  /* Narrow-viewport day-detail: stack name on top, time + hours below.
     At phone widths the time column (with tz badge + overnight "+1d") plus
     the hours column consume the whole row, leaving the 1fr name column to
     collapse to ~0 under the overflow:hidden + nowrap regime above. Stacking
     gives the name its own row and removes the redundant header strip. */
  @media (max-width: 480px) {
    .dd-table .head { display: none; }
    .dd-table .trow {
      grid-template-columns: 1fr auto;
      grid-template-areas:
        "name hrs"
        "time time";
      align-items: baseline;
      row-gap: 2px;
      padding: 8px 2px;
    }
    .dd-table .trow .nm  { grid-area: name; }
    .dd-table .trow .tm  { grid-area: time; }
    .dd-table .trow .hrs { grid-area: hrs; }
    .dd-table .cmt { padding-top: 2px; }
  }

  /* Approval row, employee row, etc. all need the safety too */
  .emp-row, .hist-shift-card, .approvals-banner,
  .week-submit, .clock-card, .shift-summary { min-width: 0; }

  /* Toast / FAB / Modal stay anchored to the shell */
  .toast-wrap {
    position: absolute;
    left: 14px;
    right: 14px;
    bottom: 20px;
  }
  .fab {
    right: 20px;
    bottom: 24px;
  }

  /* Safe-area respect on iOS phones (notch / home indicator) */
  @supports (padding: max(0px)) {
    .scroll {
      padding-left: max(20px, env(safe-area-inset-left));
      padding-right: max(22px, env(safe-area-inset-right));
      padding-bottom: max(24px, env(safe-area-inset-bottom));
    }
    .toast-wrap {
      bottom: max(20px, env(safe-area-inset-bottom));
    }
    .fab {
      bottom: max(24px, calc(env(safe-area-inset-bottom) + 8px));
    }
  }

  /* Sticky-hover fix for touch devices.
     On iOS Safari (and some Android browsers) a tap triggers :hover and the
     hover style remains painted until the user taps elsewhere. On elements
     where hover adds a visible background/color, that leaves a "ghost"
     highlight on the previously-tapped control. Neutralise those specific
     hover effects when the device has no hover pointer. :active still fires
     for press feedback. */
  @media (hover: none) {
    .icon-btn:hover,
    .month-nav .chev:hover {
      background: transparent;
      color: var(--text-secondary);
    }
    .lang-toggle:hover { background: var(--surface-dark); }
    .emp-row:hover {
      background: var(--surface-card);
      border-color: var(--outline-soft);
    }
    .demo-chip:hover { background: var(--surface-card); }
    .approval-row .top.expandable:hover { background: transparent; }
    .hist-week-head.expandable:hover { background: transparent; }
    .breakdown .drow.tappable:hover { background: transparent; }
  }

  /* =========================================================
     TAB BADGE — small numeric overlay on a bottom-bar tab.
     Used for the admin Inbox tab to show pending count.
     ========================================================= */
  .tabbar .tab { position: relative; }
  .tabbar .tab .tab-badge {
    position: absolute;
    top: 2px;
    right: calc(50% - 28px);
    min-width: 24px;
    height: 24px;
    padding: 0 7px;
    border-radius: 999px;
    background: var(--accent-amber);
    color: var(--t-bg);
    font-family: var(--tf-body);
    font-size: var(--fs-cap);
    font-weight: 700;
    line-height: 24px;
    text-align: center;
    letter-spacing: 0;
    box-shadow: 0 0 0 2px var(--t-bg);
  }

  /* Forward / back screen transitions. The previous .screen-enter is kept
     for the initial mount; nav now picks fwd/back based on push vs pop. */
  .screen-enter-fwd { animation: slide-from-right 280ms cubic-bezier(.2,.8,.2,1) both; }
  .screen-enter-back { animation: slide-from-left 280ms cubic-bezier(.2,.8,.2,1) both; }
  @keyframes slide-from-right {
    from { opacity: 0; transform: translateX(20px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  @keyframes slide-from-left {
    from { opacity: 0; transform: translateX(-20px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  /* Tab swap should fade, not slide — siblings, not parent/child. */
  .screen-enter-tab { animation: fade-in 200ms ease both; }

  @media (prefers-reduced-motion: reduce) {
    .screen-enter, .screen-enter-fwd, .screen-enter-back, .screen-enter-tab,
    .month-anim-next, .month-anim-prev,
    .modal-card, .modal-scrim,
    .toast, .lang-toggle .slider, .clock-card .pulse::after {
      animation: none !important;
      transition: none !important;
    }
  }

  /* =========================================================
     UNIFIED WEEK CARD — used on Home, History, and Inbox.
     Single visual treatment for "a week" so users learn one
     mental model. Header (always visible) + body (when expanded)
     + footer (contextual actions/notice).
     ========================================================= */
  .week-card {
    margin-top: 12px;
    padding: 14px 16px;
    border-radius: 14px;
    background: var(--surface-dark);
    box-sizing: border-box;
    transition: background 150ms ease;
  }
  .week-card.urgent {
    border: 1.5px solid var(--accent-amber);
    background: color-mix(in oklab, var(--accent-amber) 9%, var(--surface-dark));
  }
  .week-card.rejected {
    border: 1.5px solid var(--accent-red);
    background: color-mix(in oklab, var(--accent-red) 8%, var(--surface-dark));
  }
  .week-card .wc-head {
    display: flex; align-items: center; justify-content: space-between;
    gap: 10px;
    min-width: 0;
  }
  .week-card .wc-head.tappable {
    cursor: pointer;
    touch-action: manipulation;
    user-select: none;
  }
  .week-card .wc-title-block { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
  .week-card .wc-title {
    font-family: var(--tf-display);
    font-weight: 400;
    font-size: var(--fs-xl);
    letter-spacing: -0.4px;
    line-height: 1.1;
    color: var(--text-primary);
    font-variant-numeric: tabular-nums;
  }
  .week-card .wc-employee {
    font-family: var(--tf-body);
    font-size: var(--fs-sm);
    font-weight: 600;
    line-height: 1.1;
  }
  .week-card .wc-sub {
    font-family: var(--tf-mono);
    font-size: var(--fs-xs);
    font-weight: 500;
    color: var(--text-muted);
    font-variant-numeric: tabular-nums;
  }
  .week-card .wc-right {
    display: flex; align-items: center; gap: 10px; flex: 0 0 auto;
  }
  .week-card .wc-hrs {
    font-family: var(--tf-mono);
    font-size: var(--fs-base);
    font-weight: 700;
    color: var(--text-primary);
    font-variant-numeric: tabular-nums;
  }
  .week-card .wc-status {
    font-family: var(--tf-body);
    font-size: var(--fs-cap);
    font-weight: 700;
    letter-spacing: 1.2px;
    padding: 3px 8px;
    border-radius: 2px;
    text-transform: uppercase;
    background: transparent;
    border: 1px solid currentColor;
  }
  .week-card .wc-status.pending     { color: var(--accent-amber); }
  .week-card .wc-status.approved    { color: var(--accent-green); }
  .week-card .wc-status.rejected    { color: var(--accent-red-light, #fca5a5); }
  /* Pseudo-status for past unsubmitted weeks. Same outlined treatment as the
     other status pills — color comes from the base .wc-status rule, this
     just picks the hue. */
  .week-card .wc-status.unsubmitted { color: var(--accent-amber); }
  /* Reused from .hist-week-head for Reopen menu — same affordance pattern. */
  .week-card .wc-status.has-menu {
    position: relative;
    cursor: pointer;
    touch-action: manipulation;
  }
  .week-card .wc-status.has-menu::after {
    content: "▾"; margin-left: 4px; opacity: .7;
  }
  .week-card .wc-status.has-menu.open::after { transform: rotate(180deg); }
  .week-card .wc-attest {
    font-family: var(--tf-body);
    font-style: italic;
    font-size: var(--fs-xs);
    color: var(--text-muted);
    margin-top: 8px;
    line-height: 1.4;
  }
  .week-card .wc-warn {
    font-family: var(--tf-body);
    font-style: italic;
    font-size: var(--fs-xs);
    color: var(--accent-amber);
    margin-top: 8px;
    line-height: 1.4;
  }
  .week-card .wc-footer {
    margin-top: 12px;
    padding-top: 10px;
    border-top: 1px dashed var(--outline-soft);
  }
  .week-card .wc-footer-actions {
    display: flex; gap: 8px;
  }
  .week-card .wc-footer-actions > .btn { flex: 1; min-width: 0; }
  /* Lock notice replaces the old week-closed-card banner. Lives inside the
     week card itself — the week IS the locked thing. */
  .week-card .wc-lock {
    display: flex; align-items: center; gap: 10px;
    margin-top: 10px;
    padding: 10px 12px;
    border-radius: 10px;
    background: color-mix(in oklab, var(--accent-amber) 8%, transparent);
    border: 1px dashed color-mix(in oklab, var(--accent-amber) 40%, transparent);
    color: var(--text-secondary);
    font-family: var(--tf-body);
    font-size: var(--fs-sm);
    line-height: 1.4;
  }
  .week-card .wc-lock.approved {
    background: color-mix(in oklab, var(--accent-green) 6%, transparent);
    border-color: color-mix(in oklab, var(--accent-green) 35%, transparent);
  }
  .week-card .wc-lock svg { width: 16px; height: 16px; flex: 0 0 auto; color: var(--accent-amber); }
  .week-card .wc-lock.approved svg { color: var(--accent-green); }

  /* The shift cards inside a week-card share the .week-rollup compact treatment
     (already defined for .week-rollup .hist-shift-card up above). */

  /* Inbox screen — section headers between week-cards and edit-requests. */
  .inbox-empty {
    margin: 40px 4px;
    padding: 24px 16px;
    text-align: center;
    font-family: var(--tf-body);
    font-style: italic;
    font-size: var(--fs-base);
    color: var(--text-muted);
    background: var(--surface-card);
    border: 1px dashed var(--outline-soft);
    border-radius: 14px;
  }
  .inbox-section-label {
    font-family: var(--tf-body);
    font-size: var(--fs-xs);
    font-weight: 500;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin: 18px 4px 6px;
  }
  .edit-req-card {
    margin-top: 8px;
    padding: 14px 16px;
    border-radius: 14px;
    background: var(--surface-dark);
  }
  .edit-req-card .er-head {
    display: flex; align-items: baseline; justify-content: space-between;
    gap: 10px; margin-bottom: 6px;
  }
  .edit-req-card .er-name {
    font-family: var(--tf-display);
    font-weight: 400;
    font-size: var(--fs-lg);
    line-height: 1.1;
  }
  .edit-req-card .er-date {
    font-family: var(--tf-mono);
    font-size: var(--fs-xs);
    color: var(--text-muted);
    font-variant-numeric: tabular-nums;
  }
  .edit-req-card .er-times {
    font-family: var(--tf-mono);
    font-size: var(--fs-sm);
    color: var(--text-primary);
    font-variant-numeric: tabular-nums;
  }
  .edit-req-card .er-times .strike {
    color: var(--text-muted);
    text-decoration: line-through;
    margin-right: 8px;
  }
  .edit-req-card .er-times .arrow { color: var(--text-muted); margin: 0 6px; }
  .edit-req-card .er-times .new { color: var(--text-primary); font-weight: 700; }
  .edit-req-card .er-reason {
    font-family: var(--tf-body);
    font-style: italic;
    font-size: var(--fs-base);
    color: var(--text-secondary);
    line-height: 1.45;
    margin-top: 6px;
  }
  .edit-req-card .er-actions {
    display: flex; gap: 8px;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px dashed var(--outline-soft);
  }
  .edit-req-card .er-actions > .btn { flex: 1; }

  /* =========================================================
     MANAGE USERS — full screen (was a stack of modals).
     Reuses .emp-row visuals so the surface feels consistent
     with the admin Roster tab.
     ========================================================= */
  .mu-screen .mu-row {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 4px;
    border-bottom: 1px solid var(--outline-soft);
    cursor: pointer;
    touch-action: manipulation;
    transition: background 120ms ease;
  }
  .mu-screen .mu-row.inactive { cursor: default; opacity: .65; }
  .mu-screen .mu-row:active { background: var(--surface-card-hi); }
  .mu-screen .mu-row .mu-body { flex: 1; min-width: 0; }
  .mu-screen .mu-row .mu-name {
    font-family: var(--tf-display);
    font-weight: 400;
    font-size: var(--fs-md);
    line-height: 1.1;
  }
  .mu-screen .mu-row .mu-meta {
    font-family: var(--tf-mono);
    font-size: var(--fs-xs);
    color: var(--text-muted);
    margin-top: 3px;
    letter-spacing: 0.2px;
  }
  .mu-screen .mu-row .chev { color: var(--text-muted); flex: 0 0 auto; }
  .mu-screen .mu-section-label {
    font-family: var(--tf-body);
    font-size: var(--fs-xs);
    font-weight: 500;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin: 22px 4px 6px;
  }
  .mu-screen .add-user-btn {
    display: flex; align-items: center; justify-content: center;
    gap: 8px;
    width: 100%; min-height: 52px;
    margin: 8px 0 4px;
    background: transparent;
    border: 1px dashed var(--outline-soft);
    border-radius: 14px;
    color: var(--text-secondary);
    font-family: var(--tf-body);
    font-size: var(--fs-base);
    font-weight: 600;
    letter-spacing: 0.5px;
    cursor: pointer;
    touch-action: manipulation;
    transition: background 150ms ease, color 150ms ease, border-color 150ms ease;
  }
  .mu-screen .add-user-btn:hover { background: var(--surface-card-hi); color: var(--text-primary); border-color: var(--text-secondary); }
  .mu-screen .add-user-btn:active { filter: brightness(.94); }
  .mu-screen .add-user-btn svg { width: 18px; height: 18px; }

  /* Edit User screen — form scaffolding shared with sheets but laid out
     full-page. Uses .field-label and the common input/select treatment. */
  .eu-screen .eu-form {
    display: flex; flex-direction: column;
    margin-top: 8px;
  }
  .eu-screen input,
  .eu-screen select,
  .eu-screen textarea {
    display: block; width: 100%;
    background: transparent;
    border: 0;
    border-bottom: 1.5px solid var(--outline-soft);
    border-radius: 0;
    padding: 10px 4px;
    color: var(--text-primary);
    font-family: var(--tf-body);
    font-size: var(--fs-md);
    margin-bottom: 14px;
    outline: none;
    transition: border-color 150ms ease;
  }
  @media (pointer: coarse) {
    .eu-screen input, .eu-screen select, .eu-screen textarea { font-size: 16px; }
  }
  .eu-screen input:focus,
  .eu-screen select:focus,
  .eu-screen textarea:focus { border-color: var(--accent-blue); }
  .eu-screen .eu-actions {
    display: flex; gap: 10px;
    margin-top: 16px;
  }
  .eu-screen .eu-actions > .btn { flex: 1; }
  .eu-screen .eu-admin-actions {
    display: flex; gap: 10px;
    flex-wrap: wrap;
    margin: 22px 0 0;
    padding-top: 16px;
    border-top: 1px dashed var(--outline-soft);
  }
  /* Three buttons (Reset / Deactivate / Delete permanently) — give each a
     min-width so the longer labels stay readable; wrap to a second row on
     narrow viewports rather than squeezing the type. */
  .eu-screen .eu-admin-actions > .btn { flex: 1 1 130px; min-width: 130px; }
  .eu-screen .eu-err {
    font-family: var(--tf-body);
    font-size: var(--fs-sm);
    color: var(--accent-red-light);
    background: rgba(239,68,68,.06);
    padding: 8px 10px;
    border-radius: 8px;
    margin-bottom: 12px;
  }
  .eu-screen .eu-checkbox-row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin: 4px 0 14px;
  }
  .eu-screen .eu-checkbox-row input[type="checkbox"] {
    margin-top: 2px;
    width: 18px; height: 18px;
    flex: 0 0 auto;
    accent-color: var(--accent-primary);
  }
  .eu-screen .eu-checkbox-row label { cursor: pointer; }
  .eu-screen .eu-checkbox-label {
    font-family: var(--tf-body);
    font-size: var(--fs-sm);
    font-weight: 600;
    color: var(--text-primary);
  }
  .eu-screen .eu-checkbox-help {
    font-family: var(--tf-body);
    font-size: var(--fs-sm);
    color: var(--text-muted);
    margin-top: 2px;
  }

  /* Roster screen — same emp-row visuals, no extra wrapper. */
  .roster-screen .section-header { margin-top: 8px; }

  /* Inbox tab badge contrast tweak for active tab. */
  .tabbar .tab.active .tab-badge { box-shadow: 0 0 0 2px var(--surface-card); }

</style>
</head>
<body>

<div class="app-root">
  <div class="version-tag" id="versionTag"></div>
  <div class="float-back" id="floatBack"></div>
  <div class="float-account" id="floatAccount"></div>
  <div class="scroll" id="scrollRoot"></div>
  <div id="bottomBarRoot"></div>
  <div id="fabRoot"></div>
  <div class="toast-wrap" id="toastWrap"></div>
  <div id="modalRoot"></div>
</div>

<script>
    // =============================================================
  // STATE
  // =============================================================
  const state = {
    currentUser: null,
    screen: "login",
    viewingEmployeeId: null,
    nav: [],            // screen history for back button
    lang: (() => {
      // Mirror the inline-script logic in <head>: explicit choice wins,
      // otherwise default to Spanish (the app's primary audience).
      try {
        const v = localStorage.getItem("pc_lang");
        if (v === "en" || v === "es") return v;
      } catch {}
      return "es";
    })(),
    // calendar — default to the viewer's current month; login() and loadDB()
    // re-snap this on every session start so a long-lived tab doesn't drift.
    calYear: new Date().getFullYear(),
    calMonth: new Date().getMonth(),
    selectedDay: null,
    lastAnim: 0,
    // clock flow (employee)
    clock: "idle",
    clockIn: null,
    clockOut: null,
    // Server id of the open shift written at clock-in (so admins see "on shift
    // now" before the employee submits). null until the background clock-in
    // commit lands; openShiftPending holds that in-flight promise so submit can
    // await it before deciding whether to close vs. create.
    openShiftId: null,
    openShiftPending: null,
    clockInCoord: null,
    clockOutCoord: null,
    clockInTz: null,
    clockOutTz: null,
    comment: "",
    // modals
    modal: null,        // "addEmployee" | "shiftDetail" | etc.
    // Cleartext password to reveal back to the owner after a successful
    // password reset. Set when /users/reset-password succeeds; cleared on
    // sheet close so re-opening the sheet starts fresh.
    resetPasswordRevealed: null,
    // Live text in the "type the username to confirm" field on the hard-
    // delete sheet. Tracked in state so re-renders during the modal don't
    // wipe what they've typed.
    confirmDeleteText: "",
    // When a modal opens on top of another (e.g. "Edit shift" from inside
    // shiftDetail), the outer modal is pushed onto this stack so popstate
    // can restore it instead of nuking the whole stack.
    modalStack: [],
    // history week-expansion: Set<weekStart>. Lazy-init.
    expandedHistoryWeeks: null,
    // direction tracker for screen transitions: 1 = forward push, -1 = back
    navDir: 0,
    // user menu (account dropdown) open state
    userMenuOpen: false,
  };

  // =============================================================
  // DATA
  // =============================================================

  // Hydrated from db.json by loadDB() before first render.
  const users = [];
  const userById = {};
  const employees = () => users.filter(u => u.role === "employee");

  // Shifts: id, empId, date (YYYY-MM-DD), start, end, hours, comment, coords.
  // Hydrated by loadDB() → hydrateFromDb(). Runtime writes go through
  // api.createShift(); the server returns the canonical shift which we push.
  let nextShiftId = 100;
  const shifts = [];

  // IANA timezone of the device at call time. Falls back to null if
  // Intl isn't available (very old browsers).
  function currentTimezone() {
    try {
      return Intl.DateTimeFormat().resolvedOptions().timeZone || null;
    } catch {
      return null;
    }
  }

  // Short timezone name ("EDT", "PST", "CEST", etc.) for display. Falls back to
  // the IANA string if the short name can't be resolved for any reason.
  function tzShort(tz, when) {
    if (!tz) return "";
    try {
      const parts = new Intl.DateTimeFormat(locale(), {
        timeZone: tz,
        timeZoneName: "short",
      }).formatToParts(when || new Date());
      const p = parts.find(x => x.type === "timeZoneName");
      return p ? p.value : tz;
    } catch {
      return tz;
    }
  }

  // Fake business next to the Pentagon (Arlington, VA)
  const BIZ = { lat: 38.87185, lng: -77.0563 };
  function gpsNoteText(coord) {
    if (!coord) return tr("locating");
    return `📍 ${coord.lat.toFixed(5)}, ${coord.lng.toFixed(5)}`;
  }

  // Real-GPS capture. Returns a promise that resolves to one of:
  //   { lat, lng, real: true }                  — user granted, coord captured
  //   { real: false, reason: "blocked" }        — site permission is cached as denied; browser won't prompt
  //   { real: false, reason: "declined" }       — user saw the prompt and chose not to allow
  //   { real: false, reason: "unavailable" }    — position couldn't be determined (OS Location Services off, GPS hardware unavailable, etc.)
  //   { real: false, reason: "timeout" }        — browser gave up acquiring a position
  //   { real: false, reason: "unsupported" }    — browser has no geolocation API
  //
  // Notes:
  //  - We check `navigator.permissions` first so we can distinguish "cached denied" (won't re-prompt)
  //    from "user declined just now". Different messages, different remediation.
  //  - We explicitly do NOT set enableHighAccuracy:true. That forces GPS and fails often indoors / in
  //    dense urban areas; the default (Wi-Fi / IP) is plenty for a "did you clock in where you said
  //    you did" map pin and works almost everywhere.
  //  - No outer timeout from our side — the native permission prompt can sit open for 10+ seconds on
  //    mobile, and racing it silently discards the user's answer. The browser's own timeout below
  //    handles the acquire-position phase.
  async function getCurrentCoord() {
    if (!navigator.geolocation) {
      console.warn("[gps] navigator.geolocation is not available");
      return { real: false, reason: "unsupported" };
    }

    // Pre-check permission state (supported in Chrome/Firefox/Edge; modern Safari as of 16+).
    let permState = "prompt";
    if (navigator.permissions && navigator.permissions.query) {
      try {
        const r = await navigator.permissions.query({ name: "geolocation" });
        permState = r.state;
      } catch (e) {
        console.info("[gps] permissions.query unsupported; falling through", e);
      }
    }
    console.info("[gps] permission state:", permState);

    if (permState === "denied") {
      // Browser has this site blocked — getCurrentPosition will fail instantly with no prompt.
      return { real: false, reason: "blocked" };
    }

    return new Promise((resolve) => {
      navigator.geolocation.getCurrentPosition(
        (pos) => {
          console.info("[gps] position acquired:", pos.coords.latitude, pos.coords.longitude, `±${Math.round(pos.coords.accuracy)}m`);
          resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude, real: true });
        },
        (err) => {
          console.warn("[gps] getCurrentPosition error:", err.code, err.message);
          // code 1 PERMISSION_DENIED can mean either the user just declined, or (on some
          // OSes) the browser was allowed at site level but the OS blocked it. We use
          // `permState === "prompt"` above as a rough signal: if the permission state was
          // "prompt" moments ago and we got code 1, the user almost certainly just declined.
          let reason;
          if (err.code === 1) reason = permState === "prompt" ? "declined" : "blocked";
          else if (err.code === 2) reason = "unavailable";
          else if (err.code === 3) reason = "timeout";
          else reason = "unknown";
          resolve({ real: false, reason });
        },
        { enableHighAccuracy: false, timeout: 20000, maximumAge: 30000 }
      );
    });
  }

  // Map a getCurrentCoord() result to a user-facing toast.
  // `action` is "in" or "out" (clock direction), used to pick the right
  // localized "Clock-in/out location captured" string.
  function gpsToast(result, action) {
    if (result.real) {
      const key = action === "out" ? "clockOutLocCaptured" : "clockInLocCaptured";
      return { msg: tr(key), kind: "success", pill: "📍" };
    }
    const reasonKey = {
      blocked: "gpsBlocked",
      declined: "gpsDeclined",
      unavailable: "gpsUnavailable",
      timeout: "gpsTimeout",
      unsupported: "gpsUnsupported",
      unknown: "gpsUnknown",
    }[result.reason] || "gpsUnknown";
    return { msg: tr(reasonKey), kind: "warn", pill: "⚠" };
  }

  // Hydrated from db.json by loadDB(). Weekly Mon–Sun approvals keyed by
  // (empId, weekStart). Statuses: pending | approved | rejected. Rejected
  // entries may carry a rejectionComment.
  const weekApprovals = [];

  // =============================================================
  // API CLIENT — talks to the Cloudflare Worker
  // =============================================================
  //
  // All runtime writes are persisted there (one commit per write into the
  // private punchcard-data repo). The Worker is on a different eTLD+1
  // (workers.dev) from the page (github.io), so cross-site SameSite=None
  // cookies get silently dropped by iOS Safari ITP. Session is therefore a
  // bearer token in localStorage, sent in the Authorization header.
  const API_BASE = location.hostname === "localhost" || location.hostname === "127.0.0.1"
    ? ""  // same-origin against tools/dev-server.mjs
    : "https://app.punchcard-api.workers.dev";
  const TOKEN_KEY = "pc_token";

  function getToken() { try { return localStorage.getItem(TOKEN_KEY); } catch { return null; } }
  function setToken(t) { try { t ? localStorage.setItem(TOKEN_KEY, t) : localStorage.removeItem(TOKEN_KEY); } catch {} }

  // Mid-shift clock state ("in" or "out", with start time, coords, tz, and
  // comment-in-progress) must survive a reload — closing the tab in the
  // middle of a shift used to lose everything because state.clock and
  // friends are in-memory only. Persist per-user so signing in as a
  // different user doesn't inherit the previous user's open shift.
  const CLOCK_KEY = (uid) => `pc_clock_${uid}`;
  function saveClockState() {
    const u = state.currentUser;
    if (!u) return;
    const key = CLOCK_KEY(u.id);
    if (state.clock === "idle") {
      try { localStorage.removeItem(key); } catch {}
      return;
    }
    const payload = {
      clock: state.clock,
      clockIn:  state.clockIn  ? state.clockIn.toISOString()  : null,
      clockOut: state.clockOut ? state.clockOut.toISOString() : null,
      clockInCoord:  state.clockInCoord  || null,
      clockOutCoord: state.clockOutCoord || null,
      clockInTz:  state.clockInTz  || null,
      clockOutTz: state.clockOutTz || null,
      comment: state.comment || "",
      openShiftId: state.openShiftId ?? null,
    };
    try { localStorage.setItem(key, JSON.stringify(payload)); } catch {}
  }
  function restoreClockState() {
    const u = state.currentUser;
    if (!u) return;
    const key = CLOCK_KEY(u.id);
    let raw;
    try { raw = localStorage.getItem(key); } catch { return; }
    if (!raw) return;
    let p;
    try { p = JSON.parse(raw); } catch { return; }
    if (!p || !p.clock || p.clock === "idle") return;
    state.clock = p.clock;
    state.clockIn  = p.clockIn  ? new Date(p.clockIn)  : null;
    state.clockOut = p.clockOut ? new Date(p.clockOut) : null;
    state.clockInCoord  = p.clockInCoord  || null;
    state.clockOutCoord = p.clockOutCoord || null;
    state.clockInTz  = p.clockInTz  || null;
    state.clockOutTz = p.clockOutTz || null;
    state.comment = p.comment || "";
    state.openShiftId = p.openShiftId ?? null;
    state.openShiftPending = null;
  }

  class ApiError extends Error {
    constructor(status, message) { super(message); this.status = status; }
  }

  async function apiCall(method, path, body) {
    const headers = {};
    if (body !== undefined) headers["Content-Type"] = "application/json";
    const token = getToken();
    if (token) headers["Authorization"] = `Bearer ${token}`;
    let res;
    try {
      res = await fetch(API_BASE + path, {
        method,
        headers,
        body: body !== undefined ? JSON.stringify(body) : undefined,
      });
    } catch (e) {
      throw new ApiError(0, "network"); // offline / CORS / DNS
    }
    const data = await res.json().catch(() => ({}));
    if (res.status === 401) {
      // Session expired or never existed. If we thought we were logged in,
      // drop to the login screen; otherwise (pre-login /me probe) just bubble.
      setToken(null);
      if (state.currentUser) logout();
      throw new ApiError(401, data.error || "unauthenticated");
    }
    if (!res.ok) throw new ApiError(res.status, data.error || res.statusText);
    return data;
  }

  const api = {
    me:                ()              => apiCall("GET",  "/me"),
    login:             (u, p)          => apiCall("POST", "/login",         { username: u, password: p }),
    logout:            ()              => apiCall("POST", "/logout"),
    db:                ()              => apiCall("GET",  "/db"),
    createShift:       (body)          => apiCall("POST", "/shifts",        body),
    clockOut:          (body)          => apiCall("POST", "/shifts/clock-out", body),
    updateShiftComment: (shiftId, comment) => apiCall("POST", "/shifts/comment", { shiftId, comment }),
    setApproval:       (empId, ws, status, reason) =>
                                          apiCall("POST", "/approvals",     { empId, weekStart: ws, status, rejectionComment: reason }),
    createEditRequest: (body)          => apiCall("POST", "/edit-requests", body),
    decideEditRequest: (id, status)    => apiCall("POST", "/edit-requests", { action: "decide", id, status }),
    adminEdit:         (body)          => apiCall("POST", "/admin-edits",   body),
    adminAddShift:     (body)          => apiCall("POST", "/admin-shifts",  body),
    deleteShift:       (id, reason)    => apiCall("POST", "/shifts/delete", { id, reason }),
    createUser:        (body)          => apiCall("POST", "/users",         body),
    updateUser:        (body)          => apiCall("POST", "/users/update",          body),
    resetPassword:     (id, password)  => apiCall("POST", "/users/reset-password",  { id, password }),
    deactivateUser:    (id)            => apiCall("POST", "/users/deactivate",      { id }),
    reactivateUser:    (id)            => apiCall("POST", "/users/reactivate",      { id }),
    deleteUser:        (id, confirmUsername) => apiCall("POST", "/users/delete",    { id, confirmUsername }),
  };

  // Present a Worker error as a user-facing toast. Network/5xx get a generic
  // retry nudge; 4xx surface the Worker's error string so the user knows
  // which validation tripped (missing reason, username taken, etc.).
  function toastApiError(e, fallback) {
    if (e instanceof ApiError && e.status >= 400 && e.status < 500) {
      toast(e.message || fallback, { kind: "warn", pill: "⚠" });
    } else {
      toast(fallback, { kind: "warn", pill: "⚠" });
      console.error(e);
    }
  }

  // Reassigns the contents of every in-memory store from a /db response.
  // Used on boot and after any write that might have cascading effects
  // (edit-request approval → shift mutation + new adminEdits entry).
  function hydrateFromDb(resp) {
    users.length = 0;
    users.push(...resp.db.users);
    for (const k in userById) delete userById[k];
    for (const u of resp.db.users) userById[u.id] = u;

    shifts.length = 0;
    shifts.push(...resp.db.shifts);
    nextShiftId = resp.db.shifts.reduce((m, s) => Math.max(m, s.id), 99) + 1;

    weekApprovals.length = 0;
    weekApprovals.push(...resp.db.weekApprovals);

    editRequests.length = 0;
    editRequests.push(...resp.db.editRequests);
    nextEditReqId = resp.db.editRequests.reduce((m, r) => Math.max(m, r.id), 0) + 1;
  }

  // One-time data bootstrap. Calls /me first — if a session cookie is valid
  // we silently restore to that user's home. Otherwise we leave state.screen
  // at "login" (its initial value) and the login screen renders.
  async function loadDB() {
    let me;
    try { me = await api.me(); }
    catch (e) { return; /* 401 or network — show login */ }

    state.currentUser = me.user;
    state.screen = isAdminLike(me.user) ? "admin_home" : "employee_home";
    { const now = new Date(); state.calYear = now.getFullYear(); state.calMonth = now.getMonth(); }
    const dbResp = await api.db();
    hydrateFromDb(dbResp);
    // Restore an in-progress clock state if we left one on a previous
    // visit. No-op for admins (they never clock); no-op if the user has
    // no saved state (the common case).
    restoreClockState();
  }

  // Version tag reads Last-Modified from the current page — which GitHub
  // Pages sets to the commit time of the most recent deploy. Rendered in
  // the viewer's local time as v.YYYY-MM-DD.HHMM. If the header is missing
  // (e.g., file:// or a dev server that doesn't emit it), leave it blank.
  (async function setVersionTag() {
    const el = document.getElementById("versionTag");
    if (!el) return;
    try {
      const res = await fetch(location.href, { method: "HEAD", cache: "no-cache" });
      const lm = res.headers.get("Last-Modified");
      if (!lm) return;
      const d = new Date(lm);
      if (isNaN(d)) return;
      const pad = (n) => String(n).padStart(2, "0");
      const ymd = `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
      const hm = `${pad(d.getHours())}${pad(d.getMinutes())}`;
      el.textContent = `v.${ymd}.${hm}`;
    } catch { /* offline / blocked — leave empty */ }
  })();

  // Role helpers
  const isOwner      = (u) => u?.role === "owner";
  const isAdmin      = (u) => u?.role === "admin";
  const isReadonly   = (u) => u?.role === "readonly";
  const isEmployee   = (u) => u?.role === "employee";
  const canApprove   = (u) => isOwner(u) || isAdmin(u);          // approvals, edit approvals
  const canManage    = (u) => isOwner(u) || isAdmin(u);           // add employees, manage
  const isAdminLike  = (u) => isOwner(u) || isAdmin(u) || isReadonly(u); // sees admin home
  const roleLabel    = (u) => {
    if (isOwner(u))    return tr("owner");
    if (isAdmin(u))    return tr("admin");
    if (isReadonly(u)) return tr("readonly");
    return "";
  };

  // Greeting block for home screens. Full "Welcome, / Name / [ROLE]" on the
  // very first home render of a session; compact single line "Name · Role"
  // after that, since the user just saw it. The flag is per-tab — opening a
  // fresh tab gets the full greeting again. Returns a DOM node.
  function greetingBlock(u, opts={}) {
    const showRole = opts.showRole !== false;
    const greeted = (() => { try { return sessionStorage.getItem("pc_greeted"); } catch { return null; } })();
    if (greeted) {
      return el("div", {class:"greeting greeting--compact"},
        el("span", {class:"name"}, u.displayName),
        showRole && roleLabel(u) ? el("span", {class:`role-inline ${isReadonly(u) ? "readonly" : ""}`}, "· " + roleLabel(u)) : null,
      );
    }
    try { sessionStorage.setItem("pc_greeted", "1"); } catch { /* private mode */ }
    return el("div", {class:"greeting"},
      el("div", {class:"hello"}, tr("welcome")),
      el("div", {class:"name"}, u.displayName),
      showRole && roleLabel(u) ? el("div", {class:`role ${isReadonly(u) ? "readonly" : ""}`}, roleLabel(u)) : null,
    );
  }

  function fmtHM(hhmm) {

    // identically, and Spanish 24h ("16:15") matches how nurses actually
    // write times on a punch card.

  function isOvernight(start, end) {

    const [sh, sm] = start.split(":").map(Number);
    const [eh, em] = end.split(":").map(Number);

  function computeShiftHours(start, end) {

    const [sh, sm] = start.split(":").map(Number);
    const [eh, em] = end.split(":").map(Number);

  function animateOutAndThen(node, next, opts) {
    const ms = (opts && opts.ms) || 280;
    if (!node || typeof node.getBoundingClientRect !== "function") {
      next();
      return;
    }
    const h = node.getBoundingClientRect().height;
    node.style.maxHeight = h + "px";
    node.style.overflow = "hidden";
    node.style.pointerEvents = "none";
    void node.offsetHeight; // force reflow so initial max-height applies
    node.style.transition =
      `opacity ${ms}ms ease, ` +
      `transform ${ms}ms cubic-bezier(.4,0,.2,1), ` +
      `max-height ${ms}ms cubic-bezier(.4,0,.2,1), ` +
      `margin ${ms}ms ease, padding ${ms}ms ease`;
    requestAnimationFrame(() => {
      node.style.opacity = "0";
      node.style.transform = "translateX(14px)";
      node.style.maxHeight = "0";
      node.style.marginTop = "0";
      node.style.marginBottom = "0";
      node.style.paddingTop = "0";
      node.style.paddingBottom = "0";
    });
    setTimeout(next, ms);
  }

  // Shrink+fade a button in place, then call `next`. After next() runs render(),
  // caller can find the freshly-rendered status pill and add `.pop-in` so it
  // scales in where the button was — a button→pill crossfade.
  function animateShrinkAndThen(node, next, opts) {
    const ms = (opts && opts.ms) || 220;
    if (!node) { next(); return; }
    node.style.pointerEvents = "none";
    node.style.transition = `opacity ${ms}ms ease, transform ${ms}ms cubic-bezier(.4,0,.2,1)`;
    requestAnimationFrame(() => {
      node.style.opacity = "0";
      node.style.transform = "scale(.85)";
    });
    setTimeout(next, ms);
  }

  // =============================================================
  // NAV
  // =============================================================
  function navTo(screen, extra={}) {
    state.nav.push({ screen: state.screen, selectedDay: state.selectedDay, viewingEmployeeId: state.viewingEmployeeId });
    state.screen = screen;
    Object.assign(state, extra);
    state.lastAnim = 0;
    state.navDir = 1;
    history.pushState({ depth: state.nav.length }, "");
    render();
  }
  // Tabs are sibling roots — switching between Home/History does NOT push
  // a nav entry, so no back button appears. Any prior drill-in navigation
  // is cleared on tab switch. Use a fade transition (siblings, not parent/
  // child), distinct from the slide used for push/pop.
  function navTab(screen) {
    if (state.screen === screen) return;
    state.nav = [];
    state.screen = screen;
    state.lastAnim = 0;
    state.navDir = 0;
    render();
  }
  function navBack() {
    const prev = state.nav.pop();
    if (prev) {
      state.screen = prev.screen;
      state.selectedDay = prev.selectedDay ?? state.selectedDay;
      state.viewingEmployeeId = prev.viewingEmployeeId ?? null;
    }
    state.navDir = -1;
    render();
  }
  // The shift-detail sheet lets an employee edit their own comment inline
  // (no "Save" button — the textarea is the editor). When the sheet closes
  // or a sub-modal opens on top, this flushes the pending write. The hook
  // captures the textarea element + original comment so it can no-op if
  // nothing actually changed.
  let pendingCommentFlush = null;
  function flushPendingComment() {
    if (!pendingCommentFlush) return;
    const fn = pendingCommentFlush;
    pendingCommentFlush = null;
    try { fn(); } catch (e) { console.error("Couldn't save comment:", e); }
  }
  function openModal(name, extras = {}) {
    flushPendingComment();
    if (state.modal) {
      state.modalStack.push({
        modal: state.modal,
        viewingShiftId: state.viewingShiftId,
        viewingEmployeeId: state.viewingEmployeeId,
        manageTargetId: state.manageTargetId,
      });
    }
    state.modal = name;
    Object.assign(state, extras);
    history.pushState({ modal: true }, "");
    render();
  }
  window.addEventListener("popstate", () => {
    flushPendingComment();
    if (state.modal) {
      if (state.modalStack.length) {
        const prev = state.modalStack.pop();
        Object.assign(state, prev);
      } else {
        state.modal = null;
      }
      state.resetPasswordRevealed = null;
      state.confirmDeleteText = "";
      render();
    } else if (state.nav.length) {
      navBack();
    }
  });
  function login(u) {
    state.currentUser = u;
    state.nav = [];
    state.selectedDay = null;
    { const now = new Date(); state.calYear = now.getFullYear(); state.calMonth = now.getMonth(); }
    state.screen = isAdminLike(u) ? "admin_home" : "employee_home";
    // Restore mid-shift clock state if this user had one saved from a
    // previous session (closed the tab between clock-in and submit).
    restoreClockState();
    history.replaceState({ depth: 0 }, "");
    render();
  }
  function logout() {
    // Fire-and-forget the Worker /logout — clearing local state + the stored
    // bearer token is what matters for UX. Token rotation on the server (via
    // SESSION_SECRET) is the real security guarantee; a failed POST here is
    // fine.
    api.logout().catch(() => {});
    setToken(null);
    state.currentUser = null;
    state.screen = "login";
    state.nav = [];
    flushPendingComment();
    state.modal = null;
    state.modalStack = [];
    state.expandedHistoryWeeks = null;
    state.clock = "idle"; state.clockIn = state.clockOut = null; state.clockInTz = state.clockOutTz = null; state.comment = "";
    state.openShiftId = null; state.openShiftPending = null;
    history.replaceState({ depth: 0 }, "");
    render();
  }

  // =============================================================
  // CALENDAR / DAY DETAIL
  // =============================================================
  function dataByDay(year, month, scopeEmpId=null) {
    const out = {};
    for (const s of shifts) {
      // Open shifts (clocked in, no clock-out) have no end/hours yet — they
      // surface in the "On shift now" live roster, not the calendar/day grid.
      if (!s.end) continue;
      // Place on the BOOKS day, not the literal clock-in day — a pre-3:30am
      // clock-in lands on the previous calendar square.
      const d = new Date(bizDate(s) + "T00:00:00");
      if (d.getFullYear() !== year || d.getMonth() !== month) continue;
      if (scopeEmpId && s.empId !== scopeEmpId) continue;
      (out[d.getDate()] = out[d.getDate()] || []).push(s);
    }
    return out;
  }

  function renderCalendar(scopeEmpId=null) {
    const firstOfMonth = new Date(state.calYear, state.calMonth, 1);
    const daysInMonth = new Date(state.calYear, state.calMonth+1, 0).getDate();
    // Calendar runs Mon–Sun: shift getDay() so Monday = 0, Sunday = 6.
    const startOffset = (firstOfMonth.getDay() + 6) % 7;
    const data = dataByDay(state.calYear, state.calMonth, scopeEmpId);
    const today = new Date();

    const dowKey = tr("dowAbbr");
    const dows = el("div", {class:"dows"}, ...dowKey.map(d => el("span", {}, d)));
    const grid = el("div", {class:"grid"});
    grid.dataset.scope = scopeEmpId == null ? "" : String(scopeEmpId);
    grid.dataset.year = String(state.calYear);
    grid.dataset.month = String(state.calMonth);
    const maxHrs = Math.max(0, ...Object.values(data).map(arr => arr.reduce((s,x)=>s+x.hours,0)));
    const totalCells = startOffset + daysInMonth;
    const rows = Math.ceil(totalCells / 7);

    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < 7; c++) {
        const cellIdx = r*7 + c;
        const dayNum = cellIdx - startOffset + 1;
        if (dayNum < 1 || dayNum > daysInMonth) {
          grid.appendChild(el("div", {class:"cell empty"}));
          continue;
        }
        const dayShifts = data[dayNum] || [];
        const dayHours = dayShifts.reduce((s,x)=>s+x.hours,0);
        const hasShifts = dayShifts.length > 0;
        const isToday = today.getFullYear() === state.calYear && today.getMonth() === state.calMonth && dayNum === today.getDate();
        const isSelected = state.selectedDay === dayNum;

        const inner = el("div", {class:"inner"});
        inner.appendChild(el("span", {class:"num"}, String(dayNum)));

        const byEmp = hasShifts
          ? Object.entries(dayShifts.reduce((m,sh)=>{m[sh.empId]=(m[sh.empId]||0)+sh.hours;return m;}, {}))
              .sort((a,b)=>b[1]-a[1])
          : [];
        const empCount = byEmp.length;

        const displayedHours = scopeEmpId
          ? (byEmp.find(([id])=>Number(id)===scopeEmpId)?.[1] || 0)
          : dayHours;
        const showHoursText = displayedHours >= 1
          ? `${Math.round(displayedHours)}${tr("hoursShort")}`
          : displayedHours > 0 ? `${displayedHours.toFixed(1)}${tr("hoursShort")}` : "";

        if (hasShifts) {
          if (scopeEmpId) {
            // Employee view: the little "8h" hour total under the date.
            if (showHoursText) {
              inner.appendChild(el("span", {class:"pair"}, el("span", {}, showHoursText)));
            }
          } else {
            // Admin view: one colored dot per unique employee who worked
            // that day, in order of most-hours first. Tells "who worked"
            // at a glance without needing to tap in.
            const dots = el("span", {class:"dots"});
            for (const [empIdStr] of byEmp) {
              const emp = userById[Number(empIdStr)];
              if (!emp) continue;
              dots.appendChild(el("span", {
                class: "dot",
                style: `background:${emp.color}`,
                title: emp.displayName,
              }));
            }
            inner.appendChild(dots);
          }
        }

        let heatClass = "";
        if (hasShifts && maxHrs > 0) {
          const ratio = dayHours / maxHrs;
          if (ratio > 0.8) heatClass = "heat-4";
          else if (ratio > 0.55) heatClass = "heat-3";
          else if (ratio > 0.3) heatClass = "heat-2";
          else heatClass = "heat-1";
        }

        const cell = el("div", {
          class: `cell ${hasShifts ? "has-shifts" : ""} ${isToday ? "today" : ""} ${isSelected ? "selected" : ""} ${heatClass}`,
          "data-day": String(dayNum),
          "data-row": String(r),
          onclick: () => selectDay(dayNum),
        });
        cell.appendChild(inner);
        grid.appendChild(cell);
      }

      if (state.selectedDay != null) {
        const row = Math.floor((state.selectedDay - 1 + startOffset) / 7);
        if (row === r) {
          grid.appendChild(el("div", {class:"day-detail-slot", style:"grid-column: span 7;"},
            renderDayDetail(state.selectedDay, scopeEmpId)));
        }
      }
    }
    return el("div", {class:"cal"}, dows, grid);
  }

  // Targeted day selection — no full re-render
  function selectDay(dayNum) {
    const grid = document.querySelector(".cal .grid");
    if (!grid) { state.selectedDay = dayNum; render(); return; }

    const scopeRaw = grid.dataset.scope;
    const scopeEmpId = scopeRaw ? Number(scopeRaw) : null;
    const year = Number(grid.dataset.year);
    const month = Number(grid.dataset.month);

    const prev = state.selectedDay;
    const next = (prev === dayNum) ? null : dayNum;
    state.selectedDay = next;

    // Toggle selected class on cells
    if (prev != null) {
      grid.querySelector(`.cell[data-day="${prev}"]`)?.classList.remove("selected");
    }
    if (next != null) {
      grid.querySelector(`.cell[data-day="${next}"]`)?.classList.add("selected");
    }

    // Remove any existing detail slot
    grid.querySelector(".day-detail-slot")?.remove();

    // Insert new detail slot at end of the selected row.
    // Calendar runs Mon–Sun, so shift JS's Sun-first getDay() into a
    // Mon-first offset (getDay()=0 → 6) — matches renderCalendar's math.
    // Without this, clicking a Sunday computes the wrong row and the
    // expansion lands two weeks below.
    if (next != null) {
      const startOffset = (new Date(year, month, 1).getDay() + 6) % 7;
      const row = Math.floor((next - 1 + startOffset) / 7);
      // Last cell in that row — scan from row*7+6 downward until we find one
      let anchor = null;
      for (let c = 6; c >= 0; c--) {
        const cell = grid.children[row*7 + c];
        if (cell && cell.classList.contains("cell")) { anchor = cell; break; }
      }
      if (anchor) {
        const slot = el("div", {class:"day-detail-slot", style:"grid-column: span 7;"},
          renderDayDetail(next, scopeEmpId));
        anchor.insertAdjacentElement("afterend", slot);
      }
    }
  }

  function renderDayDetail(dayNum, scopeEmpId=null) {
    const data = dataByDay(state.calYear, state.calMonth, scopeEmpId);
    const dayShifts = data[dayNum] || [];
    const d = new Date(state.calYear, state.calMonth, dayNum);
    const label = d.toLocaleDateString(locale(),
      { weekday:"long", month:"long", day:"numeric" }).replace(/^./, c => c.toUpperCase());
    const wrap = el("div", {class:"day-detail"}, el("div", {class:"date-label"}, label));
    if (!dayShifts.length) {
      wrap.appendChild(el("div", {class:"no-shifts"}, tr("noShifts")));
      return wrap;
    }
    const groups = {};
    for (const sh of dayShifts) (groups[sh.empId] = groups[sh.empId] || []).push(sh);
    const t = el("div", {class:"dd-table"});
    t.appendChild(el("div", {class:"head"},
      el("span", {}, tr("employee")),
      el("span", {class:"r"}, tr("tableTime")),
      el("span", {class:"r"}, tr("hours")),
    ));
    for (const [empIdStr, list] of Object.entries(groups)) {
      const emp = userById[Number(empIdStr)];
      for (const sh of list) {
        t.appendChild(el("div", {
          class:"trow",
          style:"cursor:pointer; touch-action:manipulation;",
          onclick: () => openModal("shiftDetail", { viewingShiftId: sh.id }),
        },
          el("span", {class:"nm", style:`color:${emp.color}`},
            el("span", {class:"sw", style:`background:${emp.color}`}),
            el("span", {}, emp.displayName),
          ),
          el("span", {class:"tm"},
            timeRangeWithTz(sh.start, sh.end, sh.clockInTz, sh.clockOutTz, new Date(sh.date + "T00:00:00")),
            prevDayBadge(sh),
          ),
          el("span", {class:"hrs", style:`color:${emp.color}`},
            el("span", {}, sh.hours.toFixed(1)),
            el("span", {class:"chev"}, "›"),
          ),
        ));
        if (sh.comment) t.appendChild(el("div", {class:"cmt"}, `"${sh.comment}"`));
      }
    }
    wrap.appendChild(t);
    return wrap;
  }

  // The old `.topbar` consumed ~50px on every screen even when it carried

  // in the page (admin_employee header). Now both controls float over the

  function renderTopbar() {
    const back = document.getElementById("floatBack");

    if (state.screen === "login") {
      back.innerHTML = "";
      account.innerHTML = "";

  // Account / sign-out dropdown. Replaces what used to be a single-tap
  // sign-out icon — a mis-tap on that wiped the session. Now tapping
  // opens a menu, and the user has to hit "Sign out" deliberately.
  function renderUserMenu() {
    const u = state.currentUser;

      u?.role === "owner" ? "owner" :

      u?.role === "readonly" ? "readonly" :

        // Just re-render the topbar — a full render() replays the
        // screen-enter transition on the main content, which reads like a
        // page flash every time you open the menu.
        renderTopbar();
      },
    }, ICON("user"));
    if (state.userMenuOpen) {
      const menu = el("div", {
        class: "user-menu",

  // =============================================================
  // SCREENS
  // =============================================================
  function renderLogin() {
    const s = strings[state.lang];
    const root = document.getElementById("scrollRoot");
    root.innerHTML = "";
    root.className = "scroll";

    let errorBox = null;
    const userIn = el("input", {
      placeholder: s.username,
      autocomplete: "username",
      autocapitalize: "off",
      autocorrect: "off",
      spellcheck: "false",
      inputmode: "text",
    });
    const { input: passIn, wrap: passWrap } = passwordField({
      placeholder: s.password,
      autocomplete: "current-password",
      autocapitalize: "off",
      autocorrect: "off",
      spellcheck: "false",
    });

    async function attempt(username, password) {
      if (goBtn.disabled) return;
      goBtn.disabled = true;
      try {
        const { user, token } = await api.login(username, password);
        setToken(token);
        const dbResp = await api.db();
        hydrateFromDb(dbResp);
        login(user);
      } catch (e) {
        if (!errorBox) errorBox = el("div", {class:"err"}, s.invalidCreds);
        form.insertBefore(errorBox, goBtn);
        errorBox.textContent = e.status === 401 ? s.invalidCreds : tr("errCouldntSignIn");
      } finally {
        goBtn.disabled = false;
      }
    }

    const goBtn = el("button", {
      class:"go",
      onclick: (e) => { e.preventDefault(); attempt(userIn.value.trim(), passIn.value); }
    }, s.signIn);

    const form = el("form", {class:"login-form", onsubmit: (e) => { e.preventDefault(); attempt(userIn.value.trim(), passIn.value); }},
      userIn, passWrap, goBtn);

    const langRow = el("div", {style:"display:flex; justify-content:flex-end; width:100%;"},
      langToggle()
    );

    root.appendChild(el("div", {class:"login-wrap screen-enter"},
      langRow,
      el("div", {class:"brand"}, s.appName.slice(0,5), el("span", {class:"accent"}, s.appName.slice(5))),
      el("div", {class:"tag"}, s.tagline),
      form,
    ));
  }

  // ============================================================
  // WEEK CARD — collapsible week roll-up showing range + hours,
  // expanding to a list of shift cards. Used on the History tab and
  // on per-employee admin views. (Weekly submission/approval flow
  // was removed: shifts now just stack up with no status pill, no
  // submit button, and no admin inbox.)
  // ============================================================
  function renderWeekRow(opts) {
    const {
      empId, weekStart,
      showEmployee = false,
      forceExpanded = false,
    } = opts;

    const wkShifts = shiftsForWeek(empId, weekStart);
    const wkHours = wkShifts.reduce((s, x) => s + x.hours, 0);
    const wkEnd = weekEndOf(weekStart);
    const emp = userById[empId];

    // ---- expansion state ----
    // Lazy-init: pre-expand the current week so it's open by default
    // wherever the week card is rendered (home + history).
    if (state.expandedHistoryWeeks == null) {
      state.expandedHistoryWeeks = new Set();
      state.expandedHistoryWeeks.add(thisWeekStart());
    }
    const set = state.expandedHistoryWeeks;
    let expanded = forceExpanded || set.has(weekStart);
    const toggleExpand = forceExpanded ? null : () => {
      if (set.has(weekStart)) set.delete(weekStart); else set.add(weekStart);
      render();
    };

    // ---- title + meta block ----
    const titleBlock = el("div", {class:"wc-title-block"});
    if (showEmployee && emp) {
      titleBlock.appendChild(el("div", {class:"wc-employee", style:`color:${emp.color}`}, emp.displayName));
    }
    titleBlock.appendChild(el("div", {class:"wc-title"},
      `${fmtDateShort(weekStart)} – ${fmtDateShort(wkEnd)}`));
    titleBlock.appendChild(el("div", {class:"wc-sub"},
      `${wkHours.toFixed(1)}${tr("hoursShort")} · ${wkShifts.length} ${tr("shifts").toLowerCase()}`));

    // ---- right side: hours + chevron ----
    const right = el("div", {class:"wc-right"},
      el("span", {class:"wc-hrs"}, `${wkHours.toFixed(1)}${tr("hoursShort")}`),
    );
    if (toggleExpand) {
      right.appendChild(el("span", {class:`chevron ${expanded ? "up" : ""}`}, "›"));
    }

    const head = el("div", {
      class: "wc-head" + (toggleExpand ? " tappable" : ""),
      onclick: toggleExpand || null,
    }, titleBlock, right);

    const card = el("div", {class:"week-card week-rollup"}, head);

    if (expanded && wkShifts.length > 0) {
      const sorted = [...wkShifts].sort((a,b) =>
        a.date.localeCompare(b.date) || a.start.localeCompare(b.start));
      for (const sh of sorted) card.appendChild(renderShiftCard(sh));
    }

    return card;
  }

  // Shared compact shift list used by admin approvals drill-in,
  // employee sign-off card, past-weeks rows, and history week expansion.
  function weekShiftBreakdown(wkShifts) {
    const details = el("div", {class:"breakdown"});
    if (!wkShifts.length) {
      details.appendChild(el("div", {class:"empty"}, tr("noShifts")));
      return details;
    }
    const sorted = [...wkShifts].sort((a,b) =>
      a.date.localeCompare(b.date) || a.start.localeCompare(b.start));
    for (const sh of sorted) {
      const shDate = new Date(sh.date + "T00:00:00");
      // noteOptional users normally work short shifts — don't flag them as a
      // problem.
      const hrsCls = (sh.hours < 9 && !userById[sh.empId]?.noteOptional) ? "h warn" : "h ok";
      const drow = el("div", {
        class: "drow tappable",
        onclick: () => openModal("shiftDetail", { viewingShiftId: sh.id }),
      },
        el("div", {class:"d"}, fmtDateWD(bizDate(sh)), prevDayBadge(sh)),
        el("div", {class:"t"},
          timeRangeWithTz(sh.start, sh.end, sh.clockInTz, sh.clockOutTz, shDate),
        ),
        el("div", {class: hrsCls}, `${sh.hours.toFixed(1)}${tr("hoursShort")}`),
      );
      if (sh.comment) {
        drow.appendChild(el("div", {class:"c"}, `"${sh.comment}"`));
      }
      details.appendChild(drow);
    }
    return details;
  }

  // Persist the clock-in as an OPEN shift (no end yet) so admins see the
  // employee in "On shift now" immediately. Optimistic + best-effort: the UI
  // has already flipped to the in-progress card, so this commits in the
  // background (a GitHub commit is 300–800ms) and stashes the new shift id so
  // the matching clock-out closes THIS row instead of creating a second one.
  // On failure we leave openShiftId null and the eventual submit creates the
  // full shift exactly as before — clock-in persistence is only for live admin
  // visibility, never the source of truth for the recorded shift.
  function persistClockIn() {
    const d = state.clockIn;
    if (!d) return;
    const pad = n => String(n).padStart(2, "0");
    const dateStr = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
    const start = `${pad(d.getHours())}:${pad(d.getMinutes())}`;
    state.openShiftId = null;
    state.openShiftPending = (async () => {
      try {
        const { shift } = await api.createShift({
          date: dateStr,
          start,                        // no `end` → server creates an open shift
          clockIn: state.clockInCoord,  // may be null until GPS resolves; backfilled at clock-out
          clockInTz: state.clockInTz,
        });
        state.openShiftId = shift.id;
        if (!shifts.some(s => s.id === shift.id)) shifts.push(shift);
        nextShiftId = Math.max(nextShiftId, shift.id + 1);
        saveClockState();
      } catch (e) {
        console.warn("[clock-in] open-shift persist failed; submit will create the full shift", e);
      }
    })();
  }

  function clockSection() {
    // Three states only — Idle / In progress / Just finished.
    if (state.clock === "idle") {
      const btn = el("button", {
        class: "btn hero clock-in",
        onclick: async () => {
          state.clock = "in";
          state.clockIn = new Date();
          state.clockInCoord = null;
          state.clockInTz = currentTimezone();
          saveClockState();
          render();
          persistClockIn();   // background open-shift commit → instant "on shift now"
          const c = await getCurrentCoord();
          state.clockInCoord = c.real ? { lat: c.lat, lng: c.lng } : null;
          saveClockState();
          const t = gpsToast(c, "in");
          toast(t.msg, { kind: t.kind, pill: t.pill });
          render();
        },
      }, ICON("play", 32), el("div", {}, tr("clockIn")));
      return btn;
    }
    if (state.clock === "in") {
      const wrap = el("div", {});
      const inTz = tzShort(state.clockInTz, state.clockIn);
      wrap.appendChild(el("div", {class:"clock-card"},
        el("div", {class:"pulse"}),
        el("div", {style:"flex:1"},
          el("div", {class:"label"}, tr("clockedInAt")),
          el("div", {class:"time"},
            fmtTimeDate(state.clockIn),
            inTz ? el("span", {class:"tz-inline"}, inTz) : null,
          ),
        )
      ));
      if (state.clockInCoord) {
        wrap.appendChild(miniMapThumb([{...state.clockInCoord, in: true}]));
      }
      wrap.appendChild(el("div", {style:"height:14px"}));
      wrap.appendChild(el("button", {
        class:"btn hero clock-out",
        onclick: async () => {
          state.clock = "out";
          state.clockOut = new Date();
          state.clockOutCoord = null;
          state.clockOutTz = currentTimezone();
          saveClockState();
          render();
          const c = await getCurrentCoord();
          state.clockOutCoord = c.real ? { lat: c.lat, lng: c.lng } : null;
          saveClockState();
          const t = gpsToast(c, "out");
          toast(t.msg, { kind: t.kind, pill: t.pill });
          render();
        }
      }, ICON("stop", 32), el("div", {}, tr("clockOut"))));
      return wrap;
    }
    // state.clock === "out": summary + comment + submit
    const diffMin = (state.clockOut - state.clockIn) / 60000;
    const hrs = diffMin / 60;

    const commentField = el("textarea", {
      class: "comment-field",
      placeholder: tr("comments"),
      oninput: (e) => { state.comment = e.target.value; saveClockState(); updateSubmitState(); },
    });
    commentField.value = state.comment;

    const wrap = el("div", {});
    const inTzShort  = tzShort(state.clockInTz,  state.clockIn);
    const outTzShort = tzShort(state.clockOutTz, state.clockOut);
    const summaryPins = [];
    if (state.clockInCoord)  summaryPins.push({...state.clockInCoord,  in: true });
    if (state.clockOutCoord) summaryPins.push({...state.clockOutCoord, in: false });

    const summaryEl = el("div", {class:"shift-summary"},
      el("div", {class:"row"},
        el("div", {class:"col"},
          el("div", {class:"l-label"}, tr("start")),
          el("div", {class:"time"},
            fmtTimeDate(state.clockIn),
            inTzShort ? el("span", {class:"tz-inline"}, inTzShort) : null,
          ),
        ),
        el("div", {class:"col r"},
          el("div", {class:"l-label"}, tr("end")),
          el("div", {class:"time"},
            fmtTimeDate(state.clockOut),
            outTzShort ? el("span", {class:"tz-inline"}, outTzShort) : null,
          ),
        ),
      ),
      summaryPins.length ? miniMapThumb(summaryPins) : null,
      el("div", {class:"total"},
        el("span", {class:`value ${hrs < 9 ? "warn":""}`}, hrs.toFixed(1)),
        el("span", {class:"unit"}, tr("hours").toLowerCase()),
      ),
      commentField,
    );

    // Per-user opt-out (e.g. a part-time hire whose normal day is < 9hrs):
    // owner sets noteOptional on the user, and the under-9hr comment rule
    // stops applying to them everywhere.
    const noteRequired = hrs < 9 && !state.currentUser?.noteOptional;
    if (noteRequired) {
      summaryEl.appendChild(el("div", {class:"comment-required-note"}, tr("commentRequired")));
    }
    wrap.appendChild(summaryEl);
    wrap.appendChild(el("div", {style:"height:14px"}));
    const submitBtn = el("button", {
      class: "btn primary full",
      onclick: async (ev) => {
        if (noteRequired && !state.comment.trim()) {
          commentField.focus();
          commentField.classList.add("required");
          return;
        }
        if (ev.currentTarget.disabled) return;
        ev.currentTarget.disabled = true;
        const d = state.clockIn;
        const dateStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
        const pad = n => String(n).padStart(2,"0");
        const start = `${pad(state.clockIn.getHours())}:${pad(state.clockIn.getMinutes())}`;
        const end   = `${pad(state.clockOut.getHours())}:${pad(state.clockOut.getMinutes())}`;
        // Use the actual Date diff so overnight shifts (end-time-of-day before
        // start-time-of-day) compute correctly — the HH:MM strings drop the
        // date and would otherwise yield a negative span.
        const computedHours = Math.round(((state.clockOut - state.clockIn) / 3600000) * 10) / 10;
        // Wait for the background clock-in commit (if still in flight) so we
        // know whether there's an open shift to close vs. a fresh one to create.
        if (state.openShiftPending) { try { await state.openShiftPending; } catch {} }
        const shiftBody = {
          date: dateStr,
          start, end,
          hours: computedHours,
          comment: state.comment.trim(),
          clockIn:  state.clockInCoord,
          clockOut: state.clockOutCoord,
          clockInTz:  state.clockInTz,
          clockOutTz: state.clockOutTz,
        };
        const finish = (shift) => {
          // The completed shift replaces the open row if we had one.
          const i = shifts.findIndex(s => s.id === shift.id);
          if (i >= 0) shifts[i] = shift; else shifts.push(shift);
          nextShiftId = Math.max(nextShiftId, shift.id + 1);
          state.clock = "idle";
          state.clockIn = state.clockOut = null;
          state.clockInCoord = state.clockOutCoord = null;
          state.clockInTz = state.clockOutTz = null;
          state.comment = "";
          state.openShiftId = null;
          state.openShiftPending = null;
          saveClockState(); // clears the per-user localStorage key
          toast(tr("shiftLogged"), {kind:"success", pill:"✓"});
          render();
        };
        try {
          if (state.openShiftId != null) {
            // Close the open shift created at clock-in.
            const { shift } = await api.clockOut({ id: state.openShiftId, ...shiftBody });
            finish(shift);
          } else {
            // No open shift (old client, or the clock-in commit never landed) —
            // create the complete shift, exactly as the app did before.
            const { shift } = await api.createShift(shiftBody);
            finish(shift);
          }
        } catch (e) {
          // Closing a now-missing/already-closed open shift must never lose the
          // shift — fall back to creating a complete one.
          if (state.openShiftId != null && (e.status === 404 || e.status === 409)) {
            try {
              state.openShiftId = null;
              const { shift } = await api.createShift(shiftBody);
              finish(shift);
              return;
            } catch (e2) {
              ev.currentTarget.disabled = false;
              toastApiError(e2, tr("errCouldntSaveShift"));
              return;
            }
          }
          ev.currentTarget.disabled = false;
          toastApiError(e, tr("errCouldntSaveShift"));
        }
      }
    }, el("span", {}, tr("submit")));
    wrap.appendChild(submitBtn);

    function updateSubmitState() {
      // Only clear a prior "required" state once the user has typed. We don't
      // pre-warn them with red — the comment-required-note pill does that
      // calmly in amber. The red state only appears if they try to submit
      // without a comment.
      if (state.comment.trim()) commentField.classList.remove("required");
    }
    return wrap;
  }

  // Admin "Home" tab — greeting, month calendar, then the Employees roster.
  // Pending approvals live on the Inbox tab. The roster used to be its own
  // tab but Today + Roster on their own each felt thin; reuniting them
  // gives this screen a real reason to exist (operational glance + drill-in).
  // An "open shift" = clocked in, no clock-out yet (end is null/empty). This is
  // the row a clock-in writes before the matching clock-out lands, so its mere
  // presence means the employee is on shift right now.
  function openShiftFor(empId) {
    return shifts.find(s => s.empId === empId && !s.end);
  }
  function onShiftNow() {
    return employees()
      .map(emp => ({ emp, shift: openShiftFor(emp.id) }))
      .filter(x => x.shift);
  }
  // "3h 12m" elapsed since a clock-in, from the shift date + HH:MM start.
  function elapsedSince(dateStr, start) {
    const [h, m] = start.split(":").map(Number);
    const d = new Date(dateStr + "T00:00:00");
    d.setHours(h, m, 0, 0);
    let mins = Math.round((Date.now() - d.getTime()) / 60000);
    if (mins < 0) mins = 0;
    const hh = Math.floor(mins / 60), mm = mins % 60;
    return hh > 0 ? `${hh}h ${mm}m` : `${mm}m`;
  }

  // "On shift now" live roster — who is currently clocked in. Shown at the top
  // of the admin/owner/read-only home so on-shift status is the first thing
  // they see. Each row taps through to that employee's profile.
  function renderLiveOnShift() {
    const live = onShiftNow();
    const wrap = el("div", {style:"margin: 0 2px 4px;"});
    wrap.appendChild(el("div", {class:"live-head"},
      el("h3", {}, el("span", {class:"live-dot"}), tr("onShiftNow")),
      el("small", {}, String(live.length)),
    ));
    if (!live.length) {
      wrap.appendChild(el("div", {class:"live-empty"}, ICON("clock", 16), el("span", {}, tr("noOneOnShift"))));
      return wrap;
    }
    for (const { emp, shift } of live) {
      const dateHint = new Date(shift.date + "T00:00:00");
      wrap.appendChild(el("div", {
        class: "live-row",
        onclick: () => navTo("admin_employee", { viewingEmployeeId: emp.id, selectedDay: null }),
      },
        el("div", {class:"av", style:`background:color-mix(in oklab, ${emp.color} 22%, transparent); color:${emp.color}`}, emp.displayName.charAt(0)),
        el("div", {class:"body"},
          el("div", {class:"name", style:`color:${emp.color}`}, emp.displayName),
          el("div", {class:"since"}, `${tr("onShiftSince")} `, timeWithTz(shift.start, shift.clockInTz, dateHint)),
        ),
        el("div", {class:"elapsed"}, elapsedSince(shift.date, shift.start)),
      ));
    }
    return wrap;
  }

  function renderAdminHome() {

  // Owner-only: full-page list of users. Tap an active user to edit them
